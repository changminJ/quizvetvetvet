<script type="application/json" id="quiz-data">{"L01-history": {"lecture": "L01-history", "title": "수의독성학의 역사", "slug": "history", "questions": [{"lecture": "L01-history", "round": "2025-중간", "num": "3", "qid": "Q002", "body": "3. 수의독성학의 역사에 대한 아래의 설명 중 틀린 것을 모두 고르면?\n\n①. 19세기 유기화학의 성장에 힘입어 실험독성학이 급속히 발달하였다.\n②. 1960년대 수천 명의 어린이들이 심한 기형으로 태어나게 한 비극적인 Thalidomide 사건은 화학물질의 배아, 태아, 그리고 환경에 대한 영향을 총괄적으로 이해하기 위한 시도를 촉발했다.\n③. Paraquat의 환경 오염 문제는 Rachel Carson의 '침묵의 봄'(1962)이 발간되는 계기로 이어졌다.\n④. 1890년대 방사능과 비타민 중독 사고로 인해 1960년대에 미국 순수식품 및 의약품 관련 법 중의 최초인 Wiley 법안이 통과되었다.\n⑤. 마취제와 소독제 등 새로운 물질의 발견은 화학물질이 실험동물에 이로운가 아니면 해로운가를 결정하기 위하여 최초의 대규모 생물학적 분석(복수동물연구)를 이용하게 했다.", "jokboAnswer": "3, 4, 5", "claudeAnswer": "🔴 ③, ④, ⑤", "explanation": "**1) 배경**. 2025년 중간고사에 출제된 **종합형 역사 문항**. 5개 선지 중 3개가 교묘하게 뒤틀려 있고, 수의독성학 역사의 주요 사건(유기화학·실험독성학 / Thalidomide / 침묵의 봄·DDT / Wiley 법안 / 방사능·비타민·bioassay)이 한 문항에 모두 등장한다. L01 시험 대비의 핵심 문항.\n\n**2) 포인트**. 선지별 판정:\n- ①(19세기 유기화학 성장 → 실험독성학 급속 발달) → **옳음**. 강의안 lec-01 chunk 3 슬라이드 2 \"19세기 전반: 유기화학의 급속 발전 → 실험독성학 기반 마련\". 주의 — 일부 변형 문항(Q107)에서는 \"**20세기** 유기화학\"으로 세기를 뒤틀어 오답 처리한다.\n- ②(1960년대 Thalidomide → 배아·태아·환경 영향 통합 이해 촉발) → **옳음**. Q360의 정답 서술과 동일. 개념학습 Unit 1.6.\n- ③(**Paraquat**의 환경오염 문제 → 침묵의 봄 1962 계기) → **틀림**. 침묵의 봄의 고발 대상은 **DDT**이다. Paraquat는 1950년대 후반 개발된 제초제로 폐섬유화 독성이 유명하며, Rachel Carson의 고발과 무관. lec-02 chunk 2 슬라이드 3.\n- ④(1890년대 방사능·비타민 **중독 사고** → 1960년대 Wiley 법안 통과) → **틀림**. 이 선지는 **두 가지 오류**가 겹쳐 있다. 첫째, 방사능·비타민은 \"**발견**\"이지 \"중독 사고\"가 아니다. 둘째, Wiley 법안(Pure Food and Drug Act)은 **1906년** 통과(미국 연방법), 1960년대가 아니다. 또한 방사능·비타민 발견이 Wiley 법안의 직접 인과라는 강의안 서술도 없다.\n- ⑤(**마취제·소독제** 발견 → 최초 대규모 bioassay 도입) → **틀림**. 최초 대규모 bioassay의 계기는 **방사능·비타민의 발견**(Q348 정답)이지 마취제·소독제가 아니다. lec-01 chunk 3 슬라이드 3.\n\n**3) 정답 근거**. 틀린 선지 = ③·④·⑤. 강의안 lec-01 chunk 3 슬라이드 2~3 + lec-02 chunk 2~3 + 개념학습 Unit 1.5·1.6.\n\n**4) 오답 소거 (선지 조합)**. 족보가 \"3, 4, 5\"로 정답을 지정했으며, Claude 재판정도 동일. ①·②는 명백한 역사적 사실이므로 제외.\n\n**5) 함정**. 이 한 문항에 **수의독성학 역사 3대 함정**이 모두 집약되어 있다:\n- 🔴 **\"Paraquat ↔ DDT\"** — 침묵의 봄의 대상은 DDT. Paraquat 넣으면 즉시 오답.\n- 🔴 **\"Wiley 법안 연도 1906년\"** — 1960년대 넣으면 즉시 오답. 방사능·비타민 \"발견\"이지 \"중독 사고\" 아님.\n- 🔴 **\"복수동물연구(bioassay) 계기 = 방사능·비타민\"** — 마취제·소독제 넣으면 즉시 오답.\n\n시험 직전에 이 3대 함정만 체화하면 역사 종합 문항에서 실점하지 않는다.", "tail": "", "scoreable": true, "correctIndices": [2, 3, 4]}, {"lecture": "L01-history", "round": "2024-중간", "num": "48", "qid": "Q151", "body": "48. 유기염소계에 관한 설명으로 틀린 것을 모두 고르시오\n\na. 자연계에서 분해기전이 거의 없어 호수바닥의 침전물 등 환경에서 장시간 잔류한다.\nb. 1950-70년대 초반까지 농약으로 광범위하게 사용되어 오염된 토양이나 쓰레기처리장으로부터 지속적으로 누출되었다.\nc. 디페닐 지방족 화합물, 방향족 탄화수소, 사이클로디엔화합물이 포함된다.\nd. 수용성이 높아 생태계 먹이사슬의 상위단계에 있는 동물 및 인간에 축척되어 내분비계 장애물질, 일명 환경호르몬의 주종을 이루고 있다.\ne. 현재 유기염소계 농약은 아예 사용하고 있지 않다.\n\n①. a, c\n2. b, d, e\n3. c, e\n4. d, e", "jokboAnswer": "4", "claudeAnswer": "④ d, e", "explanation": "**1) 배경**. Q332와 완전히 동일한 구조의 문항. 선지 a가 \"분해기전이 **거의 없어** 잔류\"로 돌아왔다(Q257에서는 \"있으며 잔류\"로 바뀌었었음).\n\n**2) 포인트**. 5개 선지 판정:\n- a(분해기전 거의 없어 잔류) → 옳음.\n- b(1950~70년대 농약 광범위 사용·누출) → 옳음.\n- c(디페닐 지방족·방향족 탄화수소·사이클로디엔) → 옳음. 3계열 구성.\n- d(**수용성**이 높아 먹이사슬 상위 축적) → **틀림**. 지용성이 옳음.\n- e(현재 유기염소계 농약 **아예** 사용하지 않음) → **틀림**. \"아예\"는 극단적 과장.\n\n**3) 정답 근거**. 틀린 선지 = d·e → ④. 교과서 01장 + 강의안 lec-02.\n\n**4) 오답 소거**:\n- ① a, c → 둘 다 옳음.\n- ② b, d, e → b는 옳음.\n- ③ c, e → c는 옳음.\n\n**5) 함정**. Q332·Q151의 정답 패턴은 **d(지용성↔수용성) + e(일부사용↔전면금지)**로 고정되어 있다. 이 두 함정만 기억하면 유기염소계 \"틀린 것\" 시리즈 3문항(Q332·Q257·Q151)이 다 해결된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L01-history", "round": "2023-기말", "num": "28", "qid": "Q244", "body": "내분비계 장애물질이란 내분비계에서 정상적인 기능을 방해하는 물질로서 환경으로부터 체내에 유입되어 호르몬장애를 일으키는 것을 말한다. 환경호르몬에 대한 설명으로 틀린 것은?\n\nA. 극미량으로 장애를 유발한다.\nB. 호르몬 분비 불균형을 초래, 성장억제 등을 일으키지만 차세대에 영향을 주지 않는다.\nC. 체내대사가 빨리 일어나 배출이 용이하다.\nD. 지용성이 강하며 생물체내 지방조직에 축적된다.\nE. 자연계에서 만들어지지만 분해기구가 없어 장기간 안정된 상태로 존재한다.\nF. 일부 지역에 국한되어 독성 작용이 나타난다.", "jokboAnswer": "B, C, F", "claudeAnswer": "🔴 B, C, F", "explanation": "**1) 배경**. Q181·Q069와 거의 똑같은 문항 — 환경호르몬의 5대 특성 중 **정반대 오답 3종(차세대 영향 없다·체내대사 빠르다·일부지역 국한)**을 제시하고 나머지(극미량·지용성 축적·난분해성)는 옳게 제시하는 정형화된 \"틀린 것 고르기\" 문제.\n\n**2) 포인트**. 6개 선지 판정:\n- A(극미량 장애 유발) → 옳음. Q441 정의 서술 그대로.\n- B(차세대 영향 **주지 않는다**) → **틀림**. 환경호르몬의 가장 중요한 특성 중 하나가 \"차세대 영향\"이다. 급·만성 독성과 구분되는 지점.\n- C(체내대사 빨리·배출 용이) → **틀림**. 지용성·난분해성으로 반감기 길고 지방축적.\n- D(지용성 강함·지방 축적) → 옳음.\n- E(분해기구 없어 장기 안정) → 옳음. 난분해성.\n- F(일부 지역 국한) → **틀림**. 먹이사슬·대기 이동으로 전 지구적 분포(예: DDT는 극지방 동물 지방에서도 검출).\n\n**3) 정답 근거**. 틀린 선지 = B·C·F. 강의안 lec-02 slide 2 + 개념학습 Unit 1.7.\n\n**4) 오답 소거**. (선지 구조 5지선다가 주어지지 않은 서술형으로 보이지만) 족보 정답 표기가 \"B,C,F\"이므로 Claude 재판정도 동일.\n\n**5) 함정**. B·C·F는 **환경호르몬 오답 3종 세트**로 굳어진 고정 패턴이다. 이 세 가지만 자동 반사로 찍을 수 있으면 이 시리즈 5문항이 모두 해결된다. 특히 \"차세대 영향 **없다/있다**\" 뒤집기는 한 번만 놓치면 전면 오답이 되는 치명적 포인트.\n\n⚠️ 경계 문항이나 강의안만으로 전 선지 판정 가능.", "tail": "⚠️ 경계", "scoreable": false, "correctIndices": []}, {"lecture": "L01-history", "round": "2023-기말", "num": "38", "qid": "Q254", "body": "1950~1970년대 초반까지 농약으로 광범위하게 사용되어 오염 토양이나 쓰레기 처리장으로부터 지속적으로 누출되고 있으며, 자연계에 분해 기전이 거의 없어 호수 바닥의 침전물 등 환경에 장기간 잔류하고 특히 매우 높은 지용성으로 생태계 먹이사슬의 상위 단계에 있는 동물 및 인간에 축적되어 내분비계 장애물질(endocrine disrupting chemicals, EDCs), 일명 환경 호르몬의 주종을 이루고 있는 약물은?\n\n①. 유기인산염(organophophates)\n②. 유기염소계(organochlorines)\n③. 피프로닐(fipronil)\n④. 피레스린(pyrethrins)", "jokboAnswer": "미표기", "claudeAnswer": "② 유기염소계(organochlorines)", "explanation": "**1) 배경**. Q295의 **4지선다 변형**. 선지에서 아미트라즈가 빠지고 순서만 바뀌었다.\n\n**2) 포인트**. 문항 서술 4요소 — 1950~70년대 광범위 농약 사용, 난분해·잔류, 지용성 먹이사슬 농축, EDCs 주종 — 이 네 가지가 **모두 성립하는 농약 계열은 유기염소계**뿐. 선지 순서만 바뀌었지 답은 동일.\n\n**3) 정답 근거**. 교과서 01장 p.3 + 강의안 lec-02 + 개념학습 Unit 1.7.\n\n**4) 오답 소거**:\n- ① 유기인산염 → AChE 저해 신경독성 농약. 분해 빠르고 축적성 낮음.\n- ③ 피프로닐 → GABA 수용체 차단, 반려동물 외기생충약. EDCs 주종 아님.\n- ④ 피레스린 → 광분해성 빠른 천연 살충제. 난분해성과 정반대.\n\n**5) 함정**. Q295와 동일한 문항이므로 한번 체화했다면 반사적으로 정답이 나와야 한다. \"유기인산염 vs 유기염소계\" 혼동만 주의(인=신경, 염소=환경호르몬).", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L01-history", "round": "2023-기말", "num": "41", "qid": "Q257", "body": "유기염소계에 대한 설명으로 옳지 않은 것을 모두 고른 것은?\n\na. 자연계에 분해기전이 있으며 호수바닥의 침전물 등에 장기간 잔류한다.\nb. 1950~1970년대 초반까지 농약으로 광범위하게 사용되어 오염 토양이나 쓰레기 처리장으로부터 지속적으로 누출되고 있다.\nc. 디페닐 지방족 화합물, 방향족 탄화수소, 사이클로디엔 화합물이 포함된다.\nd. 매우 수용성으로 먹이사슬을 통해 동물 및 인간에 축적되어 내분비계 장애물질, 일명 환경호르몬의 주종을 이루고 있다.\ne. 현재 유기염소계 농약은 모두 사용하지 않고 있다.\n\n①.ce\n②.bde\n③.ace\n④.ade", "jokboAnswer": "4", "claudeAnswer": "④ a, d, e", "explanation": "**1) 배경**. Q332와 유사하지만 a에 **새로운 함정**이 추가된 변형. Q332에서는 a가 \"분해기전이 거의 없어 잔류\"로 옳은 진술이었는데, 이번 a는 \"**분해기전이 있으며** 잔류\"로 바뀌어 모순된 진술이 되었다.\n\n**2) 포인트**. 5개 선지 판정:\n- a(분해기전이 **있으며** 잔류) → **틀림**. 유기염소계는 분해기전이 거의 **없기** 때문에 잔류하는 것이다. 원인·결과가 논리적으로 맞지 않는 진술.\n- b(1950~70년대 광범위 사용·누출) → 옳음.\n- c(디페닐 지방족·방향족 탄화수소·사이클로디엔) → 옳음. 3계열 구성.\n- d(매우 **수용성**으로 먹이사슬 축적) → **틀림**. 지용성이 옳음.\n- e(현재 **모두** 사용하지 않음) → **틀림**. \"모두\"는 극단적 과장. 일부 지역·용도에서 사용 중.\n\n**3) 정답 근거**. 틀린 선지 3개(a·d·e) = ④. 교과서 01장 p.3 + 강의안 lec-02.\n\n**4) 오답 소거**:\n- ① c, e → c는 옳음.\n- ② b, d, e → b는 옳음.\n- ③ a, c, e → c는 옳음.\n\n**5) 함정**. a의 뒤틀기가 이번 회차의 핵심. \"분해기전이 있다\"와 \"분해기전이 없다\"는 한 글자 차이지만 완전히 반대 진술이다. 유기염소계 기출 7문항에서 이런 세밀한 뒤틀기가 반복되므로, **\"유기염소계의 어느 속성을 뒤집었는가\"**를 선지별로 지목할 수 있어야 한다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L01-history", "round": "2022-중간", "num": "32", "qid": "Q295", "body": "1950~1970년대 초반까지 농약으로 광범위하게 사용되어 오염 토양이나 쓰레기 처리장으로부터 지속적으로 누출되고 있으며, 자연계에 분해 기전이 거의 없어 호수바닥의 침전물 등 환경에 장기간 잔류하고 특히 매우 높은 지용성으로 생태계 먹이사슬의 상위 단계에 있는 동물 및 인간에 축적되어 내분비계 장애물질(endocrine disrupting chemicals, EDCs), 일명 환경 호르몬의 주종을 이루고 있는 약물은?\n\n①. 유기인산염(organophosphates)\n②. 피프로닐(fipronil)\n③. 피레스린(pyrethrins)\n④. 아미트라즈(amitraz)\n⑤. 유기염소계(organochlorines)", "jokboAnswer": "5", "claudeAnswer": "⑤ 유기염소계(organochlorines)", "explanation": "**1) 배경**. 이 문항은 환경호르몬·유기염소계 문항 **7문항 시리즈의 원형**이다(Q254·Q081·Q095·Q151·Q199와 동일 구조, 5지선다/4지선다/괄호완성으로만 변형). 문항 서술은 유기염소계의 4대 특성을 교과서 01장 원문 그대로 나열한 뒤 \"이 약물이 무엇인가\"를 묻는다.\n\n**2) 포인트**. 네 가지 진술이 모두 성립하는 유일한 농약 계열은 유기염소계다:\n- 1950~70년대 농약 광범위 사용 (DDT·Aldrin·Dieldrin 등)\n- 난분해성 → 호수 침전물 잔류\n- 지용성 → 먹이사슬 생물농축\n- EDCs 주종\n\n**3) 정답 근거**. 교과서 01장 p.3 + 강의안 lec-01 슬라이드 3~4 + lec-02 전체. 개념학습 Unit 1.7에 4대 특성 명시.\n\n**4) 오답 소거** (각 선지의 실제 특성 대비):\n- **① 유기인산염(organophosphates)** → 파라티온·말라티온 등 AChE(acetylcholinesterase) 저해 농약. 상대적으로 **분해가 빠르고 축적성 낮음**. \"잔류·생물농축·EDCs 주종\"에 해당하지 않음. L03·L05 범위에서 신경독성·SLUDGE 증상으로 자주 등장.\n- **② 피프로닐(fipronil)** → GABA 수용체 차단 살충제. 반려동물 외부기생충 제거에 쓰이나 지용성은 있어도 \"EDCs 주종\"은 아님.\n- **③ 피레스린(pyrethrins)** → 국화과 식물 추출 천연 살충제. **광분해성이 매우 빠르고** 포유류에 비교적 안전. \"난분해성\"과 정반대.\n- **④ 아미트라즈(amitraz)** → α2-아드레날린성 작용제, 진드기 구제제. EDCs 주종이 아님.\n\n**5) 함정**. ①과 ⑤는 이름이 비슷해 혼동 가능(유기인산염 vs 유기염소계). 핵심 구분: **\"인(P)\"이면 신경독성·분해 빠름·AChE, \"염소(Cl)\"이면 지용성·난분해·환경호르몬**. 시험 직전에 반드시 이 한 줄 매핑을 외워 두자.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L01-history", "round": "2022-기말", "num": "26", "qid": "Q322", "body": "환경호르몬(Environmental hormone)에 대한 설명으로 틀린 것은?\na. 체내 대사가 빨리 일어난다.\nb. 지용성이 강해 지방조직에 축적된다\nc. 국소적으로만 분포한다.\nd. 극미량으로도 생식기능에 이상을 가져올 수 있다.\ne. 만성독성과는 달리 차세대에 영향을 미친다.\nf. 먹이사슬을 통해 동물이나 사람의 체내에 축적된다.\ng. 분해하는 토양 미생물이 없어 환경에서 장기간 안정된다.\n\n①. a, b\n②. a, c\n③. c, d, e\n④. c, e, f\n5. d, g, g", "jokboAnswer": "2", "claudeAnswer": "② a, c", "explanation": "**1) 배경**. 환경호르몬 \"틀린 것 고르기\" 5문항 시리즈의 첫 등장. Q441에서 배운 4대 특성(극미량 효과·차세대 영향·먹이사슬 축적·지용성 지방축적)에 **난분해성(토양 미생물 분해 기구 없음)**까지 포함한 5대 특성 중, **정반대로 뒤집은 오답**을 골라내는 구조다.\n\n**2) 포인트**. 7개 선지를 하나씩 판정:\n- a(체내 대사가 빨리 일어난다) → **틀림**. 지용성·난분해성이라 체내 대사 느리고 지방축적.\n- b(지용성 강해 지방 축적) → 옳음. 4대 특성 중 하나.\n- c(국소적으로만 분포한다) → **틀림**. 먹이사슬 통해 전 지구적·전신 분포.\n- d(극미량으로 생식기능 이상) → 옳음.\n- e(만성독성과 달리 차세대 영향) → 옳음(Q441 정의).\n- f(먹이사슬 체내 축적) → 옳음.\n- g(분해 토양 미생물 없음 → 장기 안정) → 옳음(난분해성).\n\n**3) 정답 근거**. 틀린 선지는 a·c 두 개이므로 정답은 ② a, c. 강의안 lec-02 slide 2 + 개념학습 Unit 1.7.\n\n**4) 오답 소거**:\n- ① a, b → b는 옳으므로 탈락.\n- ③ c, d, e → d·e는 옳으므로 탈락.\n- ④ c, e, f → e·f는 옳으므로 탈락.\n- ⑤ d, g, g → 두 선지 모두 옳고, 중복 표기(오답지 자체가 오기).\n\n**5) 함정**. a(\"체내대사 빠름\")와 c(\"국소 분포\")는 환경호르몬 오답 5문항 시리즈 공통 함정. 향후 Q244·Q181·Q069에서도 정확히 같은 선지가 등장한다. 이 두 진술은 **환경호르몬의 정반대 특성**이라는 것을 반드시 체화하자.\n\n⚠️ 경계 문항이지만 강의안만으로 전 선지 판정 가능.", "tail": "⚠️ 경계", "scoreable": true, "correctIndices": [1]}, {"lecture": "L01-history", "round": "2022-기말", "num": "36", "qid": "Q332", "body": "유기염소계에 관한 설명으로 틀린 것을 모두 고르시오.\na. 자연계에서 분해기전이 거의 없어 호수바닥의 침전물 등 환경에서 장기간 잔류한다.\nb. 1950-70년대 초반까지 농약으로 광범위하게 사용되어 오염된 토양이나 쓰레기처리장으로부터 지속적으로 누출되었다.\nc. 디페닐 지방족 화합물(diphenyl aliphatic compounds), 방향족 탄화수소(aryl hydrocarbons), 사이클로디엔화합물(cyclodiene compounds)이 포함된다.\nd. 수용성이 높아 생태계 먹이사슬의 상위단계에 있는 동물 및 인간에 축적되어 내분비계 장애물질(endocrine disrupting chemicals, EDCs), 일명 환경호르몬의 주종을 이루고 있다.\ne. 현재 유기염소계 농약은 거의 사용하지 않고 있다.\n\n①. a, c, e\n②. b, c, e\n③. b, d, e\n4. c, e\n5. d, e", "jokboAnswer": "5", "claudeAnswer": "⑤ d, e", "explanation": "**1) 배경**. 유기염소계 \"틀린 것 모두 고르기\" 3문항 시리즈(Q332·Q257·Q151)의 원형. Q295의 정의 문항이 \"정답 키워드\"를 찾는 문제라면, 이 시리즈는 **두 가지 뒤틀기(수용성 vs 지용성, 전면 사용금지 vs 일부 사용 중)**를 중심으로 오답 여부를 판별한다.\n\n**2) 포인트**. 5개 선지 판정:\n- a(분해기전 없음 → 호수 침전물 잔류) → 옳음. 난분해성 핵심.\n- b(1950~70년대 농약 광범위 사용) → 옳음. 역사적 사실.\n- c(디페닐 지방족·방향족 탄화수소·사이클로디엔 포함) → 옳음. 3계열 구성.\n- d(**수용성**이 높아 먹이사슬 상위 축적 → EDCs 주종) → **틀림**. 수용성이 아니라 **지용성**이 핵심. 수용성 물질은 오히려 소변으로 빠르게 배출된다.\n- e(현재 유기염소계 농약 거의 사용하지 않음) → **부분적으로 틀림**. 족보 판정은 \"거의 사용하지 않음\"을 과장·일반화된 진술로 봐서 오답 처리. 일부 국가·특수 용도(예: 말라리아 퇴치 DDT 제한적 사용)에서는 여전히 사용.\n\n**3) 정답 근거**. 따라서 틀린 것은 d·e이고 정답은 ⑤. 교과서 01장 p.3 유기염소계 서술 + 강의안 lec-02.\n\n**4) 오답 소거**:\n- ①②③ → a·b·c 중 옳은 선지를 틀린 것으로 포함하므로 탈락.\n- ④(c, e) → c는 옳은 진술이므로 탈락.\n\n**5) 함정**. e의 \"거의 사용하지 않는다\"는 완곡한 표현이지만 출제자는 이를 \"절대 다수 사용 중단\"으로 해석해 오답 처리한다. Q151·Q257에서는 \"아예 사용하지 않는다\"·\"모두 사용하지 않는다\"처럼 더 극단적 표현으로 바뀌어 확실한 오답이 된다. **\"유기염소계 = 일부 잔존 사용\" 관점을 유지**하는 게 안전.", "tail": "", "scoreable": true, "correctIndices": [4]}]}, "L03-concepts": {"lecture": "L03-concepts", "title": "독성학 기초 개념", "slug": "concepts", "questions": [{"lecture": "L03-concepts", "round": "2025-중간", "num": "2", "qid": "", "body": "Paracelsus의 용량반응관계에 대한 설명으로 틀린 것을 고르시오.\n\n① 용량과 반응에서의 차이는 화학 물질의 치료와 독성의 특징 사이에서 나타난다.\n② 치료와 독성은 투여량과 밀접하게 관련되어 있지만, 투여량에 따라 구분될 수 없다.\n③ 과거 독성학 분야에 대한 기본적인 개념들이 현재에도 받아들여지고 있다.\n④ 실험은 화학물질에 대한 반응을 검사하기 위해 요구된다.\n⑤ 노출량이 증가함에 따라 독성도 증가한다는 가정을 바탕으로 한다.", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "Paracelsus의 4개념(교재 p.7-8, 강의안 lec-03 chunk 2 슬라이드 1)은 다음과 같다:\n1. 실험은 화학물질에 대한 반응을 검사하기 위해 요구된다.\n2. 용량과 반응에서의 차이는 화학물질의 치료와 독성의 특징 사이에서 나타난다.\n3. **치료와 독성의 특징은 투여량에 밀접하게 관련되어 있고 🔴 구분할 수 있다.**\n4. 화학물질에 대한 특이도와 치료적 효과 및 독성효과를 확인할 수 있다.\n\n각 선지 판정:\n- ① 옳음 — Paracelsus 2번째 개념 그대로.\n- ② **틀림** — Paracelsus 3번째 개념은 \"투여량에 따라 **구분할 수 있다**\"인데, ②는 \"구분될 수 없다\"로 완전히 뒤집었다. 이것이 Paracelsus 명제의 핵심 — \"용량이 독과 약을 구분한다\"는 그의 본질적 통찰을 부정하는 서술이다.\n- ③ 옳음 — 교재는 Paracelsus의 독물 정의에 대해 \"앞으로도 계속 유효할 것이다\"라고 평가하며 현재까지 유효함을 인정.\n- ④ 옳음 — Paracelsus 1번째 개념.\n- ⑤ 옳음 — 용량-반응 관계의 전제 \"생체에 노출된 독성물질의 양에 비례하여 생체에서 독성작용의 정도가 나타난다\"와 일치.\n\n정답은 **②**. 족보 정답 일치.\n\n**함정 요소**:\n- ②의 \"구분될 수 없다\"는 Paracelsus 명제의 핵심을 부정하는 절대 오답 패턴. Paracelsus의 본질은 \"용량이 차이를 만든다\"이므로 \"구분 불가능\"은 반드시 오답.\n- 1과 4 개념을 헷갈리기 쉬우나 문항은 개념 내용 자체가 아니라 \"틀린 것\" 하나만 고르면 되므로 ②에 집중.\n\n근거 위치: 교재 p.7-8, 강의안 lec-03 chunk 2 슬라이드 1.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "4", "qid": "", "body": "다음 용어들 중 틀린 것들로만 묶여있는 것은?\n\n① 독소(toxin): 독물 혹은 독(poison)과 같은 의미이며 이들 용어는 독성을 지닌 모든 물질을 지칭할 때 사용된다.\n② 독성(toxicity): 어떠한 독물이 생체에서 손상을 일으킬 수 있는 정도\n③ 중독증(toxicosis): 독물에 중독됨에 따라 발생하는 병적 상태\n④ 노출경로(route of exposure): 독성학에서는 주로 경구, 피부 및 호흡 세 가지의 경로를 통해 중독이 발생한다.\n⑤ 문턱용량(threshold dose): 독성물질의 노출 시에 독성이 보이는 최고용량을 의미한다.", "jokboAnswer": "①⑤", "claudeAnswer": "**①⑤**", "explanation": "교재 p.5-6 \"용어의 정의\" 전체를 근거로 판정:\n- ① **틀림** — 🔵 **독소(toxin)**는 교재 원문에서 \"생물체에 의해 생성된 독성물질\"로 정의되며 mycotoxin·zootoxin·phytotoxin이 예시. \"독물(poison) 혹은 독과 같은 의미이며 독성을 지닌 모든 물질을 지칭\"한다는 서술은 **독성물질(toxicant)**에 대한 정의다. 독소와 독물(=독성물질)을 동의어화한 것이 오류.\n- ② 옳음 — 교재 원문: \"독성(toxicity): 어떠한 독물이 생체에서 손상을 일으킬 수 있는 정도를 나타낸다.\"\n- ③ 옳음 — 교재 원문: \"중독증(toxicosis): 생물체가 독물(poison)에 노출되었을 때에 나타내는 병적상태를 뜻한다.\" 문항 서술은 축약 표현이나 의미 일치.\n- ④ 옳음 — 교재 원문: \"독성학에서는 주로 경구(oral), 피부(dermal), 호흡(inhalation)의 세 가지 경로를 통하여 독물의 노출이 발생한다.\"\n- ⑤ **틀림** — 교재 원문: \"🔴 **문턱용량(threshold dose): 생물체에서 독성물질의 노출 시에 독성이 관찰되는 최소용량을 의미한다.**\" ⑤는 \"독성이 보이는 **최고**용량\"이라고 썼는데, \"최고\"는 정반대 표현이며 \"보이는 최소용량 = 보이지 않는 최고용량\"으로 이해해야 한다.\n\n따라서 틀린 것은 **①⑤**. 족보 정답 일치.\n\n**함정 요소**:\n- **독소 ≠ 독물** — 이 구분이 [2025-중간] #4의 핵심 함정. 독소는 \"생물이 만든 독\", 독물은 \"독을 가진 모든 물질\"이라는 포괄-구체 관계. 영어로도 toxin(생물기원) vs toxicant(모든 독성물질)로 구분된다.\n- 문턱용량의 \"최소 vs 최고\" 뒤집기는 개념학습 Unit 2.1 적용 문항 #2에서도 함정 선지로 출제되었다.\n- ②·③·④는 모두 옳으므로 \"같은 의미\"·\"손상을 일으킬 수 있는 정도\"·\"경구·피부·호흡 3경로\" 같은 교재 키워드 표현에 익숙해질 것.\n\n근거 위치: 교재 p.5-6 \"1. 용어의 정의\".", "tail": "", "scoreable": true, "correctIndices": [0, 4]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "5", "qid": "", "body": "치료지수에 대한 설명으로 틀린 것을 모두 고르시오.\n\n① TI = 중간유효용량(ED50)/반수치사량(LD50)에 의해 구할 수 있다.\n② 치료지수는 약물이나 화학물질의 안전성 정도를 나타낸다.\n③ 동일한 약리작용을 갖는 두 가지 약물을 비교할 때 치료지수의 작용은 불가하다.\n④ 치료지수가 낮은 약물은 효능을 나타내는 농도와 독성을 나타내는 농도가 크게 차이 나므로 복용할 때 용량과 용법에 주의해야 한다.\n⑤ 어떤 약물이 상대적으로 치료지수가 더욱 크다면 그 약물은 환자의 투여 시에 더욱 안정하게 사용할 수 있다.", "jokboAnswer": "①③④", "claudeAnswer": "**①③④** (족보와 일치)", "explanation": "교재 p.5 \"치료지수\" 항목을 기준으로 각 선지 판정:\n- ① **틀림** — 🔴 **TI = LD50 / ED50**이 정확한 공식이다. ①은 분자·분모를 뒤바꾸어 ED50/LD50으로 썼으므로 오류. 치료지수는 \"치사량이 유효량의 몇 배인가\"를 묻는 비율이므로 분자에 LD50, 분모에 ED50이 와야 한다.\n- ② 옳음 — 교재 원문: \"약물이나 화학물질의 안전성(safety) 정도를 나타내는 지수.\"\n- ③ **틀림** — 교재 원문: \"같은 약리작용을 갖는 두 가지 약물을 비교하였을 때에, 어떤 약물이 상대적으로 치료지수가 더욱 크다면 그 약물은 환자에 투여 시에 더욱 안전하게 사용할 수 있다는 의미가 된다.\" 즉 교재는 동일 약리작용 약물 간 TI 비교를 **가능한 활용**으로 제시한다. ③의 \"불가하다\"는 정반대.\n- ④ **틀림** — 핵심 함정. TI가 **낮은** 약물은 유효 농도(ED50)와 치사 농도(LD50)가 **서로 가깝다**(차이가 **작다**). ④는 \"효능 농도와 독성 농도가 **크게 차이 나므로**\"라고 썼는데, TI가 낮다는 것은 곧 차이가 작다는 의미이므로 인과관계가 뒤집혔다. 결론 부분(\"용량·용법 주의\")은 맞지만 전제(\"크게 차이 나므로\")가 틀렸으므로 선지 전체가 틀린 것으로 판정.\n- ⑤ 옳음 — 교재 원문 그대로: TI가 클수록 더 안전하게 사용 가능.\n\n따라서 틀린 것은 **①③④**. 족보 정답과 일치한다.\n\n**함정 요소**:\n- ④는 \"결론은 맞지만 전제가 틀린\" 교묘한 선지. TI 낮음 ⇒ 효능과 독성 농도 **가까움** ⇒ 위험 ⇒ 용량·용법 주의. 이 인과 사슬을 정확히 이해할 것.\n- ①의 분자·분모 역전은 매우 흔한 단순 함정.\n- ③의 \"불가하다\" 역시 단순 부정 함정. TI의 주 용도가 바로 약물 간 안전성 비교라는 점을 상기.\n\n근거 위치: 교재 p.5 \"치료지수\".", "tail": "", "scoreable": true, "correctIndices": [0, 2, 3]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "6", "qid": "", "body": "안전계수에 대한 설명으로 틀린 것을 모두 고르시오.\n\n① 사람을 대상으로 한 실험에서는 10의 안전계수를 적용한다.\n② 만성 동물실험에서 얻은 무독성량의 경우에는 10의 안전계수를 적용한다.\n③ 개체 간 차이를 감안하여 10의 안전계수를 적용한다.\n④ 안전계수는 동물실험 등을 통한 화학물질의 독성시험 결과에서 얻은 무독성량으로부터 인간에게 적용하기 위한 안전한 잔류 허용량을 구하기 위해 사용하는 계수이다.\n⑤ 종 간 차이를 감안하여 10의 안전계수를 적용한다.", "jokboAnswer": "②⑤", "claudeAnswer": "**②** (족보와 다름 — ⑤는 옳음)", "explanation": "교재 p.5 \"안전계수\" 원문: \"일반적으로 동물 종 사이의 감수성 차이를 감안하여 10의 안전계수를, 그리고 개체간의 차이를 감안하여 10의 안전계수를 적용한다. 따라서 사람에서 관찰된 무독성량 값의 경우에는 그 값을 다시 안전계수 10으로 나누고, 만성 동물실험에서 얻은 무독성량의 경우는 그 값을 다시 안전계수 100으로 나누어 안전한 잔류허용량을 계산한다.\"\n\n각 선지 판정:\n- ① 옳음 — 사람 실험 데이터는 종간 차이가 없으므로 개체간 ×10만 적용해 총 안전계수 10.\n- ② **틀림** — 만성 동물실험 NOAEL은 🔴 **종간 10 × 개체간 10 = 100**으로 나눠야 한다. \"10\"만 적용한다는 서술은 오류.\n- ③ 옳음 — 개체간 차이 ×10.\n- ④ 옳음 — 안전계수의 정의 그대로.\n- ⑤ **옳음** (족보는 틀렸다고 했으나) — 종간 차이 ×10은 교재가 명시한 내용. 족보는 ⑤를 틀린 선지로 분류했지만 교재 원문과 완전히 부합하는 옳은 서술이다.\n\n따라서 **족보는 ②⑤이지만 강의안 p.5 근거로 ②만 틀림**. ⑤는 옳은 진술이므로 정답 세트에서 제외되어야 한다.\n\n**Claude 재판정 결론: ②만 정답** (족보 정답 ②⑤는 ⑤가 오기로 포함된 오류).\n\n**함정 요소**:\n- ② \"10만 적용\" 함정: 만성 동물실험 = 10(종간) × 10(개체간) = 100이라는 공식을 반드시 외울 것.\n- ⑤의 족보 오표기: 족보 정답을 무비판적으로 신뢰하면 ⑤도 틀렸다고 오해. **Claude는 강의자료 기준 독립 재판정**한다는 원칙상 ⑤는 옳다.\n- 사람 NOAEL(÷10) vs 동물 만성 NOAEL(÷100)의 이분법이 이 문항의 핵심.\n\n근거 위치: 교재 p.5 \"안전계수\".", "tail": "", "scoreable": true, "correctIndices": [1, 4]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "7", "qid": "", "body": "약리학과 독성학을 비교 설명한 것으로 옳지 않은 것을 모두 고른 것은?\n\n① 약물에 비하여 독성물질의 노출은 주로 경구 섭취, 흡입, 피부 노출, 그 외에 안구 노출 등으로 비교적 노출 경로가 제한적인 편이다.\n② 약물은 합리적으로 계획하여(rationally designed) 자발적으로(voluntarily) 투여된다.\n③ 용량 개념에 있어서는 약리학은 노출량의 개념이고, 독성학은 투여량의 개념으로 이해할 수 있다.\n④ 독성물질은 예상하지 못한 사이에 우발적으로(accidentally) 의식하지 못하고서(involuntarily) 노출이 일어난다.\n⑤ 체내에서의 분포, 대사, 배설의 원리나 용량반응관계의 적용 등에서는 약물이 독성물질이나 서로 유사한 점이 많다.", "jokboAnswer": "③", "claudeAnswer": "**③**", "explanation": "교재 p.7 \"3. 약리학과 독성학의 비교\" 전체가 이 문항의 정답 근거다. 선지 ①②④⑤는 모두 교재 원문 표현을 그대로 옮긴 옳은 진술이며, ③만 용량 개념을 뒤집어 놓았다.\n\n각 선지 판정:\n- ① 옳음 — 독성물질 노출 경로 제한성 (경구·흡입·피부·안구).\n- ② 옳음 — rationally designed + voluntarily.\n- ③ **틀림** — 🔴 **약리학 = 투여량(amount of administration), 독성학 = 노출량(amount of exposure)**. ③은 정확히 뒤집었다.\n- ④ 옳음 — accidentally + involuntarily.\n- ⑤ 옳음 — ADME + 용량-반응 관계 공통.\n\n정답은 **③**. 족보 정답 일치.\n\n**함정 요소**:\n- 이 유형은 2021·2022·2024·2025 모든 회차에서 반복 출제. 매번 \"약리학=투여량, 독성학=노출량\"을 뒤집은 선지가 정답. 영문 용어(amount of administration/exposure)까지 정확히 외울 것.\n- ①의 \"피하주사\"를 독성물질 경로에 포함할지 논란이 있으나(교재는 경구·흡입·피부·안구 4개를 명시), 이 문항은 피하주사 언급 없이 경구·흡입·피부·안구로 정확히 썼으므로 옳은 선지.\n\n근거 위치: 교재 p.7.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "9", "qid": "", "body": "독성물질에 의해 손상을 입는 세포나 조직, 장기는 선택적이다. 선택적 독성에 대해 설명한 것 중 틀린 것을 모두 고르시오.\n\n① 어떤 독성물질의 독성작용이 특정한 종류의 생물체 또는 생물체의 특정 부위의 조직에서만 관찰되는 경우에 이러한 독성을 선택적 독성이라 한다.\n② 제초제 파라콰트는 노출 경로 의존적으로 폐에서 선택적으로 높은 독성을 나타낸다.\n③ 선택적 독성이 발생하는 이유로 어떤 일부 종류의 생물체들에서 친화적이기 때문이고 표적 수용체와는 관련이 없다.\n④ 독성물질의 분해 능력이 어떤 일부 종류의 생물체 또는 특정 부위의 조직에서 다른 종류에 비해 더욱 높거나 또는 낮은 경우가 있다.\n⑤ 납이 경구로 노출된 때에는 신장이 일차표적 장기로 손상을 받는다.", "jokboAnswer": "②③⑤", "claudeAnswer": "**②③⑤** (족보와 일치 — ⑤는 교재 근거 부족으로 \"틀린 것\"으로 판정 가능)", "explanation": "교재 p.9-10 \"5. 표적기관과 선택적 독성\" 및 lec-03 chunk 4 슬라이드 2-3 기준으로 판정:\n- ① 옳음 — 선택적 독성의 교재 정의 그대로.\n- ② **틀림** — 🔴 **paraquat는 노출 경로에 상관없이(무관하게) 폐에서 선택적 독성**을 나타낸다. \"경로 의존적\"은 정반대 서술.\n- ③ **틀림** — 선택적 독성의 발생 원인 중 하나가 **표적 수용체의 존재 여부 및 친화력 차이**다 (교재 p.10 첫째·둘째 원인). \"표적 수용체와는 관련이 없다\"는 교재와 정면 충돌.\n- ④ 옳음 — 교재 p.10 셋째 원인: \"독성물질의 분해 능력이 특정 생물체 또는 특정 부위의 조직에서 다른 종류에 비해 더욱 높거나 또는 낮은 경우가 있다.\"\n- ⑤ **틀림** — 교재 p.9는 **카드뮴(cadmium)** 경구 노출 시 신장이 표적이라고 기술하며, **납(lead)**의 표적기관에 대한 명시적 서술은 02장에 없다. 일반 독성학 지식에서 납의 표적은 조혈계(적혈구·헴합성)·신경계(말초·중추)·신장 순으로 복합적이지만, 교재 02장 범위에서 \"납 경구 → 신장 일차표적\"이라는 명제는 근거가 없다. 따라서 교재 근거만으로는 ⑤를 옳다고 할 수 없으며, 족보도 ⑤를 틀린 선지로 분류.\n\n따라서 정답은 **②③⑤**. 족보 정답과 일치.\n\n**함정 요소**:\n- ②의 paraquat \"경로 의존/무관\"은 모든 선택적 독성 문항의 핵심 함정. 고정 암기.\n- ③은 교재의 세 원인(수용체 존재·친화력·분해 능력) 중 첫째·둘째를 통째로 부정하는 절대 오답 패턴.\n- ⑤는 함정형 선지 — 카드뮴-신장이 교재 원문인데 납으로 바꿔놓았다. 금속 독성물질의 표적은 개별적이므로 일반화 금지. 강의자료에 명시된 사례만 근거로 삼아야 한다.\n\n근거 위치: 교재 p.9-10 \"5. 표적기관과 선택적 독성\".", "tail": "", "scoreable": true, "correctIndices": [1, 2, 4]}, {"lecture": "L03-concepts", "round": "2024-중간", "num": "7", "qid": "", "body": "약리학과 독성학의 차이를 비교했을 때 틀린 것을 고르시오.\n\n① 약리학과 다르게 독성학은 경구 투여, 흡입, 피하주사, 안구노출 등 비교적 노출 경로가 제한적이다.\n② 용량 개념으로 볼 때 약리학은 노출량, 독성학은 투여량의 개념으로 볼 수 있다.\n③ 약리학은 합리적으로 계획하고 자발적으로 투여한다.\n④ 독성물질의 경우 우발적으로 의식하지 못하고 노출된다.\n⑤ 약리학과 독성학은 분포, 대사, 배설, 용량반응관계 등 유사점이 많다.", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "교재 p.7 \"약리학과 독성학의 비교\"를 기준으로 각 선지 판정:\n- ① 옳음 — 교재 p.7: \"독성물질의 노출은 주로 경구섭취, 흡입, 피부노출, 그리고 그 외에 안구노출 등으로 비교적 노출 경로가 제한적인 편이다.\" (주의: \"피하주사\"는 약물 투여 경로로 일반적이지만, 독성물질 노출 경로로 포함되는지는 문항에 따라 판정이 갈린다. 본 문항에서는 \"독성학은 ~ 제한적\"이라는 전체 결론이 옳으므로 옳은 선지로 본다.)\n- ② **틀림** — 교재 p.7: \"🔴 **약리학은 투여량(amount of administration)의 개념, 독성학은 노출량(amount of exposure)의 개념**.\" ②는 이를 정확히 뒤집음.\n- ③ 옳음 — \"약물은 합리적으로 계획하여(rationally designed) 자발적으로(voluntarily) 투여된다.\"\n- ④ 옳음 — \"독성물질은 예상하지 못한 사이에 우발적으로(accidentally) 의식하지 못하고서(involuntarily) 노출이 일어난다.\"\n- ⑤ 옳음 — \"체내에서의 분포, 대사, 배설의 원리나 용량-반응 관계의 적용 등에서는 약물이나 독성물질이나 서로 유사한 점이 많다.\"\n\n정답은 **②**. 족보 정답 일치.\n\n**함정 요소**:\n- ②는 \"약리학·독성학 비교\" 문항의 단골 오답 선지. [2025-중간] #7(Q006)도 완전히 동일한 패턴으로 ③ 정답.\n- ① \"피하주사\"가 독성물질 노출 경로로 제시된 점이 미묘 — 교재 원문은 경구·흡입·피부·안구 4개를 명시한다. 피하주사는 엄밀히 약물의 비경구 투여 경로이나, 문항 맥락에서 ②가 명백한 오답이므로 ①은 옳은 것으로 판정한다.\n\n근거 위치: 교재 p.7 \"약리학과 독성학의 비교\".", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L03-concepts", "round": "2024-중간", "num": "8", "qid": "", "body": "용량반응관계는 독성학의 근간을 이루는 가장 기본적이면서도 중요한 개념이다. 이에 대한 가정으로 틀린 것은?\n\n① 용량반응관계의 이론은 생체에 노출된 독성물질의 양에 비례하여 독성작용의 정도를 나타낸다.\n② 독성물질의 작용은 독성물질이 표적으로 하는 분자(molecule) 또는 수용체(receptor)에 작용하여 독성반응을 일으킨다.\n③ 독성반응의 크기는 그 특정 수용체에서의 독성물질 농도(concentration)와 상관관계가 있다.\n④ 특정 수용체에서의 독성물질의 농도는 그 독성물질의 노출량(dose)와 관련이 있다.\n⑤ 수용체의 종류와 수에 관련이 있다.", "jokboAnswer": "모두 맞음 (정답 없음)", "claudeAnswer": "**모두 맞음** (정답 없음 유형)", "explanation": "교재 p.8 \"4. 용량반응관계\" 전체를 근거로 각 선지 판정:\n- ① 옳음 — 교재 원문: \"용량-반응 관계의 이론은 생체에 노출된 독성물질의 양에 비례하여 생체에서 독성작용의 정도가 나타난다는 것에 기반을 두고 있다.\"\n- ② 옳음 — 3대 전제 첫째: \"독성물질의 작용은 독성물질이 표적으로 하는 분자(molecule) 또는 수용체(receptor)에 작용해서 독성 반응을 일으킨다.\"\n- ③ 옳음 — 3대 전제 둘째: \"독성 반응의 크기는 그 특정 수용체에서의 독성물질의 농도(concentration)와 상관관계가 있다.\"\n- ④ 옳음 — 3대 전제 셋째: \"특정 수용체에서의 독성물질의 농도는 그 독성물질의 노출량(dose)과 관련이 있다.\"\n- ⑤ 옳음 — 교재 p.8: \"발현되는 독성 반응의 크기 정도는 특정 독성물질이 어떤 수용체를 통해 작용하는가, 또한 표적기관에 이 독성물질의 수용체가 얼마나 많이 존재하고 있는가 등에 따라서도 영향을 받는다.\" 수용체의 종류·수가 반응에 관련된다는 진술은 교재 서술과 일치.\n\n따라서 **정답은 \"모두 맞음\"**. 족보 정답과 일치한다.\n\n**함정 요소**:\n- \"정답 없음\" 유형 문항은 수험생이 무리하게 오답을 찾으려다 함정에 빠지기 쉽다. 5개 선지가 모두 옳은 진술인지 교재 원문과 1:1 대조하는 신중함 필요.\n- 변형 문항(개념학습 Unit 2.4 적용 문항 #2)은 ⑤를 \"수용체의 종류와 수에는 영향을 받지 않는다\"로 뒤집어 틀린 선지로 만든다. 선지 표현이 긍정/부정으로 바뀔 때 주의.\n\n근거 위치: 교재 p.8 \"4. 용량반응관계\".", "tail": "", "scoreable": false, "correctIndices": []}]}, "L04-toxicokinetics": {"lecture": "L04-toxicokinetics", "title": "독물동력학 (ADME)", "slug": "toxicokinetics", "questions": [{"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "8", "qid": "Q007", "body": "8. 다음 중 독동학 구획 모형에 대한 설명으로 옳지 않은 것을 모두 고르시오.\n\n① 약물 기반의 생리학이나 해부학적 구조의 기질적 특성에 대한 정보가 필요하다.\n② 복합적 투여 용량에서 물질의 축적 정도를 설명하거나 예측하는데 값진 정보를 제공한다.\n③ 특별한 조직의 생물학 구획 간의 개별적인 전달 속도, 배출 경로에서 개별적인 기여와 비율 등을 정확하게 평가하고 반영할 수 있다.\n④ 특별한 조직에서 시간 경과, 노출 정도 및 약물의 특이한 속성, 배출을 정확하게 평가하거나 반영할 수 있다.\n⑤ 특별한 노출 정도까지 도달하기 위한 약물의 효용성, 투여 용량 및 투여 방식을 선택하는 데 이용할 수 있다.", "jokboAnswer": "1, 3, 4", "claudeAnswer": "**①③④**", "explanation": "교과서 p.14~15.\n- ① 오류: 구획모형은 생리·해부 정보 **없이도** 단순화 기술 가능.\n- ② 옳음.\n- ③ 오류: 개별 조직 구획 간 전달속도·배출 경로별 기여 **정확하게** 평가 = 구획모형 한계.\n- ④ 오류: 특정 조직 상세 반영 불가 = 구획모형 한계.\n- ⑤ 옳음.", "tail": "", "scoreable": true, "correctIndices": [0, 2, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "10", "qid": "Q009", "body": "10. 독동학과 독력학에 대한 설명 중 틀린 것을 모두 고르시오.\n\n① ADME 과정이 0차역학이고 비선형인 약동학과는 달리 독동학은 1차역학이고 선형이다.\n② 독성물질이 체내에서 어떤 생리적 움직임을 보이는가를 연구하는 학문을 독력학, 독성물질의 독성효과에 대한 분자적 기전, 상호작용을 연구하는 학문을 독동학이라고 한다.\n③ 독동학은 1차역학을 따르고 역학 과정이 선형으로 기대되는 약물의 낮은 농도와 관련된 ADME 과정의 역학이다.\n④ 독동학의 기본적인 목적은 독성 시험 조건 아래에서 생체이물의 투여 용량과 체내 순환하고 있는 농도 사이에 상관관계와 관련된 정보를 얻는데 있다.\n⑤ 독동학 자료는 후속 임상시험에서 투여 용량의 점진적인 증가를 위한 근거를 제공한다.", "jokboAnswer": "1, 2, 3", "claudeAnswer": "**①②**", "explanation": "교과서 p.11.\n- ① 오류: 약동학이 1차역학·선형. 독동학은 고용량에서 0차역학·비선형 **포함**. ①은 뒤바뀜.\n- ② 오류: 독동학 = ADME; 독력학 = 분자 기전. 명칭 뒤바뀜.\n- ③: 약동학의 정의이나 독동학의 저용량 측면 포함 서술로 해석 가능. 족보 정답 ③을 틀렸다고 한 것은 오류 가능성.\n- **Claude 재판정: ①②**.", "tail": "", "scoreable": true, "correctIndices": [0, 1]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "11", "qid": "Q010", "body": "11. 약물흡수 관련 특이 요소에 대해 틀린 것을 모두 고르시오.\n\n① 매우 작은 분자들(200Da 이하, 직경 4×10⁻⁴ μm 이하)은 별 어려움 없이 세포 구멍을 통과한다.\n② 이온화된 유형은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다.\n③ 세포막 양쪽의 pH와 pKa가 이온화 정도의 결정에 중요한 역할을 한다.\n④ 비이온화된 유형은 지방용해성이 낮기 때문에 세포막의 지방층을 통과하기 힘들다.\n⑤ 약물을 포함한 화학물질들은 이동이 지방이 많은 세포막을 통해 이루어진다.", "jokboAnswer": "2, 4", "claudeAnswer": "**②④**", "explanation": "교과서 p.12.\n- ② 오류: 이온형 = 지용성 낮음.\n- ④ 오류: **비이온형** = 지용성 **높음** → 세포막 통과 용이. ④가 반대 서술.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "12", "qid": "Q011", "body": "12. 수소이온과 관련된 생체이물에 대한 설명 중 틀린 것은?\n\n① 약산성의 환경인 장에서는 약산성의 화학물질과 약이 잘 흡수된다.\n② 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n③ 살리실산염에 의한 중독에서 탄산수소소듐을 투여하면 오줌의 알칼리성을 증가시킨다.\n④ 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n⑤ 대부분의 생체이물들의 흡수는 작은창자에서 이루어지는데 이는 약알칼리성인 장내 pH와 수백만 개의 융모로 구성된 매우 넓은 표면적과 특별한 흡수성 상피 때문이다.", "jokboAnswer": "1", "claudeAnswer": "**①**", "explanation": "교과서 p.12. 소장은 약**알칼리성** 환경 → 약**염기성** 물질 흡수 ↑. ①의 \"약산성의 환경인 장\" + \"약산성 화학물질 잘 흡수\"는 두 가지 오류.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "13", "qid": "Q012", "body": "13. 생체이물들의 체내이용 제한요소들 중 틀린 것을 모두 고르시오.\n\n① 간장 내의 대사\n② 작은 창자 내의 제1상, 제2상 관련 양쪽 효소들\n③ 소화기계 내의 매우 강한 pH, 가수분해 효소들, 미생물들\n④ 폐포 표면의 90%를 차지하는 capillary bud\n⑤ 작은 창자의 특별한 흡수 상피", "jokboAnswer": "4, 5", "claudeAnswer": "**④⑤**", "explanation": "교과서 p.13. ①②③ = 체내이용 제한 요소. ④ 폐포 모세혈관상 = 흡수 촉진; ⑤ 소장 흡수성 상피 = 흡수 촉진 → 제한요소 아님.", "tail": "", "scoreable": true, "correctIndices": [3, 4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "14", "qid": "Q013", "body": "14. 생체이물에 노출되는 주요 경로 중 하나인 호흡경로에 대한 설명 중 틀린 것은?\n\n① 폐는 심장박출량 100%를 받아들이고 기관지에서 말단 폐포까지 기도의 많은 분지는 흡수를 위한 거대한 표면적을 제공한다.\n② 폐포 표면의 90%가 모세혈관상(capillary bed)에 노출되어 있기 때문에 폐를 통한 흡수는 매우 신속하다.\n③ 폐의 해부학적 부위와 관계없이 화학물질은 확산, 퇴적, 축적된다.\n④ 폐흡수 과정을 통해 전달되는 화학물질은 간장 일차 통과 대사를 거친 후 직접 심장을 통하여 체순환으로 들어간다.\n⑤ 능동적 확산은 생체이물의 흡수에 중요한 역할을 한다.", "jokboAnswer": "3, 4, 5", "claudeAnswer": "**③④⑤**", "explanation": "교과서 p.13.\n- ③ 오류: 입자 크기·기도 구조에 따라 침착 부위 달라짐.\n- ④ 오류: 폐흡수 → 간 초회통과 **없이** 체순환 직접 진입.\n- ⑤ 오류: **수동적** 확산이 주요 기전.", "tail": "", "scoreable": true, "correctIndices": [2, 3, 4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "15", "qid": "Q014", "body": "15. 동물 종에 따른 흡수에 대한 내용 중 틀린 것을 모두 고르시오.\n\n① 초식동물에 비해 육식동물에서 지방용해성 외래독성물질 축적률이 낮다.\n② 섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높인다.\n③ 어린 송아지와 새끼 양은 매우 거친 먹이에 적응할 정도로 성장할 때까지는 단위동물과 유사하다.\n④ 혐기성인 반추수의 1위는 비반추동물에 비해 화학물질을 매우 효과적으로 증가시킨다.\n⑤ 반추동물은 나이 의존적인 화학물질의 흡수를 보인다.", "jokboAnswer": "1, 2, 4", "claudeAnswer": "**①②④**", "explanation": "교과서 p.14.\n- ① 오류: 육식동물 = 축적률 **높음**.\n- ② 오류: 섬유소 → 생체이용률 **감소**.\n- ④ 오류: 반추 1위 = 화학물질 효과적 **감소**. \"증가\"는 틀림.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "16", "qid": "Q015", "body": "16. 생체이물의 분포에 관한 내용으로 틀린 것을 모두 고르시오.\n\n① 관류율은 확산이 느릴 때 그 속도를 제한한다.\n② 생체이물의 신체 기관 내 분포는 확산율, 그리고 해당기관에서의 상대적 친화성에 의해 주로 영향을 받는다.\n③ 혈중 단백질 결합률이 높은 화합물들은 대부분 낮은 조직분포를 보인다.\n④ propranolol은 높은 단백질 결합률을 보이기 때문에 많은 조직들에서 낮은 조직 분포율을 보인다.\n⑤ 혈중 단백질 결합이 증가하면 관류율이 높은 기관에서 이것은 혈액에서 기관으로 확산율을 증가시킬 수 있다.", "jokboAnswer": "1, 4", "claudeAnswer": "**①④**", "explanation": "교과서 p.14.\n- ① 오류: 관류율 = 확산 **빠를 때** 속도 제한.\n- ④ 오류: propranolol은 조직 친화력 높아 조직분포 **높음**.", "tail": "", "scoreable": true, "correctIndices": [0, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "17", "qid": "Q016", "body": "17. 약물 또는 생체이물의 역학적 형태를 단순화시켜 기술한 비구획성 독동학 매개변수에 대해 틀린 것을 모두 고르시오.\n\n① AUC: 시료채취 기간에 걸친 약물 노출의 양적인 측정이다.\n② Cmax: 약물의 농도 측정 과정 동안 유지된 약물의 최고 농도로 약물 흡수 정도를 결정하기 위하여 자주 이용된다.\n③ Tmax: 최고 농도에 도달한 시간을 의미하며 약물 흡수 속도를 평가하는 데 유용하다.\n④ Cmin: 시간 대비 혈중약물농도 곡선에서 배출단계 동안에 도달한 최저 약물농도로 최고혈중농도에 대한 최저혈중농도 비율은 약물배출 속도에 대해 값진 정보를 제공할 수 있다.\n⑤ AUCi-task: 약물의 안전성 평가를 위한 독동학 연구에서 0시간부터 12시간까지 측정된다.", "jokboAnswer": "5", "claudeAnswer": "**⑤**", "explanation": "교과서 p.15. AUC = 0~2시간. \"12시간\" = 오류.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "18", "qid": "Q017", "body": "18. 분포용적에 관한 설명 중 틀린 것을 모두 고르시오.\n\na. 독성물질이 큰 조직분포를 보이고 약물이 폭 넓게 조직들과 결합될 경우에도 Vd는 조직용적을 초과할 수 없다.\nb. Vd는 혈관 내분포의 지표로 간주되며, L(리터) 단위 또는 L/체중 kg 단위로 표시된다.\nc. 투여용량을 체내에 존재하는 혈중농도로 나눈 값이며, 조직적으로 독성물질이 체내에 분포된 독성물질의 양을 나타낸다.\nd. Vd는 독성물질 특이적이며 중앙혈액분획 내의 모든 독성물질의 분포를 나타낸다.\ne. 더 큰 Vd를 가진 독성물질이 큰 조직분포를 보인다.\n\n① bcde  ② abd  ③ abde  ④ bce  ⑤ abcd", "jokboAnswer": "2 (② abd)", "claudeAnswer": "**② abd**", "explanation": "교과서 p.15.\n- a 오류: Vd는 조직용적 초과 가능 (겉보기 값).\n- b 오류: Vd = 전신 분포 지표.\n- c 옳음.\n- d 오류: Vd는 전신 분포 나타냄.\n- e 옳음.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "19", "qid": "Q018", "body": "19. 다음 중 독동학 구획 모형에 대한 설명으로 옳지 않은 것은?\n\n① 약물 기반의 생리학이나 해부학적 구조의 기질적 특성에 대한 정보가 필요하다.\n② 복합적 투여 용량에서 약물의 축적 정도를 설명하거나 예측하는 데 값진 정보를 제공한다.\n③ 특별한 노출 정도까지 도달하기 위한 약물의 효용성, 투여 용량 및 투약 방식을 선택하는 데 이용할 수 있다.\n④ 특별한 조직의 생물학 구획 간의 개별적인 전달 속도, 배출 경로에서 개별적인 기여와 비율 등을 정확하게 평가하고 반영할 수 있다.\n⑤ 서로 다른 투여 용량에서 체순환 내에서의 약물의 시간적 과정을 평가하거나 예측하는 데 사용할 수 있다.", "jokboAnswer": "1, 3, 4", "claudeAnswer": "**①④**", "explanation": "교과서 p.14~15.\n- ① 오류: 구획모형 = 생리·해부 정보 없이도 단순화 기술 가능.\n- ② 옳음.\n- ③ 재검토: 족보 정답이 ③을 틀렸다고 하나 교과서에서 구획모형의 용도 중 투여용량·방식 선택 활용을 언급. 불분명.\n- ④ 오류: 개별 조직 구획 간 전달속도·배출 기여 **정확하게** 평가 = 구획모형 한계.\n- **Claude 재판정: ①④**.", "tail": "", "scoreable": true, "correctIndices": [0, 3]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "10", "qid": "Q113", "body": "독동학, 독력학에 대한 설명 중 틀린 것을 고르시오.\n\n① ADME 과정이 1차역학이고 선형인 약동학과는 달리 특별히 높은 용량에서 독동학은 1차역학이고 선형을 포함한다.\n② 독성물질이 체내에서 어떤 생리적 움직임을 보이는가를 연구하는 학문을 독력학, 독성물질의 독성효과에 대한 분자적 기전, 상호작용을 연구하는 학문을 독동학이라고 한다.\n③ 독동학은 1차역학을 따르고 역학과정이 선형으로 기대되는 약물의 낮은 농도와 관련된 ADME과정의 역학이다.\n④ 독력학의 기본 목적은 독성 시험조건 아래에서 생체이물의 투여용량과 체내에 순환하고 있는 농도 사이에 상관관계와 관련된 정보를 얻는데 있다.\n⑤ 독력학적 정보를 통해 후속 임상시험에서 투여용량의 점진적인 증가를 위한 근거로 사용된다.", "jokboAnswer": "미표기", "claudeAnswer": "**①②④**", "explanation": "교과서 p.11.\n- ① 오류: 높은 용량에서 독동학은 **0차역학·비선형**.\n- ② 오류: 독동학 = ADME; 독력학 = 분자 기전. 명칭 뒤바뀜.\n- ③ 옳음.\n- ④ 오류: 투여용량-체내농도 상관관계 = **독동학**의 목적. \"독력학\"은 잘못된 주어.\n- ⑤ 옳음.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "11", "qid": "Q114", "body": "투여경로에 따른 약물흡수 관련 특이 요소에 대한 설명 중 틀린 것은?\n\n① 매우 작은 분자들(200Da 이하, 직경 4×10⁻⁴ μm 이하)은 별 어려움 없이 세포 구멍을 통과한다.\n② 이온화된 유형은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다.\n③ 이온화된 유형은 지방용해성이 낮기 때문에 세포막의 지방층을 통과하기 어렵다.\n④ 세포막 양쪽의 pH와 pKa가 이온화 정도의 결정에 중요한 역할을 한다.\n⑤ 원칙적으로 지방이 많은 세포막을 통해 이루어진다.", "jokboAnswer": "2", "claudeAnswer": "**②**", "explanation": "교과서 p.12. ②는 이온화형을 \"지방에 잘 용해\"라고 서술 — 오류.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "12", "qid": "Q115", "body": "수소이온과 관련된 생체이물에 대한 설명 중 틀린 것은?\n\n① 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n② 알칼리 환경의 작은창자에서는 약염기성의 화학물질과 약물이 잘 흡수된다.\n③ 대부분의 생체이물들의 흡수는 작은창자에서 이루어지는데 이는 약알칼리성인 장내 pH와 수백만 개의 융모로 구성된 매우 넓은 표면적과 특별한 흡수성 상피 때문이다.\n④ 살리실산염(salicylate)에 의한 중독에서 탄산수소소듐(sodium bicarbonate)을 투여하면 오줌의 알칼리성을 감소(pH 8.0에서 6.5)시킨다.\n⑤ 탄산수소소듐은 살리실산염의 비이온화를 대폭 감소(약 25배)시켜 신장 재흡수를 방지하고 신장 배출을 증가(약 5배)시킨다.", "jokboAnswer": "4", "claudeAnswer": "**④**", "explanation": "교과서 p.12. NaHCO3 투여 → 소변 알칼리성 **증가**(pH 6.5→8.0). ④는 방향 반대 서술.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "13", "qid": "Q116", "body": "생체이물들의 체내이용 제한요소들 중 틀린 것을 모두 고르시오.\n\na. 간장 내의 대사\nb. 작은 창자 내의 제1상, 제2상 관련 양쪽 효소들\nc. 폐포 표면의 90%를 차지하는 capillary bud\nd. 소화기계 내의 매우 강한 pH, 가수분해 효소들, 미생물들\ne. 작은 창자의 특별한 흡수 상피\n\n① cde  ② 모두 맞음  ③ ce  ④ abcd  ⑤ 모두 틀림", "jokboAnswer": "미표기", "claudeAnswer": "**③ ce**", "explanation": "교과서 p.13. a(간 대사)·b(소장 1·2상 효소)·d(강산 pH·효소·미생물) = 체내이용 **제한** 요소. c(폐포 모세혈관상)·e(소장 흡수성 상피) = 흡수 **촉진** 요소 → 제한요소 아님. 틀린 것(제한요소 아닌 것): ce = ③.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "14", "qid": "Q117", "body": "생체이물에 노출되는 주요 경로 중 하나인 흡입경로에 대한 설명 중 틀린 것을 모두 고르시오.\n\na. 폐는 심장박출량 100%를 받아들이고 기관지에서 말단 폐포까지 기도의 많은 분지는 흡수를 위한 거대한 표면적을 제공한다.\nb. 폐포 표면의 90%가 모세혈관상(capillary bed)에 노출되어 있기 때문에 폐를 통한 흡수는 매우 신속하다.\nc. 폐의 해부학적 부위와 상관없이 화학물질은 확산, 퇴적, 축적된다.\nd. 폐흡수 과정을 통해 전달되는 화학물질은 간장 일차통과 대사를 거치지 않고 심장을 통하여 직접 체순환으로 들어간다.\ne. 수동적 확산은 생체이물의 흡수에 중요한 역할을 한다.\n\n① a, c, d  ② b, e  ③ c, d, e  ④ c, d  ⑤ a, b, c", "jokboAnswer": "4 (④ c, d)", "claudeAnswer": "⚠️ **재판정**: **c만 틀림**", "explanation": "교과서 p.13.\n- c 오류: 화학물질 침착은 입자 크기·기도 구조에 따라 달라짐. \"부위 무관\"은 틀림.\n- d 옳음: 폐흡수 → 간 초회통과 **없이** 체순환 직접 진입. 교과서 명확히 기술.\n- 족보 정답이 d를 틀렸다고 한 것은 교과서 내용과 불일치. **Claude 재판정: c만 틀림**.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "15", "qid": "Q118", "body": "동물 종에 따른 흡수에 대한 내용으로 옳지 않은 것은?\n\n① 초식동물에 비해 육식동물에서 지방용해성 외래독성물질 축적률이 높다.\n② 섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높인다.\n③ 어린 송아지와 새끼 양은 매우 거친 먹이에 적응할 정도로 성장할 때까지는 단위동물과 유사하다.\n④ 혐기성인 반추수의 제1위는 비반추동물에 비해 화학물질을 매우 효과적으로 감소시킨다.\n⑤ 반추동물은 나이 의존적인 화학물질의 흡수를 보인다.", "jokboAnswer": "2", "claudeAnswer": "**②**", "explanation": "교과서 p.14. ②는 생체이용률을 \"높인다\" → 오류. 섬유소 풍부 먹이 → 생체이용률 **낮춤**.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "16", "qid": "Q119", "body": "생체이물의 분포에 대한 설명 중 틀린 것을 모두 고르시오.\n\na. propranolol은 높은 단백 결합률을 보이지만, 많은 조직에 높은 친화력을 보이기에 높은 조직 분포를 보인다.\nb. 관류율은 확산이 느릴 때 그 속도를 제한한다.\nc. 혈중 단백질 결합률이 높은 화합물들은 대부분 높은 조직분포를 보인다.\nd. 생체이물의 신체 기관내 분포는 확산률, 관류율, 그리고 해당기관에서의 상대적 친화성에 주로 영향을 받는다.\ne. 혈중 단백질 결합이 증가하면 관련 기관에서 혈액에서 기관으로 확산률이 증가하지 않는다.", "jokboAnswer": "미표기", "claudeAnswer": "**bc**", "explanation": "교과서 p.14.\n- a 옳음: propranolol 예외.\n- b 오류: 관류율 = 확산 **빠를 때** 속도 제한.\n- c 오류: 단백결합 ↑ → **낮은** 조직분포 (일반).\n- d 옳음.\n- e 옳음: 단백결합 ↑ → 자유형 감소 → 기관 이동 감소.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "17", "qid": "Q120", "body": "약물 또는 생체이물의 역학적 행태를 단순화시켜 기술한 비구획성 독동학 매개변수에 대해 틀린 것을 고르시오.\n\n① AUC은 시료채취 기간에 걸친 약물 노출의 양적인 측정이다.\n② Cmax는 약물의 농도 측정 과정 동안 유지된 약물의 최고 농도로 약물흡수 정도를 결정하기 위하여 자주 이용된다.\n③ Tmax는 최고농도에 도달한 시간을 의미하며 약물흡수 속도를 평가하는데 유용하다.\n④ Cmin은 시간 대비 혈중약물농도 곡선에서 배출단계 동안에 도달한 최저 약물농도로 최고혈중농도에 대한 최저혈중농도 비율은 약물배출 속도에 대해 값진 정보를 제공할 수 있다.\n⑤ 약물의 안전성 평가를 위한 독동학 연구에서, AUCt0-tlast는 0시간부터 12시간까지 측정된다.", "jokboAnswer": "5", "claudeAnswer": "**⑤**", "explanation": "교과서 p.15. AUC = 0~2시간 측정. \"12시간\" = 오류.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "18", "qid": "Q121", "body": "분포용적에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. 독성물질이 큰 조직분포를 보이고 약물이 폭 넓게 조직들과 결합될 경우에도 Vd는 조직용적을 초과할 수 없다.\nb. Vd는 혈관 내분포의 지표로 간주되며 L(리터) 단위 또는 L/체중 kg 단위로 표시된다.\nc. 투여용량을 체내에 존재하는 혈중농도로 나눈 값이며, 조직적으로 독성물질이 체내에 분포된 독성물질의 양을 나타낸다.\nd. Vd는 독성물질 특이적이며 중앙혈액분획 내의 모든 독성물질의 분포를 나타낸다.\ne. 좀 더 큰 Vd를 가진 독성물질이 큰 조직 분포를 보인다.\n\n① bcde  ② abd  ③ abde  ④ bce  ⑤ abcd", "jokboAnswer": "2 (② abd)", "claudeAnswer": "**② abd**", "explanation": "교과서 p.15.\n- a 오류: Vd는 조직용적 초과 가능 (겉보기 값).\n- b 오류: Vd = 전신 분포 지표, 혈관 내 분포 지표 아님.\n- c 옳음: Vd = 투여량 ÷ 혈중농도.\n- d 오류: Vd는 전신(중앙+말초) 분포 나타냄.\n- e 옳음: 큰 Vd → 광범위 조직분포.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "19", "qid": "Q122", "body": "독동학 구획 모형에 대한 설명으로 옳지 않은 것을 보기에서 모두 찾아라.\n\na. 약물 기반의 생리학이나 해부학적 구조의 기질적 특성에 대한 정보가 필요하다.\nb. 복합적 투여 용량에서 약물의 축적 정도를 설명하거나 예측하는 데 값진 정보를 제공한다.\n\n*(이하 OCR 미완성)*", "jokboAnswer": "미표기", "claudeAnswer": "**a** (+ c, d 추정 — Q007, Q018 동일 유형 참조)", "explanation": "교과서 p.14~15. a(\"정보가 필요하다\") = 오류 → 구획모형은 생리·해부 정보 **없이도** 단순화 기술 가능.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "30", "qid": "Q134", "body": "30. 외인성 물질의 독성효과 및 대사에 관한 설명으로 틀린 것을 고르시오.\n\nA. 흡수된 독성물질은 위장관 점막세포, 간, 폐 등을 통과하면서 일차통과효과를 통해 독성이 증가한다.\nB. 표적기관에 모세혈관의 투과성 항진, 특수 수송계 존재, 가역적인 세포 내 결합, 재분포는 표적으로의 분포를 촉진한다.\nC. 독성물질은 생체 외로 제거되기 전에 신세뇨관에서 생체 내로 재흡수되어 독성이 약화된다.\nD. 수용성 독성물질은 배설되기 어려우므로 생체 내 대사를 거쳐 배설되기 쉬운 화합물로 변화되어야 한다.\nE. 혈장단백과 결합, 특수 장벽 존재, 저장 부위로부터 유리, 세포밖으로 배출 등은 표적으로의 분포를 촉진한다.\n\n① a, c  ② a, c, d, e  ③ 모두 맞음  ④ b, c, e  ⑤ a, b, c, d", "jokboAnswer": "2 (② a, c, d, e)", "claudeAnswer": "**A, C, D** (E는 부분 오류)", "explanation": "교과서 p.12~14.\n- A 오류: 일차통과효과는 독성 **감소**.\n- B 옳음: 표적 분포 촉진 요소.\n- C 오류: 신세뇨관 재흡수 → 반감기 **연장** + 독성 **강화** (약화 아님).\n- D 오류: **지용성** 물질이 배설 어려움. \"수용성\"은 틀림.\n- E 부분 오류: 혈장단백 결합·특수 장벽·세포 배출 = 분포 **제한**. \"저장부위로부터 유리\"는 촉진 요소. 혼합됨.\n→ 족보 정답 a,c,d,e 중 a·c·d는 명확히 틀림.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "6", "qid": "Q270", "body": "6. 독성학과 독력학에 대한 설명 중 틀린 것 2개를 고르시오.\n\n① 독성물질이 체내에서 어떤 생리적 움직임을 보이는가를 연구하는 학문을 독력학, 독성물질의 독성효과에 대한 분자적 기전, 상호작용을 연구하는 학문을 독성학이라고 한다.\n② ADME 과정이 1차역학이고 선형인 약동학과는 달리 높은 용량에서 독동학은 0차역학이고 비선형이다.\n③ 독동학은 1차역학을 따르고 역학 과정이 선형으로 기대되는 약물의 낮은 농도와 관련된 ADME 과정이 선형이다.\n④ 독동학의 기본적인 목적은 독성 시험 조건 아래에서 생체이물의 투여 용량과 체내 순환하고 있는 농도 사이에 상관관계와 관련된 정보를 얻는데 있다.\n⑤ 독동학 자료는 후속 임상시험에서 투여 용량의 점진적인 증가를 위한 근거를 제공한다.", "jokboAnswer": "미표기", "claudeAnswer": "**①③**", "explanation": "교과서 p.11.\n- ① 오류: 독동학(toxicokinetics) = ADME 연구; 독력학(toxicodynamics) = 분자적 기전 연구. ①은 명칭 뒤바뀜.\n- ② 옳음: 독동학은 높은 용량에서 0차역학·비선형.\n- ③ 오류: ③은 약동학(pharmacokinetics)의 정의이다. 독동학은 1차(저용량) + 0차(고용량) 역학 모두 포함.\n- ④⑤ 옳음.", "tail": "", "scoreable": true, "correctIndices": [0, 2]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "7", "qid": "Q271", "body": "7. 투여 경로에 따른 약물흡수 관련 특이 요소에 대한 설명 중 틀린 것은?\n\n① 매우 작은 분자들(200Da 이하의 분자량을 가지고 있으면서 직경이 4×10⁻⁴ 마이크로미터 이하인 화학물질들)은 별 어려움 없이 세포구멍을 통과한다.\n② 이온화된 유형은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다.\n③ 이온화된 유형은 지방친화성이 낮기 때문에 세포막의 지방층을 통과하기 힘들다.\n④ 세포막 양쪽의 수소이온농도(pH)와 해리상수(pKa)가 이온화 정도의 결정에 중요한 역할을 한다.\n⑤ 원칙적으로 지방이 많은 세포막을 통해 이루어진다.", "jokboAnswer": "미표기", "claudeAnswer": "**②**", "explanation": "교과서 p.12. ②는 이온화형을 \"지방에 잘 용해\"라고 서술 — 오류. 이온형은 지용성 낮음. ③이 옳은 진술.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "8", "qid": "Q272", "body": "8. 수소이온과 관련된 생체이물에 대한 설명 중 틀린 것은?\n\n① 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n② 알칼리 환경인 소장에서는 약염기성 화학물질과 약물이 잘 흡수된다.\n③ 대부분의 생체이물들의 흡수는 작은창자에서 이루어지는데 이는 약알칼리성인 장내 pH와 수백만 개의 융모(villi)로 구성된 매우 넓은 표면적과 특별한 흡수성 상피 때문이다.\n④ 살리실산염(salicylate)에 의한 중독에서 탄산수소나트륨(sodium bicarbonate)을 투여하면 오줌의 알칼리성을 감소(pH 8.0에서 6.5)시킨다.\n⑤ 탄산수소나트륨은 살리실산염의 비이온화를 대폭 감소(약 25배)시켜 신장 재흡수를 방지하고 신장 배출을 증가(약 5배)시킨다.", "jokboAnswer": "미표기", "claudeAnswer": "**④**", "explanation": "교과서 p.12. NaHCO3 투여는 오줌의 알칼리성을 **증가**(pH 6.5→8.0)시킨다. ④는 방향 반대 서술.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "9", "qid": "Q273", "body": "9. 다음 중 생체이물에서 체내 이용을 **제한하는 것이 아닌** 2가지를 고르시오.\n\n① 폐포 표면의 90%가 노출되어 있는 모세혈관상(capillary bed)\n② 작은창자에서 대사는 제1상(phase I)과 제II상(phase II) 반응을 거치며 진행된다.\n③ 생체이물의 흡수는 작은창자에서 일어나며 이는 약알칼리성인 장내 pH와 수백만 개의 융모(villi)로 구성된 넓은 표면적과 특별한 흡수성 상피 때문이다.\n④ 간장에서 일어나는 대사는 독성을 증가시킨다.\n⑤ 소화기계 내에 매우 강한 pH와 많은 미생물들은 독성을 증가시킨다.", "jokboAnswer": "①, ⑤", "claudeAnswer": "⚠️ **재판정**: **①③**", "explanation": "교과서 p.13.\n- ① 폐포 모세혈관상 = 흡수 촉진 요소 (제한 아님) ✓\n- ② 소장 1·2상 대사 = 체내이용 제한 요소 (맞음)\n- ③ 소장 흡수성 상피 = 흡수 촉진 요소 (제한 아님) ✓\n- ④ 간 대사 = 체내이용 제한 요소 (맞음)\n- ⑤ 강한 pH·미생물 = 체내이용 제한 요소 (맞음)\n→ 제한하는 것이 아닌 것: ①③. 족보 정답 ①⑤에서 ⑤를 \"제한 아님\"으로 분류한 것은 오류로 판단.", "tail": "", "scoreable": true, "correctIndices": [0, 2]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "10", "qid": "Q274", "body": "10. 생체이물에 노출되는 주요 경로 중 하나인 호흡경로에 대한 설명 중 틀린 것 2가지를 고르시오.\n\n*(선지 ③④⑤가 OCR 오류로 동일하게 인쇄됨 — 원본 참조 불가)*\n\n① 폐는 심장박출량 100%를 받아들이고 기관지에서 말단 폐포까지 기도의 많은 분지는 흡수를 위한 거대한 표면적을 제공한다.\n② 폐포 표면의 90%가 모세혈관상(capillary bed)에 노출되어 있기 때문에 폐를 통한 흡수는 매우 신속하다.\n③~⑤ (OCR 미완성)", "jokboAnswer": "미표기", "claudeAnswer": "OCR 오류로 선지 완전 식별 불가. Q013·Q117 동일 주제 참조.", "explanation": "교과서 p.13. 호흡경로 특징: ① 폐 심박출량 100% 수용 (옳음), ② 폐포 90% 모세혈관 노출 (옳음). 틀린 진술 패턴: \"부위 무관 확산·퇴적\" / \"간 초회통과 거침\" / \"능동적 확산 중요\".", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "11", "qid": "Q275", "body": "11. 동물 종에 따른 흡수에 대한 내용으로 옳지 않은 것은?\n\n① 초식동물에 비해 육식동물에서 지방용해성 외래독성물질 축적률이 높다.\n② 섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높인다.\n③ 어린 송아지와 새끼 양은 매우 거친 먹이에 적응할 정도로 성장할 때까지는 단위동물과 유사하다.\n④ 혐기성인 반추수의 제1위는 비반추동물에 비해 화학물질을 매우 효과적으로 감소시킨다.\n⑤ 반추동물은 나이 의존적인 화학물질의 흡수를 보인다.", "jokboAnswer": "2", "claudeAnswer": "**②**", "explanation": "교과서 p.14. ②는 생체이용률을 \"높인다\" → 오류. 섬유소 풍부 먹이 → 생체이용률 **낮춤**.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "12", "qid": "Q276", "body": "12. 생체이물에 관한 설명 중 틀린 것을 2개 고르시오.\n\n① 기관 내 분포는 확산율, 관류율, 상대적 친화성에 영향을 받는다.\n② 관류율은 확산이 느릴 때 그 속도를 제한한다.\n③ 단백질 결합률이 높으면 일반적으로 높은 조직 분포율을 보인다.\n④ propranolol은 높은 단백질 결합률을 보이지만 많은 조직들에 높은 친화력을 갖고 있어 높은 조직 분포율을 보인다.\n⑤ 혈장 단백질 결합률이 높아지면 높은 관류율을 가진 기관에서 이것은 혈관에서 기관으로의 이동이 증가한다.", "jokboAnswer": "2, 3", "claudeAnswer": "**②③**", "explanation": "교과서 p.14.\n- ② 오류: 관류율은 확산이 **빠를 때** 속도 제한.\n- ③ 오류: 단백결합 ↑ → 일반적으로 **낮은** 조직분포.", "tail": "", "scoreable": true, "correctIndices": [1, 2]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "13", "qid": "Q277", "body": "13. 약물 또는 생체이물의 역학적 행태를 단순화시켜 기술한 비구획성 독동학 매개변수에 대해 틀린 것을 고르시오.\n\n① AUC은 시료채취 기간에 걸친 약물 노출의 양적인 측정이다.\n② Cmax는 약물의 농도 측정 과정 동안 유지된 약물의 최고 농도로 약물흡수 정도를 결정하기 위하여 자주 이용된다.\n③ Tmax는 최고농도에 도달한 시간을 의미하며 약물흡수 속도를 평가하는데 유용하다.\n④ Cmin은 시간 대비 혈중약물농도 곡선에서 배출단계 동안에 도달한 최저 약물농도로 최고혈중농도에 대한 최저혈중농도 비율은 약물배출 속도에 대해 값진 정보를 제공할 수 있다.\n⑤ 약물의 안전성 평가를 위한 독동학 연구에서, AUCt0-tlast는 0시간부터 12시간까지 측정된다.", "jokboAnswer": "5", "claudeAnswer": "**⑤**", "explanation": "교과서 p.15. AUCt0-tlast = 0~**2시간** 측정. \"12시간\"은 반복 오답 선지. 족보 정답 ⑤와 일치.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "16", "qid": "Q280", "body": "16. 수소이온농도와 흡수에 대해 틀린 것을 고르시오.\n\n① 약산성인 위는 약산성의 화학물질을 잘 흡수한다.\n② 약알칼리인 장은 약염기성의 화학물질을 잘 흡수한다.\n\n*(이하 OCR 미완성)*", "jokboAnswer": "미표기", "claudeAnswer": "본문 미완성으로 판정 불가. ①②는 모두 옳은 진술.", "explanation": "교과서 p.12. ①②는 pH-이온화 원리에 맞는 옳은 진술. 나머지 선지 미확인.", "tail": "", "scoreable": true, "correctIndices": [0, 1]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "21", "qid": "Q284", "body": "21. 대부분의 외인성 물질의 독성 과정 및 효과에 대한 설명들 중 틀린 것을 고르시오.\n\n① 흡수된 독성 물질은 장관, 점막세포, 간, 폐 등을 통과하면서 일차통과효과(First pass effect)를 통해 독성을 감소시킨다.\n② 특수 수송계의 존재, 재분포, 많은 혈류량, 조직 친화성은 흡수된 독성 물질의 분포를 촉진한다.\n③ 혈장단백과 결합, 특수 장벽의 존재, 세포 밖으로의 배출 등은 흡수된 독성 물질의 분포를 촉진한다.\n④ 지용성 화합물은 배설되기 어려우므로 생체 내 대사를 거쳐 배설되기 쉬운 화합물로 변화되어야 한다.\n⑤ 독성 물질은 생체 외로 제거되기 전에 신세뇨관에서 생체 내로 재흡수되어 반감기는 길어지고, 이차적 노출에 의해 독성이 강화될 수 있다.", "jokboAnswer": "3", "claudeAnswer": "**③**", "explanation": "교과서 p.14. 혈장단백과 결합·특수 장벽·세포 배출은 분포를 **제한**하는 요소. ③의 \"촉진한다\"는 오류. ①②④⑤는 옳음.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "1", "qid": "Q337", "body": "주로 독성물질이 체내에서 어떤 생리적인 움직임을 보이는가를 연구하는 세부학문을 ( )이라 하고, 독성물질의 독성효과에 대한 분자적 기전과 상호작용을 연구하는 세부학문을 ( )이라 한다.\n\n*(본문 OCR 미완성 — jokbo-전체.md p.28 문항 1 기준으로 복원)*", "jokboAnswer": "독동학(toxicokinetics), 독력학(toxicodynamics)", "claudeAnswer": "독동학(toxicokinetics), 독력학(toxicodynamics)", "explanation": "교과서 p.11 \"독동학과 독력학\" 도입부. 독동학(toxicokinetics) = 독성물질의 체내 생리적 움직임(ADME) 연구; 독력학(toxicodynamics) = 독성물질의 독성효과에 대한 분자적 기전·상호작용 연구.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "5", "qid": "Q341", "body": "( )은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다. 대조적으로 ( )은 지방친화성이 낮기 때문에 세포막의 지방층을 통과하기 힘들다.\n\n*(본문 OCR 미완성 — jokbo-전체.md p.28 문항 5 기준으로 복원)*", "jokboAnswer": "비이온화된 유형, 이온화된 유형", "claudeAnswer": "비이온화된 유형(non-ionized form), 이온화된 유형(ionized form)", "explanation": "교과서 p.12 \"경구흡수와 생체이용률\". 비이온형은 지용성이 높아 세포막 지방층을 통과하기 쉽고, 이온형은 지용성이 낮아 세포막 통과가 어렵다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "10", "qid": "Q346", "body": "약물의 안정성 평가를 위한 독동학 연구는 종종 0시간부터 ( ) 시간까지 측정된다.", "jokboAnswer": "2", "claudeAnswer": "2 (시간)", "explanation": "교과서 p.15 \"기본적인 독동학 매개변수\". 약물 안전성 평가를 위한 독동학 연구에서 AUCt0-tlast는 0시간부터 2시간까지 측정된다. 이후 문항에서 \"12시간\"이라고 서술한 선지가 반복적인 오답으로 등장한다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "13", "qid": "Q349", "body": "생체이물의 신체 기관 내 분포에 영향을 미치는 대표적인 세 가지 요인은?", "jokboAnswer": "확산율, 관류율, 해당기관에서 다양한 구성요소들에 대한 상대적 친화성", "claudeAnswer": "확산율(diffusion rate), 관류율(perfusion rate), 해당 기관에서의 상대적 친화성(relative affinity)", "explanation": "교과서 p.14 \"분포\" 항목. 기관 내 분포는 ① 확산율, ② 관류율, ③ 기관에 대한 상대적 친화성에 의해 결정된다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "19", "qid": "Q355", "body": "육식성, 초식성 그리고 잡식성 동물들의 먹이 습성은 서로 매우 다르기 때문에 잠재적인 독성물질의 생체 내 축적에 차이를 가져온다. 위 세 동물 중 지방용해성 외래독성물질 축적률이 가장 높은 동물은?", "jokboAnswer": "육식성 동물", "claudeAnswer": "육식성 동물", "explanation": "교과서 p.14 \"동물종에 따른 흡수의 차이점\". 육식동물은 지방 섭취량이 높고 체내 지방 함량도 많기 때문에 지용성 독성물질의 축적률이 가장 높다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "34", "qid": "Q370", "body": "혈장단백농도가 낮아지면 혈액삼투압 뿐만 아니라 독극물과 결합(중화) 할 수 있는 능력도 줄어들어서 혈장단백과 결합하고 있지 않은 유리(free, unbound) 독극물의 농도가 증가하여 독성 반응이 커지게 된다. (O/X)", "jokboAnswer": "미표기", "claudeAnswer": "O (옳음)", "explanation": "교과서 p.14 \"분포\". 혈장단백 농도 감소 → 단백 결합 능력 감소 → 자유형(unbound) 독성물질 농도 증가 → 독성 반응 증가. 이 진술은 옳다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "41", "qid": "Q377", "body": "섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높이는가 낮추는가?", "jokboAnswer": "낮춘다", "claudeAnswer": "낮춘다", "explanation": "교과서 p.14 \"동물종에 따른 흡수의 차이점\". 섬유소가 풍부한 먹이는 독성화합물의 생체이용률을 낮춘다. 섬유소가 독성물질과 결합하거나 장 통과 시간에 영향을 주어 흡수를 제한한다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "67", "qid": "Q403", "body": "이 투여경로의 이점은 흡수율이 낮은 약물들을 장흡수와 장에서 일차통과대사를 피하여 간에 직접 전달하는 것이며, 이 경로로 약물은 경구경로에 비교하였을 때 매우 신속하게 더 높은 농도에 도달한다. 이 투여 경로는?", "jokboAnswer": "정맥투여(IV)", "claudeAnswer": "정맥투여(IV) — 단, 문항 서술의 일부 표현에 오류 가능성 있음", "explanation": "교과서 p.13 \"비경구경로와 생체이물의 흡수\". 정맥투여(IV)는 흡수 단계 없이 체순환으로 직접 진입하므로 매우 빠르게 높은 혈중농도에 도달. \"장흡수와 일차통과대사 회피\"는 경구가 아닌 경로의 일반 특성. 족보 정답 IV 유지.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "82", "qid": "Q419", "body": "살리실산염(salicylate)에 의한 중독에서 ( )을 투여하여 오줌의 알칼리성을 증가시켜 (pH 6.5에서 8.0으로) 살리실산염의 이온화를 촉진시켜 신장배출을 효과적으로 증가시킬 수 있다.", "jokboAnswer": "sodium bicarbonate", "claudeAnswer": "sodium bicarbonate (탄산수소나트륨)", "explanation": "교과서 p.12. 살리실산염은 약산성 물질. 소변 알칼리화(pH 6.5→8.0) → 이온화 촉진 → 신세뇨관 재흡수 감소 → 신장 배설 증가. Sodium bicarbonate 투여가 이 효과를 달성.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "88", "qid": "Q425", "body": "대부분의 생체이물들의 흡수가 작은 창자에서 이루어지는데 그 이유 세가지는?", "jokboAnswer": "약알칼리성인 장내 pH, 수백만 개의 융모로 구성되어 매우 넓은 표면적을 가짐, 특별한 흡수성 상피", "claudeAnswer": "① 약알칼리성 장내 pH, ② 수백만 개의 융모(villi)에 의한 매우 넓은 표면적, ③ 특별한 흡수성 상피(absorptive epithelium)", "explanation": "교과서 p.12.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "89", "qid": "Q426", "body": "살리실산염(salicylate)에 의한 중독에서 ( )을 투여하여 오줌의 알칼리성을 증가시켜(pH 6.5에서 pH 8.0으로) 살리실산염의 이온화를 촉진시켜 신장배출을 효과적으로 증가시킬 수 있다.", "jokboAnswer": "sodium bicarbonate", "claudeAnswer": "sodium bicarbonate (Q419와 동일 — 중복 문항)", "explanation": "Q419 해설 참조.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "90", "qid": "Q427", "body": "약동학에서 가장 중요한 역학적 매개변수이고 시료채취 기간에 걸친 약물 노출의 양적인 측정치를 가리키는 용어는?", "jokboAnswer": "AUC", "claudeAnswer": "AUC (area under the curve)", "explanation": "교과서 p.15. AUC는 시간에 따른 체내 노출량을 정량적으로 평가하는 가장 중요한 지표.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "95", "qid": "Q432", "body": "베타 수용체 차단제인 propranolol은 높은 단백질 결합률을 보임에도 불구하고 높은 조직 분포율을 나타낸다. 그 이유는?", "jokboAnswer": "많은 조직들에게 높은 친화력을 보이기 때문이다.", "claudeAnswer": "많은 조직들에 대해 높은 친화력을 보이기 때문", "explanation": "교과서 p.14. propranolol은 단백결합률이 높음에도 불구하고 조직 친화력이 높아 높은 조직 분포율을 나타내는 예외적 사례.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2021-기말", "num": "99", "qid": "Q436", "body": "약물 또는 생체이물의 역학적 행태를 단순화시켜 기술하는 독동학 모델은?", "jokboAnswer": "비구획성 독동학 모델", "claudeAnswer": "비구획성(non-compartmental) 독동학 모델", "explanation": "교과서 p.14. 비구획성 방법(NCA)은 복잡한 생리학적 가정 없이 관찰된 농도-시간 데이터를 직접 분석하는 가장 단순한 방법.", "tail": "", "scoreable": false, "correctIndices": []}]}, "L05-factors": {"lecture": "L05-factors", "title": "독성요인", "slug": "factors", "questions": [{"lecture": "L05-factors", "round": "2025-중간", "num": "20", "qid": "", "body": "독성에 영향을 미치는 물리화학적 요인 중 틀린 것을 모두 고르시오.\n\n① 페노티아진(phenothiazine)은 입자의 크기가 작아져도 독성이 증가하지 않는다.\n② 독성물질의 화학구조는 체내흡수·분포·작용기전에 영향을 미친다.\n③ 독성물질에서 용질을 충분히 녹일 수 있는 운반체의 액량 및 농도는 흡수 속도에 영향을 미친다.\n④ 독성물질의 물리적 제형이나 입자의 크기는 독성에 영향을 미치지 않는다.\n⑤ 지용성 물질은 지질막을 잘 통과하므로 흡수가 빠르고 지방이나 신경조직에 잘 축적된다.", "jokboAnswer": "①, ④", "claudeAnswer": "①, ④", "explanation": "[2024-중간] #20을 5지 단일 선지형으로 재구성한 문항. 틀린 것 **모두** 고르라는 형태로 정답이 2개(①·④).\n\n- **① 틀림**: 교재 p.17 \"페노티아진은 입자가 작을수록 독성이 높아진다\". 족보 선지는 \"작아져도 증가하지 않는다\"로 정반대.\n- **② 옳음**: 교재 p.17 \"화학 구조는 체내 흡수, 분포, 대사 및 작용기전에 큰 영향\" — 일치.\n- **③ 옳음**: 교재 p.17-18 운반체·용매는 흡수에 영향. 액량·농도 포함.\n- **④ 틀림**: 교재 p.17 \"제형, 순도, 입자 크기 등에 따라 독성이 다르게 발현된다\" — 영향 **큼**. 족보 선지 반대.\n- **⑤ 옳음**: 교재 p.17 지용성 → 지질막 통과·지방·신경 축적 — 그대로.\n\n따라서 ①·④ 두 선지가 틀려 정답.\n\n함정 요소는 ①과 ④가 결국 같은 개념을 다른 어휘로 표현한 점이다. ①은 구체 물질(페노티아진), ④는 일반 진술(제형·입자 크기)로 서술만 다르지 본질은 동일(\"입자 크기 → 독성\")이다. 둘 다 방향이 뒤집혀 있으므로 함께 골라야 한다. ②·③·⑤는 교재 원문과 일치하여 방향이 올바르다.", "tail": "", "scoreable": true, "correctIndices": [0, 3]}, {"lecture": "L05-factors", "round": "2025-중간", "num": "21", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 설명 중 틀린 것을 모두 고르시오.\n\na. 독성 정도는 투여 횟수에 크게 영향을 받지 않는다.\nb. 동물 종에 따라 대사효소의 활성도 또는 흡수율에 따라 선택적 독성이 유발되는 경우가 있다.\nc. 동일종의 동물에서 독성은 체중이나 체표면적에 비례한다.\nd. 배설 경로는 흡수 속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\ne. 연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서 독성의 차이가 나타난다.\nf. 대사과정에서 궁극적인 독성물질로 활성화되는 경우에는 피하나 복강내 투여가 오히려 경구 투여보다 높은 독성을 발현한다.", "jokboAnswer": "a, d, f", "claudeAnswer": "a, d, f", "explanation": "[2022-중간] #14 / [2024-중간] #21·#35의 선지 a~f를 순서만 뒤섞어 재출제. 2022·2024에서는 \"a, b, c\"가 틀린 3개였지만 2025는 선지 순서를 바꿨기 때문에 틀린 3개가 **a, d, f**로 이동했다 (내용은 동일).\n\n- **a 틀림**: 투여 횟수 → 독성 큰 영향 (교재 p.18).\n- **b 옳음**: 종간 선택적 독성, 대사효소·흡수율 차이 (교재 p.19).\n- **c 옳음**: 체중·체표면적 비례 (교재 p.20).\n- **d 틀림**: 노출(투여) 경로가 절대적 요인이며 배설 경로가 아님 (교재 p.18).\n- **e 옳음**: 연령별 차이 (교재 p.20).\n- **f 틀림**: 다이옥신 예외 — 경구 > 피하·복강내 (교재 p.19). 족보 선지 반대.\n\n따라서 a·d·f가 틀린 정답.\n\n함정 요소는 2022·2024에서 \"a, b, c가 틀림\"이라는 패턴을 암기한 수험생이 반사적으로 a·b·c를 고르는 것을 유도한다. 그러나 2025에서는 옛날의 b·c 위치에 d·f가 배치되어 있다. 선지 번호가 아니라 **내용의 방향**으로 판정해야 한다. 통제 지점 3개: (i) 투여 횟수 \"영향 없음\" 서술, (ii) **\"배설\"** 경로라는 단어, (iii) \"피하·복강내 > 경구\" 서술. 이 세 문구가 보이면 무조건 틀림.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "22", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 관한 내용 중 틀린 것을 모두 고르시오.\n\n① 페노바비탈(phenobarbital)의 LD₅₀은 경구투여에서보다 혈관내투여에서가 높다.\n② 다이옥신은 대사과정에서 궁극적인 독성물질로 활성화되어 경구투여에서보다 피하나 복강내투여에서가 높은 독성을 발휘한다.\n③ 아플라톡신 B₁에 의한 간암독성은 랫드가 마우스보다 훨씬 민감하다.\n④ 포유류에는 말라티온 분해효소가 존재하여 효소가 없는 해충에 비해 독성이 낮다.\n⑤ thiamine(vitamin B₁)을 체내에서 합성하는 반추류는 thiaminase를 함유하는 고사리 중독에 말보다 더 민감하다.", "jokboAnswer": "①, ②, ⑤", "claudeAnswer": "①, ②, ⑤", "explanation": "[2022-중간] #15, [2024-중간] #22와 같은 5대 함정 문항이지만 **틀린 것 모두 고르기**로 형식을 바꾸고 3개 선지를 동시에 뒤집었다.\n\n- **① 틀림**: 교재 p.19 페노바비탈 LD₅₀ — 경구 280 > IV 80 mg/kg. 즉 LD₅₀ 수치는 **경구가 더 높다**(IV가 낮음). 족보 선지는 \"IV가 경구보다 높다\"로 정반대. LD₅₀ 수치와 독성 방향을 명확히 구분하지 않으면 걸리는 함정.\n- **② 틀림**: 교재 p.19 다이옥신 예외 — **경구가 피하·복강내보다 독성 강함**. 족보 선지는 반대.\n- **③ 옳음**: 랫드 15 ppb >> 마우스 10,000 ppb (교재 p.20).\n- **④ 옳음**: 포유류 carboxylesterase → 말라티온 분해 → 독성 **낮음**. 교재 p.19. 족보 선지가 이번에는 방향이 맞게 서술됨 (흔치 않은 경우).\n- **⑤ 틀림**: 교재 p.19 \"반추류는 고사리 중독에 말보다 **덜** 민감\". 족보 선지는 \"더 민감\"으로 반대. 반추위 미생물 thiamine 합성이 thiaminase 공격을 상쇄.\n\n틀린 선지 ①·②·⑤ 세 개 → 정답.\n\n함정 요소는 역대 문항과 달리 이번에는 **④(말라티온)가 맞는 서술**로 나왔다는 점이다. 매년 ④자리에 말라티온이 뒤집혀 나오던 패턴이 깨졌다. 대신 ①(페노바비탈 LD₅₀)과 ⑤(반추류)가 뒤집혀 있다. 문항 유형 자체에 대한 선입견으로 한두 개만 고르고 넘어가면 감점이다. **다섯 선지 모두 독립적으로 판정**해야 안전하다. 핵심 통제: (i) LD₅₀ 수치와 독성의 역방향 관계, (ii) 다이옥신=경구 강함, (iii) 반추류=저항성.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 4]}, {"lecture": "L05-factors", "round": "2025-중간", "num": "23", "qid": "", "body": "독성에 영향을 미치는 건강상태 요인에 대한 것으로 틀린 것은?\n\na. 영양상태, 섭취한 동식물의 종류, 각종 질환 보유 여부 등에 따라 특정 독성물질의 독성이 영향을 받음.\nb. 아세트아미노펜은 고단백 식이로 인해 독성이 증가하고 약효가 상승한다.\nc. 안티피린은 채식을 선호하는 인종보다 육류를 선호하는 인종에서 대사가 수월하여 약효가 높아진다.\nd. 암페타민은 저체온에서 독성이 증가한다.\ne. DDT는 저체온에서 독성이 증가한다.", "jokboAnswer": "미표기", "claudeAnswer": "b, c, d (틀린 것 3개)", "explanation": "[2024-중간] #23과 선지 a~d는 동일하지만, **e선지만 DDT 체온 방향이 바뀌어** \"저체온\" (옳음)으로 출제되었다. 즉 2024 버전의 e는 \"DDT 고체온\"(틀림)이었으나 2025 버전 e는 \"DDT 저체온\"(맞음)이 됐다.\n\n- **a 옳음**: 영양·질환 → 독성에 영향 (교재 p.20).\n- **b 틀림**: APAP는 고단백 식이로 독성 **감소**·약효 **저하** (교재 p.20). 족보 선지는 \"독성 증가, 약효 상승\"으로 반대.\n- **c 틀림**: 안티피린은 육류 소비자(Caucasians)에서 대사 수월 → 약효 **낮아짐** (교재 p.20). 족보 선지는 \"약효 높아진다\"로 반대. 빠른 대사는 약효를 떨어뜨림(반감기 단축).\n- **d 틀림**: 암페타민은 **고체온**에서 독성 증가 (교재 p.20). 족보 선지는 \"저체온\"으로 반대. 교감신경 흥분제는 고체온과 결합하면 더 위험.\n- **e 옳음**: DDT는 **저체온**에서 독성 증가 (교재 p.20). 족보 선지 방향 맞음. 저체온에서 DDT 대사·배설 저하로 축적 증가.\n\n틀린 것은 b·c·d 세 개.\n\n함정 요소는 **동일 선지 구조의 작년 문항을 기억한 수험생이 e도 자동으로 \"틀림\"으로 분류하는 실수**다. 2024·2025에서 e선지가 정반대로 달라졌으니 선지를 끝까지 독립적으로 읽어야 한다. 암페타민=**고체온**, DDT=**저체온**의 짝은 순서가 반대이므로 \"A가 앞의 단어, D가 뒤의 단어\"처럼 혼동을 방지하는 자기만의 암기 트릭이 필요하다. \"암**페**타민 = **고**, D**D**T = **저**\"로 초성 대조 외우기 추천.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "24", "qid": "", "body": "독성물질의 연용효과(Continuous use)와 그에 대한 설명이 맞게 짝지어진 것은?\n\na-축적  b-과민감화  c-내성  d-습관성\n\nㄱ- 반복 투여된 독성물질이 흡수에 비해 대사나 배설이 늦어 독성이 과도하게 나타나는 현상.\nㄴ- 이전의 반복노출에 의해 감수성이 증가해 동일용량 투여에도 과도한 반응이 유도되는 현상.\nㄷ- 이전의 반복 노출에 의해 감수성이 감소되어 동일용량 투여에도 불구하고 같은 정도의 독작용이 일어나지 않는 현상.\nㄹ- 일부 독성물질을 장기간 투여할 때 나타나는 탐닉 현상으로, 물질의 투여를 중단하면 금단 증상으로 건강상태가 현저하게 나빠진다.\n\n(선지 번호 원본 미복구)", "jokboAnswer": "미표기 (구조상 a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ)", "claudeAnswer": "a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ", "explanation": "[2024-중간] #24와 개념은 동일하지만 **ㄱ~ㄹ 설명 순서가 달라서** 매칭 결과가 바뀐다. 2024에서는 ㄱ이 내성 정의였지만, 2025에서는 **ㄱ이 축적 정의**로 바뀌었다. 따라서 매칭 결과도 달라진다.\n\n교재 p.21 연용효과 정의 기준 판정:\n- **a 축적 = ㄱ**: \"흡수 > 대사·배설 → 독성 과도\" = ㄱ 설명과 정확히 일치.\n- **b 과민감화 = ㄴ**: \"감수성 증가 → 과도한 반응\" = ㄴ 설명과 정확히 일치.\n- **c 내성 = ㄷ**: \"감수성 감소 → 같은 효과 미달\" = ㄷ 설명과 정확히 일치.\n- **d 습관성 = ㄹ**: \"탐닉·금단증상\" = ㄹ 설명과 정확히 일치.\n\n결과적으로 a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ. 선지 번호와 무관하게 **4개가 순서대로 1:1 대응**된다.\n\n함정 요소는 2024년에 내성 = ㄱ이었던 것을 반사적으로 외운 수험생이 2025년에도 같은 매칭(c-ㄱ)을 쓰는 실수다. 설명문 ㄱ~ㄹ의 **내용**으로 판정해야 하며, 번호 암기는 통하지 않는다. 요령: 정의의 핵심 단어만 추출해서 매칭하면 빠르다 — \"흡수>배설 = 축적\", \"감수성 증가 = 과민감화\", \"감수성 감소 = 내성\", \"탐닉·금단 = 습관성\". 각 정의는 딱 하나의 개념에만 대응되므로 매칭은 기계적이다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "25", "qid": "", "body": "생물학적 작용을 가진 두 개 이상의 독성물질에 의한 현상에 대해 알맞게 짝지어진 것은?\n\na-부가효과  ㄱ- 두 개 이상의 독성물질이 서로 반대로 작용하여 독성이 감소하는 것\nb-증강효과  ㄴ- 각각의 효과를 더한 것보다 크게 증가하는 효과\nc-상승효과  ㄷ- 특정 효과가 없는 A약물이 B약물의 효과를 더 증강시키는 것\nd-길항효과  ㄹ- 두 약물의 병용효과가 각각의 효과를 더한 만큼 증가하는 것\n\n(선지 번호 원본 미복구)", "jokboAnswer": "a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ (표기 오류 다수)", "claudeAnswer": "a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ", "explanation": "[2022-중간] #17, [2024-중간] #25와 완전히 동일한 병용효과 매칭. ㄱ~ㄹ 설명 순서가 동일하여 정답도 동일하다.\n\n- **a 부가 = ㄹ**: 1+1.2=2.2 (에테르+클로로폼)\n- **b 증강 = ㄷ**: 0+1>1 (이소프로판올+CCl₄)\n- **c 상승 = ㄴ**: 2.3+5.0=61.1배 (아트로핀+2-PAM)\n- **d 길항 = ㄱ**: 반대 작용, 독성 감소\n\n교재 pp.22-23 기준. 연용효과 매칭(c=ㄷ)과 혼동하지 말 것 — **병용효과는 c=ㄴ(상승)**이다.\n\n함정 요소: 이 문항은 2022·2024·2025 세 차례 거의 동일하게 출제되어 **\"병용효과 매칭 답은 ㄹ-ㄷ-ㄴ-ㄱ\"**로 암기하면 바로 답이 나온다. 다만 매년 선지 번호는 달라질 수 있으므로 ㄹ-ㄷ-ㄴ-ㄱ 조합을 찾아 그 번호를 고르는 것이 안전하다. 또 연용효과와 병용효과를 혼동하지 말 것: 연용은 반복 노출에서의 체내 반응, 병용은 여러 물질 동시 노출.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "26", "qid": "", "body": "다음 빈칸에 적절히 선택된 것을 고르시오.\n[그림: 생체내 약물(독물)의 대사 경로 및 대사산물]\n\nA: 고지용성  B: 제2상 반응: 생합성  C: 포합  D: 산화, 환원, 가수분해  E: 제1상 반응\n\n① A-B-D-C-E  ② A-B-D-E-C  ③ A-D-E-C-B  ④ A-E-D-B-C  ⑤ A-E-C-B-D", "jokboAnswer": "④", "claudeAnswer": "④ (A-E-D-B-C)", "explanation": "[2024-중간] #26과 완전히 동일한 문항. 그림·선지·정답 모두 그대로. 정답 ④ A-E-D-B-C.\n\n교재 04장 대사 흐름도 (교재발췌.md chunk 8 근방) 기준:\n- **A 고지용성** → 외인성 독성물질이 고지용성 상태로 체내 진입.\n- **E 제1상 반응** → 대사 첫 단계 카테고리.\n- **D 산화·환원·가수분해** → E의 하위 내용. 작용기 노출·변형.\n- **B 제2상 반응: 생합성** → 대사 두 번째 단계 카테고리.\n- **C 포합(conjugation)** → B의 하위 내용. 글루쿠론산·술페이트·글루타티온 등과 결합 → 수용성 증가 → 배설.\n\n오답 소거는 [2024-중간] #26 해설과 동일하다. 카테고리(E, B)와 하위 내용(D, C)을 섞거나, 1·2상 순서를 뒤집거나, A를 제외하고 시작 위치를 바꾸면 전부 틀림.\n\n함정 요소는 없다. 2024년 동일 문항이 그대로 출제되었으므로 **답 ④ 고정 암기**로 충분하다. 다만 개념적으로는 1상(functional group 노출) → 2상(conjugation 부착) 순서의 필연성을 이해해야 다른 유사 문항에도 대응 가능하다. 이 문항은 L06 biotransformation 단원의 도입부 개념과 연결되며, L05 범위 내에서 완결되어 있다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "20", "qid": "", "body": "대사산물의 물리화학적 요인에 대하여 틀린 것을 모두 고른 것은?\n\na. 물리적 제형이나 입자의 크기 등은 독성에 영향을 미치지 않는다.\nb. 화학 구조는 체내 흡수, 분포 및 작용 기전에 영향을 미치지 않는다.\nc. 용질을 충분히 녹일 수 있는 운반체가 잘 흡수시킬 수 있으며, 독성물질 투여 시의 액량 및 농도 역시 흡수 속도에 영향을 미친다.\nd. 지용성 물질이 지질막을 잘 통과하므로 흡수가 빠르고 지방이나 신경조직에 잘 축적된다.\ne. 페노티아진은 입자가 작아도 독성이 높아지지 않는다.\n\n① a, b, c  ② a, b, e  ③ b, c, d, e  ④ a, b, d, e  ⑤ 모두 틀림", "jokboAnswer": "미표기", "claudeAnswer": "② (a, b, e)", "explanation": "물리화학적 요인 5선지 중 방향이 뒤집힌 것만 고르는 전형적 문항. 교재 p.17(교재발췌.md 슬라이드 4/1) \"1. 물리화학적 요인\"을 기준으로 판정한다.\n\n- **a 틀림**: 교재 p.17 \"독성물질의 제형, 순도, 입자 크기 등에 따라 독성이 다르게 발현된다\". 즉 제형·입자 크기는 독성에 **크게 영향**. 족보 선지의 \"영향을 미치지 않는다\"는 정반대.\n- **b 틀림**: 교재 p.17 \"화학구조는 체내 흡수, 분포, 대사 및 작용기전에 큰 영향을 미친다\". 족보 선지의 \"영향 없다\"는 정반대.\n- **c 옳음**: 교재 p.17-18 \"용질을 충분히 녹일 수 있는 운반체나 용매는 세포막 투과 속도 혹은 흡수 속도에 영향을 미친다\". 액량·농도도 흡수에 영향을 주는 것이 맞다.\n- **d 옳음**: 교재 p.17 \"지용성 물질이 지질막을 잘 통과하므로 흡수가 빠르고, 지방이나 신경조직에 잘 축적된다\" — 거의 그대로.\n- **e 틀림**: 교재 p.17 \"페노티아진(phenothiazine)은 입자가 작을수록 독성이 높아진다\". 족보 선지의 \"작아도 높아지지 않는다\"는 정반대.\n\n따라서 틀린 선지는 a·b·e 세 개로 정답은 ②이다.\n\n함정 요소는 다음과 같다. 첫째, a와 b 모두 \"영향을 미치지 않는다\"라는 동일 구조 부정으로 일반화하여 그럴듯하게 느끼기 쉽다. 교재는 둘 다 **큰 영향**을 명시한다. 둘째, e는 페노티아진이라는 구체 사례를 인용하면서 방향을 뒤집는데, 교재에 예시로 명시된 \"작을수록 독성↑\"를 기억하지 못하면 보편적으로 \"입자 크기는 중요하다\" 정도의 직관만으로는 판정이 어렵다. 셋째, 선지 ⑤ \"모두 틀림\"은 c·d를 함께 틀림으로 몰아가려는 함정이지만 c·d는 교재 기술과 일치한다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "21", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 아래의 설명 중 틀린 것들로만 묶여있는 것은?\n\na. 독성 정도는 투여횟수에는 크게 영향을 받지 않는다.\nb. 배설 경로는 흡수 속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\nc. 대사과정에서 궁극적인 독성물질로 활성화되는 경우에는 피하나 복강내 투여가 오히려 경구투여보다 높은 독성을 발현한다.\nd. 동물 종에 따라 대사효소의 활성도 또는 흡수율에 따라 선택적 독성이 유발되는 경우가 있다.\ne. 연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서 독성의 차이가 나타난다.\nf. 동일종의 동물에서 독성은 체중이나 체표면적에 비례한다.\n\n① a, b, c  ② a, b, e  ③ b, c, e  ④ b, d, f  ⑤ c, e, f", "jokboAnswer": "①", "claudeAnswer": "① (a, b, c)", "explanation": "[2022-중간] #14와 선지 a~f가 거의 동일한 반복 출제 문항이다. 교재 p.18-20 기준 판정은 동일하다.\n\n- **a 틀림**: 교재 p.18 \"투여 횟수가 달라지면 ... 축적·내성 등의 성질에 따라 독성 정도가 달라진다\". 투여 횟수 = 독성에 큰 영향.\n- **b 틀림**: 교재 p.18 \"**노출경로**는 흡수속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다\". \"배설 경로\"가 아니다.\n- **c 틀림**: 교재 p.19 다이옥신 예외 — \"경구 > 피하·복강내\". 족보 선지는 방향 반대.\n- **d·e·f 옳음**: 각각 종간 차이·연령 차이·체중·체표면적 비례로 교재와 일치.\n\n틀린 것 a·b·c → 정답 ①. 2022년과 2024년 두 차례 반복 출제된 템플릿 문항으로, 선지 표현도 거의 동일하다.\n\n함정 요소는 b의 \"배설\"이라는 단어 하나만 바꾸는 점, 그리고 c의 일반론화(\"다이옥신\" 언급 없이 \"대사 활성화 경우\")에 있다. 매년 같은 틀로 출제되므로 **a·b·c = 틀림 / d·e·f = 맞음**을 통으로 암기하는 것이 효율적이다.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "22", "qid": "", "body": "독성을 나타내는 생물학적 인자 중 틀린 것은?\n\n① 포유류는 말라티온 분해효소가 있어 해충보다 독성이 높다.\n② 다이옥신은 대사과정에서 궁극적인 독물로 활성화되어 경구투여에서가 피하나 복강내 주사보다 높은 독성을 갖는다.\n③ 반추류는 thiamine(vitamin B₁)을 가져 thiaminase를 함유하는 고사리 중독에서 독성이 덜하다.\n④ 페노바비탈의 LD₅₀은 경구투여에서 혈관내투여보다 높다.\n⑤ 아플라톡신 B₁에 의한 간암독성은 랫드가 마우스보다 민감하다.", "jokboAnswer": "①", "claudeAnswer": "①", "explanation": "[2022-중간] #15의 ④선지와 거의 동일하게 말라티온 선지의 방향이 뒤집힌 문항이다. 선지 배치 순서만 달라졌고 판정 논리는 동일하다.\n\n- **① 틀림(정답)**: 교재 p.19 \"포유류에는 말라티온 분해효소가 존재하여 효소가 없는 해충에 비해 독성이 월등히 낮다\". 족보 선지는 \"독성이 높다\"로 정반대. 포유류 carboxylesterase → malathion 가수분해 → 무독화.\n- **② 옳음**: 다이옥신 경구 > 피하·복강내 예외. 교재 p.19.\n- **③ 옳음**: 반추류의 thiamine 자체 합성 → 고사리 저항성. 교재 p.19.\n- **④ 옳음**: 페노바비탈 LD₅₀ 경구 280 > IV 80 mg/kg. 교재 p.19.\n- **⑤ 옳음**: 랫드 15 ppb >> 마우스 10,000 ppb. 교재 p.20.\n\n5대 함정 중 말라티온 하나만 방향이 틀려 ①이 정답이다.\n\n함정 요소는 \"분해효소가 있다\"(맞는 사실)에 \"독성이 높다\"(틀린 결론)를 접착제처럼 붙여 한 문장으로 만든 점이다. 효소가 **분해**하면 독성은 **낮아진다**는 일반 원리를 끊임없이 상기해야 한다. 또 ④선지의 \"LD₅₀이 경구 > IV\"가 수치상 맞지만 독성 방향과 혼동될 수 있다 — LD₅₀ 수치 ↑ = 독성 ↓라는 역방향 관계를 반드시 기억할 것.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "23", "qid": "", "body": "독성에 영향을 미치는 건강상태 요인에 대한 것으로 틀린 것은?\n\na. 영양상태, 섭취한 동식물의 종류, 각종 질환 보유여부 등에 따라 특정 독성물질의 독성이 영향을 받음.\nb. 아세트아미노펜은 고단백 식이로 인해 독성이 증가하고 약효가 상승된다.\nc. 안티피린은 채식을 선호하는 인종보다 육류를 선호하는 인종에서 대사가 수월하여 약효가 높아진다.\nd. 암페타민은 저체온에서 독성이 증가한다.\ne. DDT는 고체온에서 독성이 증가한다.\n\n① 모두 맞음  ② b, c, d  ③ a, b, c, d  ④ b, c, d, e  ⑤ 모두 틀림", "jokboAnswer": "④", "claudeAnswer": "④ (b, c, d, e)", "explanation": "건강상태 관련 4가지 세부 기전(APAP·안티피린·암페타민·DDT)이 모두 방향이 뒤집혀 틀린 것으로 구성된 문항. 교재 p.20(교재발췌.md 슬라이드 3)의 건강상태·체온 항목 기준 판정.\n\n- **a 옳음**: 교재 p.20 \"간·신장 질환, 영양 상태, 감염, 스트레스 등은 독성물질의 대사 및 배설에 영향을 미친다\" — 영양·질환 요인이 독성에 영향을 준다는 일반 진술. 정확.\n- **b 틀림**: 교재 p.20 \"아세트아미노펜은 고단백식이로 독성이 **감소**하고 약효가 **저하**되며\" — 족보 선지는 \"독성 증가·약효 상승\"으로 둘 다 뒤집힘. 고단백은 APAP의 GSH 합성을 돕거나 포합 해독을 증가시키는 방향.\n- **c 틀림**: 교재 p.20 \"안티피린은 육류를 다량 소비하는 Caucasians에서 채식을 선호하는 Asians보다 대사가 수월하여 약효가 **낮아진다**\" — 족보 선지는 \"약효가 높아진다\"로 뒤집힘. 대사가 수월해지면 빨리 분해되어 약효 **지속 시간이 짧아지고 효과가 낮아진다**.\n- **d 틀림**: 교재 p.20 \"암페타민은 **고체온**에서 독성이 증가\" — 족보 선지는 \"저체온\"으로 반대. 암페타민 = 교감신경 자극 = 고체온에서 더 위험.\n- **e 틀림**: 교재 p.20 \"DDT는 **저체온**에서 독성이 증가\" — 족보 선지는 \"고체온\"으로 반대. DDT = 저체온에서 대사 저하로 축적 증가.\n\n틀린 선지 b·c·d·e 네 개로 정답 ④.\n\n함정 요소는 암페타민과 DDT의 체온 방향이 서로 **반대**라는 점이다. 암페타민=고체온, DDT=저체온으로 짝을 지어 암기해야 섞이지 않는다. 또 안티피린 선지에서 \"대사가 수월 → 약효가 높아진다\"는 직관적으로 맞아 보이지만, 약물학적으로는 **대사가 빠르면 약효 농도·지속이 짧아져 오히려 약효가 낮아진다**는 원리를 기억해야 한다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "24", "qid": "", "body": "독성물질의 연용효과(Continuous use)와 그에 대한 설명이 맞게 짝지어진 것은?\n\na. 축적  b. 과민감화  c. 내성  d. 습관성\n\nㄱ. 이전의 반복 노출에 의해 감수성이 감소되어 동일용량 투여에도 불구하고 같은 정도의 독작용이 일어나지 않는 현상.\nㄴ. 이전의 반복노출에 의해 감수성이 증가해 동일용량 투여에도 과도한 반응이 유도되는 현상.\nㄷ. 일부 독성물질을 장기간 투여할 때 나타나는 탐닉 현상으로, 물질의 투여를 중단하면 금단 증상으로 건강상태가 현저하게 나빠진다.\nㄹ. 반복 투여된 독성물질이 흡수에 비해 대사나 배설이 늦어 독성이 과도하게 나타나는 현상.\n\n① a-ㄴ, b-ㄷ, c-ㄱ, d-ㄹ  ② a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ  ③ a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ  ④ a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ  ⑤ a-ㄷ, b-ㄹ, c-ㄱ, d-ㄴ", "jokboAnswer": "⑤ (오류)", "claudeAnswer": "③ (a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ)", "explanation": "족보 정답 ⑤는 오류이며, 교재 p.21 연용효과 정의 기준 정답은 ③이다. 각 개념을 정의에 그대로 대응시키면 매칭이 결정된다.\n\n- **a 축적(accumulation) = ㄹ**: \"흡수 > 대사·배설 → 독성 과도\" 정의가 ㄹ에 그대로 있음. 교재 p.21.\n- **b 과민감화(hypersensitization) = ㄴ**: \"감수성 **증가** → 과도한 반응\" 정의가 ㄴ에 그대로. 알레르기가 대표.\n- **c 내성(tolerance) = ㄱ**: \"감수성 **감소** → 동일 용량에 같은 독작용 안 일어남\" 정의가 ㄱ에 그대로. 수용체 민감 소실 / 효소 유도가 기전.\n- **d 습관성(habituation) = ㄷ**: \"장기 투여 탐닉 → 중단 시 금단증상\" 정의가 ㄷ에 그대로.\n\n따라서 a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ → 선지 ③이 정답이다. 족보가 ⑤로 표기한 것은 명백한 오류로, ⑤는 \"a-ㄷ, b-ㄹ\"로 축적과 습관성이 바뀌어 있어 정의와 어긋난다.\n\n함정 요소는 이 문항이 병용효과 매칭(부가·증강·상승·길항 = a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ = ②)과 표면 구조가 유사하다는 점이다. 병용효과 매칭은 b가 ㄷ이지만, 연용효과 매칭은 b가 ㄴ이다 — 두 매칭을 혼동하지 말 것. 연용효과 매칭은 **\"감수성 증가(ㄴ) = 과민감화(b)\"**라는 키를 먼저 잡으면 나머지가 자동으로 결정된다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "25", "qid": "", "body": "생물학적 작용을 가진 두 개 이상의 독성물질에 의한 현상에 대하여 알맞게 짝지은 것은?\n\na - 부가효과  ㄱ - 두 개 이상의 독성물질이 서로 반대로 작용하여 독성이 감소하는 것.\nb - 증강효과  ㄴ - 각각의 효과를 더한 것보다 크게 증가하는 효과\nc - 상승효과  ㄷ - 특정 효과가 없는 A 약물이 B 약물의 효과를 더 증강시키는 것\nd - 길항효과  ㄹ - 두 약물의 병용효과가 각각의 효과를 더한 만큼 증가하는 것\n\n① a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ  ② a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ  ③ a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ  ④ a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ  ⑤ a-ㄷ, b-ㄹ, c-ㄱ, d-ㄴ", "jokboAnswer": "②", "claudeAnswer": "② (a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ)", "explanation": "[2022-중간] #17과 동일 구조의 병용효과 매칭. 답 ② 고정. 교재 pp.22-23 기준.\n\n- **a 부가(additive) = ㄹ**: 1+1.2=2.2 (Ether+Chloroform 마취)\n- **b 증강(potentiation) = ㄷ**: 0+1>1 (Isopropanol+CCl₄)\n- **c 상승(synergistic) = ㄴ**: 합 초과, Atropine+2-PAM=61.1배\n- **d 길항(antagonistic) = ㄱ**: 반대 작용, 독성 감소\n\n매칭 암기 요령: **\"ㄹ-ㄷ-ㄴ-ㄱ\"을 거꾸로(ㄱ이 마지막)** 기억하면 a·b·c·d 순서에 맞는다. 또는 \"0+1>1은 증강, 더해서 61.1은 상승\"이라는 수식 단서로 추론해도 된다.\n\n함정 요소는 선지 ①이 \"a-ㄱ(부가를 길항 정의)\"로 완전히 뒤집힌 함정, ⑤가 \"a-ㄷ, b-ㄹ(부가와 증강을 통째로 바꿈)\"로 중간 함정을 구성한다는 점이다. 첫 번째 글자만 봐도 함정 여부를 걸러낼 수 있다 — a는 반드시 ㄹ이다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "26", "qid": "", "body": "다음 빈칸에 적절히 선택된 것을 고르시오.\n[그림: 생체내 약물(독물)의 대사경로 및 대사산물]\n\nA: 고지용성\nB: 제2상 반응: 생합성\nC: 포합\nD: 산화, 환원, 가수분해\nE: 제1상 반응\n\n① A-B-D-C-E  ② A-B-D-E-C  ③ A-D-E-C-B  ④ A-E-D-B-C  ⑤ A-E-C-B-D", "jokboAnswer": "④", "claudeAnswer": "④ (A-E-D-B-C)", "explanation": "독성물질 체내 대사 경로의 큰 흐름을 순서대로 배치하는 문항. 교재 04장 슬라이드 (교재발췌.md chunk 8 도식)에 따르면 외인성 고지용성 물질은 다음 순서로 대사·배설된다.\n\n1. **A 고지용성(외인성 물질 진입)** — 첫 단계. 지용성이 커야 세포막·간세포 진입 가능.\n2. **E 제1상 반응** — 두 번째 단계. 1상의 카테고리 이름.\n3. **D 산화·환원·가수분해** — 1상 반응의 구체 내용. 즉 E의 하위 설명으로 이어짐.\n4. **B 제2상 반응: 생합성** — 세 번째 단계 카테고리. 1상을 거친 중간대사체에 결합 그룹을 붙임.\n5. **C 포합(conjugation)** — 2상 반응의 구체 내용. B의 하위 설명. 최종적으로 수용성 증가 → 배설.\n\n따라서 순서는 **A → E → D → B → C**이고, 선지 번호는 ④이다.\n\n다른 선지 소거:\n- ① A-B-D-C-E: 2상이 1상보다 먼저 나옴 → 틀림.\n- ② A-B-D-E-C: 1·2상이 뒤섞임 → 틀림.\n- ③ A-D-E-C-B: 반응 카테고리(E, B) 없이 하위 내용(D, C)이 먼저 나옴 → 틀림.\n- ⑤ A-E-C-B-D: 포합(C)이 2상(B)보다 먼저 나오고, 1상 세부(D)가 맨 뒤로 감 → 틀림.\n\n함정 요소는 **카테고리(E 1상, B 2상)와 그 하위 내용(D 산화·환원·가수분해, C 포합)을 섞는 것**이다. 카테고리가 먼저 나오고 그 다음에 하위 내용이 이어지는 계층 구조를 기억해야 한다. 또한 1상 → 2상 순서가 절대 바뀌지 않는다는 점(1상은 functional group 노출, 2상은 그에 conjugation 부착)이 핵심이다. L06 biotransformation 단원과 주제가 이어지지만 본 문항은 L05 교재 04장 내에서 완결된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "35", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 아래의 설명 중 틀린 것들로만 묶여있는 것은?\n(Q124 / Q278과 동일 선지 a~f)\n\n① a, b, c  ② a, b, e  ③ b, c, e  ④ b, d, f  ⑤ c, e, f", "jokboAnswer": "①", "claudeAnswer": "① (a, b, c)", "explanation": "[2022-중간] #14, [2024-중간] #21과 같은 선지 a~f 구조가 2024년 중간고사 내에서 한 번 더 반복 출제되었다. 같은 시험지에 같은 문항이 두 번 실린 이례적 경우. 판정은 동일하다.\n\n- **a 틀림**: 투여 횟수 → 독성 큰 영향 (교재 p.18, 축적·내성 결과).\n- **b 틀림**: **노출 경로**가 절대적 요인 (\"배설 경로\" 아님, 교재 p.18).\n- **c 틀림**: 다이옥신은 경구 > 피하·복강내 (교재 p.19 예외).\n- **d·e·f 옳음**: 종간 차이·연령·체중·체표면적 비례 모두 정확.\n\n틀린 것 a·b·c → 정답 ①.\n\n함정 요소는 이전 2022·2024년 타 문항과 완전히 동일한 구조라는 점이다. 다만 한 시험지에 같은 내용이 두 번 출제되었다는 점에서, 실제 시험에서 \"이거 아까 봤는데?\" 싶으면 동일 정답 ①을 자신있게 써도 된다. **a·b·c 세트 = 생물학적 요인 단골 오답 3종**으로 외우면 시험 직전 복습에 효율적이다.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2022-중간", "num": "14", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 아래의 설명 중 틀린 것들로만 묶여있는 것은?\n\na. 독성 정도는 투여 횟수에는 크게 영향을 받지 않는다.\nb. 배설 경로는 흡수 속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\nc. 대사과정에서 궁극적인 독성물질로 활성화되는 경우에는 피하나 복강내투여가 오히려 경구 투여보다 높은 독성을 발현한다.\nd. 동물 종에 따라 대사효소의 활성도 또는 흡수율에 따라 선택적 독성이 유발되는 경우가 있다.\ne. 연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서 독성의 차이가 나타난다.\nf. 동일종의 동물에서 독성은 체중(kg)이나 체표면적(cm²)에 비례한다.\n\n① a, b, c  ② a, b, e  ③ b, c, e  ④ b, d, f  ⑤ c, e, f", "jokboAnswer": "⑤ (c, e, f로 표기됨 — 명백한 오류)", "claudeAnswer": "① (a, b, c)", "explanation": "족보 정답 ⑤는 오류이며, 교재 p.18-20 근거로 ①이 정답이다. 각 선지를 하나씩 판정한다.\n\n- **a 틀림**: 교재 p.18 \"투여 횟수가 달라지면 독성물질의 배설속도, 축적, 내성 등의 성질에 따라 독성 정도가 달라진다.\" 횟수 = 독성에 큰 영향. \"영향 받지 않는다\"는 정반대 서술이다.\n- **b 틀림**: 교재 p.18 \"노출경로는 흡수속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\" 족보 선지에서 \"노출(투여) 경로\"를 \"**배설** 경로\"로 단어 하나만 바꿨다. 배설은 독성 종료 단계와 관련되지만 \"흡수·대사 큰 변화\"의 주체는 노출 경로다.\n- **c 틀림**: 교재 p.19 다이옥신 예외는 \"**경구** 투여가 오히려 피하·복강내보다 높은 독성\"이다. 족보 선지는 방향을 뒤집어 \"피하·복강내 > 경구\"로 서술해 틀렸다.\n- **d 옳음**: 교재 p.19 \"종간 및 계통 간 해부학적·생리학적·대사적 차이로 인해 선택적 독성\" — 대사효소 활성도·흡수율 차이에 의한 선택적 독성은 정확한 서술이다.\n- **e 옳음**: 교재 p.20 \"연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서도 독성에 차이\" — 그대로 일치.\n- **f 옳음**: 교재 p.20 \"동일 종의 동물에서 독성은 일반적으로 체중이나 체표면적에 비례한다\" — 정확한 서술.\n\n따라서 틀린 것은 a·b·c이며 정답은 ①이다. 족보 ⑤는 명백한 오답 처리 오류.\n\n함정 요소는 b선지의 \"배설\"이라는 단어 한 글자 차이와, c선지에서 \"다이옥신\"이라는 단어 없이 \"대사 활성화되는 경우\"만 일반화되어 나타난다는 점이다. 일반론적으로 그럴듯하게 읽히지만 교재는 **경구 > 피하·복강내**를 명시한다. 선지 a는 \"투여 횟수 무시\"라는 직관적 오류를 제공해 가장 많은 수험생이 걸려드는 함정이다.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2022-중간", "num": "15", "qid": "", "body": "다음 중 독성에 영향을 미치는 특성으로 옳지 않은 것은?\n\n① 페노바비탈의 LD₅₀은 경구투여에서 혈관내투여보다 높다.\n② 아플라톡신 B₁에 의한 간암독성은 랫드(15ppb)가 마우스(10,000ppb이상)보다 민감하다.\n③ 다이옥신은 대사과정에서 궁극적인 독물로 활성화되어 경구투여에서가 피하나 복강내 주사보다 높은 독성을 갖는다.\n④ 살충제인 말라티온에 대해 포유류는 분해효소가 있어 해충보다 독성이 높다.\n⑤ 반추류는 thiamine(vitamin B₁)을 가져 thiaminase를 함유하는 고사리 중독에서 독성이 덜하다.", "jokboAnswer": "④", "claudeAnswer": "④", "explanation": "L05의 5대 종간 함정(페노바비탈·아플라톡신·다이옥신·말라티온·반추류)을 한 문항에 모아놓은 표준 문항이다. ④만 방향이 틀리게 서술되어 정답으로 지목된다.\n\n- **① 옳음**: 교재 p.19 페노바비탈 LD₅₀ — 경구 280 > IV 80 mg/kg. LD₅₀ 수치 자체는 경구가 더 높다(즉 경구가 독성은 낮음). 서술이 \"LD₅₀ 수치\"를 말하는 것이라 방향이 맞다. 여기서 수험생이 흔히 실수하는 것이 \"독성은 IV가 높으니 LD₅₀도 IV가 높겠지\"로 착각하는 것 — LD₅₀는 독성과 **역비례**다.\n- **② 옳음**: 교재 p.20 \"랫드 15 ppb, 마우스 10,000 ppb 이상으로 랫드가 훨씬 민감.\" 수치까지 정확.\n- **③ 옳음**: 교재 p.19 다이옥신 예외가 그대로 서술됨. \"경구 > 피하·복강내\"가 정답 방향이다.\n- **④ 틀림(정답)**: 교재 p.19 \"포유류에는 말라티온 분해효소가 존재하여 효소가 없는 해충에 비해 독성이 **월등히 낮다**.\" 족보 선지는 \"해충보다 독성이 높다\"로 정반대. 포유류=효소 有 → 독성 **낮음**이 핵심.\n- **⑤ 옳음**: 교재 p.19 반추류는 반추위 미생물이 thiamine을 합성하므로 thiaminase 함유 고사리에 저항성을 가진다. 말(단위동물)보다 덜 민감.\n\n함정 요소는 ①선지의 LD₅₀ 해석(독성과 역비례)과, ④선지에서 \"분해효소가 있다\"는 맞는 사실에 \"독성이 높다\"는 반대 결론을 붙여 논리 흐름이 단절된 점이다. \"분해효소 있으면 → 독성 ↓\"로 연결되어야 한다. 말라티온 = 포유류 독성 낮음 = 해충 독성 높음은 매년 거의 같은 형태로 출제된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L05-factors", "round": "2022-중간", "num": "17", "qid": "", "body": "생물학적 작용을 가진 두 개 이상의 독성물질에 의한 현상에 대하여 알맞게 짝지은 것은?\n\na - 부가효과(additive effect)\nb - 증강효과(potentiation effect)\nc - 상승효과(synergistic effect)\nd - 길항효과(antagonistic effect)\n\nㄱ 두 개 이상의 독성물질이 서로 반대로 작용하여 독성이 감소하는 것\nㄴ 각각의 효과를 더한 것보다 크게 증가하는 효과\nㄷ 특정 효과가 없는 A 약물이 B 약물의 효과를 더 증강시키는 것\nㄹ 두 약물의 병용효과가 각각의 효과를 더한 만큼 증가하는 것\n\n① a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ\n② a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ\n③ a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ\n④ a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ\n⑤ a-ㄷ, b-ㄹ, c-ㄱ, d-ㄴ", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "이 매칭 문항은 L05에서 가장 자주 나오는 고정 패턴이며, 답은 항상 **a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ**으로 고정된다. 교재 pp.22-23 ② 증가효과·③ 길항효과 정의에 따라 기계적으로 매칭된다.\n\n- **a 부가효과 = ㄹ**: 정의 \"두 약물의 병용효과가 각각의 효과를 더한 만큼 증가\" → ㄹ이 그대로 일치. 수식 1+1.2=2.2의 에테르+클로로폼 마취가 예.\n- **b 증강효과 = ㄷ**: 정의 \"특정 효과가 없는 A(0)가 B(1)를 증강\" → ㄷ이 그대로 일치. isopropanol+CCl₄가 예.\n- **c 상승효과 = ㄴ**: 정의 \"각각의 합보다 크게 증가\" → ㄴ이 그대로 일치. atropine+2-PAM=61.1배가 예.\n- **d 길항효과 = ㄱ**: 정의 \"반대로 작용하여 독성 감소\" → ㄱ이 그대로 일치.\n\n함정 요소는 \"증강\"이라는 한글 단어가 \"상승\"과 의미상 구분이 약하다는 점이다. \"0 + 1 > 1\"의 A가 무효일 때가 증강, \"1 + 1 > 2\"처럼 양쪽 다 유효한데 단순합을 초과할 때가 상승이다. 또 선지 ①, ③, ⑤처럼 \"a-ㄷ(부가를 증강 정의로)\" 같은 1칸 어긋남을 넣어 혼동을 유도한다. 수치 예시(1+1.2=2.2 / 0+1>1 / 2.3+5.0=61.1)를 먼저 떠올리면 매칭이 자동으로 결정된다.", "tail": "", "scoreable": true, "correctIndices": [1]}]}, "L06-mechanism-1-2": {"lecture": "L06-mechanism-1-2", "title": "독성기전 1·2", "slug": "mechanism-1-2", "questions": [{"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "27", "qid": "Q026", "body": "27. 외인성 물질의 대사 중 틀린 것을 모두 고르시오.\n\n①. 친수성, 분자량 큰 물질은 지용성으로 바귀어 흡수는 어렵고 배설이 용이해진다.\n②. 외인성 물질이 대사적 활성화되어 생성된 물질을 반응성 대사산물이라 한다.\n③. 외인성 물질은 생화학적 활성이 없는 물질이 되거나 또는 더욱 생물학적 독성이 높은 물질이 될 수 있다.\n④. 외인성 물질들이 생체내 대사 거쳐 독성 있는 물질로 변환되는 과정을 대사적 활성화라고 한다.\n⑤. 대사는 외인성 물질의 배설, 덜 유해한 물질로의 변환을 통해 중요한 방어기전의 역할을 한다.", "jokboAnswer": "①", "claudeAnswer": "**①**", "explanation": "1) **배경**: [2024-중간] #27과 동일 핵심. 동일 함정 반복.\n\n2) **포인트·정답 근거**: ① 방향이 반대. 강의안 lec-07 chunk 4: 대사 = **지용성(친지성)** → **수용성(친수성)**.\n\n3) **오답 소거**: ②③④⑤ 모두 강의안 개념 그대로.\n\n4) **함정**: 지문 결과부(흡수 어렵고 배설 용이)가 맞아서 전체를 맞는 것으로 오인할 위험.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "28", "qid": "Q027", "body": "28. 다음 중 반응성 대사산물에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. 친전자성 물질은 체액이나 세포 내 친핵성 물질과 포합되어 비활성화되며 가장 많은 친핵성 또는 해독 분자는 핵산이다.\nb. 친핵성 물질은 상대편 분자의 친전자성 물질과 반응하며 생체 내에서 단백질, 지질, 핵산, GSH 등이 친전자성 물질이다.\nc. 자유기는 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다.\nd. 산화-환원적 스트레스를 일으키는 것은 생체에서 비교적 쉽게 환원될 수 있는 분자 산소(O₂) 이다.\ne. 정상적으로 O₂는 근육과 혈관에서 신호 분자이지만, 독성학으로는 산화적 스트레스의 주요 요소이다.\n\n①. a, b, c\n②. a, e\n③. b, d, e\n④. a, b, d, e\n⑤. a, b, e", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: [2022-중간] #19, [2024-중간] #28의 확장판. e의 기체 분자만 O₂로 바뀜.\n\n2) **포인트**: 3개 함정을 동시에 잡아내야 함.\n\n3) **정답 근거**:\n   - a(**틀림**): 해독 분자 = **물**, 핵산 아님.\n   - b(**틀림**): 단백질·지질·핵산·GSH = **친핵성** (친전자성 아님).\n   - c·d(맞음).\n   - e(**틀림**): 근육·혈관 신호 분자 = **NO**. O₂도 아니고 CO도 아님.\n\n4) **오답 소거**: 틀린 3개 모두 포함 = ⑤.\n\n5) **함정**: b는 미묘 — \"단백질·지질·핵산·GSH는 친핵성 분자\"라고 외워야 함. 친전자성 물질이 이들을 **공격**하는 관계.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "29", "qid": "Q028", "body": "29. 반응성 대사산물을 생성하는 아래의 물질들에 대한 설명 중 틀린 것을 모두 고르시오.\n\n①. 대식세포에서는 ONOO⁻를 형성한 다음 NO₂와 HO·를 생성하기 때문에 대식세포는 RNS 생성의 중요한 경로가 된다.\n②. 벤젠은 산화-환원 순환을 거쳐 O₂⁻를 생성하는 대표적인 물질이다.\n③. 장내 세균총은 질산염(NO₃)을 아질산염(NO₂)으로 환원시켜 독성이 더욱 강한 물질로 된다.\n④. 전이 금속들은 제1상과 제2상 반응을 촉진시켜 HO·을 생성하도록 한다.\n⑤. paraquat는 산화-환원 순환(redox cycling)을 거쳐 O₂⁻를 생성시켜 선택적인 간독성을 일으키기 쉽다.", "jokboAnswer": "④⑤", "claudeAnswer": "**④⑤**", "explanation": "1) **배경**: [2022-중간] #20의 리메이크. ②에서 Benzene의 O₂⁻ 생성은 옳다고 다시 확인.\n\n2) **포인트·정답 근거**:\n   - ④(**틀림**): 전이 금속 = **Fenton 반응**(Fe²⁺+H₂O₂→Fe³⁺+HO·). 1·2상 반응과 무관.\n   - ⑤(**틀림**): Paraquat = **폐독성** (간독성 아님).\n\n3) **오답 소거**: ①②③ 모두 옳음.\n\n4) **함정**: ②의 \"벤젠→O₂⁻\"를 HO·로 착각하면 오답 포함해 과잉 선택할 수 있음 — Benzene은 **O₂⁻**.", "tail": "", "scoreable": true, "correctIndices": [3, 4]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "30", "qid": "Q029", "body": "30. 다음 중 반응성 대사산물을 생성하는 물질들에 대한 설명으로 틀린 것을 모두 고르시오.\n\n①. 대식세포에서는 ONOO⁻를 형성한 다음 NO₂와 HO·를 생성하기 때문에 대식세포는 RNS 생성의 중요한 경로가 된다.\n②. Paraquat는 산화-환원 순환(redox cycling)을 거쳐 O₂⁻를 생성시켜 간독성을 일으키기 쉽다.\n③. 장내 세균총은 질산염(NO₃)을 아질산염(NO₂)으로 환원시켜 독성이 더욱 강한 물질로 만든다.\n④. 전이 금속들은 제1상과 제2상 반응을 촉진시켜 HO·를 생성하도록 한다.\n⑤. Benzene은 산화-환원 순환을 거쳐 HO·를 생성하는 대표적인 물질이다.", "jokboAnswer": "②, ④, ⑤", "claudeAnswer": "**②, ④, ⑤**", "explanation": "1) **배경**: 3대 고정 함정이 모두 한 문항에 응축된 \"종합 문제\".\n\n2) **포인트·정답 근거**:\n   - ②(**틀림**): Paraquat = 폐독성.\n   - ④(**틀림**): 전이 금속 = Fenton 반응.\n   - ⑤(**틀림**): Benzene = **O₂⁻**(HO· 아님). 강의안 lec-07 chunk 6 슬라이드 2.\n\n3) **오답 소거**: ①③ 옳음.\n\n4) **함정**: Benzene의 ROS 산물을 HO·로 적어놓은 선지에 주의 — O₂⁻만 정답.", "tail": "", "scoreable": true, "correctIndices": [1, 3, 4]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "32", "qid": "Q031", "body": "32. 다음 중 틀린 것을 모두 고르시오.\n\n①. 독성물질은 단백질, 지질, 핵산, 친핵성 물질인 세포내 thiols(GSH)를 표적으로 하고, 특히 단백질은 친전자성 물질의 공격에 주요 표적이 된다.\n②. 독성물질과 분자 간의 결합에는 비공유결합과 공유결합이 존재하고, 수소 분리, 전자 전이, 효소 반응 등이 있다.\n③. 독성물질과 분자 간의 공유결합은 가역적이다.\n④. 독성물질과 분자 간의 비공유결합은 강하고 비가역적이다.\n⑤. 소량의 친전자성 물질이 DNA와의 공유결합할 수 있으며, DNA가 알킬화되는 경우 발암을 일으킬 수 있다.", "jokboAnswer": "③, ④", "claudeAnswer": "**③, ④**", "explanation": "1) **배경**: [2024-중간] #32의 축소판. 결합 양상만 집중.\n\n2) **포인트·정답 근거**:\n   - ③(**틀림**): 공유결합은 **비가역**(강하고 안정).\n   - ④(**틀림**): 비공유결합은 **약·가역**.\n\n3) **오답 소거**: ①②⑤ 옳음.\n\n4) **함정**: 강도·가역성 개념을 교차시킨 혼동. **강=비가역, 약=가역** 한 쌍으로 암기.", "tail": "", "scoreable": true, "correctIndices": [2, 3]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "33", "qid": "Q032", "body": "33.\n\n①\n②\n③\n④\n⑤\n\n> (본문 OCR 미완성 — 선지 전혀 수집 안 됨. 반응성 대사산물·자유기 매칭 문항으로 추정)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가**", "explanation": "topic이 물질-산물 짝짓기로 추정. 핵심 짝: **Paraquat → O₂⁻(폐독성)**, **Benzene → O₂⁻**, **전이금속 → HO·(Fenton)**, **대식세포 → ONOO⁻ → NO₂·+HO·(RNS)**, **NO → 근육·혈관 신호분자**. 이 매핑이 깨지는 선지를 제거하면 정답.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "34", "qid": "Q033", "body": "세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작의 올바른 순서는?\n\na. 지방산으로부터 생성된 지질 자유기는 산소 분자와 쉽게 반응하여 세포막 지질 손상의 증폭 및 확산을 유도\nb. 직접적인 독성 유발\nc. 외인성 물질에 의해 자유기 생성\nd. aldehyde가 단백질이나 DNA와 공유결합하여 산화적 손상\ne. 지방산으로부터 수소를 분리하여 지질 자유기(L·)가 생성되어 지질과산화가 시작\nf. 유독한 aldehyde가 생성\n\n①. c-e-f-a-d-b\n②. c-e-a-f-d-b\n③. d-c-a-f-e-b\n④. e-f-a-c-d-b\n⑤. d-c-e-a-f-b", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "1) **배경**: 교과서 5장 p.38 \"지질과산화(lipid peroxidation)\"는 자유기(free radical)가 세포막 인지질의 다가불포화지방산(PUFA)을 공격해 연쇄반응(chain reaction)으로 막 구조를 파괴하는 대표적 세포손상 기전. 개시(initiation) → 전파(propagation) → 종결(termination)의 3단계 프레임이며, 본 문항의 a~f는 이 큰 흐름을 6개의 소단계로 세분한 것.\n\n2) **포인트**: 6단계의 화학적 의미를 먼저 매핑.\n   - c = **외인성 물질에 의한 자유기(R·) 생성** (개시 트리거, 반응성 대사산물·ROS 등이 씨앗이 됨)\n   - e = R·이 지방산의 **α-탄소에서 수소를 분리 → L·(lipid radical) 생성**, 진정한 지질과산화의 시작점\n   - a = L·이 **O₂와 즉시 반응 → LOO·(lipid peroxyl radical)** 형성, 인접 지방산을 다시 공격해 손상이 막 전체로 확산·증폭(전파)\n   - f = 연쇄 종결 과정에서 **MDA(malondialdehyde)·4-HNE 같은 유독한 aldehyde** 생성\n   - d = aldehyde가 **단백질·DNA와 공유결합**하여 산화적 손상을 2차 표적으로 전파\n   - b = 최종적으로 세포·조직 수준의 **직접적 독성 유발**\n\n3) **정답 근거**: 순서는 반드시 **c → e → a → f → d → b**. 이유 ─ ① 자유기가 없으면 L·이 안 생기고(c 선행), ② L·이 없으면 O₂와의 반응(a)이 불가능하며, ③ LOO·의 연쇄반응 종결 산물로서 aldehyde(f)가 나오고, ④ aldehyde가 생겨야 단백질·DNA 공유결합(d)이 가능하며, ⑤ 이 손상이 누적되어야 독성(b)이 나타나기 때문. 이 흐름을 모두 만족하는 선지는 **② c→e→a→f→d→b**.\n\n4) **오답 소거**:\n   - ① c-e-**f-a**-d-b: a(O₂ 반응·확산)가 f(aldehyde 생성)보다 먼저 와야 함. LOO· 없이는 aldehyde가 생기지 않음.\n   - ③ **d-c**-a-f-e-b: d(공유결합)가 맨 앞에 오면 aldehyde 없이 공유결합이 일어난다는 모순. c(개시)가 반드시 선행.\n   - ④ **e-f-a**-c-d-b: c(자유기 생성)가 없이 e(L· 생성)부터 시작할 수 없음. 개시 트리거 누락.\n   - ⑤ **d-c-e-a-f-b**: 역시 d가 먼저 오는 순서 오류. aldehyde(f) 뒤에 d가 와야 논리가 성립.\n\n5) **함정**: a(O₂와 반응·확산)와 f(aldehyde 생성)의 순서를 바꾸기 쉽다. \"LOO·가 먼저 만들어져 연쇄반응을 확산시키는 **전파 단계(a)**\"가 먼저이고, 이 전파가 종결되며 나오는 산물이 aldehyde(f)라는 점을 기억. 또 [2024-중간] #34, [2025-중간] #34·#36에서 선지가 동일한 형태로 반복 출제되므로 순서 자체를 **c-e-a-f-d-b**로 통암기할 것.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "36", "qid": "Q035", "body": "세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작으로 올바른 순서는?\n\na. 지방산으로부터 생성된 지질 자유기는 산소 분자와 쉽게 반응하여 세포막 지질 손상의 증폭 및 확산을 유도\nb. 직접적인 독성 유발\nc. 외인성 물질에 대해 자유기 생성\nd. aldehyde가 단백질이나 DNA와 공유결합하여 산화적 손상\ne. 지방산으로부터 수소를 분리하여 지질 자유기(L·)가 생성되어 지질과산화가 시작\nf. 유독한 aldehyde가 생성\n\n①. c-e-f-a-d-b\n②. c-e-a-f-d-b\n③. d-c-a-f-e-b\n④. e-f-a-c-d-b\n⑤. d-c-e-a-f-b", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "Q033(2025-mid #34)과 동일 문항. c→e→a→f→d→b = ②. 지질과산화 발생 기작은 동일: 외인성 자유기 생성(c) → L·생성(e) → O₂와 반응·확산(a) → aldehyde 생성(f) → 단백질·DNA 공유결합(d)
