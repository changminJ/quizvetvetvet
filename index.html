e**: 독성물질(hapten) + 내인성 단백질 → **완전 항원 생성** (교재 lines 730-731).\n   - **d**: 완전 항원 → 림프구 자극 → **IgA·D·E·G·M 항체 생성** (교재 lines 732-733).\n   - **b**: 동일 항원에 반복 노출 → **항원-항체 복합체 형성** (교재 lines 734-735, 746).\n   - **c**: 복합체 반응 → **보체단백질 유리** (교재 lines 747-748).\n   - **a**: 유리된 보체 → **세포 표면 손상 6종** (교재 lines 749-752).\n\n4) **오답 선지 소거**:\n   - ① a-b-d-c-e: **a로 시작**(세포 손상이 맨 앞). 종착 효과를 시작으로 놓은 역전 오답. e(항원 형성)가 맨 뒤 — 완전히 뒤집힌 순서.\n   - ② b-d-c-e-a: **b(복합체 형성)로 시작** — 항원 형성(e)과 항체 생성(d)이 없이 복합체가 먼저 형성될 수 없으므로 오답.\n   - ③ b-e-c-d-a: b로 시작하는 순간 오답 확정. \"복합체 형성 후 항원 형성\"은 시간 역전.\n   - ④ e-d-b-c-a: **정답**. 인과 순서 완전 부합.\n   - ⑤ e-b-d-d-a: 표기 자체에 **\"d-d\" 중복**이 있다 (원본 OCR 오류로 보이며 정답 불가). 또한 항원 형성(e) 직후 복합체 형성(b)으로 건너뛰어 항체 생성(d) 단계를 누락.\n\n5) **함정 요소**:\n   - 2022년에 이미 출제된 문항이 2년 뒤 **선지 표기만 바꿔 재출제**됨. 개념학습.md 빈출 Top에 \"면역반응 cascade 2회 출제\"로 등록되어 있으며, 🔴 2회 이상 빈출 마커가 붙는 핵심 암기 대상.\n   - 출제자는 알파벳 치환으로 \"새 문항처럼\" 위장했으나, **정답 번호조차 ④로 동일**하다. 즉 선지 배열 순서도 의도적으로 유지한 것으로 보이며, 족보를 풀어본 시험생에게 유리한 구조.\n   - ⑤ 선지의 \"d-d\" 중복 타이핑은 원본 OCR/타이핑 오류일 가능성이 크나, 해설 작성 시 **오타가 있는 선지는 자동 오답 처리**되는 것이 시험장 상식이므로 ⑤를 선택하지 않는 것이 안전.\n   - **핵심 암기 구호**: \"**E-D-B-C-A**\" = \"이**디**비씨에이\" = \"이 디비(DB) CA(원산지)\".\n\n**근거 위치**: 교재발췌.md lines 723-758 (교과서 05장 p.43-44 \"4) 면역반응\" 단락 전문). [2022-중간] #27과 동일 근거.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L08-mechanism-3", "round": "2024-중간", "num": "38", "qid": "", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고른 것은?\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.\n\n①. a, b, c, d, e  ②. a, c, d  ③. b, d, f  ④. c, d, e  ⑤. c, e, f", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e가 틀림)", "explanation": "6개 서술 중 틀린 것만 골라 묶은 선지 세트에서 맞는 조합을 찾는 구조다. 교과서 05장 \"단백질 산화적 손상\" 소절이 근거다.\n\n**혈색소가 왜 산화 표적인가**(a, b, f = 옳음):\n- a 옳음 — \"고농도 외래물질이 혈액에 분포되어 있어 적혈구는 쉽게 외래물질에 노출될 수 있다\".\n- b 옳음 — \"적혈구는 핵과 세포질세망을 가지고 있지 못함으로써 새롭게 합성된 단백질로 손상된 단백질을 대치할 수 없다\".\n- f 옳음 — 혈색소 내 산소가 자동산화(autoxidation, Fe²⁺→Fe³⁺)를 촉진하는 이유가 됨.\n\n**산화 손상의 구체 형태**(c, d, e 중 어느 것이 맞는가):\n- c **틀림** — 변성된 혈색소(globin)가 적혈구 세포막에 이중결합한 것은 **Heinz body**다. **Howell-Jolly body**는 적혈구 내에 남은 **잔류 핵물질(DNA)** 로 완전히 다른 개념이다. 이름이 비슷해서 헷갈리지만 형성 물질부터 다르다.\n- d **틀림** — 산화 방향이 **정반대**다. 정상 Hb의 Fe는 **Fe²⁺**(산소 결합 가능 상태)이며, 독성물질에 의해 **Fe³⁺로 산화**되어 **MetHb**(메트헤모글로빈)를 형성하면 산소 운반이 불가능해진다. 선지의 \"Fe³⁺→Fe²⁺\"는 환원 방향이라 실제 독성 기전과 반대.\n- e **틀림** — α·β-글로빈 사슬의 시스테인 잔기가 산화되면 **disulfide(S-S) 결합**을 형성한다. **ester 결합**은 산-알코올 결합으로 완전히 다른 화학 반응.\n\n따라서 틀린 것은 **c, d, e** 세 개 → 정답 ④.\n\n함정 요소 세 가지가 연속 배치된 고난도 문항이다. (1) Heinz ↔ Howell-Jolly 이름 유사성, (2) Fe 산화 방향 뒤집기, (3) disulfide ↔ ester 결합 종류 바꿔치기. 세 함정을 모두 놓치지 않으려면 **\"Heinz/Fe²⁺→Fe³⁺/disulfide\"** 세 키워드를 묶어 암기해야 한다. 2025-mid #38에서 동일 선지가 그대로 재출제되었다는 점에서 매년 출제 가능성이 높다.\n\n근거: 교과서 05장 \"단백질 산화적 손상\" 소절, 강의안 lec-08 슬라이드 (혈색소 산화 슬라이드).", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "40", "qid": "Q143", "body": "40. 다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증(Pancytopenia)를 유발한다. ...\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.", "jokboAnswer": "미표기", "claudeAnswer": "**첫 번째 = Benzene / 두 번째 = TCDD**", "explanation": "1) **배경**: 교재 5장 p.38(면역 억제) 원문 그대로 출제.\n\n2) **포인트**: 두 빈칸이 서로 다른 물질 — 혼동 금지.\n\n3) **정답 근거**:\n   - Benzene: CYP→hydroquinone→myeloperoxidase→quinoid→ROS→골수 원조세포→pancytopenia. 이 체인은 오직 Benzene.\n   - TCDD: \"가장 강력한 면역억제 독성물질\" + 흉선 T세포 분화 억제 + Ca²⁺ 의존성 endonuclease 활성화. 이 체인은 오직 TCDD.\n\n4) **오답 소거**: Caspase는 세포사멸 실행효소(독성물질 아님), TRAIL은 세포사멸 ligand, Paraquat·CO는 해당 기전 없음.\n\n5) **함정**: [2025-중간] #40에서 동일 지문이 선지화됨 — ④ \"Benzene, TCDD\" 순서 고정.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L13-mechanism-4-7-11", "round": "2024-중간", "num": "41", "qid": "", "body": "생체의 이롭거나 유해한 외부자극 또는 환경 변화에 대한 병리학적 적응에 대한 용어와 설명이 올바르게 짝지어진 것은?\n\n용어 목록:\n1. 비대(hypertrophy)\n2. 위축(atrophy)\n3. 증생(hyperplasia)\n4. 화생(metaplasia)\n5. 형성이상(dysplasia)\n6. 역형성(anaplasia)\n7. 종양(neoplasia)\n\n설명 목록:\nㄱ. 정상 세포는 생존할 수 없는 환경에서 생존할 수 있는 세포로 대치하여 적응하는 현상\nㄴ. 죽은 세포보다 더 많은 원세포 형태가 같지 않은 세포를 만들어 성장하고 분화하는 현상\nㄷ. 생체 내·외 스트레스나 기능감소로 인해 세포 크기가 증가하는 현상\nㄹ. 핵이 크고 유사분열이 발생하는 현상\nㅁ. 생체 내·외 스트레스나 기능감소로 인해 세포 크기가 줄어드는 현상\nㅂ. 비전형적인 핵과 활발한 유사분열 양상을 가져 분화 조절 능력을 상실하는 현상\nㅅ. 독성물질 혹은 물리적 손상에 반응하여 세포 수가 증가하는 현상\n\n① 1ㄷ-2ㅁ-3ㅅ-4ㄱ-5ㄹ-6ㅂ-7ㄴ  (OCR로 ②~⑤ 선지 미복원 — 족보 원문에 ①만 기록됨)", "jokboAnswer": "①", "claudeAnswer": "① (1=ㄷ, 2=ㅁ, 3=ㅅ, 4=ㄱ, 5=ㄹ, 6=ㅂ, 7=ㄴ)", "explanation": "1) **배경 — 왜 병리학적 적응을 분류하는가**: 교재 §4.11 \"수복 장애\"(교재 p.45-46, 교재발췌.md lines 1690-1786)는 생체가 유해 환경 변화에 대해 항상성을 유지하기 위한 적응 능력을 가지며, 이 회복이 **완전하거나 불완전**할 수 있다고 서술한다. 불완전 회복 시 조직은 **세포 수 변동, 세포 구조·기능 변동, 다른 세포로의 대치** 등 병리학적 변화를 초래한다. 이것이 \"병리학적 적응(pathological adaptation)\"이다. 이 7개 용어는 각각 **어느 방향·어느 크기·어느 세포 종류의 변화**를 의미하는지 정확히 매칭해야 한다.\n\n2) **문항이 묻는 핵심 포인트**: 7개 용어 각각이 \"세포 **크기**↑/↓\", \"세포 **수**↑\", \"세포 **종류** 교체\", \"**핵 이상 + 유사분열 증가**\", \"**분화 조절 상실**\", \"**무한 증식**\" 중 어느 차원에 속하는지 단순 매칭. 단 혼동을 유도하기 위해 \"스트레스나 기능 변화\"라는 공통 표현을 ㄷ·ㅁ 양쪽에 쓰고, 방향(증가/감소)만 반대로 제시한다.\n\n3) **정답 ① 근거 — 7개 매칭 판정**:\n   - **1 비대(hypertrophy) = ㄷ (세포 크기 증가)**: 교재 lines 1743-1746 \"비대(hypertrophy)는 분열하지 못하는 심장근 및 골격근 세포에서 잘 나타나며, 생체 내·외의 스트레스나 기능 부하가 클 때 조직이나 기관의 크기가 커진다.\" 단, 설명 ㄷ은 \"기능**감소**로 세포 크기가 증가\"라고 되어 있는데 이는 원문 \"기능 **부하**가 **클 때**\"와 다소 차이가 있다 — 다만 선지 구성상 \"크기 증가\"는 비대밖에 없으므로 ㄷ이 1에 귀속 (출제 오류로 보이나 소거법상 정답).\n   - **2 위축(atrophy) = ㅁ (세포 크기 감소)**: 교재 lines 1747-1749 \"위축(atrophy)은 비대와 반대로 호르몬 결핍, 영양 결핍, 조직의 혈액량 감소 등에 의해 조직 혹은 기관 크기가 감소한 경우이다.\"\n   - **3 증생(hyperplasia) = ㅅ (세포 수 증가)**: 교재 lines 1738-1742 \"증생(hyperplasia)은 유사분열 능력이 있는 조직에서 잘 일어나며...독성 물질 혹은 물리적 손상에 반응하여 세포의 숫적 증가를 초래하여 조직 덩어리 및 기관의 크기를 증가시킨다.\" — 설명 ㅅ 문구와 거의 축자 일치.\n   - **4 화생(metaplasia) = ㄱ (다른 세포로 대치)**: 교재 lines 1750-1753 \"화생(metaplasia)은 정상 세포는 생존할 수 없는 환경에서 생존할 수 있는 세포로 대치된 것으로, 대치된 세포는 정상 세포와 같은 기능을 수행하지 못한다.\" — 설명 ㄱ과 축자 일치.\n   - **5 형성이상(dysplasia) = ㄹ (핵 비대 + 유사분열)**: 교재 §4.11 본문에는 dysplasia 정의가 독립 항목으로 없으나 설명 ㄹ \"핵이 크고 유사분열이 발생하는 현상\"은 전형적 dysplasia 정의에 부합. 역형성(ㅂ)과의 구분: dysplasia는 \"핵 비대 + 유사분열 증가\"만 있고 **분화 조절 능력은 남아 있음** (전암 단계), anaplasia는 **분화 조절 능력 완전 상실** (악성).\n   - **6 역형성(anaplasia) = ㅂ (분화 조절 능력 상실)**: 교재 lines 1781-1783 \"역형성(anaplasia)은 비전형적인 핵을 지고 있고, 활발한 유사분열 양상을 가져 분화 조절 능력이 상실된 경우이다.\" — 설명 ㅂ과 축자 일치.\n   - **7 종양(neoplasia) = ㄴ (무한 성장·분화)**: 교재 lines 1776-1780 \"종양(neoplasia)은 세포의 죽음 및 대치가 엄격하게 조절되는 정상 분화 조직과는 다르게 주어진 기간 동안에 죽은 세포보다 더 많은 원세포 형태와 같지 않은 세포를 만들어 성장하고 분화하는 경우이다.\" — 설명 ㄴ과 축자 일치.\n\n4) **오답 선지 소거**: 족보 원문에 ①만 기록되어 있고 ②~⑤는 OCR로 복원되지 않았으나, 병리학적 적응 매칭 문제의 전형적 오답 패턴은 다음과 같다:\n   - **ㄷ ↔ ㅁ 혼동**: 비대(크기↑)와 위축(크기↓) 방향을 뒤집은 선지 (1-ㅁ, 2-ㄷ). 출제 단골 함정.\n   - **ㄷ ↔ ㅅ 혼동**: 비대(크기↑)와 증생(수↑)을 섞은 선지 (1-ㅅ, 3-ㄷ). 개념학습.md에서 경고한 \"비대 vs 증생\" 핵심 함정.\n   - **ㄱ ↔ ㅂ 혼동**: 화생(세포 종류 교체)과 역형성(분화 조절 상실)을 바꾼 선지.\n   - **ㄹ ↔ ㅂ 혼동**: 형성이상(핵 비대만)과 역형성(핵 비대 + 분화 조절 상실)을 바꾼 선지.\n   - **ㄴ ↔ ㅅ 혼동**: 종양(무한 증식)과 증생(정상 자극 반응 세포 수 증가)을 섞은 선지.\n\n5) **함정 요소**:\n   - **\"기능 감소\"(ㄷ) vs \"기능 부하\"(교재 원문)**: 설명 ㄷ은 \"스트레스나 **기능감소**로 세포 크기가 증가\"라고 기술하는데 교재 원문은 \"스트레스나 **기능 부하**가 **클 때** 크기가 커진다\"고 한다. 이것은 출제 과정에서 \"스트레스\"를 ㄷ·ㅁ 양쪽에 공통 표현으로 쓰려다 발생한 **표현 불일치**로 보이나, 선지 구성상 소거법 정답은 여전히 ①. 시험에서는 \"크기 증가\"라는 결과에 집중해 비대(1)로 귀속.\n   - **비대 ↔ 증생 구분 필수**: 둘 다 \"조직·기관 크기 증가\"라는 공통점이 있지만, **비대는 개별 세포 크기↑(수는 그대로)**, **증생은 세포 수↑(개별 크기는 정상)**. 교재는 비대를 \"분열하지 못하는 심장근·골격근\"에, 증생을 \"유사분열 능력 있는 조직\"에 국한시켜 명확히 구분한다.\n   - **2년 연속 출제**: [2024-중간] #41과 [2025-중간] #41이 동일 주제·동일 정답 선지(①)로 출제. 🔴 최우선 암기 대상.\n   - **암기 구호**: \"**비크↑**(비대 크기↑) **위크↓**(위축 크기↓) **증수↑**(증생 수↑) **화대**(화생 대치) **형핵**(형성이상 핵) **역분**(역형성 분화상실) **종무**(종양 무한증식)\".\n\n**근거 위치**: 교재발췌.md lines 1738-1783 (교재 §4.11 \"수복 장애\" p.45-46 병리학적 적응 7종 정의).", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L16-treatment", "round": "2024-중간", "num": "43", "qid": "Q146", "body": "다음 중 옳지 않은 것을 모두 고르시오.\n\na. 활성탄은 수의임상에서 널리 사용되는 흡착제이다.\nb. 반추동물은 제1위가 커서 위세척이 비효율적이다.\nc. 제염 시에 심장질환, 간질이 있는 개, 고양이에서는 빠르게 위배출을 해야 한다.\nd. 의식이 있어도 경우에 따라 위세척을 할 때 마취를 실시하지 않아도 된다.\ne. 제염 시에 설치류, 토끼, 말, 반추류에서 구토 유발은 효과적이다.\nf. 노출이 발생한 물질이 무해하거나 독성이 매우 낮은 경우에는 반드시 제염을 해야 할 필요가 없다.\ng. 대부분의 경우에서 독극물 섭취 후 6시간 이내에 구토, 위세척을 하면 효과가 유지된다.\n\n①. a, c  ②. d, e, g  ③. a, d, g  ④. c, d, e, g  ⑤. b, c, d, e, g", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e, g)", "explanation": "[2022-중간] #29(Q291)의 **확장 버전**으로, d항이 \"마취를 실시하지 않아도 된다\"는 **오답 서술로 교체**되어 틀린 것이 3개(b·c·f)→4개(c·d·e·g)로 늘어난 형태이다. [2025-중간] #43과 본문·선지 완전 동일로 2년 연속 재출제.\n\n각 항 검증(교과서 07장 (3)항):\n- **a 옳음** — 활성탄 = 수의임상 표준 흡착제 (3)g항.\n- **b 옳음** — 반추동물 제1위 커서 위세척 비효율 (3)d항 보충.\n- **c 틀림** ❗ — \"빠르게 위배출을 해야 한다\"는 정반대. 심장질환(미주신경 자극 → 부정맥)·간질(발작 유도) = 위배출 **금기** (3)e항. → 오답.\n- **d 틀림** ❗ — \"의식이 있어도 마취 생략 가능\"은 오답. 의식 유무 관계없이 위세척 전 **마취·기관내 삽관 필수**(흡인성 폐렴 예방) (3)g항. → 오답.\n- **e 틀림** ❗ — 설치류·토끼·말·반추류 = **구토 불가 종** (3)d항. → 오답.\n- **f 옳음** — 무해·저독성 물질 시 무리한 제염 불필요 (3)a항.\n- **g 틀림** ❗ — 골든타임 **1시간**. 6시간은 반복 함정 (3)c항. → 오답.\n\n틀린 것 4개 = c·d·e·g. 정답 = **④**.\n\n함정 분석: 선지 ⑤(b·c·d·e·g 5개)가 가장 그럴듯해 보이지만 b는 옳으므로 탈락. ②(d·e·g 3개)는 c를 빠뜨려 탈락. ③(a·d·g 3개)는 a를 잘못 포함해 탈락. ①(a·c 2개)은 a가 옳아 탈락. 오직 ④만 4개 모두 오답.\n\n이 구조는 교과서 7고려사항 a~g를 **매 항목 독립적으로 검증하는 훈련**을 요구한다. 단일 주제 암기(예: \"물·우유\"만)로는 풀 수 없고, 7고려사항 전체의 방향을 반대 서술로 만났을 때 반사적으로 판별할 수 있어야 한다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L17-antidotes", "round": "2024-중간", "num": "44", "qid": "", "body": "해독제에 대한 설명 중 틀린 것만 모두 고른 것은?\n\na. 치료용량에 맞춰 효과 높은 다른 약물로 대체해 사용할 수 있는 경우에도 이미 사용하기로 한 해독제를 그대로 사용한다.\nb. 해독효과의 지속기간은 독성물질의 다른 약리작용기간과 다를 수 있다.\nc. 일부 해독제는 치료기간에는 독성이 없지만 대량이나 장기간 사용하여도 독성이 없다.\nd. 해독제는 독성물질의 활성이나 영향에 대해 특이적 작용을 나타내는 것이 필요하지 않다.\ne. 해독제를 사용하기 위해 정확한 진단이 매우 중요하다.\n\n① a, b, c  ② b, c, d  ③ a, c, d  ④ c, d, e  ⑤ a, b, c, d", "jokboAnswer": "미표기", "claudeAnswer": "③ (a, c, d)", "explanation": "해독제 서론의 정의와 원칙을 정면으로 묻는 \"틀린 것만 고르기\" 문항이다. 교과서 08장 서론은 해독제를 \"독성물질의 활성이나 영향에 대해 **특이적 작용**을 나타내는 물질\"로 정의하고, 사용 3대 전제로 (1) 정확한 진단, (2) 골든 타임, (3) 유효성 제한·독성을 제시한다. 이 정의와 원칙에 비추어 선지를 하나씩 판정한다.\n\n선지 a는 **틀림**. \"더 효과 좋은 약물로 대체 가능한 경우에도 이미 결정한 해독제를 그대로 사용한다\"는 것은 임상적으로 잘못된 태도다. 해독제 선택은 환자 상태·독성물질 특성·효능을 고려해 지속적으로 재평가해야 한다.\n\n선지 b는 **옳음**. 교과서는 \"해독 효과의 지속기간은 독성물질의 작용 기간에 따라 달라진다\"고 명시한다. 골든 타임 원칙의 본질이다.\n\n선지 c는 **틀림**. \"대량·장기간 사용해도 독성이 없다\"는 유효성 제한 원칙 정면 부정. 교과서는 \"과도 용량이나 장기 사용은 해독제 자체 독성을 유발할 수 있다\"고 서술한다.\n\n선지 d는 **틀림**. 해독제 정의 자체 부정. 해독제는 정의상 독성물질에 **특이적 작용**을 나타내야 한다.\n\n선지 e는 **옳음**. 정확한 진단 없이 해독제를 투여하면 비노출 동물에게 해독제 자체가 부작용을 유발한다. 3대 전제 중 첫 번째.\n\n따라서 틀린 선지는 a·c·d, 정답은 ③. 족보 원본에 정답이 미표기되어 있으므로 수험자가 직접 판정해야 하는데, 교과서 정의·원칙에 충실하면 답이 분명하다. 함정은 \"이미 사용하기로 한 해독제를 그대로(a)\"처럼 \"일관성\"으로 포장된 표현, \"특이적 작용 불필요(d)\"처럼 정의 자체를 부정하는 표현을 알아채는 것이다. 강의안 lec-17 슬라이드 3이 이 원칙들을 한 장으로 정리한다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L16-treatment", "round": "2024-중간", "num": "45", "qid": "Q148", "body": "비스테로이드성 항염증 치료제(NSAIDs)를 장기간 섭취하게 되면 어떤 동물에서든 중독이 유발될 수 있다. 고양이는 특히 salicylate에 민감한데 그것은 간의 ( )의 활성이 낮기 때문이다. 또한 고양이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해, 배설하지 못하고 메트헤모글로빈증(methemoglobinemia)으로 발전하는 중독의 위험이 매우 커서 사용을 금한다. 빈칸에 들어갈 것은?", "jokboAnswer": "glucuronyl transferase", "claudeAnswer": "glucuronyl transferase (글루쿠론산 전이효소)", "explanation": "이번에는 **선지 없이 단답 빈칸형**이다. 두 빈칸 모두 동일 답인 **glucuronyl transferase(UGT)**를 써야 한다. 5지선다 버전(Q328·Q250·Q187)과 내용은 동일하나 단답으로 답을 직접 써야 하므로 철자·한글 표기 정확성이 요구된다.\n\n허용되는 답 표기: **glucuronyl transferase, glucuronosyl transferase, UGT(UDP-glucuronosyltransferase), 글루쿠론산 전이효소, 글루쿠론산 전달효소**. 모두 동일 효소의 다른 표기.\n\n기전(교과서 07장 / 강의안 lec-16 슬라이드 12):\n- Salicylate 민감성: 간 UGT 활성 저하 → salicylate의 glucuronide 포합 배설 경로 차단 → 혈중 salicylate 농도 축적 → 산-염기 불균형·대사성 산증·중독 악화.\n- AAP 금기: 동일 UGT 결핍 → AAP의 glucuronidation 차단 → CYP로 **NAPQI** 대량 생성 → GSH 고갈 → 간 괴사 + MetHb + Heinz body → methemoglobinemia·저산소증·사망.\n\n두 임상 현상의 **공통 원인이 하나의 효소 결핍**이라는 것이 핵심이다. 이 원리를 이해하면 [2025-기말] #31(Q075) \"공통으로 들어갈 말\" 문제도 즉시 같은 답으로 풀린다.\n\n함정은 단답 시 \"Glucuronyl transferase\"라고 부정확하게 축약하거나 \"UDPGT\"처럼 약어만 쓰는 경우인데, 교과서 표기를 정확히 따르면 채점 안전.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "47", "qid": "Q150", "body": "47. 유기인산염, 카바메이트에 대한 아래 설명 중 틀린 것을 모두 고른 것은?\n\na. 유기인산염은 아세틸콜린에스터레이스를 가역적으로 억제시켜 독성을 증가시킨다.\nb. 카바메이트는 아세틸콜린에스터레이스를 비가역적으로 억제시켜 독성을 증가시킨다.\nc. 카바메이트는 농약, 해충 퇴치 목걸이로 쓰여 광범위한 중독원이다.\nd. 카바메이트는 파리, 개미 등 미끼의 주성분으로 쓰여 광범위한 중독원이 존재한다.\ne. 파라옥손이 파라티온으로 전환되면 10배 이상의 높은 독성이 발현된다.\n\n①. abc\n②. abcd\n③. abde\n④. acd\n⑤. abe", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: [2023-기말] #40과 **완전 동일**한 선지 구성으로 재출제. [2025-기말] #36에서도 반복.\n\n2) **포인트·정답 근거**: a(유기인산염=비가역이 맞음, 가역은 틀림), b(카바메이트=가역이 맞음, 비가역은 틀림), c·d(맞음), e(방향 반대, 파라티온→파라옥손이 맞음). 틀린 것 = a, b, e → ⑤.\n\n3) **오답 소거**:\n   - a(**틀림**): \"유기인산염 = AChE 가역 억제\"는 반대. 교과서 5장 p.44 — \"형성된 phosphate ester는 매우 느리게 파괴됨으로 AChE는 불활성화된 형태로 남게 된다\" = **비가역** 억제가 정답.\n   - b(**틀림**): \"카바메이트 = AChE 비가역 억제\"는 반대. 카바메이트는 **가역적**으로 carbamylation 후 스스로 가수분해되어 AChE가 회복됨.\n   - c(맞음): 카바메이트는 농약·해충 퇴치 목걸이(예: 고양이 벼룩 목걸이)로 광범위 사용. 맞는 설명이라 소거 대상 아님.\n   - d(맞음): 카바메이트는 파리·개미 미끼(bait) 주성분으로 쓰임. 맞는 설명이라 소거 대상 아님.\n   - e(**틀림**): 방향이 반대. **파라티온 → 파라옥손**이 10배 독성 증가 방향. \"파라옥손 → 파라티온\"은 존재하지 않는 역반응.\n   → 틀린 것 a·b·e를 모두 포함하는 선지는 ⑤ abe.\n\n4) **함정**: 선지에 a·b·e 외에 c·d가 섞여 들어간 조합(①abc, ②abcd, ③abde, ④acd)에 속지 말 것. c·d는 카바메이트의 **실제 용도**를 서술한 정답 문장이므로 \"틀린 것\"에 포함시키면 안 된다. 또 e는 파라티온·파라옥손의 이름이 모두 나오므로 방향성(P=S → P=O)을 놓치면 맞는 설명으로 착각하기 쉽다.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L01-history", "round": "2024-중간", "num": "48", "qid": "Q151", "body": "48. 유기염소계에 관한 설명으로 틀린 것을 모두 고르시오\n\na. 자연계에서 분해기전이 거의 없어 호수바닥의 침전물 등 환경에서 장시간 잔류한다.\nb. 1950-70년대 초반까지 농약으로 광범위하게 사용되어 오염된 토양이나 쓰레기처리장으로부터 지속적으로 누출되었다.\nc. 디페닐 지방족 화합물, 방향족 탄화수소, 사이클로디엔화합물이 포함된다.\nd. 수용성이 높아 생태계 먹이사슬의 상위단계에 있는 동물 및 인간에 축척되어 내분비계 장애물질, 일명 환경호르몬의 주종을 이루고 있다.\ne. 현재 유기염소계 농약은 아예 사용하고 있지 않다.\n\n①. a, c\n2. b, d, e\n3. c, e\n4. d, e", "jokboAnswer": "4", "claudeAnswer": "④ d, e", "explanation": "**1) 배경**. Q332와 완전히 동일한 구조의 문항. 선지 a가 \"분해기전이 **거의 없어** 잔류\"로 돌아왔다(Q257에서는 \"있으며 잔류\"로 바뀌었었음).\n\n**2) 포인트**. 5개 선지 판정:\n- a(분해기전 거의 없어 잔류) → 옳음.\n- b(1950~70년대 농약 광범위 사용·누출) → 옳음.\n- c(디페닐 지방족·방향족 탄화수소·사이클로디엔) → 옳음. 3계열 구성.\n- d(**수용성**이 높아 먹이사슬 상위 축적) → **틀림**. 지용성이 옳음.\n- e(현재 유기염소계 농약 **아예** 사용하지 않음) → **틀림**. \"아예\"는 극단적 과장.\n\n**3) 정답 근거**. 틀린 선지 = d·e → ④. 교과서 01장 + 강의안 lec-02.\n\n**4) 오답 소거**:\n- ① a, c → 둘 다 옳음.\n- ② b, d, e → b는 옳음.\n- ③ c, e → c는 옳음.\n\n**5) 함정**. Q332·Q151의 정답 패턴은 **d(지용성↔수용성) + e(일부사용↔전면금지)**로 고정되어 있다. 이 두 함정만 기억하면 유기염소계 \"틀린 것\" 시리즈 3문항(Q332·Q257·Q151)이 다 해결된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2024-중간", "num": "52", "qid": "Q154", "body": "알칼리, 산을 제염하는 방법 중 가장 효과적인 것 두 개를 고르시오.\n\na. 위세척  b. 활성탄  c. 구토  d. 우유  e. 물\n\n①. a, b, c, e  ②. b, d  ③. a, c, e  ④. d, e", "jokboAnswer": "미표기 (교과서 기준 ④)", "claudeAnswer": "④ (d·e = 우유·물)", "explanation": "[2022-기말] #34·[2023-기말] #39·[2025-기말] #39의 **a~e 보기 변형**이다. 원래 ①~⑤ 선지에서 물이 ②, 우유가 ④였던 것이 여기서는 물이 e, 우유가 d로 재배치되었다. 정답 키워드는 동일 — **물·우유**.\n\n보기 검증(교과서 07장 (3)b항):\n- **a 위세척** ❌ 부식성 역류 → 점막 추가 손상\n- **b 활성탄** ❌ 강산·강알칼리 흡착 불가\n- **c 구토** ❌ 역류 + 흡인성 폐렴\n- **d 우유** ✓ 단백·지질 코팅 + 희석\n- **e 물** ✓ 농도 희석\n\n선지 조합:\n- ① a·b·c·e — a·b·c 금기 포함 → 오답\n- ② b·d — b 활성탄 금기 → 오답\n- ③ a·c·e — a·c 금기 포함 → 오답\n- ④ **d·e** ✓ — 우유·물만 정답\n\n정답 = ④.\n\n함정: 선지 구성이 ①~④ 4개뿐이고 정답이 ④에 배치되어 있어 \"가장 많은 보기를 포함한 선지가 정답\"이라는 시험 요령을 역이용. 오히려 ① (4개 포함)이 함정이고 ④ (2개만 포함)가 정답이다. 보기 a~e 배치를 바꾸는 변형에 흔들리지 않으려면 \"물·우유\" 두 키워드만 고정으로 기억하면 된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "N", "qid": "Q133", "body": "> (본문 OCR 미완성 — 문항 번호 N, 반응성 대사산물 생성물질 관련 추정)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가** (본문 미복원)", "explanation": "[2022-중간] #20, [2025-중간] #29·#30 계열. 3대 고정 함정 — ①Paraquat→폐독성(간 X), ②전이금속→Fenton(1·2상 X), ③신호분자=NO(CO X). 선지 공개되면 즉답 가능.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "1", "qid": "Q155", "body": "다음 중 신약 개발·허가 절차에 대한 설명으로 틀린 것을 모두 고른 것은?\n\n①. 효능은 인증기관이 과학적인 방법으로 검증하면 된다.\n②. 전임상 안전성 시험은 개별기관의 인증을 받은 GLP에서만 수행 가능하다.\n③. GLP 인증 기관에는 IACUC 설치가 권장된다.\n④. 1상 임상시험은 정상인 지원자를 대상으로 안전성과 체내동태를 검토한다.\n⑤. 2상 임상시험은 환자를 대상으로 유효성을 확인한다.\n⑥. 3상 임상시험은 보통 3개 기관 90명 이상의 환자를 대상으로 유효성·용법용량·주의사항을 면밀히 검토한다.\n⑦. 시판 후 일정 기간 동안 부작용 증례를 수집하여 부작용이 나타나면 판매가 취소된다.", "jokboAnswer": "① (원본 오기, \"모두\"를 묻는 형식이면 ①②③)", "claudeAnswer": "①, ②, ③", "explanation": "- ① **틀림** — 효능 탐색 = 모든 연구기관·개인 수행 가능.\n- ② **틀림** — 전임상 안전성 = **MFDS 인증 GLP**. \"개별기관 인증\"은 함정.\n- ③ **틀림** — IACUC = **의무 설치**. \"권장\"은 함정.\n- ④~⑦ 옳음.\nQ045·Q216과 본문 완전 동일. 3대 함정 ①②③은 매년 반복. (강의안 lec-18 슬라이드 5)", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "3", "qid": "Q296", "body": "다음 독성학 용어와 설명의 매칭 중 틀린 것은?\n\na. 반수치사량(LD50) — 시험동물의 50%를 사망하게 하는 추정 용량\nb. MTD(최대 내약 용량) — 90일 시험에서 체중증가를 10% 이내로 억제하는 최고 용량\nc. NOAEL(무해 최대 용량) — 부작용이 관찰되지 않는 최고 용량\nd. ED50(반수 유효 용량) — 대상 동물의 50%에서 효과를 나타내는 용량\ne. ADI/TDI(일일 섭취허용량) — NOAEL × 안전계수(100)\n\n① a  ② b  ③ c  ④ d  ⑤ e", "jokboAnswer": "⑤", "claudeAnswer": "⑤", "explanation": "- ① a 옳음 — LD50 = 단회 50% 치사 용량, 급성 지표\n- ② b 옳음 — MTD = 90일 반복에서 체중증가 10% 이내 억제\n- ③ c 옳음 — NOAEL = No Observed Adverse Effect Level\n- ④ d 옳음 — ED50 = 50% 효과 용량, TI=LD50/ED50\n- ⑤ e **틀림** — ADI = **NOAEL ÷ 안전계수(100)**. 곱하기(×)가 아니라 **나누기(÷)**. 안전계수 100 = 종간 차이 10 × 개체간 차이 10\n족보 함정 포인트는 단 하나: **÷를 ×로 바꾸기**. (강의안 lec-18 슬라이드 10)", "tail": "— PDF 검증 확정 (재분류)", "scoreable": true, "correctIndices": [4]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "5", "qid": "Q298", "body": "반복투여독성시험에서 용량 설정과 관련된 설명으로 옳은 것은?\n\na. 군당 설치류 암수 각 5마리 이상\nb. 한계용량은 체중 1 kg당 2 g (절식 후 매일 투여)\nc. 용량-반응 관계를 나타낼 수 있도록 MTD, NOAEL 포함 3단계 이상 용량 설정\nd. 회복군을 추가하여 독성 변화의 가역성·지연성 평가 권장\ne. 단기간 용량 시험(DRF)은 반복투여시험 전에 반드시 모든 시험에서 실시\n\n① a, b, e  ② a, c, e  ③ b, d  ④ c, d  ⑤ a, b, c, e", "jokboAnswer": "미표기(원본에 \"용량-반응 관계\"만 단편 표기)", "claudeAnswer": "④ (c, d)", "explanation": "- a **틀림** — 군당 설치류 암수 **각 10마리 이상**이 표준. \"5마리\"는 함정.\n- b **틀림** — 반복투여 2 g/kg은 맞지만 **절식하지 않고** 매일 투여. \"절식 후\"는 단회 조건과 섞인 함정.\n- c **옳음** — MTD·NOAEL 포함 3단계 이상, **용량-반응 관계 필수**.\n- d **옳음** — 회복군 권장.\n- e **틀림** — DRF는 필요 시. \"모든 시험에서 반드시\"는 과잉 요건.\n→ 옳은 선지만 모으면 c·d → **④**. (강의안 lec-18 슬라이드 17)", "tail": "— PDF 검증 확정 (재분류)", "scoreable": true, "correctIndices": [3]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "6", "qid": "Q160", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵, S9 mix\"는 어떤 독성시험인가? (Q049·Q222·Q300 동일)", "jokboAnswer": "미표기", "claudeAnswer": "유전독성", "explanation": "4년 연속 완전 동일. Ames + 염색체이상 + 소핵 + S9 mix = **유전독성시험**. (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "6", "qid": "Q300", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵 시험, S9 mix 대사활성화\"는 어떤 독성시험에 해당하는가?\n\n① 유전독성  ② 면역독성  ③ 국소독성  ④ 발암성  ⑤ 생식발생독성", "jokboAnswer": "①", "claudeAnswer": "① 유전독성", "explanation": "- ① **정답** — 유전독성시험(Genotoxicity) 표준 3종:\n  ① 박테리아 복귀돌연변이(**Ames test**) — S. typhimurium·E. coli\n  ② 체외 **염색체이상시험**\n  ③ 체내 **소핵시험**\n  + **S9 mix**(rat liver microsome, CYP450) = 대사활성화 모사\n- ② 면역독성 = ASA·PCA·GPMT·면역기능 (전혀 다름)\n- ③ 국소독성 = 피부·안점막·구강·질 (토끼 2~3 kg)\n- ④ 발암성 = 설치류 2종 24~30개월 (별개 시험, 유전독성 후속)\n- ⑤ 생식발생독성 = Segment I/II/III, 기형 이중염색 (다른 카테고리)\n이 문항은 **4년 연속(2022~2025) 완전 동일**. 서술 조합만 봐도 즉답 가능. (강의안 lec-18 슬라이드 19)", "tail": "— PDF 검증 확정 (재분류)", "scoreable": true, "correctIndices": [0]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "7", "qid": "Q301", "body": "발암성시험에 대한 설명으로 틀린 것을 모두 고른 것은?\n\na. 랫드·마우스·햄스터 중 2종 이상을 사용한다.\nb. 이유 후 12주 이상 성숙한 시기에 투여를 시작한다.\nc. 단회투여예비 → 반복투여예비 시험을 통해 최고 투여 용량을 결정한다.\nd. MTD(최대 내약 용량)를 시험자가 임의로 결정한다.\ne. 저용량 또는 음성 대조군 동물의 누적사망률이 95%에 이를 때 시험을 종료한다.\n\n① a, b, d, e  ② a, c, e  ③ b, d, e  ④ c, d  ⑤ b, e", "jokboAnswer": "③ (PDF page-60 답박스 직독 확인)", "claudeAnswer": "③ (b, d, e) — 족보와 일치", "explanation": "이 문항은 a가 \"**1종 이상**\" 또는 \"마우스 등 1종\"으로 제시(2024-기말 PDF 본문). 답박스에 \"답: 3\" 명시.\n- a **옳음** — 1종 이상(또는 2종) 필수 사용.\n- b **틀림** — 이유 후 **6주 이내** 어린 동물 시작. \"12주 성숙기\"는 함정.\n- c 옳음 — DRF(단회→반복) 순서 옳음.\n- d **틀림** — MTD = 체중증가 10% 이내 억제로 **객관적 결정**. \"임의\"는 함정.\n- e **틀림** — 누적사망률 **20%** 도달 시 종료. \"95%\"는 정반대 함정.\n→ 틀린 것만 모으면 b·d·e → **③**. (강의안 lec-18 슬라이드 22)", "tail": "— PDF 검증 확정 (재분류·정답 정정)", "scoreable": true, "correctIndices": [2]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "29", "qid": "Q184", "body": "Ames test에 대한 설명으로 옳지 않은 것을 모두 고른 것은?\n\na. S. typhimurium·E. coli를 사용한 복귀돌연변이 시험\nb. 정상 균주는 his 없어도 증식, 돌연변이 후 his 필요\nc. S9 mix 첨가로 대사 활성화 산물 검출 가능\nd. Ames test로 포유류 대사활성화 재연 가능\ne. 식품·천연물도 변이원성 함유 가능\n\n① b, d  ② b, c  ③ a, d  ④ c, d  ⑤ a, b, d", "jokboAnswer": "①②④ (원본 오기)", "claudeAnswer": "① (b, d)", "explanation": "- b **틀림** — his⁻ 정상(영양요구체) → 변이원 → his⁺ 복귀. 진술은 정반대.\n- d **틀림** — prokaryote 기반, 포유류 대사 완전 재연 ❌.\n- a·c·e 옳음.\n→ **①**. Q072·Q247·Q325 동일 b·d 함정. (강의안 lec-18 슬라이드 19-20)", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2024-기말", "num": "35", "qid": "Q190", "body": "35. 알코올과 글리콜에 대한 내용으로 맞지 않는 것은?\n\na. 애완동물의 알코올 중독증의 주요원인은 에탄올 및 이소프로필 알코올이다.\nb. 에탄올은 직접적인 발암제이다.\nc. 개와 고양이의 메탄올 독성은 사람에 비해서 높다.\nd. 사람에서 눈 신경을 손상시킴으로서 영구적인 실명을 초래한다.\ne. 비영장류에서는 포름산을 효율적으로 배설시키기 때문에 실명과 뇌 괴사를 잘 일으키지 않는다.", "jokboAnswer": "미표기", "claudeAnswer": "**b, c** (단일 정답 요구 시 **b**)", "explanation": "1) **배경**: [2022-기말] #39과 유사하나 선지 구성이 조금 다름. 복수 정답 가능성.\n\n2) **포인트**: 3가지 고정 함정 — 에탄올 직접 발암(X), 개/고양이 메탄올 감수성 (X, 낮음), 비영장류 포름산 처리 (○).\n\n3) **정답 근거**:\n   - b(**틀림**): 에탄올 = 간접 기여, 직접 발암제 아님.\n   - c(**틀림**): 개·고양이 메탄올 독성은 사람보다 **낮음**.\n   - a·d·e(맞음).\n\n4) **오답 소거**: a, d, e 모두 강의안·교재 서술과 일치.\n\n5) **함정**: \"개·고양이 독성 ↑\"라고 쓰면 동물 임상 감각상 맞아 보이지만, 메탄올만은 예외 — 비영장류가 포름산을 잘 배설한다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L17-antidotes", "round": "2024-기말", "num": "36", "qid": "", "body": "빈칸에 들어갈 알맞은 단어를 고르시오.\n\n( )은 2가 알코올 중 가장 간단한 형태의 화합물로서, 자동차에 쓰이는 부동액과 세정제로 쓰이며 약한 녹색을 띄고, 가장 빈번한 중독의 요인이 되고 있다. ( )중독증은 연중 일어나지만 부동액을 많이 교환하는 봄철에 더 많이 발생할 수 있다. 대부분 개와 고양이가 노출될 우려가 크며, 이들 암수 모두 위험도가 같지만 정상적인 동물이 난소를 제거하거나 중성화된 동물보다 더 자주 중독된다. 특히 ( )는 단맛이 있어서 개 및 고양이와 같은 소동물과 어린이를 유인할 수 있어 중독증이 잘 발생한다. 사람과 고양이가 ( )에 특히 민감하고, 고양이에서 민감한 이유는 oxalate의 생성률이 높기 때문이다.\n\n① 에탄올  ② 에틸렌 글리콜  ③ 메탄올  ④ 이소프로필 알코올  ⑤ 에테르", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "[2022-기말] #40과 본문이 완전히 동일하다. 2년 간격(2022→2024)으로 동일 지문·동일 정답이 반복 출제된 대표 사례로, **EG 기본 특성 문항은 족보 3회차 이상 반복 예상**되는 핵심. 풀이 포인트는 동일: \"2가 알코올\" + \"부동액·녹색\" + \"단맛\" + \"사람·고양이 민감, oxalate 생성률 높음\" 네 단서 중 어느 하나만 잡아도 EG(②)가 특정된다. 에탄올(①, 1가)·메탄올(③, 1가)은 2가 조건에서 탈락, 이소프로필 알코올(④)은 부동액이 아닌 소독제, 에테르(⑤)는 알코올이 아닌 마취제. 메탄올 오답 유도에 특히 주의 — 메탄올은 사람(영장류) 시신경 손상으로 유명하지만 1가 알코올이고 EG보다 독성 발현 경로(formate 축적)가 다르다. EG의 고양이 민감 기전(oxalate 생성률 ↑ → calcium oxalate 신세뇨관 결정 → 급성 신부전)은 개념학습 Unit 8.5와 동일. 해독은 에탄올·4-MP(Fomepizole)로 ALDH를 경쟁 차단하여 EG의 oxalate 전환을 막는다. 교과서 08장 EG 각론·강의안 lec-17 기반.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L09-mechanism-4-1-3", "round": "2024-mid", "num": "37", "qid": "", "body": "많은 독성물질은 유전자 조절, 세포내 신호전달, 핵산 및 단백질 합성 장애를 일으켜 그 독성효과를 나타낸다. 다음 중 틀린 것을 모두 고르시오.\n\na. DNA 중합효소 β는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다.\nb. DNA 중합효소 α는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\nc. 화학물질에 의한 신호전달 이상은 주로 단백질의 메틸화 상태의 변화에 의하여 일어난다.\nd. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이 결국 종양을 일으킬 수 있다.\ne. 많은 독성 물질은 그 농도에 따라 RNA 중합효소 1, 2 및 3에 대한 억제 정도가 달라진다.\nf. sulfur 함유 아미노산인 세린과 트레오닌은 산화에 특히 민감하다.\n\n족보 원본 해설: \"중합효소 알파는 sulfhydryl기를 가진다. 중합효소 베타는 sulfhydryl기를 가지고 있지 않다.\"", "jokboAnswer": "a, b, c, f", "claudeAnswer": "**a, b, c, f** (족보와 일치)", "explanation": "이 문항은 §4.5 핵산·단백질 합성 장애의 세부 문장 6개를 한꺼번에 검증하는 다중선택형이다. 각 선지를 교재 본문과 한 줄씩 대조한다.\n\n- **a 틀림** — 교재 p.52 §4.5 2): \"DNA 중합효소 **α**는 하나 또는 그 이상의 **sulfhydryl기**를 가지고 있어 이를 변형시키는 인자에 매우 민감하다... DNA 중합효소 **β**는 sulfhydryl기를 가지고 있지 않아 저항성을 가진다.\" 선지는 α↔β를 뒤집어 서술했다. **민감한 것은 α, 저항성인 것은 β**.\n\n- **b 틀림** — a와 동일한 α↔β 역전. b 혼자서도 틀림. 교재 원문과 정면 충돌.\n\n- **c 틀림** — 교재 p.52 §4.5 1) \"신호전달 조절 장애\": \"PKC를 활성화시키는 물질은 이 신호경로를 통한 단백질(신호전달계)의 **인산화(phosphorylation)**를 촉진한다.\" 즉 신호전달 이상의 핵심은 **인산화** 상태 변화이지 메틸화가 아니다. 메틸화는 DNA/히스톤 수준 후성유전학적 조절에서 자주 언급되지만, §4.5가 다루는 \"화학물질에 의한 신호전달 이상\"은 인산화 경로이다.\n\n- **d 옳음** — 교재 p.52 §4.5 2): \"DNA 산화는 **세포자멸사 및 괴사**를 일으킬 뿐만 아니라 **돌연변이**, 결국 **종양**을 일으킬 수 있다.\" 정확히 일치. 소거.\n\n- **e 옳음** — 교재 p.52~53 §4.5 3) RNA 합성 장애: \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다.\" 그대로 일치. α-amanitin(세 가지 모두 억제), actinomycin D(농도 의존적으로 rRNA→mRNA 영향) 예시가 이를 뒷받침.\n\n- **f 틀림** — **Sulfur 함유 아미노산은 Cysteine(Cys, -CH₂-SH)과 Methionine(Met, -CH₂-CH₂-S-CH₃)** 두 개이다. Serine(-CH₂-OH)과 Threonine(-CH(OH)-CH₃)은 **hydroxyl기(-OH) 함유 아미노산**으로 황 원소를 갖지 않는다. 따라서 \"sulfur 함유 아미노산인 세린·트레오닌\"이라는 서술은 이중으로 틀림(이름과 분류가 모순). Cys·Met은 실제로 **sulfhydryl기(Cys의 -SH)와 티오에테르(Met의 -S-)**를 가져 산화적 스트레스에 취약하다. 이 지식은 교재 §4.2 서술에서 \"아미노산의 sulfhydryl기\"가 산화 표적으로 언급되는 맥락과 연결된다.\n\n따라서 **틀린 선지는 a·b·c·f** 네 개. d·e 두 개만 옳다.\n\n함정 요소: (1) **a·b가 쌍으로 틀림** — 두 선지 모두 α↔β가 같은 방향으로 뒤집혀 있어, 얼핏 \"하나만 맞추면 되겠지\"하고 한쪽만 고르기 쉽다. 둘 다 체크해야 감점 없음. (2) **c의 \"메틸화\"** — 후성유전학 단원(L11·L13)에서 메틸화를 자주 다루므로 익숙한 단어지만, §4.5의 신호전달 이상은 **인산화**가 정답. (3) **f의 serine/threonine** — 생화학에서 \"serine/threonine kinase\"(Ser·Thr 인산화)가 친숙해 이름이 익숙하다는 이유로 그냥 맞다고 넘길 수 있다. 아미노산 곁사슬의 원소를 떠올려야 구분 가능.\n\n**근거 위치**: 교재 p.52 §4.5 \"1) 신호전달 조절 장애\" · \"2) DNA 합성 장애 및 손상\" · p.52~53 \"3) RNA 합성 장애\" + 생화학 기초(Cys·Met의 황 함유).", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2024-mid", "num": "37", "qid": "Q141", "body": "많은 독성물질은 유전자 조절, 세포내 신호전달, 핵산 및 단백질 합성 장애를 일으켜 그 독성효과를 나타낸다. 다음 중 틀린 것을 모두 고르시오.\n\na. DNA 중합효소 β는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다.\nb. DNA 중합효소 α는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\nc. 화학물질에 의한 신호전달 이상은 주로 단백질의 메틸화 상태의 변화에 의하여 일어난다.\nd. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이 결국 종양을 일으킬 수 있다.\ne. 많은 독성 물질은 그 농도에 따라 RNA 중합효소 1, 2 및 3에 대한 억제 정도가 달라진다.\nf. sulfur 함유 아미노산인 세린과 트레오닌은 산화에 특히 민감하다.", "jokboAnswer": "a, b, c, f", "claudeAnswer": "a, b, c, f", "explanation": "이 문항은 교과서 §4.5 \"핵산 및 단백질 합성 장애\"의 네 가지 핵심 함정을 한꺼번에 묶어 검증하는 종합 문항이다. 각 선지는 교과서 한 줄 한 줄을 정확히 \"거꾸로\" 또는 \"대체어\"로 오염시켰다.\n\n- **a 틀림**: 교과서 §4.5 (2)는 \"DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자에 매우 민감하다\"고 한다. 선지는 α ↔ β를 뒤바꿨다. β가 -SH기를 가지고 민감하다는 진술은 완전한 역전.\n- **b 틀림**: 같은 단락 \"DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다\"가 원문. 선지는 α가 -SH기 없고 저항성이라 뒤바꿨다. a·b는 한 쌍으로 설계된 역전 함정.\n- **c 틀림**: 교과서 §4.5 (1) \"신호전달 장애\"에서는 \"PKC를 활성화시키는 물질은 신호전달계의 인산화를 촉진한다\"로 서술한다. 신호전달은 단백질 **인산화(phosphorylation)** 조절에 의해 일어나며, **메틸화(methylation)**는 주로 DNA 메틸화(유전자 발현 조절)·히스톤 메틸화의 맥락이지 신호전달 축의 주요 수식이 아니다.\n- **d 옳음**: 교과서 §4.5 (2) \"DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이를 일으켜 궁극적으로 종양을 일으킬 수 있다\" 원문과 일치.\n- **e 옳음**: 교과서 §4.5 (3) \"RNA 합성 장애\"에서 \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다\"고 서술한다.\n- **f 틀림**: Sulfur(황) 함유 아미노산은 **Cysteine(-CH₂-SH)**과 **Methionine(-CH₂-CH₂-S-CH₃)**. Serine(-CH₂-OH)과 Threonine(-CH(OH)-CH₃)은 hydroxyl(-OH)기 함유 아미노산이며 황이 없다. 산화에 민감한 것은 Cys의 -SH기와 Met의 티오에테르기다.\n\n함정 요소: a·b는 역전 쌍, c는 수식 바꿔치기(인산화→메틸화), f는 아미노산 분류 오류로, 각각 다른 차원의 오답 패턴을 한 문항에 몰아넣었다. 특히 \"세린·트레오닌이 sulfur AA\"라는 명백한 생화학 상식 오류를 끼워넣어 해당 선지를 \"맞다\"고 오판하는 실수가 흔하다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2024-mid", "num": "38", "qid": "Q142", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고른 것은?\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.\n\n①. a, b, c, d, e  ②. a, c, d  ③. b, d, f  ④. c, d, e  ⑤. c, e, f", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e가 틀림)", "explanation": "이 문항은 교과서 §4.5 \"(4) 단백질 산화적 손상\" 단락의 세 갈래 정보(취약성 이유·Heinz body·MetHb·disulfide)를 한 번에 검증한다. 배경을 짚으면, 적혈구는 산화 스트레스에 극도로 취약한데 그 이유는 **세 가지가 서로 보강**하기 때문이다: ① 혈색소 자체에 고농도 산소가 결합되어 있어 자동산화(autoxidation)가 상시 일어나고, ② 혈액에 분포된 외래물질이 혈관 내 적혈구에 쉽게 접근하며, ③ **적혈구는 핵·세포질세망이 없어 손상된 단백질을 새로 합성해 대치할 수 없다**. 이 세 조건이 모두 \"맞는 취약성 이유\"다.\n\n- **a 옳음**: \"외래물질 노출\" = §4.5 원문 그대로.\n- **b 옳음**: \"손상 단백질 대치 불가\" = §4.5 원문 그대로.\n- **c 틀림**: 변성 혈색소가 적혈구 세포막에 이중결합한 구조는 **Heinz body**다. **Howell-Jolly body**는 비장에서 미처 제거되지 못한 **핵 잔재물(nuclear remnant)** — 적혈구 세포질 내 작은 푸른 점으로 관찰되며, 무비장증(asplenia)·혈액학적 질환에서 볼 수 있다. 두 구조는 원인·외형·위치(세포막 vs 세포질) 모두 다르다.\n- **d 틀림**: 산화 방향이 정반대. 정상 Hb의 철은 **Fe²⁺**(ferrous, 산소 결합 가능)이며, 독성물질(nitrite·phenylhydroxylamine·nitrosobenzene)이 이를 **Fe³⁺**(ferric)로 산화시켜 **methemoglobin(MetHb)**을 만든다. MetHb는 산소를 결합하지 못하므로 산소 운반 능력이 상실된다. \"Fe³⁺→Fe²⁺\"는 정반대.\n- **e 틀림**: α·β-글로빈 사슬의 산화는 각 사슬의 Cys 잔기의 -SH기가 산화되어 **disulfide(S-S) 결합**을 형성한다. 이 분자내·분자간 S-S 가교가 혈색소 단백질을 응집시켜 Heinz body를 만든다. **ester 결합(-CO-O-)**은 카복실산과 알코올 사이에 형성되는 전혀 다른 결합이다.\n- **f 옳음**: 혈색소에 결합한 고농도 산소가 자동산화의 근원이 되므로 취약성 이유로 맞다.\n\n따라서 c·d·e 세 개가 틀림 → ④.\n\n함정 요소: c는 Heinz body ↔ Howell-Jolly body 용어 바꿔치기(혈액학에서 자주 혼동), d는 산화 방향 역전, e는 \"disulfide\"를 \"ester\"로 교체한 것이다. 세 함정이 모두 한 단락 안에서 서로 인접한 문장에서 온 것이라 교과서를 정확히 암기하지 않으면 어느 하나를 \"맞다\"고 오판하기 쉽다. Q037(2025-mid #38)과 본문이 거의 동일하게 반복된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L11-mechanism-4-4-6", "round": "2024-mid", "num": "40", "qid": "Q143", "body": "다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증(Pancytopenia)를 유발한다. ...\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.", "jokboAnswer": "미표기 (Benzene / TCDD — 본문 서술 기준)", "claudeAnswer": "첫 번째 빈칸 = Benzene / 두 번째 빈칸 = TCDD", "explanation": "문항 본문은 교과서 §4.8 \"면역 억제\" 두 단락을 이어 붙인 것이다. 면역 억제를 일으키는 독성물질은 다양하지만 교과서가 **가장 대표적**이라 명시하는 두 물질이 Benzene과 TCDD이며, 각각의 기전·표적 세포·임상 결과가 완전히 다르다는 점이 핵심이다.\n\n**첫 번째 빈칸 — Benzene**: 골수 독성의 대명사. 간 CYP → hydroquinone → 골수 myeloperoxidase → quinoid 대사체 + ROS → 골수 원조세포(조혈 모세포) 파괴 → **pancytopenia**(적혈구·백혈구·혈소판 모두 감소) + 림프구 전구세포(T·B) 감소. Benzene 만성 노출은 사람에서 재생불량성 빈혈·급성 백혈병의 원인으로 등록되어 있다. 교과서 본문 \"hydroquinone → myeloperoxidase → quinoid → pancytopenia\"의 4단계 용어 조합이 Benzene 말고는 성립하지 않는다.\n\n**두 번째 빈칸 — TCDD(2,3,7,8-tetrachlorodibenzo-p-dioxin)**: 면역 억제의 **가장 강력한** 독성물질. TCDD는 AhR(aryl hydrocarbon receptor)과 결합하여 핵 내로 이동하고 특정 유전자를 활성화하는데, 흉선 피질 상피세포에서 이 기전이 **T 세포 분화·성숙을 억제**한다. 동시에 **Ca²⁺ 의존성 endonuclease**를 활성화하여 피질 미성숙 T 세포(thymocyte)의 DNA를 절단시켜 세포자멸사를 유도한다. 결과적으로 흉선이 현저히 위축되고 T 세포 매개 면역이 저하된다. 교과서의 \"가장 강력한 면역억제\"·\"흉선 피질\"·\"T 세포 분화 억제\"·\"Ca²⁺ 의존성 endonuclease\" 네 구절은 모두 TCDD 고유의 특징이다.\n\n함정 요소: 단답 자리에 \"Paraquat\"·\"TRAIL\"·\"Caspase\"·\"Aflatoxin\"을 끼워넣는 선지가 있다. Paraquat는 폐독성, TRAIL·Caspase는 세포자멸사 경로의 내재 분자이지 외인성 독성물질 이름이 아니다. Aflatoxin은 간독성·DNA 공유결합 기전으로 \"myeloperoxidase 단계\"가 없다. 두 빈칸을 혼동하는 것도 흔한 오류다 — Benzene↔TCDD 바꿔치면 \"Benzene이 흉선 T세포 분화 억제\"가 되어 사실과 정반대다.\n\nQ039(2025-mid #40)에 동일 본문·선지로 재출제되었다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L14-diagnosis", "round": "2024-mid", "num": "42", "qid": "", "body": "중독의 진단에 대한 아래의 설명 중 틀린 것을 모두 고른 것은?\n\na. 독성검사를 위한 샘플들은 채취한 즉시 냉동(frozen)하는 것이 원칙이다.\nb. 건초, 곡물 등과 같이 매우 건조한 샘플들은 냉동 보관한다.\nc. 전혈(whole blood)의 경우에는 냉동보관하여야 한다.\nd. 모든 혈청(serum), 혈장(plasma) 샘플은 원심분리한 후에 상층액을 분리하여 냉동보관하여야 한다.\ne. 오줌(urine)은 약 100 mL 이상 되는 양을 채취하고 절대 주사바늘이 꽂혀 있는 상태로 운반하면 안된다.\n\n①. b, c, e  ②. a, c, e  ③. c, d  ④. b, c  ⑤. a, c, d", "jokboAnswer": "④", "claudeAnswer": "④ (b, c)", "explanation": "1) 배경 — [2023-fin] #1과 완전히 동일한 묶음 문항. 교과서 §3·§5의 보관 원칙 3층 구조를 반복 확인한다. 같은 문항이 중간·기말에 바로 다음 해 재출제될 정도로 출제자에게도 \"반드시 체화시켜야 할 개념\"으로 분류된 문항.\n\n2) 핵심 포인트 — a~e 중 \"냉동\"이 잘못 적용된 두 진술(b·c)을 모두 찾아야 한다.\n\n3) 정답 선지 근거\n- b 틀림 — 건조 시료(건초·곡물)는 **냉암소** 보관. 문항 b 진술이 \"냉동 보관\"으로 변형된 오답. (교과서 §3)\n- c 틀림 — 전혈은 **냉장(refrigerated)·EDTA** 튜브 보관. \"냉동 보관\"은 오답. (교과서 §3·§5)\n→ 틀린 것: b·c → 정답 ④.\n\n4) 오답 선지 소거\n- ① (b, c, e) — e는 \"오줌 100mL 이상, 주사바늘 운반 금지\"로 교과서 §5 원문과 일치하므로 옳은 진술. 포함 오류.\n- ② (a, c, e) — a는 \"채취 즉시 냉동이 원칙\"으로 교과서 §3 원문. 옳은 진술. 포함 오류.\n- ③ (c, d) — d는 \"혈청·혈장 원심분리 후 상층액 냉동\"으로 교과서 §3 원문. 옳은 진술. 포함 오류.\n- ⑤ (a, c, d) — a·d 모두 옳은 진술. 포함 오류.\n\n5) 함정 요소 — 학생이 c(전혈 냉동) 하나만 잡고 ③(c, d)로 답을 고르는 것이 가장 전형적인 오답 패턴이다. d(혈청·혈장 냉동)가 옳은 진술인데 c와 비슷해 보여 덩달아 묶어버리는 심리. 실제로는 b(건조 시료 냉동 → 냉암소가 정답)도 함께 틀렸다는 것을 놓치지 말아야 한다. 선지 순서상 b가 먼저이므로 b부터 검토하는 습관을 들이면 방지 가능.\n\n근거 위치: 교과서 06장 §3·§5, 강의안 lec-14 슬라이드 5.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L14-diagnosis", "round": "2024-fin", "num": "48", "qid": "", "body": "Dithionite에 의한 paraquat 검출법에는 산에 ( )를 가하여 알칼리화시키고 sodium dithionite을 첨가하여 푸른색을 띄면 양성이라 할 수 있다.\n\n①. 수산화칼슘  ②. 수산화나트륨  ③. 수산화칼륨  ④. 수산화암모늄  ⑤. 수산화알루미늄", "jokboAnswer": "②", "claudeAnswer": "② (수산화나트륨, NaOH)", "explanation": "1) 배경 — Paraquat(파라콰트)는 제초제로 광범위하게 사용되는 bipyridilium 계열 화합물이며 사람·동물에서 폐섬유화를 유발하는 고독성 물질. 강의안 표 6.1(오줌 타겟)과 사후 표본(폐)에 파라콰트가 별도로 명시될 정도로 수의독성학에서 중요도가 높다. Dithionite법은 오줌·조직 추출물에서 파라콰트를 신속히 확인하는 **정성 간이 검출법(qualitative spot test)**이다.\n\n2) 핵심 포인트 — 빈칸은 \"산에 무엇을 가하여 **알칼리화**시키는가\"이다. 따라서 강염기 또는 알칼리성 시약이 들어가야 하며, Dithionite법의 표준 프로토콜에서 규정된 정확한 시약을 골라야 한다.\n\n3) 정답 선지 근거 — ② **수산화나트륨(NaOH)**이 표준 시약. 반응 원리는 (i) NaOH로 pH를 알칼리성으로 올려 Paraquat 환원 반응 조건을 맞추고, (ii) Sodium dithionite(Na₂S₂O₄)가 Paraquat²⁺를 단일양이온 라디칼(Paraquat⁺•)로 환원시키면, (iii) 이 라디칼이 **푸른색(blue)**을 띠므로 양성으로 판정한다. 강의안 lec-14 분석독성학 슬라이드 및 lec-15 파라콰트 관련 슬라이드에 이 프로토콜이 직접 서술되어 있다.\n\n4) 오답 선지 소거\n- ① 수산화칼슘(Ca(OH)₂) — 석회수. 용해도가 낮아 pH 상승이 제한적이며 Dithionite법 프로토콜에 쓰이지 않음.\n- ③ 수산화칼륨(KOH) — 강염기이지만 표준 프로토콜에서는 NaOH가 지정되어 있어 오답.\n- ④ 수산화암모늄(NH₄OH) — 약염기이며 휘발성. 안정적인 알칼리화 조건을 만들 수 없어 부적합.\n- ⑤ 수산화알루미늄(Al(OH)₃) — 양쪽성 물질이나 용해도 및 알칼리 강도 부족. 사용 안 함.\n\n5) 함정 요소 — 선지가 모두 \"수산화~\"로 시작하는 동종 계열로 구성되어 학생이 이름의 친숙함으로 찍기 어렵게 설계됨. \"알칼리화 = 가장 대표적인 강염기 = NaOH\"라는 기준으로 판단해야 한다. 색상 파트에서 \"푸른색 양성\"을 \"붉은색\"으로 바꾸는 변형 함정이 미래에 등장할 수 있으므로 **NaOH → 푸른색** 세트로 암기.\n\n근거 위치: 강의안 lec-14·lec-15 분석독성학 섹션, 교과서 06장 §7(분석독성학 일반 원리), 강의안 표 6.1 오줌·폐 타겟.", "tail": "", "scoreable": true, "correctIndices": [1]}]}, "Y2022MID-모아보기": {"lecture": "Y2022MID-모아보기", "title": "2022 중간 모아보기", "slug": "y2022mid", "questions": [{"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "1", "qid": "Q261", "body": "1. 용량 개념으로 볼 때 약리학은 노출량, 독성학은 투여량의 개념으로 볼 수 있다.\n\n① 약리학은 합리적으로 계획하고 자발적으로 투여한다.\n② 독성물질의 경우 우발적으로 의식하지 못하고 노출된다.\n③ 약리학과 독성학은 분포, 대사, 배설, 용량반응관계 등 유사점이 많다.\n④ 약리학은 독성학의 한 분야이다.\n⑤ 약리학과 독성학은 서로 다른 학문이다.", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: 강의안 lec-07 슬라이드 2(chunk 1)에서 \"약리학과 독성학은 동전의 양면처럼 연속선상\"이라 명시.\n\n2) **포인트**: \"서로 다른 학문이다\"라는 극단적 진술의 오류를 잡아내는 문항.\n\n3) **정답 근거**: 두 학문은 대사·분포·배설·용량반응 등 방법론을 공유하며 용량·의도의 차이만 있음 → \"서로 다름\"은 오류.\n\n4) **오답 소거**: ①약리학=계획적, ②독성학=우발적, ③공통점 많음 모두 강의안 서술과 일치. ④\"약리학이 독성학의 한 분야\"도 어색하지만 ⑤가 가장 명확한 오답.\n\n5) **함정**: 지문에서 \"노출량·투여량 개념이 다르다\"고 언급하여 학문이 별개인 것처럼 유도 — 사실은 **연속선상**.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "6", "qid": "Q270", "body": "6. 독성학과 독력학에 대한 설명 중 틀린 것 2개를 고르시오.\n\n① 독성물질이 체내에서 어떤 생리적 움직임을 보이는가를 연구하는 학문을 독력학, 독성물질의 독성효과에 대한 분자적 기전, 상호작용을 연구하는 학문을 독성학이라고 한다.\n② ADME 과정이 1차역학이고 선형인 약동학과는 달리 높은 용량에서 독동학은 0차역학이고 비선형이다.\n③ 독동학은 1차역학을 따르고 역학 과정이 선형으로 기대되는 약물의 낮은 농도와 관련된 ADME 과정이 선형이다.\n④ 독동학의 기본적인 목적은 독성 시험 조건 아래에서 생체이물의 투여 용량과 체내 순환하고 있는 농도 사이에 상관관계와 관련된 정보를 얻는데 있다.\n⑤ 독동학 자료는 후속 임상시험에서 투여 용량의 점진적인 증가를 위한 근거를 제공한다.", "jokboAnswer": "미표기", "claudeAnswer": "**①③**", "explanation": "교과서 p.11.\n- ① 오류: 독동학(toxicokinetics) = ADME 연구; 독력학(toxicodynamics) = 분자적 기전 연구. ①은 명칭 뒤바뀜.\n- ② 옳음: 독동학은 높은 용량에서 0차역학·비선형.\n- ③ 오류: ③은 약동학(pharmacokinetics)의 정의이다. 독동학은 1차(저용량) + 0차(고용량) 역학 모두 포함.\n- ④⑤ 옳음.", "tail": "", "scoreable": true, "correctIndices": [0, 2]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "7", "qid": "Q271", "body": "7. 투여 경로에 따른 약물흡수 관련 특이 요소에 대한 설명 중 틀린 것은?\n\n① 매우 작은 분자들(200Da 이하의 분자량을 가지고 있으면서 직경이 4×10⁻⁴ 마이크로미터 이하인 화학물질들)은 별 어려움 없이 세포구멍을 통과한다.\n② 이온화된 유형은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다.\n③ 이온화된 유형은 지방친화성이 낮기 때문에 세포막의 지방층을 통과하기 힘들다.\n④ 세포막 양쪽의 수소이온농도(pH)와 해리상수(pKa)가 이온화 정도의 결정에 중요한 역할을 한다.\n⑤ 원칙적으로 지방이 많은 세포막을 통해 이루어진다.", "jokboAnswer": "미표기", "claudeAnswer": "**②**", "explanation": "교과서 p.12. ②는 이온화형을 \"지방에 잘 용해\"라고 서술 — 오류. 이온형은 지용성 낮음. ③이 옳은 진술.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "8", "qid": "Q272", "body": "8. 수소이온과 관련된 생체이물에 대한 설명 중 틀린 것은?\n\n① 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n② 알칼리 환경인 소장에서는 약염기성 화학물질과 약물이 잘 흡수된다.\n③ 대부분의 생체이물들의 흡수는 작은창자에서 이루어지는데 이는 약알칼리성인 장내 pH와 수백만 개의 융모(villi)로 구성된 매우 넓은 표면적과 특별한 흡수성 상피 때문이다.\n④ 살리실산염(salicylate)에 의한 중독에서 탄산수소나트륨(sodium bicarbonate)을 투여하면 오줌의 알칼리성을 감소(pH 8.0에서 6.5)시킨다.\n⑤ 탄산수소나트륨은 살리실산염의 비이온화를 대폭 감소(약 25배)시켜 신장 재흡수를 방지하고 신장 배출을 증가(약 5배)시킨다.", "jokboAnswer": "미표기", "claudeAnswer": "**④**", "explanation": "교과서 p.12. NaHCO3 투여는 오줌의 알칼리성을 **증가**(pH 6.5→8.0)시킨다. ④는 방향 반대 서술.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "9", "qid": "Q273", "body": "9. 다음 중 생체이물에서 체내 이용을 **제한하는 것이 아닌** 2가지를 고르시오.\n\n① 폐포 표면의 90%가 노출되어 있는 모세혈관상(capillary bed)\n② 작은창자에서 대사는 제1상(phase I)과 제II상(phase II) 반응을 거치며 진행된다.\n③ 생체이물의 흡수는 작은창자에서 일어나며 이는 약알칼리성인 장내 pH와 수백만 개의 융모(villi)로 구성된 넓은 표면적과 특별한 흡수성 상피 때문이다.\n④ 간장에서 일어나는 대사는 독성을 증가시킨다.\n⑤ 소화기계 내에 매우 강한 pH와 많은 미생물들은 독성을 증가시킨다.", "jokboAnswer": "①, ⑤", "claudeAnswer": "⚠️ **재판정**: **①③**", "explanation": "교과서 p.13.\n- ① 폐포 모세혈관상 = 흡수 촉진 요소 (제한 아님) ✓\n- ② 소장 1·2상 대사 = 체내이용 제한 요소 (맞음)\n- ③ 소장 흡수성 상피 = 흡수 촉진 요소 (제한 아님) ✓\n- ④ 간 대사 = 체내이용 제한 요소 (맞음)\n- ⑤ 강한 pH·미생물 = 체내이용 제한 요소 (맞음)\n→ 제한하는 것이 아닌 것: ①③. 족보 정답 ①⑤에서 ⑤를 \"제한 아님\"으로 분류한 것은 오류로 판단.", "tail": "", "scoreable": true, "correctIndices": [0, 2]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "10", "qid": "Q274", "body": "10. 생체이물에 노출되는 주요 경로 중 하나인 호흡경로에 대한 설명 중 틀린 것 2가지를 고르시오.\n\n*(선지 ③④⑤가 OCR 오류로 동일하게 인쇄됨 — 원본 참조 불가)*\n\n① 폐는 심장박출량 100%를 받아들이고 기관지에서 말단 폐포까지 기도의 많은 분지는 흡수를 위한 거대한 표면적을 제공한다.\n② 폐포 표면의 90%가 모세혈관상(capillary bed)에 노출되어 있기 때문에 폐를 통한 흡수는 매우 신속하다.\n③~⑤ (OCR 미완성)", "jokboAnswer": "미표기", "claudeAnswer": "OCR 오류로 선지 완전 식별 불가. Q013·Q117 동일 주제 참조.", "explanation": "교과서 p.13. 호흡경로 특징: ① 폐 심박출량 100% 수용 (옳음), ② 폐포 90% 모세혈관 노출 (옳음). 틀린 진술 패턴: \"부위 무관 확산·퇴적\" / \"간 초회통과 거침\" / \"능동적 확산 중요\".", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "11", "qid": "Q275", "body": "11. 동물 종에 따른 흡수에 대한 내용으로 옳지 않은 것은?\n\n① 초식동물에 비해 육식동물에서 지방용해성 외래독성물질 축적률이 높다.\n② 섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높인다.\n③ 어린 송아지와 새끼 양은 매우 거친 먹이에 적응할 정도로 성장할 때까지는 단위동물과 유사하다.\n④ 혐기성인 반추수의 제1위는 비반추동물에 비해 화학물질을 매우 효과적으로 감소시킨다.\n⑤ 반추동물은 나이 의존적인 화학물질의 흡수를 보인다.", "jokboAnswer": "2", "claudeAnswer": "**②**", "explanation": "교과서 p.14. ②는 생체이용률을 \"높인다\" → 오류. 섬유소 풍부 먹이 → 생체이용률 **낮춤**.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "12", "qid": "Q276", "body": "12. 생체이물에 관한 설명 중 틀린 것을 2개 고르시오.\n\n① 기관 내 분포는 확산율, 관류율, 상대적 친화성에 영향을 받는다.\n② 관류율은 확산이 느릴 때 그 속도를 제한한다.\n③ 단백질 결합률이 높으면 일반적으로 높은 조직 분포율을 보인다.\n④ propranolol은 높은 단백질 결합률을 보이지만 많은 조직들에 높은 친화력을 갖고 있어 높은 조직 분포율을 보인다.\n⑤ 혈장 단백질 결합률이 높아지면 높은 관류율을 가진 기관에서 이것은 혈관에서 기관으로의 이동이 증가한다.", "jokboAnswer": "2, 3", "claudeAnswer": "**②③**", "explanation": "교과서 p.14.\n- ② 오류: 관류율은 확산이 **빠를 때** 속도 제한.\n- ③ 오류: 단백결합 ↑ → 일반적으로 **낮은** 조직분포.", "tail": "", "scoreable": true, "correctIndices": [1, 2]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "13", "qid": "Q277", "body": "13. 약물 또는 생체이물의 역학적 행태를 단순화시켜 기술한 비구획성 독동학 매개변수에 대해 틀린 것을 고르시오.\n\n① AUC은 시료채취 기간에 걸친 약물 노출의 양적인 측정이다.\n② Cmax는 약물의 농도 측정 과정 동안 유지된 약물의 최고 농도로 약물흡수 정도를 결정하기 위하여 자주 이용된다.\n③ Tmax는 최고농도에 도달한 시간을 의미하며 약물흡수 속도를 평가하는데 유용하다.\n④ Cmin은 시간 대비 혈중약물농도 곡선에서 배출단계 동안에 도달한 최저 약물농도로 최고혈중농도에 대한 최저혈중농도 비율은 약물배출 속도에 대해 값진 정보를 제공할 수 있다.\n⑤ 약물의 안전성 평가를 위한 독동학 연구에서, AUCt0-tlast는 0시간부터 12시간까지 측정된다.", "jokboAnswer": "5", "claudeAnswer": "**⑤**", "explanation": "교과서 p.15. AUCt0-tlast = 0~**2시간** 측정. \"12시간\"은 반복 오답 선지. 족보 정답 ⑤와 일치.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L05-factors", "round": "2022-중간", "num": "14", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 아래의 설명 중 틀린 것들로만 묶여있는 것은?\n\na. 독성 정도는 투여 횟수에는 크게 영향을 받지 않는다.\nb. 배설 경로는 흡수 속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\nc. 대사과정에서 궁극적인 독성물질로 활성화되는 경우에는 피하나 복강내투여가 오히려 경구 투여보다 높은 독성을 발현한다.\nd. 동물 종에 따라 대사효소의 활성도 또는 흡수율에 따라 선택적 독성이 유발되는 경우가 있다.\ne. 연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서 독성의 차이가 나타난다.\nf. 동일종의 동물에서 독성은 체중(kg)이나 체표면적(cm²)에 비례한다.\n\n① a, b, c  ② a, b, e  ③ b, c, e  ④ b, d, f  ⑤ c, e, f", "jokboAnswer": "⑤ (c, e, f로 표기됨 — 명백한 오류)", "claudeAnswer": "① (a, b, c)", "explanation": "족보 정답 ⑤는 오류이며, 교재 p.18-20 근거로 ①이 정답이다. 각 선지를 하나씩 판정한다.\n\n- **a 틀림**: 교재 p.18 \"투여 횟수가 달라지면 독성물질의 배설속도, 축적, 내성 등의 성질에 따라 독성 정도가 달라진다.\" 횟수 = 독성에 큰 영향. \"영향 받지 않는다\"는 정반대 서술이다.\n- **b 틀림**: 교재 p.18 \"노출경로는 흡수속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\" 족보 선지에서 \"노출(투여) 경로\"를 \"**배설** 경로\"로 단어 하나만 바꿨다. 배설은 독성 종료 단계와 관련되지만 \"흡수·대사 큰 변화\"의 주체는 노출 경로다.\n- **c 틀림**: 교재 p.19 다이옥신 예외는 \"**경구** 투여가 오히려 피하·복강내보다 높은 독성\"이다. 족보 선지는 방향을 뒤집어 \"피하·복강내 > 경구\"로 서술해 틀렸다.\n- **d 옳음**: 교재 p.19 \"종간 및 계통 간 해부학적·생리학적·대사적 차이로 인해 선택적 독성\" — 대사효소 활성도·흡수율 차이에 의한 선택적 독성은 정확한 서술이다.\n- **e 옳음**: 교재 p.20 \"연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서도 독성에 차이\" — 그대로 일치.\n- **f 옳음**: 교재 p.20 \"동일 종의 동물에서 독성은 일반적으로 체중이나 체표면적에 비례한다\" — 정확한 서술.\n\n따라서 틀린 것은 a·b·c이며 정답은 ①이다. 족보 ⑤는 명백한 오답 처리 오류.\n\n함정 요소는 b선지의 \"배설\"이라는 단어 한 글자 차이와, c선지에서 \"다이옥신\"이라는 단어 없이 \"대사 활성화되는 경우\"만 일반화되어 나타난다는 점이다. 일반론적으로 그럴듯하게 읽히지만 교재는 **경구 > 피하·복강내**를 명시한다. 선지 a는 \"투여 횟수 무시\"라는 직관적 오류를 제공해 가장 많은 수험생이 걸려드는 함정이다.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2022-중간", "num": "15", "qid": "", "body": "다음 중 독성에 영향을 미치는 특성으로 옳지 않은 것은?\n\n① 페노바비탈의 LD₅₀은 경구투여에서 혈관내투여보다 높다.\n② 아플라톡신 B₁에 의한 간암독성은 랫드(15ppb)가 마우스(10,000ppb이상)보다 민감하다.\n③ 다이옥신은 대사과정에서 궁극적인 독물로 활성화되어 경구투여에서가 피하나 복강내 주사보다 높은 독성을 갖는다.\n④ 살충제인 말라티온에 대해 포유류는 분해효소가 있어 해충보다 독성이 높다.\n⑤ 반추류는 thiamine(vitamin B₁)을 가져 thiaminase를 함유하는 고사리 중독에서 독성이 덜하다.", "jokboAnswer": "④", "claudeAnswer": "④", "explanation": "L05의 5대 종간 함정(페노바비탈·아플라톡신·다이옥신·말라티온·반추류)을 한 문항에 모아놓은 표준 문항이다. ④만 방향이 틀리게 서술되어 정답으로 지목된다.\n\n- **① 옳음**: 교재 p.19 페노바비탈 LD₅₀ — 경구 280 > IV 80 mg/kg. LD₅₀ 수치 자체는 경구가 더 높다(즉 경구가 독성은 낮음). 서술이 \"LD₅₀ 수치\"를 말하는 것이라 방향이 맞다. 여기서 수험생이 흔히 실수하는 것이 \"독성은 IV가 높으니 LD₅₀도 IV가 높겠지\"로 착각하는 것 — LD₅₀는 독성과 **역비례**다.\n- **② 옳음**: 교재 p.20 \"랫드 15 ppb, 마우스 10,000 ppb 이상으로 랫드가 훨씬 민감.\" 수치까지 정확.\n- **③ 옳음**: 교재 p.19 다이옥신 예외가 그대로 서술됨. \"경구 > 피하·복강내\"가 정답 방향이다.\n- **④ 틀림(정답)**: 교재 p.19 \"포유류에는 말라티온 분해효소가 존재하여 효소가 없는 해충에 비해 독성이 **월등히 낮다**.\" 족보 선지는 \"해충보다 독성이 높다\"로 정반대. 포유류=효소 有 → 독성 **낮음**이 핵심.\n- **⑤ 옳음**: 교재 p.19 반추류는 반추위 미생물이 thiamine을 합성하므로 thiaminase 함유 고사리에 저항성을 가진다. 말(단위동물)보다 덜 민감.\n\n함정 요소는 ①선지의 LD₅₀ 해석(독성과 역비례)과, ④선지에서 \"분해효소가 있다\"는 맞는 사실에 \"독성이 높다\"는 반대 결론을 붙여 논리 흐름이 단절된 점이다. \"분해효소 있으면 → 독성 ↓\"로 연결되어야 한다. 말라티온 = 포유류 독성 낮음 = 해충 독성 높음은 매년 거의 같은 형태로 출제된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "16", "qid": "Q280", "body": "16. 수소이온농도와 흡수에 대해 틀린 것을 고르시오.\n\n① 약산성인 위는 약산성의 화학물질을 잘 흡수한다.\n② 약알칼리인 장은 약염기성의 화학물질을 잘 흡수한다.\n\n*(이하 OCR 미완성)*", "jokboAnswer": "미표기", "claudeAnswer": "본문 미완성으로 판정 불가. ①②는 모두 옳은 진술.", "explanation": "교과서 p.12. ①②는 pH-이온화 원리에 맞는 옳은 진술. 나머지 선지 미확인.", "tail": "", "scoreable": true, "correctIndices": [0, 1]}, {"lecture": "L05-factors", "round": "2022-중간", "num": "17", "qid": "", "body": "생물학적 작용을 가진 두 개 이상의 독성물질에 의한 현상에 대하여 알맞게 짝지은 것은?\n\na - 부가효과(additive effect)\nb - 증강효과(potentiation effect)\nc - 상승효과(synergistic effect)\nd - 길항효과(antagonistic effect)\n\nㄱ 두 개 이상의 독성물질이 서로 반대로 작용하여 독성이 감소하는 것\nㄴ 각각의 효과를 더한 것보다 크게 증가하는 효과\nㄷ 특정 효과가 없는 A 약물이 B 약물의 효과를 더 증강시키는 것\nㄹ 두 약물의 병용효과가 각각의 효과를 더한 만큼 증가하는 것\n\n① a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ\n② a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ\n③ a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ\n④ a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ\n⑤ a-ㄷ, b-ㄹ, c-ㄱ, d-ㄴ", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "이 매칭 문항은 L05에서 가장 자주 나오는 고정 패턴이며, 답은 항상 **a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ**으로 고정된다. 교재 pp.22-23 ② 증가효과·③ 길항효과 정의에 따라 기계적으로 매칭된다.\n\n- **a 부가효과 = ㄹ**: 정의 \"두 약물의 병용효과가 각각의 효과를 더한 만큼 증가\" → ㄹ이 그대로 일치. 수식 1+1.2=2.2의 에테르+클로로폼 마취가 예.\n- **b 증강효과 = ㄷ**: 정의 \"특정 효과가 없는 A(0)가 B(1)를 증강\" → ㄷ이 그대로 일치. isopropanol+CCl₄가 예.\n- **c 상승효과 = ㄴ**: 정의 \"각각의 합보다 크게 증가\" → ㄴ이 그대로 일치. atropine+2-PAM=61.1배가 예.\n- **d 길항효과 = ㄱ**: 정의 \"반대로 작용하여 독성 감소\" → ㄱ이 그대로 일치.\n\n함정 요소는 \"증강\"이라는 한글 단어가 \"상승\"과 의미상 구분이 약하다는 점이다. \"0 + 1 > 1\"의 A가 무효일 때가 증강, \"1 + 1 > 2\"처럼 양쪽 다 유효한데 단순합을 초과할 때가 상승이다. 또 선지 ①, ③, ⑤처럼 \"a-ㄷ(부가를 증강 정의로)\" 같은 1칸 어긋남을 넣어 혼동을 유도한다. 수치 예시(1+1.2=2.2 / 0+1>1 / 2.3+5.0=61.1)를 먼저 떠올리면 매칭이 자동으로 결정된다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "19", "qid": "Q282", "body": "19. 반응성 대사산물에 대한 설명 중 틀린 것을 고르시오.\n\n①. 친전자성 물질은 체액이나 세포내 친핵성 물질과 포합되어 비활성화되며 가장 많은 친핵성 또는 해독 분자는 핵산이다.\n②. 친핵성 물질은 상대편 분자의 친전자성 물질과 반응하며 생체 내에서 단백질, 지질, 핵산, GHS 등이 친핵성 물질이다.\n③. 자유기는 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다.\n④. 산화-환원적 스트레스를 일으키는 것은 생체에서 비교적 쉽게 환원될 수 있는 분자 산소(O₂)이다.\n⑤. 정상적으로 NO(Nitric Oxide)는 근육과 혈관에서 신호 분자이지만, 독성학으로는 산화적 스트레스의 주요 요소이다.", "jokboAnswer": "②", "claudeAnswer": "**①**", "explanation": "1) **배경**: ⚠️ 족보 정답 ②는 오류. 강의안 lec-07(chunk 5, 슬라이드 3)은 \"가장 많은 친핵성 또는 해독 분자는 **물(water)**\"이라 명시.\n\n2) **포인트**: \"가장 많은 친핵성/해독 분자\"라는 표현 → 단일 정답 = **물**. 핵산이 아님.\n\n3) **정답 근거**: ①의 \"핵산\"은 틀림. 정답은 ①.\n\n4) **오답 소거**: ②의 \"단백질·지질·핵산·GSH = 친핵성\" 자체는 맞는 설명(족보 오답 처리된 것). ③·④·⑤ 모두 강의안 서술과 일치.\n\n5) **함정**: 족보에서 \"핵산\" 문구가 매 회차 반복되며 **정답 지문으로 위장**. \"물\" 한 단어만 기억하면 즉답 가능.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "20", "qid": "Q283", "body": "20. 반응성 대사산물을 생성하는 아래의 물질들에 대한 설명 중 틀린 것 2개를 모두 고르시오.\n\n①. 대식세포에서는 ONOO⁻를 형성한 다음 NO₂와 HO·를 생성하기 때문에 대식세포는 RNS 생성의 중요한 경로가 된다.\n②. paraquat는 산화-환원 순환(redox cycling)을 거쳐 O₂⁻를 생성시켜 선택적인 **간독성**(부종)을 일으키기 쉽다.\n③. 장내 세균총은 질산염(NO₃)을 아질산염(NO₂)으로 환원시켜 독성이 더욱 강한 물질로 된다.\n④. 전이 금속들은 제1상과 제2상 반응을 촉진시켜 HO·을 생성하도록 한다.\n⑤. Benzene과 quinone들도 산화-환원 순환을 거쳐 O₂⁻를 생성하는 대표적인 물질이다.", "jokboAnswer": "②④", "claudeAnswer": "**②④**", "explanation": "1) **배경**: 이 문항 형식은 [2024-중간] #29·#33, [2025-중간] #29·#30으로 반복 출제되는 \"반응성 대사산물 생성물질 5선지 틀린 것 찾기\"의 원조 패턴.\n\n2) **포인트**: 두 고정 함정 — \"Paraquat=간독성\", \"전이금속=1·2상 반응\"을 모두 잡아내기.\n\n3) **정답 근거**:\n   - ② **틀림**: Paraquat는 **폐독성**(alveolar type I·II) — 강의안 lec-07 chunk 3.\n   - ④ **틀림**: 전이 금속은 **Fenton 반응**(Fe²⁺+H₂O₂→Fe³⁺+HO·)으로 HO· 생성. 1·2상 반응과 무관. 강의안 lec-07 chunk 5 슬라이드 4.\n\n4) **오답 소거(옳은 선지)**: ① 대식세포 RNS 경로 옳음. ③ 장내 세균총 NO₃⁻→NO₂⁻ 전환 옳음. ⑤ Benzene·quinone → O₂⁻ 옳음.\n\n5) **함정**: Paraquat \"부종\"이라는 표현이 익숙해서 간 부종으로 착각하기 쉬우나, 폐부종이 맞다.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2022-중간", "num": "21", "qid": "Q284", "body": "21. 대부분의 외인성 물질의 독성 과정 및 효과에 대한 설명들 중 틀린 것을 고르시오.\n\n① 흡수된 독성 물질은 장관, 점막세포, 간, 폐 등을 통과하면서 일차통과효과(First pass effect)를 통해 독성을 감소시킨다.\n② 특수 수송계의 존재, 재분포, 많은 혈류량, 조직 친화성은 흡수된 독성 물질의 분포를 촉진한다.\n③ 혈장단백과 결합, 특수 장벽의 존재, 세포 밖으로의 배출 등은 흡수된 독성 물질의 분포를 촉진한다.\n④ 지용성 화합물은 배설되기 어려우므로 생체 내 대사를 거쳐 배설되기 쉬운 화합물로 변화되어야 한다.\n⑤ 독성 물질은 생체 외로 제거되기 전에 신세뇨관에서 생체 내로 재흡수되어 반감기는 길어지고, 이차적 노출에 의해 독성이 강화될 수 있다.", "jokboAnswer": "3", "claudeAnswer": "**③**", "explanation": "교과서 p.14. 혈장단백과 결합·특수 장벽·세포 배출은 분포를 **제한**하는 요소. ③의 \"촉진한다\"는 오류. ①②④⑤는 옳음.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L08-mechanism-3", "round": "2022-중간", "num": "22", "qid": "", "body": "아래의 독성 물질과 표적분자가 잘못 짝지어진 것 2개를 모두 고르시오.\n\n①. CO - 적혈구의 혈색소(Hb)\n②. 복어독인 tetradotoxin(TTX) - (OCR 미복원)\n③. 사염화탄소 - 지질\n④. 유기인제 살충제 - (OCR 미복원)", "jokboAnswer": "2, 4", "claudeAnswer": "②, ④", "explanation": "독성물질과 표적 분자의 매칭에서 틀린 두 개를 고르는 문항이다. 교재발췌 라인 451~478의 다섯 쌍(CO-Hb, TTX-Na⁺ 통로, CCl4-막지질, Aflatoxin-DNA guanine, 유기인계-AChE)이 판단 기준이다. OCR 미복원 부분이 있지만 족보 정답이 ②, ④임을 감안하면 원본에서 이 두 선지가 TTX와 유기인제의 표적을 서로 **바꿔치기**했을 가능성이 가장 높다.\n\n선지별 판정:\n- ① 옳음 — CO는 적혈구 혈색소(Hb)와 결합하여 COHb를 생성하고 산소 운반을 방해한다. 정확한 표적(교재발췌 라인 451~455).\n- ② 틀림 — TTX의 올바른 표적은 **막전위 의존성 Na⁺ 통로**(교재발췌 라인 457~462)이다. 원문에서 OCR로 복원되지 않은 부분에 \"AChE\" 같은 오답이 제시되었을 것으로 추정된다. TTX↔유기인계 표적 바꿔치기 함정은 L08에서 가장 빈번한 출제 패턴이다.\n- ③ 옳음 — CCl4는 자유기(CCl3·)를 생성해 세포막 지질에 작용하고 지질과산화를 일으킨다(교재발췌 라인 462~465).\n- ④ 틀림 — 유기인계 살충제의 올바른 표적은 **AChE(acetylcholinesterase)** 이다(교재발췌 라인 468~470). OCR 미복원 부분에 \"Na⁺ 통로\" 같은 오답이 있었을 것으로 추정된다.\n\n함정 요소는 원문 OCR 손실이지만, 해답 구조는 명확하다. TTX와 유기인계 표적을 서로 바꿔 제시하는 것이 거의 고정된 함정 형식이며, Q135(2024-mid #31), Q030(2025-mid #31)에서도 정확히 동일 구조로 반복된다.\n\n근거: 교재발췌 라인 451~478, 강의안 lec-08 슬라이드 5~7.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "25", "qid": "Q287", "body": "25. 세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작의 올바른 순서는?\n\n> (Q286과 동일 문항, 중복 수집된 항목)", "jokboAnswer": "미표기 (원본 해설 없음)", "claudeAnswer": "**c→e→a→f→d→b** ([2024-중간] #34, [2025-중간] #34·#36 기준 ②)", "explanation": "1) **배경**: 교재 5장 p.38(지질과산화). 6단계가 그대로 문제화되는 고빈출 문항.\n\n2) **포인트**: 시작(c)·끝(b)을 먼저 고정하고 중간을 채우는 전략.\n\n3) **정답 근거**:\n   - c: 외인성 물질 → 자유기 생성 (방아쇠)\n   - e: 지방산 H 분리 → **L·** 생성 = initiation\n   - a: L· + O₂ → LOO· → 확산·증폭 = propagation\n   - f: 유독 **aldehyde**(MDA·4-HNE) 생성\n   - d: aldehyde가 DNA·단백질과 공유결합 → 산화적 손상\n   - b: 직접적 독성 유발 (최종 결과)\n\n4) **오답 소거**: d·e·f로 시작하는 순서는 모두 오답 — 개시 없이 종결 단계가 앞설 수 없음.\n\n5) **함정**: e(L·)와 a(LOO·)의 순서 혼동. \"수소 분리 → L·\" → \"L· + O₂ → LOO·\"로 L·이 먼저.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L13-mechanism-4-7-11", "round": "2022-중간", "num": "27", "qid": "", "body": "면역반응은 항원-항체 복합체의 형성으로 나타나는데, 분자량이 작은 물질은 항원으로서 역할을 하지 못한다. 이 때 일어나는 과정의 순서로 옳은 것은?\n\n가. 유리된 보체 단백질이 세포 표면을 손상시키고 괴사, 세포융해, 비만세포에서 histamine 유리, 백혈구의 식균작용 촉진, 그리고 평활근을 수축시킨다.\n나. 이 항원-항체 반응에 의해 보체단백질이 유리된다.\n다. 항원에 반복된 노출은 항체와 결합하여 항원-항체 복합체를 형성한다.\n라. 이 항원이 림프구를 자극하여 항체(IgA, D, E, G 및 M)를 형성한다.\n마. 내인성 단백질과 결합하여 항원을 형성한다.\n\n① 가-라-마-다-나  ② 가-다-마-라-나  ③ 마-다-라-가-나  ④ 마-라-다-나-가  ⑤ 마-라-나-다-가", "jokboAnswer": "④", "claudeAnswer": "④ (마 → 라 → 다 → 나 → 가)", "explanation": "1) **배경 — 왜 독성물질이 단독으로 항원이 되지 못하나**: 교재 05장 \"4) 면역반응\" 단락(교재발췌.md lines 725-727)은 \"면역반응은 항원-항체 복합체의 형성으로 나타난다. 항원인 **대부분의 독성물질은 분자량이 작아서 항원으로서 역할을 하지 못한다**\"고 명시한다. 면역계는 일정 크기 이상의 분자만 \"이물질\"로 인식하므로, 분자량 500 Da 이하의 소분자 독성물질(= hapten)은 그대로는 면역 반응을 유발하지 못하고, **내인성 단백질(carrier protein)과 공유결합**으로 붙어 충분히 큰 **hapten-단백질 결합체 = 완전 항원**이 되어야만 림프구에 인식된다.\n\n2) **문항이 묻는 핵심 포인트**: 이 cascade의 **시작점(가장 먼저 일어나는 단계)**과 **종착점(가장 나중에 일어나는 단계)**을 정확히 짚어야 한다. 시작은 반드시 **마(Hapten + 내인성 단백질 → 완전 항원)**이며, 종착은 **가(유리된 보체 → 세포 표면 손상 6종)**이다. 중간 세 단계는 \"라(림프구 자극 → 항체 생성) → 다(반복 노출 → 항원-항체 복합체) → 나(보체단백질 유리)\"의 순서이다.\n\n3) **정답 ④ 근거 — 왜 마-라-다-나-가인가**:\n   - **마**: 독성물질(hapten) + 내인성 단백질 → **완전 항원 형성** (교재 lines 730-731 \"내인성 단백질과 결합하여 항원(독성물질-단백질 결합체)을 생성한다\").\n   - **라**: 형성된 항원이 림프구를 자극 → **항체(IgA·D·E·G·M) 생성** (교재 lines 732-733 \"이 항원이 림프구를 자극하여 항체(IgA, D, E, G 및 M)를 생성한다\").\n   - **다**: 동일 항원에 반복 노출 → **항원-항체 복합체 형성** (교재 lines 734-735, 746 \"항원에 반복된 노출은 항체와 결합하여 항원-항체 복합체를 형성한다\").\n   - **나**: 항원-항체 반응 → **보체단백질 유리** (교재 lines 747-748 \"이 항원-항체 반응에 의해 보체단백질이 유리된다\").\n   - **가**: 유리된 보체 → **세포 표면 손상 6종** — 괴사·세포융해·비만세포 histamine 유리·백혈구 식균 촉진·평활근 수축 (교재 lines 749-752).\n\n4) **오답 선지 소거**:\n   - ① 가-라-마-다-나: **가로 시작**하는 것부터 오답. 보체 유리(가)가 맨 마지막 효과인데 맨 앞에 배치.\n   - ② 가-다-마-라-나: 역시 가로 시작 + 마(항원 형성)가 다(항원-항체 복합체) 뒤에 와서 인과 역전.\n   - ③ 마-다-라-가-나: 시작은 옳으나 \"다(항원-항체 복합체) → 라(항체 생성)\"이 인과 역전. 항체가 먼저 생성돼야 복합체가 형성됨.\n   - ④ 마-라-다-나-가: **정답**. 인과 순서 완전 부합.\n   - ⑤ 마-라-나-다-가: \"라(항체 생성) → 나(보체 유리)\"로 \"다(항원-항체 복합체)\"를 건너뛰어 순서 뒤틀림. 보체는 항원-항체 복합체 형성 후 유리되므로 나가 다보다 뒤.\n\n5) **함정 요소**:\n   - 출제자는 **\"가(세포 손상 6종)\"가 가장 인상적 단어**(괴사·histamine·평활근 수축)라서 시험생이 맨 앞에 놓기 쉽다는 점을 노렸다(①·② 선지).\n   - **③과 ⑤는 중간 순서만 살짝 뒤틀어** 시험생이 초반·종반만 확인하고 통과하면 걸리도록 설계. 정답 선택 시 반드시 **중간 3단계(라→다→나) 순서까지 확인**해야 한다.\n   - **핵심 암기 구호**: \"**Hap**ten → **림**프구 → **복**합체 → **보**체 → **손**상\" (마·라·다·나·가의 한 글자 추출).\n\n**근거 위치**: 교재발췌.md lines 723-758 (교과서 05장 p.43-44 \"4) 면역반응\" 단락 전문).", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2022-중간", "num": "29", "qid": "Q291", "body": "중독의 치료에 대한 아래의 설명 중 틀린 것으로만 짝지어진 것은?\n\na. 노출이 발생한 물질이 무해하거나 독성이 매우 낮은 경우에는 반드시 제염을 해야 할 필요가 없다.\nb. 제염 시에 설치류, 토끼, 말, 반추류에서 구토 유발은 효과적이다.\nc. 제염 시에 심장질환, 간질이 있는 개, 고양이에서는 위배출을 해야 한다.\nd. 의식이 있는 경우 위세척을 할 때 마취를 먼저 실시한다.\ne. 반추동물은 제1위가 커서 위세척이 비효율적인 제염법이다.\nf. 대부분의 경우에서 독극물 섭취 후 6시간 이내에 구토, 위세척을 하면 효과가 유지된다.\ng. 활성탄은 수의임상에서 널리 사용되는 흡착제이다.\n\n①. a, b, c  ②. c, e, g  ③. b, d, g  ④. b, c, f  ⑤. c, d, g", "jokboAnswer": "④", "claudeAnswer": "④ (b, c, f)", "explanation": "이 문항은 [2024-중간] #43·[2025-중간] #43과 선지 배열이 약간 다른 초기 버전(d항이 \"의식이 있는 경우 마취 먼저\"라는 옳은 서술로 등장)이다. 각 서술을 교과서 07장 (3)항 기준으로 검증한다.\n\n- **a 옳음** — 교과서 (3)a항 \"물질의 독성\" 항목. 노출 물질이 무해하거나 독성이 매우 낮다면 무리한 제염은 불필요. 제염 자체도 침습적 스트레스이므로 과잉 진료 회피.\n- **b 틀림** ❗ — 교과서 (3)d항 \"동물 종\" 항목. 설치류·토끼·말·반추류는 **구토 불가 종**. \"효과적\"은 정반대. → 오답 선지.\n- **c 틀림** ❗ — 교과서 (3)e항 \"질병 유무\" 항목. 심장질환·간질 = 위배출 **금기**(부정맥·발작 유발). \"해야 한다\"는 정반대. → 오답 선지.\n- **d 옳음** — 이 버전에서는 \"의식이 있는 경우 마취 먼저 실시\"로 정상 진술. 7고려사항 (7)g항의 원칙과 일치.\n- **e 옳음** — 교과서 (3)d항 보충. 반추동물 제1위(rumen)가 매우 커서 세척액으로 잔류물 제거 비효율.\n- **f 틀림** ❗ — 교과서 (3)c항 \"시간 경과\" 항목. 골든타임은 **1시간**. 6시간은 반복 함정. → 오답 선지.\n- **g 옳음** — 교과서 (3)g항. 활성탄 = 수의임상 표준 흡착제.\n\n틀린 것은 **b·c·f 3개**이므로 정답은 **④(b·c·f)**.\n\n출제자의 함정은 여러 항목을 섞은 조합 선지에서 옳은 항목이 1개라도 들어간 ①·②·③·⑤를 배제하는 것이다. ⑤(c·d·g)는 c만 맞고 d·g는 옳은 진술이라 탈락, ②(c·e·g)는 c만 맞음, ③(b·d·g)는 b만 맞음, ①(a·b·c)는 a가 옳아 탈락. 오직 ④만 3개 모두 오답이다. [2024·2025 중간] 버전에서는 d가 \"마취 없이도 된다\"는 오답으로 바뀌어 정답 조합이 c·d·e·g 4개로 확장된다는 차이가 있다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2022-중간", "num": "30", "qid": "Q292", "body": "비스테로이드성 항염증 치료제(NSAIDs)를 장기간 섭취하게 되면 어떤 동물에서든 중독이 유발될 수 있다. 고양이는 특히 salicylate에 민감한데 그것은 간의 ( )의 활성이 낮기 때문이다. 또한 고양이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해, 배설하지 못하고 메트헤모글로빈증(methemoglobinemia)으로 발전하는 중독의 위험이 매우 커서 사용을 금한다.\n\n(본문 OCR 일부 미복원 — 선지 포함)\n\n이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해, 배설하지 못하고 메트헤모글로빈증으로 발전하는 중독의 위험이 매우 커서 사용을 금한다.\n\n①. cyclooxygenase (COX)  ②. phosphodiesterase  ③. glucuronyl transferase  ④. cholinesterase  ⑤. acetylcholinesterase", "jokboAnswer": "미표기 (교과서 기준 ③)", "claudeAnswer": "③ (glucuronyl transferase)", "explanation": "고양이 UGT 결핍 주제의 5지선다 빈칸 문항. 본문의 두 빈칸 모두 **glucuronyl transferase(UGT, 글루쿠론산 전이효소)** 하나로 귀결된다(교과서 07장 / 강의안 lec-16 슬라이드 12).\n\n선지 분석:\n- **① COX (cyclooxygenase)** — prostaglandin 합성 효소. NSAIDs의 표적이지만 고양이에서 결핍된 것이 아니다. NSAIDs가 COX를 억제하는 것과 고양이가 NSAIDs·AAP를 배설 못하는 것은 다른 이야기. 함정.\n- **② phosphodiesterase** — cAMP·cGMP를 분해하는 효소. methylxanthine(카페인·테오브로민) 독성과 관련(L-PDE 억제)이지만 UGT 결핍과 무관.\n- **③ glucuronyl transferase** ✓ — phase II 포합 효소. 고양이에서 활성이 낮음. UDP-glucuronic acid를 약물에 전이시켜 수용성 glucuronide로 배설. 이 경로 차단이 AAP → NAPQI → MetHb·Heinz body와 salicylate 축적의 **공통 원인**.\n- **④ cholinesterase** — acetylcholine 분해 효소. 유기인제·카바메이트 독성의 표적이며 UGT와 무관.\n- **⑤ acetylcholinesterase** — cholinesterase의 한 종류. 역시 유기인제 독성 표적으로 무관.\n\n정답 = ③. OCR 미완성으로 일부 선지 문구가 불완전하지만 ③번 위치가 glucuronyl transferase임은 [2022-기말] #32·[2023-기말] #34·[2024-기말] #32의 동일 선지 구조에서 확정된다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "31", "qid": "Q294", "body": "이 물질은 아세틸콜린에스터레이스(acetylcholinesterase) 억제력을 높여 독성을 크게 증가시킨다. 예를 들어, 파라티온(parathion)이 파라옥손(paraoxon)으로 전환되면 10배 이상의 높은 독성이 발현된다. 보통 산성 토양에서는 안정성이 증가하고, 알칼리에서는 분해속도가 증가한다.\n\n①. 유기인산염(organophosphates)\n②. 카바메이트(carbamates)\n③. 디페닐 지방족 화합물(diphenyl aliphatic compounds)\n④. 방향족 탄화수소(aryl hydrocarbons)\n⑤. 사이클로디엔 화합물(cyclodiene compounds)", "jokboAnswer": "①", "claudeAnswer": "**①**", "explanation": "1) **배경**: 교재 5장 p.44. parathion-paraoxon 쌍은 유기인산염의 대표.\n\n2) **포인트**: \"parathion→paraoxon 10배 + 산성 안정/알칼리 분해\"라는 두 단서가 유기인산염에만 해당.\n\n3) **정답 근거**: 유기인산염만 탈황화 대사를 통해 더 독한 oxon 대사산물을 만들며, 가수분해 특성(pH 의존성)도 일치.\n\n4) **오답 소거**: 카바메이트(②)는 AChE 가역 억제·oxon 대사 없음. ③④⑤는 유기염소계·방향족 계열로 AChE와 무관.\n\n5) **함정**: \"AChE 억제\"라는 공통점 때문에 카바메이트도 정답 같아 보이나, 10배 전환·산성 안정 등 추가 단서는 유기인산염 전용.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L01-history", "round": "2022-중간", "num": "32", "qid": "Q295", "body": "1950~1970년대 초반까지 농약으로 광범위하게 사용되어 오염 토양이나 쓰레기 처리장으로부터 지속적으로 누출되고 있으며, 자연계에 분해 기전이 거의 없어 호수바닥의 침전물 등 환경에 장기간 잔류하고 특히 매우 높은 지용성으로 생태계 먹이사슬의 상위 단계에 있는 동물 및 인간에 축적되어 내분비계 장애물질(endocrine disrupting chemicals, EDCs), 일명 환경 호르몬의 주종을 이루고 있는 약물은?\n\n①. 유기인산염(organophosphates)\n②. 피프로닐(fipronil)\n③. 피레스린(pyrethrins)\n④. 아미트라즈(amitraz)\n⑤. 유기염소계(organochlorines)", "jokboAnswer": "5", "claudeAnswer": "⑤ 유기염소계(organochlorines)", "explanation": "**1) 배경**. 이 문항은 환경호르몬·유기염소계 문항 **7문항 시리즈의 원형**이다(Q254·Q081·Q095·Q151·Q199와 동일 구조, 5지선다/4지선다/괄호완성으로만 변형). 문항 서술은 유기염소계의 4대 특성을 교과서 01장 원문 그대로 나열한 뒤 \"이 약물이 무엇인가\"를 묻는다.\n\n**2) 포인트**. 네 가지 진술이 모두 성립하는 유일한 농약 계열은 유기염소계다:\n- 1950~70년대 농약 광범위 사용 (DDT·Aldrin·Dieldrin 등)\n- 난분해성 → 호수 침전물 잔류\n- 지용성 → 먹이사슬 생물농축\n- EDCs 주종\n\n**3) 정답 근거**. 교과서 01장 p.3 + 강의안 lec-01 슬라이드 3~4 + lec-02 전체. 개념학습 Unit 1.7에 4대 특성 명시.\n\n**4) 오답 소거** (각 선지의 실제 특성 대비):\n- **① 유기인산염(organophosphates)** → 파라티온·말라티온 등 AChE(acetylcholinesterase) 저해 농약. 상대적으로 **분해가 빠르고 축적성 낮음**. \"잔류·생물농축·EDCs 주종\"에 해당하지 않음. L03·L05 범위에서 신경독성·SLUDGE 증상으로 자주 등장.\n- **② 피프로닐(fipronil)** → GABA 수용체 차단 살충제. 반려동물 외부기생충 제거에 쓰이나 지용성은 있어도 \"EDCs 주종\"은 아님.\n- **③ 피레스린(pyrethrins)** → 국화과 식물 추출 천연 살충제. **광분해성이 매우 빠르고** 포유류에 비교적 안전. \"난분해성\"과 정반대.\n- **④ 아미트라즈(amitraz)** → α2-아드레날린성 작용제, 진드기 구제제. EDCs 주종이 아님.\n\n**5) 함정**. ①과 ⑤는 이름이 비슷해 혼동 가능(유기인산염 vs 유기염소계). 핵심 구분: **\"인(P)\"이면 신경독성·분해 빠름·AChE, \"염소(Cl)\"이면 지용성·난분해·환경호르몬**. 시험 직전에 반드시 이 한 줄 매핑을 외워 두자.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L17-antidotes", "round": "2022-중간", "num": "45", "qid": "", "body": "에틸렌글리콜에 대한 설명이다. 빈칸에 알맞은 단어를 고르시오.\n\n( )은 2가 알코올 중 가장 간단한 형태의 화합물로서, 자동차에 쓰이는 부동액과 세정제로 쓰이며 약한 녹색을 띄고, 가장 빈번한 중독의 요인이 되고 있다. ( )중독증은 연중 일어나지만 부동액을 많이 교환하는 봄철에 더 많이 발생할 수 있다.\n\n① 에탄올  ② 에틸렌 글리콜  ③ 메탄올  ④ 이소프로필 알코올  ⑤ 에테르", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "본 문항은 \"2가 알코올 중 가장 간단한 화합물 + 부동액·세정제 + 약한 녹색\"이라는 세 가지 결정적 단서로 EG를 특정하는 빈칸 완성 문항이다. 교과서 08장 각론과 강의안 lec-17은 에틸렌 글리콜(EG, C₂H₆O₂)의 기본 특성을 \"2가 알코올 중 가장 간단한 형태, 자동차 부동액·세정제 원료, 약한 녹색, 단맛, 봄철 부동액 교환 시 중독 증가\"로 서술한다. 따라서 \"2가 알코올\"이라는 화학적 정의 하나만 잡아도 선지 중 EG(②) 외에는 모두 소거된다. 에탄올(①)과 메탄올(③)은 1가 알코올로 -OH기를 하나만 가지고 있고, 이소프로필 알코올(④)은 소독제로 쓰이는 2차 알코올이며, 에테르(⑤)는 C-O-C 구조의 휘발성 용매/마취제로 알코올이 아니다. 부동액의 색(약한 녹색)과 봄철 부동액 교환 시즌(겨울 후 부동액을 새것으로 바꾸면서 폐부동액이 유출) 맥락까지 얹어보면 EG가 유일한 답. 함정 요소는 \"1가/2가\" 구분을 놓칠 때 익숙한 에탄올·메탄올로 오인하는 것이다. 강의안 lec-17 EG 슬라이드가 이 설명과 동일 문구로 제시된다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L16-treatment", "round": "2022-중간", "num": "번호미상", "qid": "Q293", "body": "(본문 OCR 미복원)\n\n이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해·배설하지 못하고 메트헤모글로빈증(methemoglobinemia)으로 발전하는 중독의 위험이 매우 커서 사용을 금한다. 빈칸에 들어갈 것은?\n\n①. cyclooxygenase(COX)  ②. phosphodiesterase  ③. glucuronyl transferase  ④. cholinesterase  ⑤. acetylcholinesterase", "jokboAnswer": "미표기 (교과서 기준 ③)", "claudeAnswer": "③ (glucuronyl transferase)", "explanation": "**배경**: 고양이의 아세트아미노펜(AAP) 독성은 수의독성학 L16 / 교과서 07장의 대표 종 특이성(species-specific toxicity) 주제이다. 본 문항은 선천적으로 결핍된 phase II 포합 효소를 5지선다로 묻는 전형적인 빈칸 유형으로, [2022-중간] #30(Q292)과 동일 선지 세트·동일 답 구성의 반복 출제이다(OCR 미복원으로 번호·본문 일부 복원 불가).\n\n**핵심 포인트**: 고양이는 **glucuronyl transferase(UGT, 글루쿠론산 전이효소)** 활성이 선천적으로 매우 낮다(교과서 07장 / 강의안 lec-16 슬라이드 12). UGT는 UDP-glucuronic acid를 약물에 전이시켜 수용성 glucuronide로 만들어 배설하는 phase II 포합 효소. 이 경로가 차단되면 AAP가 CYP450을 통해 독성 대사체 **NAPQI**로 대사되고, glutathione(GSH)이 고갈되며 **간 괴사 + methemoglobinemia(MetHb) + Heinz body 빈혈**이 발생 → 저산소증·사망. 동일 UGT 결핍 기전은 salicylate 독성에도 적용된다.\n\n**정답 근거(③ glucuronyl transferase)**: 고양이가 AAP를 \"빨리 분해·배설하지 못하고\" methemoglobinemia로 발전한다는 서술은 phase II glucuronidation 결핍을 특정한 문장이다. 교과서 07장·강의안 lec-16 슬라이드 12에 \"고양이는 glucuronyl transferase 활성이 낮아 AAP를 포합 배설하지 못한다\"로 명시.\n\n**오답 소거**:\n- **① cyclooxygenase(COX)** — prostaglandin 합성 효소. NSAIDs의 표적이지만 고양이에서 결핍된 것이 아님. NSAIDs가 COX를 억제하는 것과 고양이가 AAP를 배설하지 못하는 것은 전혀 다른 이야기. 대표적 함정 선지.\n- **② phosphodiesterase** — cAMP·cGMP 분해 효소. methylxanthine(카페인·테오브로민) 독성과 관련(PDE 억제)이지만 UGT 결핍과 무관.\n- **④ cholinesterase** — acetylcholine 분해 효소. 유기인제·카바메이트 독성의 표적 효소로 AAP 대사와 무관.\n- **⑤ acetylcholinesterase** — cholinesterase의 한 종류. 역시 유기인제 독성 표적이며 UGT와 무관.\n\n**함정**: COX가 \"NSAIDs 관련 효소\"라는 연상으로 선택하기 쉬운 오답 1순위. NSAIDs의 약리학적 표적(COX)과 고양이의 대사 결핍(UGT)은 다른 층위이므로 혼동 금물. 또한 \"메트헤모글로빈증\"이라는 단어만 보고 혈액 관련 효소를 찾으려 하면 모두 무관 선지로 빠진다 — MetHb는 UGT 결핍 → NAPQI 축적 → 적혈구 손상의 **하류 결과**일 뿐이다.\n\nOCR 미복원으로 본 Q293의 문제 번호·본문 복원이 불완전하지만, ③번 위치가 glucuronyl transferase임은 [2022-기말] #32·[2023-기말] #34·[2024-기말] #32·[2025-기말] #31의 동일 선지 구조로 매년 연속 확인된다.", "tail": "", "scoreable": true, "correctIndices": [2]}]}}</script>

<script type="text/babel" data-type="module">
const { useState, useMemo, useEffect, useRef } = React;

const CIRCLED = "①②③④⑤⑥⑦⑧⑨⑩";
const CIRCLED_TO_IDX = Object.fromEntries([...CIRCLED].map((c, i) => [c, i]));

function parseAnswer(str) {
  if (!str) return new Set();
  const s = String(str);
  const found = new Set();
  for (const ch of s) {
    if (ch in CIRCLED_TO_IDX) found.add(CIRCLED_TO_IDX[ch]);
  }
  if (found.size > 0) return found;
  // Fallback: digits 1-9 (only if not preceded by non-answer context like page number)
  const digitMatches = s.match(/[①-⑨]|\b[1-9]\b/g);
  if (digitMatches) {
    for (const d of digitMatches) {
      if (d in CIRCLED_TO_IDX) found.add(CIRCLED_TO_IDX[d]);
      else {
        const n = parseInt(d, 10);
        if (n >= 1 && n <= 9) found.add(n - 1);
      }
    }
  }
  return found;
}

function setsEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const x of a) if (!b.has(x)) return false;
