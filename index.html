 → 독성 유발(b).", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "40", "qid": "Q039", "body": "다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증을 유발한다. 이와 같은 조혈세포의 파괴로 인하여 면역 기능을 담당하는 림프구 전구세포가 감소한다.\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.\n\n① TRAIL, Benzene\n② TCDD, Benzene\n③ Caspase, TRAIL\n④ Benzene, TCDD\n⑤ TCDD, Caspase", "jokboAnswer": "④", "claudeAnswer": "**④**", "explanation": "1) **배경**: [2024-중간] #40의 선지화 버전.\n\n2) **포인트·정답 근거**: 첫 빈칸=**Benzene**(골수독성·pancytopenia), 둘째 빈칸=**TCDD**(흉선 T세포·Ca²⁺ endonuclease). 순서대로 \"Benzene, TCDD\" = ④.\n\n3) **오답 소거**: TRAIL·Caspase는 세포사멸 기구로, 독성물질이 아님. ②처럼 순서 뒤집으면 오답.\n\n4) **함정**: TRAIL과 Caspase를 독성물질로 착각 — 둘 다 숙주 단백질임.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "27", "qid": "Q130", "body": "27. 외인성 물질대사에 관해 옳지 않은 것을 고르시오.\n\n①. 친수성 물질이나 분자량이 큰 물질은 대사를 통해 지용성 물질로 바뀌게 되는데 이는 흡수를 어렵고 배설을 용이하게 한다.\n②. 대사적 활성화는 독성 물질들 중 일부는 그 물질 자체(모물질)에 의하여 독성을 일으킬 수 있지만 많은 물질들은 생체 내 대사를 거침으로서 독성을 일으킬 수 있는 물질로 변환되는 것이다.\n③. 반응성 대사산물이란 대사적 활성화로 생성된 물질이다.\n④. 외인성 물질들은 bioinactivation이나 detoxification이 될 수 있다.\n⑤. 대사는 외인성 물질을 배설하고 덜 유해한 물질을 해독하는 방어기전이다.", "jokboAnswer": "미표기", "claudeAnswer": "**①**", "explanation": "1) **배경**: 강의안 lec-07(chunk 3, 슬라이드 4)은 \"대사의 목적 = 신장에서 재흡수되지 않고 배설되도록 **수용성(극성, 이온화) 물질로 변환**\"이라 명시.\n\n2) **포인트**: 대사의 방향성 — **지용성→수용성**이 맞는데 선지 ①은 반대로 서술.\n\n3) **정답 근거**: \"친수성을 지용성으로\"는 완전히 뒤집힌 방향. 실제로는 지용성 모물질 → 수용성 대사산물 → 담즙·소변 배설.\n\n4) **오답 소거**: ②③④⑤는 강의안 개념 그대로.\n\n5) **함정**: \"흡수 어렵게·배설 용이하게\"라는 결과 부분은 맞아서 선지 전체가 맞아 보이게 만드는 구조 — 방향성이 틀리면 전체가 오류.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "28", "qid": "Q131", "body": "28. 반응성 대사산물에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. 친전자성 물질은 체액이나 세포내 친핵성 물질과 포함되어 비활성화되며 가장 많은 친핵성 또는 해독 분자는 핵산이다.\nb. 친핵성 물질은 상대편 분자의 친전자성 물질과 반응하며 생체 내에서 단백질, 지질, 핵산, GHS 등이 친핵성 물질이다.\nc. 자유기는 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다.\nd. 산화-환원적 스트레스를 일으키는 것은 생체에서 비교적 쉽게 환원될 수 있는 분자 산소(O₂)이다.\ne. 정상적으로 CO(Carbon Oxide)는 근육과 혈관에서 신호 분자이지만, 독성학으로는 산화적 스트레스의 주요 요소이다.\n\n①. a, b, e\n②. a, e\n③. b, d, e\n④. a, b, d, e\n⑤. b, e", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "1) **배경**: [2022-중간] #19와 유사 구조. e의 \"CO\" 함정이 추가.\n\n2) **포인트**: 두 고정 함정 — ①\"가장 많은 해독 분자=핵산\"(X, 물), e\"신호 분자=CO\"(X, NO).\n\n3) **정답 근거**:\n   - a(**틀림**): 가장 많은 친핵·해독 분자는 **물**.\n   - b(맞음): 친핵성 물질 열거 ○.\n   - c·d(맞음).\n   - e(**틀림**): 근육·혈관의 신호 분자는 **NO(nitric oxide)** — CO가 아님. 강의안 lec-07 chunk 7 슬라이드 1.\n\n4) **오답 소거**: a·e만 틀리므로 ②.\n\n5) **함정**: CO와 NO는 둘 다 작은 기체 분자라 혼동 유발. **CO = 독성(Hb 결합), NO = 생리 신호**로 구분.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "29", "qid": "Q132", "body": "29. 반응성 대사산물을 생성하는 아래의 물질들에 대한 설명 중 틀린 것은?\n\n> (body OCR 미완성 — 이하 내용 잘림)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가** (본문 미복원)", "explanation": "[2022-중간] #20, [2025-중간] #29·#30과 동일 유형. 핵심 오답 후보: Paraquat=간독성(X, 폐), 전이금속=1·2상 반응(X, Fenton), Benzene=HO·(X, O₂⁻), 대식세포 ONOO⁻(○), 장내 세균총 NO₃⁻→NO₂⁻(○). 선지 복원 후 해당 항목 대조.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "32", "qid": "Q136", "body": "32. 보기 중 틀린 선지로만 이루어진 것을 고르시오.\n\na. 독성물질과 분자 간의 결합에는 비공유결합과 공유결합이 존재하고, 수소 분리, 전자 전이, 효소 반응 등이 있다.\nb. 독성물질과 분자 간의 비공유결합은 강하고 비가역적이다.\nc. 독성물질과 분자의 비공유결합은 가역적이다.\nd. 독성물질은 단백질, 지질, 핵산, 친핵성 물질인 세포내 thiols(GSH)를 표적으로 하고, 특히 단백질은 친핵성 물질의 공격에 주요 표적이 된다.\ne. 소량의 친핵성 물질이 DNA와의 공유결합할 수 있으며, DNA가 알킬화되는 경우 발암을 일으킬 수 있다.\nf. 수용성 화합물은 배설되기 어려우므로 생체내 대사를 거쳐 배설되기 쉬운 화합물로 바뀌어야 한다.\n\n①. a, c, e\n②. a, d, f\n③. b, c, f\n④. b, d, e, f\n⑤. 모두 틀림", "jokboAnswer": "④", "claudeAnswer": "**④**", "explanation": "1) **배경**: 강의안 lec-07 chunk 5. 친전자·친핵 개념과 결합 양상 종합 점검.\n\n2) **포인트**: 4개의 공통 혼동 — 결합 강도·표적 분자·DNA 공격자·배설 성향.\n\n3) **정답 근거**:\n   - b(**틀림**): 비공유결합 = 약·가역. 강·비가역은 **공유**결합.\n   - d(**틀림**): 단백질은 **친전자성** 물질의 표적 (단백질이 친핵성이기 때문).\n   - e(**틀림**): DNA와 공유결합 → 알킬화 → 발암은 **친전자성** 물질.\n   - f(**틀림**): 배설 어려운 것은 **지용성(친지성)**. 수용성은 배설 쉬움.\n   - a·c(맞음).\n\n4) **오답 소거**: 틀린 4개 모두 포함 = ④.\n\n5) **함정**: d에서 \"친핵성 물질\"이라 써놓고 주체-객체를 뒤집음. \"단백질 = 친핵성 표적\" = \"**친전자성** 물질이 공격\"이 맞음.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "33", "qid": "Q137", "body": "33. 산화적 스트레스 방어계의 종류와 물질을 알맞게 짝지은 것은?\n\na. GSH\nb. SOD\nc. Catalase\nd. Metallothionein\n\nㄱ. 비효소적 자유기 포착자. 산화된 단백질의 sulfhydryl기를 환원.\nㄴ. 구리와 아연 이온 의존성 효소. O₂⁻를 H₂O₂로 전환을 촉매함.\nㄷ. 과산화소체에 고농도로 존재. H₂O₂를 H₂O로 전환을 촉매함.\nㄹ. 아연, cadmium 등을 투여하면 급속히 출현하는 금속 결합 단백질로, 중금속을 격리.\n\n①. a-ㄷ, b-ㄹ, c-ㄱ, d-ㄹ\n②. a-ㄴ, b-ㄴ, c-ㄹ, d-ㄷ\n③. a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ\n④. a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ\n⑤. a-ㄴ, b-ㄴ, c-ㄷ, d-ㄹ", "jokboAnswer": "⑤", "claudeAnswer": "**올바른 매칭 = a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ** (선지에 이 조합 없음 — **문항 오류**)", "explanation": "1) **배경**: 교재 5장 p.36-37. 방어계 4인방 매칭은 기본 중 기본이나, 선지 구성에서 착오가 발생한 출제.\n\n2) **포인트**: 족보 정답 ⑤는 \"a-ㄴ\"(GSH=Cu·Zn 효소)로 잘못 연결 → 해설 자체와 모순.\n\n3) **정답 근거**: 올바른 매칭은 a-ㄱ(GSH=비효소적 sulfhydryl 환원), b-ㄴ(SOD=Cu/Zn), c-ㄷ(Catalase=과산화소체), d-ㄹ(Metallothionein=금속 격리). 선지에 이 조합이 없음.\n\n4) **오답 소거**: 모든 선지가 오류를 포함하므로 정답 선지 없음.\n\n5) **함정**: \"족보는 ⑤로 표기되었으나 강의안·교재 근거로는 선지 오류. 각 방어계 역할을 정확히 외워야 함\". 실전에서 선지 오류 확인 시 a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ 매칭만 암기.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "34", "qid": "Q138", "body": "34. 세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작의 올바른 순서는?\n\na. 지방산으로부터 생성된 지질 자유기는 산소 분자와 쉽게 반응하여 세포막 지질 손상의 증폭 및 확산을 유도\nb. 직접적인 독성 유발\nc. 외인성 물질에 의해 자유기 생성\nd. aldehyde가 단백질이나 DNA와 공유결합하여 산화적 손상\ne. 지방산으로부터 수소를 분리하여 지질 자유기(L·)가 생성되어 지질과산화가 시작\nf. 유독한 aldehyde가 생성\n\n①. c→e→f→a→d→b\n②. c→e→a→f→d→b\n③. d→c→a→f→e→b\n④. e→f→a→c→d→b\n⑤. d→c→e→a→f→b", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "1) **배경**: 교재 5장 p.38 지질과산화. [2022-중간] #25, [2025-중간] #34·#36과 동일 문항.\n\n2) **포인트**: c로 시작·b로 끝 + e(L·)→a(LOO·)→f(aldehyde)→d(공유결합).\n\n3) **정답 근거**: c(자유기 생성)→e(L· 개시)→a(LOO· 확산)→f(aldehyde 생성)→d(DNA·단백질 공유결합)→b(독성) = ②.\n\n4) **오답 소거**: ①은 f와 a 순서 뒤바뀜. ③④⑤는 시작점이 틀림.\n\n5) **함정**: ①이 ②와 비슷해 보이지만 f·a 순서 교체 — **L·+O₂→LOO·(a) 먼저, aldehyde(f)는 나중**.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "40", "qid": "Q143", "body": "40. 다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증(Pancytopenia)를 유발한다. ...\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.", "jokboAnswer": "미표기", "claudeAnswer": "**첫 번째 = Benzene / 두 번째 = TCDD**", "explanation": "1) **배경**: 교재 5장 p.38(면역 억제) 원문 그대로 출제.\n\n2) **포인트**: 두 빈칸이 서로 다른 물질 — 혼동 금지.\n\n3) **정답 근거**:\n   - Benzene: CYP→hydroquinone→myeloperoxidase→quinoid→ROS→골수 원조세포→pancytopenia. 이 체인은 오직 Benzene.\n   - TCDD: \"가장 강력한 면역억제 독성물질\" + 흉선 T세포 분화 억제 + Ca²⁺ 의존성 endonuclease 활성화. 이 체인은 오직 TCDD.\n\n4) **오답 소거**: Caspase는 세포사멸 실행효소(독성물질 아님), TRAIL은 세포사멸 ligand, Paraquat·CO는 해당 기전 없음.\n\n5) **함정**: [2025-중간] #40에서 동일 지문이 선지화됨 — ④ \"Benzene, TCDD\" 순서 고정.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "47", "qid": "Q150", "body": "47. 유기인산염, 카바메이트에 대한 아래 설명 중 틀린 것을 모두 고른 것은?\n\na. 유기인산염은 아세틸콜린에스터레이스를 가역적으로 억제시켜 독성을 증가시킨다.\nb. 카바메이트는 아세틸콜린에스터레이스를 비가역적으로 억제시켜 독성을 증가시킨다.\nc. 카바메이트는 농약, 해충 퇴치 목걸이로 쓰여 광범위한 중독원이다.\nd. 카바메이트는 파리, 개미 등 미끼의 주성분으로 쓰여 광범위한 중독원이 존재한다.\ne. 파라옥손이 파라티온으로 전환되면 10배 이상의 높은 독성이 발현된다.\n\n①. abc\n②. abcd\n③. abde\n④. acd\n⑤. abe", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: [2023-기말] #40과 **완전 동일**한 선지 구성으로 재출제. [2025-기말] #36에서도 반복.\n\n2) **포인트·정답 근거**: a(유기인산염=비가역이 맞음, 가역은 틀림), b(카바메이트=가역이 맞음, 비가역은 틀림), c·d(맞음), e(방향 반대, 파라티온→파라옥손이 맞음). 틀린 것 = a, b, e → ⑤.\n\n3) **오답 소거**:\n   - a(**틀림**): \"유기인산염 = AChE 가역 억제\"는 반대. 교과서 5장 p.44 — \"형성된 phosphate ester는 매우 느리게 파괴됨으로 AChE는 불활성화된 형태로 남게 된다\" = **비가역** 억제가 정답.\n   - b(**틀림**): \"카바메이트 = AChE 비가역 억제\"는 반대. 카바메이트는 **가역적**으로 carbamylation 후 스스로 가수분해되어 AChE가 회복됨.\n   - c(맞음): 카바메이트는 농약·해충 퇴치 목걸이(예: 고양이 벼룩 목걸이)로 광범위 사용. 맞는 설명이라 소거 대상 아님.\n   - d(맞음): 카바메이트는 파리·개미 미끼(bait) 주성분으로 쓰임. 맞는 설명이라 소거 대상 아님.\n   - e(**틀림**): 방향이 반대. **파라티온 → 파라옥손**이 10배 독성 증가 방향. \"파라옥손 → 파라티온\"은 존재하지 않는 역반응.\n   → 틀린 것 a·b·e를 모두 포함하는 선지는 ⑤ abe.\n\n4) **함정**: 선지에 a·b·e 외에 c·d가 섞여 들어간 조합(①abc, ②abcd, ③abde, ④acd)에 속지 말 것. c·d는 카바메이트의 **실제 용도**를 서술한 정답 문장이므로 \"틀린 것\"에 포함시키면 안 된다. 또 e는 파라티온·파라옥손의 이름이 모두 나오므로 방향성(P=S → P=O)을 놓치면 맞는 설명으로 착각하기 쉽다.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "N", "qid": "Q133", "body": "> (본문 OCR 미완성 — 문항 번호 N, 반응성 대사산물 생성물질 관련 추정)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가** (본문 미복원)", "explanation": "[2022-중간] #20, [2025-중간] #29·#30 계열. 3대 고정 함정 — ①Paraquat→폐독성(간 X), ②전이금속→Fenton(1·2상 X), ③신호분자=NO(CO X). 선지 공개되면 즉답 가능.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-기말", "num": "35", "qid": "Q190", "body": "35. 알코올과 글리콜에 대한 내용으로 맞지 않는 것은?\n\na. 애완동물의 알코올 중독증의 주요원인은 에탄올 및 이소프로필 알코올이다.\nb. 에탄올은 직접적인 발암제이다.\nc. 개와 고양이의 메탄올 독성은 사람에 비해서 높다.\nd. 사람에서 눈 신경을 손상시킴으로서 영구적인 실명을 초래한다.\ne. 비영장류에서는 포름산을 효율적으로 배설시키기 때문에 실명과 뇌 괴사를 잘 일으키지 않는다.", "jokboAnswer": "미표기", "claudeAnswer": "**b, c** (단일 정답 요구 시 **b**)", "explanation": "1) **배경**: [2022-기말] #39과 유사하나 선지 구성이 조금 다름. 복수 정답 가능성.\n\n2) **포인트**: 3가지 고정 함정 — 에탄올 직접 발암(X), 개/고양이 메탄올 감수성 (X, 낮음), 비영장류 포름산 처리 (○).\n\n3) **정답 근거**:\n   - b(**틀림**): 에탄올 = 간접 기여, 직접 발암제 아님.\n   - c(**틀림**): 개·고양이 메탄올 독성은 사람보다 **낮음**.\n   - a·d·e(맞음).\n\n4) **오답 소거**: a, d, e 모두 강의안·교재 서술과 일치.\n\n5) **함정**: \"개·고양이 독성 ↑\"라고 쓰면 동물 임상 감각상 맞아 보이지만, 메탄올만은 예외 — 비영장류가 포름산을 잘 배설한다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2023-기말", "num": "40", "qid": "Q256", "body": "유기인산염, 카바메이트에 대한 아래 설명 중 틀린 것을 모두 고른 것은?\n\na. 유기인산염은 아세틸콜린에스터레이스를 가역적으로 억제시켜 독성을 증가시킨다.\nb. 카바메이트는 아세틸콜린에스터레이스를 비가역적으로 억제시켜 독성을 증가시킨다.\nc. 카바메이트는 농약, 해충 퇴치 목걸이로 쓰여, 광범위한 중독원이다.\nd. 카바메이트는 파리, 개미 등 미끼의 주성분으로 쓰여 광범위한 중독원이 존재한다.\ne. 파라옥손이 파라티온으로 전환되면 10배 이상의 높은 독성이 발현된다.\n\n①. abc\n②. abcd\n③. abde\n④. acd\n⑤. abe", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: 이 문항 형식은 [2024-중간] #47, [2025-기말] #36까지 **거의 같은 선지 세트**로 3회 반복 출제된 \"대표 자주 나오는 AChE 억제제 5지선다\".\n\n2) **포인트**: (비)가역 방향과 parathion↔paraoxon 화살표 방향 두 축.\n\n3) **정답 근거**:\n   - a(**틀림**): 유기인산염 = AChE **비가역** 억제.\n   - b(**틀림**): 카바메이트 = AChE **가역** 억제.\n   - c·d(맞음): 카바메이트의 실생활 노출 경로 ○.\n   - e(**틀림**): 방향이 **반대**. 정답은 \"**파라티온 → 파라옥손**\".\n\n4) **오답 소거**: 정답 ⑤(a,b,e)가 틀린 선지 3개를 모두 포함.\n\n5) **함정**: a·b는 쌍으로 한 번에 외우고, e는 화살표 방향만 체크하면 즉답 가능.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L06-mechanism-1-2", "round": "2023-기말", "num": "44", "qid": "Q260", "body": "알코올과 글리콜에 대한 내용으로 틀린 것을 모두 고르시오.\n\n> (body OCR 미완성 — 선지 일부 수집 안 됨)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가** (선지 미복원)", "explanation": "[2022-기말] #39·[2024-기말] #35·[2025-기말] #40과 동일 계열. 핵심 오답 포인트 — 에탄올=직접 발암제(X, 간접), 개/고양이 메탄올 독성(X, 사람보다 낮음), 비영장류 포름산 처리 불능(X, 효율적으로 처리), 에틸렌 글리콜 특성(부동액·녹색·옥살산 신장독성). 선지 복원되면 이 기준으로 판정.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "1", "qid": "Q261", "body": "1. 용량 개념으로 볼 때 약리학은 노출량, 독성학은 투여량의 개념으로 볼 수 있다.\n\n① 약리학은 합리적으로 계획하고 자발적으로 투여한다.\n② 독성물질의 경우 우발적으로 의식하지 못하고 노출된다.\n③ 약리학과 독성학은 분포, 대사, 배설, 용량반응관계 등 유사점이 많다.\n④ 약리학은 독성학의 한 분야이다.\n⑤ 약리학과 독성학은 서로 다른 학문이다.", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: 강의안 lec-07 슬라이드 2(chunk 1)에서 \"약리학과 독성학은 동전의 양면처럼 연속선상\"이라 명시.\n\n2) **포인트**: \"서로 다른 학문이다\"라는 극단적 진술의 오류를 잡아내는 문항.\n\n3) **정답 근거**: 두 학문은 대사·분포·배설·용량반응 등 방법론을 공유하며 용량·의도의 차이만 있음 → \"서로 다름\"은 오류.\n\n4) **오답 소거**: ①약리학=계획적, ②독성학=우발적, ③공통점 많음 모두 강의안 서술과 일치. ④\"약리학이 독성학의 한 분야\"도 어색하지만 ⑤가 가장 명확한 오답.\n\n5) **함정**: 지문에서 \"노출량·투여량 개념이 다르다\"고 언급하여 학문이 별개인 것처럼 유도 — 사실은 **연속선상**.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "19", "qid": "Q282", "body": "19. 반응성 대사산물에 대한 설명 중 틀린 것을 고르시오.\n\n①. 친전자성 물질은 체액이나 세포내 친핵성 물질과 포합되어 비활성화되며 가장 많은 친핵성 또는 해독 분자는 핵산이다.\n②. 친핵성 물질은 상대편 분자의 친전자성 물질과 반응하며 생체 내에서 단백질, 지질, 핵산, GHS 등이 친핵성 물질이다.\n③. 자유기는 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다.\n④. 산화-환원적 스트레스를 일으키는 것은 생체에서 비교적 쉽게 환원될 수 있는 분자 산소(O₂)이다.\n⑤. 정상적으로 NO(Nitric Oxide)는 근육과 혈관에서 신호 분자이지만, 독성학으로는 산화적 스트레스의 주요 요소이다.", "jokboAnswer": "②", "claudeAnswer": "**①**", "explanation": "1) **배경**: ⚠️ 족보 정답 ②는 오류. 강의안 lec-07(chunk 5, 슬라이드 3)은 \"가장 많은 친핵성 또는 해독 분자는 **물(water)**\"이라 명시.\n\n2) **포인트**: \"가장 많은 친핵성/해독 분자\"라는 표현 → 단일 정답 = **물**. 핵산이 아님.\n\n3) **정답 근거**: ①의 \"핵산\"은 틀림. 정답은 ①.\n\n4) **오답 소거**: ②의 \"단백질·지질·핵산·GSH = 친핵성\" 자체는 맞는 설명(족보 오답 처리된 것). ③·④·⑤ 모두 강의안 서술과 일치.\n\n5) **함정**: 족보에서 \"핵산\" 문구가 매 회차 반복되며 **정답 지문으로 위장**. \"물\" 한 단어만 기억하면 즉답 가능.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "20", "qid": "Q283", "body": "20. 반응성 대사산물을 생성하는 아래의 물질들에 대한 설명 중 틀린 것 2개를 모두 고르시오.\n\n①. 대식세포에서는 ONOO⁻를 형성한 다음 NO₂와 HO·를 생성하기 때문에 대식세포는 RNS 생성의 중요한 경로가 된다.\n②. paraquat는 산화-환원 순환(redox cycling)을 거쳐 O₂⁻를 생성시켜 선택적인 **간독성**(부종)을 일으키기 쉽다.\n③. 장내 세균총은 질산염(NO₃)을 아질산염(NO₂)으로 환원시켜 독성이 더욱 강한 물질로 된다.\n④. 전이 금속들은 제1상과 제2상 반응을 촉진시켜 HO·을 생성하도록 한다.\n⑤. Benzene과 quinone들도 산화-환원 순환을 거쳐 O₂⁻를 생성하는 대표적인 물질이다.", "jokboAnswer": "②④", "claudeAnswer": "**②④**", "explanation": "1) **배경**: 이 문항 형식은 [2024-중간] #29·#33, [2025-중간] #29·#30으로 반복 출제되는 \"반응성 대사산물 생성물질 5선지 틀린 것 찾기\"의 원조 패턴.\n\n2) **포인트**: 두 고정 함정 — \"Paraquat=간독성\", \"전이금속=1·2상 반응\"을 모두 잡아내기.\n\n3) **정답 근거**:\n   - ② **틀림**: Paraquat는 **폐독성**(alveolar type I·II) — 강의안 lec-07 chunk 3.\n   - ④ **틀림**: 전이 금속은 **Fenton 반응**(Fe²⁺+H₂O₂→Fe³⁺+HO·)으로 HO· 생성. 1·2상 반응과 무관. 강의안 lec-07 chunk 5 슬라이드 4.\n\n4) **오답 소거(옳은 선지)**: ① 대식세포 RNS 경로 옳음. ③ 장내 세균총 NO₃⁻→NO₂⁻ 전환 옳음. ⑤ Benzene·quinone → O₂⁻ 옳음.\n\n5) **함정**: Paraquat \"부종\"이라는 표현이 익숙해서 간 부종으로 착각하기 쉬우나, 폐부종이 맞다.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "25", "qid": "Q287", "body": "25. 세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작의 올바른 순서는?\n\n> (Q286과 동일 문항, 중복 수집된 항목)", "jokboAnswer": "미표기 (원본 해설 없음)", "claudeAnswer": "**c→e→a→f→d→b** ([2024-중간] #34, [2025-중간] #34·#36 기준 ②)", "explanation": "1) **배경**: 교재 5장 p.38(지질과산화). 6단계가 그대로 문제화되는 고빈출 문항.\n\n2) **포인트**: 시작(c)·끝(b)을 먼저 고정하고 중간을 채우는 전략.\n\n3) **정답 근거**:\n   - c: 외인성 물질 → 자유기 생성 (방아쇠)\n   - e: 지방산 H 분리 → **L·** 생성 = initiation\n   - a: L· + O₂ → LOO· → 확산·증폭 = propagation\n   - f: 유독 **aldehyde**(MDA·4-HNE) 생성\n   - d: aldehyde가 DNA·단백질과 공유결합 → 산화적 손상\n   - b: 직접적 독성 유발 (최종 결과)\n\n4) **오답 소거**: d·e·f로 시작하는 순서는 모두 오답 — 개시 없이 종결 단계가 앞설 수 없음.\n\n5) **함정**: e(L·)와 a(LOO·)의 순서 혼동. \"수소 분리 → L·\" → \"L· + O₂ → LOO·\"로 L·이 먼저.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2022-중간", "num": "31", "qid": "Q294", "body": "이 물질은 아세틸콜린에스터레이스(acetylcholinesterase) 억제력을 높여 독성을 크게 증가시킨다. 예를 들어, 파라티온(parathion)이 파라옥손(paraoxon)으로 전환되면 10배 이상의 높은 독성이 발현된다. 보통 산성 토양에서는 안정성이 증가하고, 알칼리에서는 분해속도가 증가한다.\n\n①. 유기인산염(organophosphates)\n②. 카바메이트(carbamates)\n③. 디페닐 지방족 화합물(diphenyl aliphatic compounds)\n④. 방향족 탄화수소(aryl hydrocarbons)\n⑤. 사이클로디엔 화합물(cyclodiene compounds)", "jokboAnswer": "①", "claudeAnswer": "**①**", "explanation": "1) **배경**: 교재 5장 p.44. parathion-paraoxon 쌍은 유기인산염의 대표.\n\n2) **포인트**: \"parathion→paraoxon 10배 + 산성 안정/알칼리 분해\"라는 두 단서가 유기인산염에만 해당.\n\n3) **정답 근거**: 유기인산염만 탈황화 대사를 통해 더 독한 oxon 대사산물을 만들며, 가수분해 특성(pH 의존성)도 일치.\n\n4) **오답 소거**: 카바메이트(②)는 AChE 가역 억제·oxon 대사 없음. ③④⑤는 유기염소계·방향족 계열로 AChE와 무관.\n\n5) **함정**: \"AChE 억제\"라는 공통점 때문에 카바메이트도 정답 같아 보이나, 10배 전환·산성 안정 등 추가 단서는 유기인산염 전용.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2022-기말", "num": "39", "qid": "Q335", "body": "알코올과 글리콜에 대한 내용으로 맞지 않는 것은?\n\na. 애완동물의 알코올 중독증의 주요원인은 에탄올 및 이소프로필 알코올이다.\nb. 에탄올은 직접적인 발암제이다.\nc. 개와 고양이의 메탄올 독성은 사람에 비해서 높다.\nd. 사람에서 눈 신경을 손상시킴으로서 영구적인 실명을 초래한다.\ne. 비영장류에서는 포름산을 효율적으로 배설시키기 때문에 실명과 뇌 괴사를 잘 일으키지 않는다.\n\n①. a, b, c, d\n②. b, c, d, e\n③. b, c, d\n④. c, d, e\n⑤. b, d, e", "jokboAnswer": "⑤", "claudeAnswer": "**③ (b, c, d)** — ⚠️ 단 d는 맞는 설명이어서 실제로 틀린 것은 b, c만 확실. 선지 구성을 보면 \"b+c만 포함\"한 선지가 없어 **문항 오류**. 가장 많은 틀린 개수를 포함하는 ③이 의도한 정답에 가까움. 족보 ⑤는 c를 포함하지 않아 부적절.", "explanation": "1) **배경**: 교재 5장 p.36 알코올·글리콜 단원.\n\n2) **포인트**: 5개 선지를 개별 참/거짓 판단.\n\n3) **정답 근거**:\n   - a(맞음): 에탄올·이소프로필이 애완동물 주요 원인 ○.\n   - b(**틀림**): 에탄올은 **직접 발암제 아님** (간접 기여).\n   - c(**틀림**): 개·고양이 메탄올 독성은 사람보다 **낮음** (비영장류=포름산 처리).\n   - d(맞음): 메탄올 → 포름산 → 시신경 → 실명 ○.\n   - e(맞음): 비영장류 = 포름산 효율 처리 → 실명/뇌괴사 드묾 ○.\n\n4) **오답 소거**: 족보 ⑤(b,d,e)는 d·e를 틀린 것으로 표기했으나 둘 다 맞는 설명이라 부적절.\n\n5) **함정**: 족보 정답 오류. \"족보는 ⑤지만 강의안 근거로 b·c만 확실히 틀림 → ③이 의도에 가까움\"을 기억.", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "2", "qid": "Q338", "body": "> (본문 OCR 미완성 — 해당 시험의 원본 body가 수집되지 않았습니다.)\n> topic: Paraquat 산화-환원 순환", "jokboAnswer": "미표기", "claudeAnswer": "Paraquat (파라쿼트)", "explanation": "강의안 lec-07 슬라이드(chunk 3, Step 1-5) 및 교과서 5장 참고. Paraquat는 흡수 후 일차통과효과 시 폐포(alveolar type I·II 세포)에 선택적으로 고농도 축적된다. 세포 내에서 NADPH-cytochrome P450 reductase에 의해 환원형 자유기(PQ⁺·)로 대사적 활성화되고, 이 자유기가 분자 O₂에 전자를 공여하여 O₂⁻(superoxide anion radical)를 생성하는 산화-환원 순환(redox cycling)을 무한 반복한다. 이 과정에서 세포 내 NADPH가 급격히 고갈되고, SOD에 의해 O₂⁻ → H₂O₂, Fenton 반응으로 OH·가 생성되어 폐조직 손상(부종)과 폐섬유증을 유발한다. 선택적 폐독성이 핵심 — 간독성이 아님.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "9", "qid": "Q345", "body": "간세포 무게의 약 20% 정도를 구성하며 친전자성 물질의 주요 표적 물질은?", "jokboAnswer": "단백질", "claudeAnswer": "단백질", "explanation": "교과서 5장 p.34, \"간세포는 무게의 약 20% 정도가 단백질로 구성되어 있기 때문에 단백질을 표적으로 하는 독성물질은 간독성 반응을 잘 나타낼 수 있다\"고 명시되어 있다. 독성물질의 표적 분자는 단백질(효소), 지질, 핵산, 친핵성 물질인 세포 내 thiols(GSH) 등이며, 그 중 단백질은 친전자성 물질의 공격에 주요 표적이 된다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "26", "qid": "Q362", "body": "많은 물질들은 생체 내 대사를 거침으로서 독성을 일으킬 수 있는 물질로 변환된다. 이러한 과정을 ( )라 하며, 이로 인하여 생성된 물질을 ( )이라고 한다.", "jokboAnswer": "대사적 활성화, 반응성 대사산물", "claudeAnswer": "대사적 활성화(metabolic activation), 반응성 대사산물(reactive metabolites)", "explanation": "강의안 lec-07 슬라이드(chunk 4, 슬라이드 3): \"대사적 활성화(Metabolic activation): 생체 내 대사를 거쳐 생물학적 활성이 높은 물질로 변환되는 과정. (생성된 물질 = 반응성 대사산물)\". 외인성 물질이 대사를 통해 독성이 더 강한 물질로 전환되는 과정이 대사적 활성화이며, 이 과정에서 생성된 물질이 반응성 대사산물이다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "27", "qid": "Q363", "body": "산화-환원적 스트레스를 일으키는 것은 궁극적으로는 분자 산소(O₂)이다. 그 이유는 O₂는 생체에서 비교적 쉽게 환원될 수 있기 때문인데 이들 산소 중간산물의 전체 영어 명과 그 종류 3가지는?", "jokboAnswer": "superoxide anion radical, hydrogen peroxide, hydroxyl radical", "claudeAnswer": "AOS(Active Oxygen Species, 활성 산소종) — 3종류: superoxide anion radical(O₂⁻), hydrogen peroxide(H₂O₂), hydroxyl radical(HO·)", "explanation": "강의안 lec-07 슬라이드(chunk 6, 슬라이드 2): \"ROS (Reactive Oxygen Species) 종류: 과산소 음이온 자유기(O₂·), 수산 자유기(HO·), 일중항 산소(¹O₂), 과산화수소(H₂O₂).\" 강의에서 환원 캐스케이드: O₂ → O₂⁻ → H₂O₂ → HO· → H₂O로 설명. AOS의 영어 전체 명칭은 Active Oxygen Species (또는 Reactive Oxygen Species, ROS).", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "32", "qid": "Q368", "body": "RNA 합성에 대한 선택적인 억제제이며, DNA에 존재하는 두 개의 연속적인 G=C 염기쌍 사이에 삽입되어 DNA의 주형을 변형시킴으로써 주형을 따라 이동하는 RNA 중합효소의 움직임을 차단하여 RNA합성 즉, 전사를 억제하는 대표적인 물질 두 가지는?", "jokboAnswer": "actinomycin D, acridine", "claudeAnswer": "actinomycin D, acridine", "explanation": "교과서 5장(핵산 및 단백질 합성 장애) 내용. Actinomycin D와 acridine은 DNA에 두 개의 연속적인 G=C 염기쌍 사이에 삽입(intercalation)되어 RNA 중합효소의 이동을 물리적으로 차단함으로써 전사(transcription)를 억제하는 대표적인 RNA 합성 선택적 억제제이다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "35", "qid": "Q371", "body": "( )은 CYP에 의하여 hydroquinone으로 되고 이것은 골수에 많이 존재하는 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시킨다. 이로 인해 골수에서 많은 조혈세포의 파괴로 인해 면역 기능을 결정하는 림프구 전구세포(T 및 B 세포)가 감소시키고 결과적으로 범혈구감소증(pancytopenia)을 유발시킨다.", "jokboAnswer": "Benzene", "claudeAnswer": "Benzene", "explanation": "교과서 5장 p.38(면역 억제): \"Benzene은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증(pancytopenia)을 유발한다. 이와 같은 전반적인 조혈세포의 파괴로 인하여 면역 기능을 담당하는 림프구 전구세포(T 및 B세포)가 감소한다.\" (교과서 원문 그대로)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "46", "qid": "Q382", "body": "( )는 구리와 아연 이온 의존성 효소로 일반적으로 세포질 및 사립체에서 O₂⁻을 H₂O₂로 전환을 촉매함으로써 더욱 반응성이 큰 자유기의 생성을 억제한다.", "jokboAnswer": "SOD (Superoxide dismutase)", "claudeAnswer": "SOD (Superoxide dismutase, 과산화물 제거효소)", "explanation": "교과서 5장 p.36(산화적 스트레스 방어계): \"SOD는 구리와 아연 이온 의존성 효소로 일반적으로 세포질 및 미토콘드리아에서 O₂⁻을 H₂O₂로 전환을 촉매한다.\" 족보에서 '사립체(mitochondria)'라고 표기된 것이 교과서에서는 '미토콘드리아'이며 동의어이므로 정답은 동일. SOD는 O₂⁻를 H₂O₂로 변환하여 더 반응성이 큰 HO·의 생성을 억제하는 핵심 항산화 효소이다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "55", "qid": "Q391", "body": "세포의 물과 결합하여 매우 활성이 큰 자유기를 생성하여 다양한 세포 구성요소를 손상시키는 것은?", "jokboAnswer": "방사능", "claudeAnswer": "방사능(방사선, radiation)", "explanation": "교과서 5장 p.34: \"방사능은 물과 결합하여 매우 활성이 큰 자유기를 생성하여 다양한 세포 구성요소를 손상시킬 수 있어서 결과적으로 정도에 따라 다양한 세포의 죽음, 세포 기능부전과 정상 분화의 이상(암)을 초래한다.\" 방사선이 세포 내 물과 반응하여 HO·를 생성하는 방사선 분해(radiolysis) 기전이다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "57", "qid": "Q393", "body": "대부분의 독성물질은 분자량이 작아서 항원으로서 역할을 하지 못하지만 ( )를 형성하여 림프구를 자극하고 이것에 의해 보체단백질이 유리되어 이것들이 세포 표면을 손상시키고 괴사, 세포융해, 비만세포에서 histamine 유리, 백혈구의 식균작용 촉진, 그리고 평활근을 수축시킨다.", "jokboAnswer": "독성물질-단백질 결합체", "claudeAnswer": "독성물질-단백질 결합체(합텐, hapten)", "explanation": "교과서 5장 p.45(면역반응): \"대부분의 독성물질은 분자량이 작아서 항원으로서 역할을 하지 못한다. 내인성 단백질과 결합하여 항원(독성물질-단백질 결합체)을 생성한다. 이 항원이 림프구를 자극하여 항체를 생성하고... 보체단백질이 유리되어 세포 표면을 손상시키고 괴사, 세포융해, 비만세포에서 histamine 유리, 백혈구의 식균작용 촉진, 평활근 수축을 일으킨다.\" 소분자 독성물질이 단백질과 결합해야 비로소 면역계에 의해 인식되는 합텐(hapten) 기전.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "61", "qid": "Q397", "body": "생체 내 신경전달물질인 아세틸콜린(Ach)의 분해를 억제함으로써 생체 내에 Ach이 축적시키고, 따라서 각종 기관의 무스카린성 및 니코틴성 수용체와 중추의 Ach 수용체를 과다하게 자극함으로써 관련기관과 중추신경계의 비정상적인 자극증상을 나타나게 하는 대표적인 유기인제 물질은?", "jokboAnswer": "parathion", "claudeAnswer": "parathion(파라티온)", "explanation": "교과서 5장 p.44(효소 불활성화): \"유기인계 살충제인 parathion은 대사에 의한 탈황화(desulfuration)로 더욱 독성이 강한 반응성 대사산물인 paraoxon(친전자성 인 함유)으로 된다. 이 활성물질이 AChE의 serine hydroxyl기를 공격하여 효소와 paraoxon이 공유결합을 한다... 따라서 생체 내 신경전달물질인 acetylcholine의 분해가 억제됨으로써 생체 내에 acetylcholine이 축적되어 각종 기관의 무스카린성 및 니코틴성 수용체와 중추의 acetylcholine 수용체가 과다하게 자극됨으로써 관련기관 및 중추신경 자극 증상을 나타낸다.\" (교과서 원문 거의 동일)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "68", "qid": "Q404", "body": "대사에 의하여 생성된 여러 자유기와 활성 산소종들에 의하여 지방산으로부터 수소를 분리하여 ( )가 생성되어 지질과산화가 시작된다.", "jokboAnswer": "지질자유기", "claudeAnswer": "지질 자유기(lipid radical, L·)", "explanation": "교과서 5장 p.38(지질과산화, 개시 단계): \"여러 자유기와 활성 산소종(ROS)들에 의하여 지방산으로부터 지질 자유기(L·)가 생성되어 지질과산화가 시작된다.\" 이것이 지질과산화의 개시(initiation) 단계이며, 이 L·이 O₂와 반응하여 LOO·(lipid peroxyl radical)를 형성하고 확산(propagation) 단계로 이어진다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "72", "qid": "Q408", "body": "생체 내 신경전달물질은 Ach의 분해를 억제함으로써 생체내에 Ach이 축적되고, 따라서 각종 기관의 무스카린성 및 니코틴성 수용체와 중추의 Ach 수용체를 과다하게 자극함으로써 관련기관과 중추신경계 비정상적인 자극증상을 나타내는 유기인제 물질은? (이 물질이 AChE를 억제하는 것보다 10배 더 강하게 억제하는 대사산물은?)\n\n> (body 일부 잘림 — 후반부 복원)", "jokboAnswer": "미표기", "claudeAnswer": "유기인제 물질 = parathion / 대사산물 = paraoxon", "explanation": "교과서 5장 p.44: \"parathion은 대사에 의한 탈황화로 더욱 독성이 강한 paraoxon으로 된다... 이렇게 형성된 phosphate ester는 매우 느리게 파괴됨으로 AChE는 불활성화된 형태로 남게 된다.\" Q294(2022-mid #31): \"파라티온(parathion)이 파라옥손(paraoxon)으로 전환되면 10배 이상의 높은 독성이 발현된다.\" 유기인산염은 AChE를 비가역적으로 억제하고, parathion → paraoxon 전환 시 독성 10배 증가.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "73", "qid": "Q410", "body": "세포 상에 거의 존재하지 않으나 생체에 아연, cadmium 등을 투여하면 간장이나 신장에 급속히 출현하는 금속결합 단백질은?", "jokboAnswer": "metallothionein", "claudeAnswer": "metallothionein(메탈로티오네인)", "explanation": "교과서 5장 p.37(산화적 스트레스 방어계): \"Metallothionein은 세포상에 거의 존재하지 않으나 생체에 아연, cadmium 등을 투여하면 간장이나 신장에 급속히 출현하는 금속결합 단백질이다... 이것은 중금속을 격리시킴으로써 단백질이나 GSH thiol의 산화를 억제한다.\" (교과서 원문과 동일) 강의안 lec-07 슬라이드(chunk 5, 슬라이드 1)에서도 \"Metallothionein에 의한 포획\"이 친전자성 물질 해독 기전 중 하나로 언급됨.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "75", "qid": "Q412", "body": "( )는 반감기가 매우 짧아(10⁻⁹초) 항산화제가 도달할 시간이 없고 효소에 의한 제거가 어렵기 때문에 이 전구물질인 H₂O₂를 물로 환원시켜 ( ) 억제하는 것이 유일한 방법이다. 또한 O₂⁻는 더욱 반응성이 큰 ( )기 때문에 생체 내 방어 기전에 의하여 제거되어야 한다.", "jokboAnswer": "hydroxyl radical", "claudeAnswer": "첫 번째 빈칸 = hydroxyl radical(HO·) / 두 번째 빈칸 = (HO· 생성을) / 세 번째 빈칸 = HO·(로 될 수 있음)", "explanation": "교과서 5장 p.36(SOD 이후 HO· 설명): \"HO⁻은 반감기가 매우 짧아(10⁻⁹초) 항산화제가 도달할 시간이 없고 효소에 의한 제거가 어렵기 때문에 이 전구물질인 H₂O₂를 물로 환원시켜 HO⁻의 생성을 억제하는 것이 해독의 유일한 방법이다. 많은 원인에 의하여 생성된 O₂⁻은 더욱 반응성이 큰 HO⁻로 될 수 있으므로 이는 생체 내 방어 기전에 의하여 제거되어야 한다.\" (교과서 원문)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2021-기말", "num": "100", "qid": "Q437", "body": "자유기는 짝을 짓지 않은 활성 전자를 가지고 있기 때문에 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다. 이러한 자유기의 대표적인 두 가지는?", "jokboAnswer": "AOS, ANS", "claudeAnswer": "AOS (Active Oxygen Species, 활성 산소종), ANS (Active Nitrogen Species, 활성 질소종)", "explanation": "강의안 lec-07 슬라이드(chunk 6): \"ROS (Reactive Oxygen Species) 종류: 과산소 음이온 자유기(O₂·), 수산 자유기(HO·), 일중항 산소(¹O₂), 과산화수소(H₂O₂).\" 강의에서 AOS와 ANS(= ROS와 RNS)를 자유기의 두 대표 계열로 분류. AOS = Active Oxygen Species(산소계 자유기), ANS = Active Nitrogen Species(질소계 자유기, RNS).", "tail": "", "scoreable": false, "correctIndices": []}]}, "L08-mechanism-3": {"lecture": "L08-mechanism-3", "title": "독성기전 3", "slug": "mechanism-3", "questions": [{"lecture": "L08-mechanism-3", "round": "2025-중간", "num": "31", "qid": "", "body": "아래의 독성물질과 표적 분자가 잘못 짝지어진 것을 고르시오.\n\n① aflatoxin - DNA 아데닌\n② 복어독 tetratoxin - acetylcholine esterase\n③ CO - 적혈구의 혈색소\n④ 사염화탄소 - 막지질\n⑤ 유기인계 - 나트륨 통로", "jokboAnswer": "3", "claudeAnswer": "강의자료 기준 실제로는 ①, ②, ⑤가 모두 틀리나, 족보 원본 채점 기준상 ③", "explanation": "본 문항은 **출제 오류 가능성이 높은 문항**이다. 교재발췌 라인 451~478 기준으로 선지를 객관적으로 판정하면:\n\n- ① **틀림** — Aflatoxin 표적은 **DNA의 guanine**(특히 N-7 위치)이다. \"아데닌\"이 아니다(교재발췌 라인 479~481).\n- ② **틀림** — TTX 표적은 **막전위 의존성 Na⁺ 통로**. AChE가 아니다.\n- ③ **옳음** — CO → Hb → COHb → 산소 공급 억제. 정확한 매칭.\n- ④ **옳음** — CCl4 → 자유기 → 세포막 지질과산화. 정확한 매칭.\n- ⑤ **틀림** — 유기인계 표적은 **AChE**. Na⁺ 통로는 TTX 표적.\n\n즉 강의자료 기준으로는 **①, ②, ⑤가 잘못 짝지어진 것**이고, ③은 정확히 옳은 매칭이다. 그런데 족보 정답이 ③으로 표기되어 있어 **발문(\"잘못 짝지어진 것을 고르시오\")과 모순**된다. 세 가지 가능성이 있다.\n\n(1) 족보 채점 정답 기록 오류 — 실제 정답은 ①, ②, ⑤ 다중 정답이었는데 기록만 ③으로 잘못 남았을 수 있다.\n(2) 출제자의 의도적 출제 오류 — 출제자가 \"혈색소는 적혈구가 아니라 다른 곳\"이라 오판한 경우(그러나 교과서·강의안과 상충).\n(3) 원본 시험에서 별도 공지가 있었을 가능성 — 실제 시험에서 정답 변경 또는 모두 정답 처리되었을 수 있다.\n\n**시험 전략**: 실제 시험에서 유사 유형이 나오면 **강의자료 기준(①②⑤ 틀림)** 으로 답해야 한다. Q135(2024-mid #31)와 내용이 거의 동일하며, 거기서는 \"a, b, d, e\" 네 개 모두 정답 처리되었다. Q030도 다중 정답(①②⑤)이 교재 기준 정답일 가능성이 높다.\n\n함정 요소는 발문을 읽지 않고 반사적으로 답하는 경우다. 항상 **5쌍 매칭**(Aflatoxin=DNA guanine, TTX=Na⁺ 통로, CO=Hb, CCl4=막지질, 유기인계=AChE)을 체크리스트로 돌려 **모든 선지를 판정**한 뒤 답해야 한다.\n\n근거: 교재발췌 라인 451~481, 강의안 lec-08 슬라이드 5~7.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2, 4]}, {"lecture": "L08-mechanism-3", "round": "2025-중간", "num": "38", "qid": "", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고르시오.\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.", "jokboAnswer": "c, d, e", "claudeAnswer": "c, d, e", "explanation": "[2024-중간] #38(Q142)와 **선지 a~f가 완전히 동일**한 문항이다. 선지 묶음 형식만 제거하고 \"모두 고르시오\"로 바뀌었을 뿐 판정 로직은 같다.\n\n**옳은 서술 (혈색소가 산화 표적인 이유)**:\n- a 옳음 — 적혈구는 혈액에 분포된 외래물질에 쉽게 노출됨.\n- b 옳음 — 적혈구는 핵·세포질세망이 없어 손상 단백질을 새로 합성해 대치할 수 없음.\n- f 옳음 — 혈색소 내 산소가 자동산화(autoxidation)를 촉진하는 원인.\n\n**틀린 서술 (산화 손상의 구체 형태)**:\n- c **틀림** — 변성된 globin이 적혈구 세포막에 이중결합한 것은 **Heinz body**다. Howell-Jolly body는 적혈구 내 잔류 핵 DNA로 완전히 다른 것. 핵이 있는 세포(적혈모구)에서 핵이 제거되는 과정의 잔재물.\n- d **틀림** — 산화 방향이 정반대. 독성물질은 정상 **Fe²⁺**(산소 결합형)를 **Fe³⁺**(MetHb)로 산화시킨다. 선지의 \"Fe³⁺→Fe²⁺\"는 환원이며 독성 기전과 반대.\n- e **틀림** — α·β-글로빈 사슬 시스테인 잔기의 산화는 **disulfide(S-S) 결합**을 형성. ester 결합은 산-알코올 결합으로 무관.\n\n정답: c, d, e.\n\n함정 요소는 Q142와 동일한 세 가지다. (1) Heinz ↔ Howell-Jolly 이름 유사성 함정, (2) Fe 산화 방향 역서술 함정, (3) disulfide ↔ ester 결합 종류 바꿔치기 함정. 2024와 2025에 연속 출제되었다는 점이 **최고 출제 가능성 신호**다. **\"Heinz / Fe²⁺→Fe³⁺(MetHb) / disulfide\"** 세 키워드를 반드시 체화할 것.\n\n근거: 교과서 05장 \"단백질 산화적 손상\" 소절, 강의안 lec-08 슬라이드 (혈색소 산화).", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L08-mechanism-3", "round": "2025-중간", "num": "39", "qid": "", "body": "표적세포 또는 기관의 수용체에 결합하여 효과를 나타내는 외인성 물질에 대한 용어와 설명이 올바르게 짝지어진 것은?\n[그림: 표적세포 또는 기관의 수용체에 결합하여 효과를 나타내는 외인성 물질에 대한 용어와 설명]\n\n① ㄱ-ㄴ-ㄷ-ㄹ\n② ㄱ-ㄷ-ㄴ-ㄹ\n③ ㄴ-ㄱ-ㄷ-ㄹ\n④ ㄴ-ㄱ-ㄹ-ㄷ\n⑤ ㄹ-ㄱ-ㄴ-ㄷ", "jokboAnswer": "①", "claudeAnswer": "① (그림 OCR 미복원으로 ㄱ·ㄴ·ㄷ·ㄹ의 구체 내용 확인 불가, 족보 원본 정답 수용)", "explanation": "본 문항은 **그림 기반 매칭 문항**이라 족보 OCR에서 ㄱ·ㄴ·ㄷ·ㄹ 라벨의 구체 용어와 설명이 복원되지 않았다. 따라서 각 선지의 구체 근거를 완전 복원해 해설하기는 어렵다. 다만 이 문항이 묻는 **핵심 개념(수용체 결합 외인성 물질 4종 분류)** 은 반드시 암기해야 할 내용이다.\n\n교재발췌 \"3. 독성물질과 표적과의 반응\" 비공유 결합 항목에서 수용체 결합 외인성 물질을 네 범주로 분류한다.\n\n1. **효현제(agonist)**: 수용체와 결합하여 내인성 물질(호르몬·신경전달물질 등)과 **같은 방향**의 작용을 유발. 완전 활성화.\n2. **부분 효현제(partial agonist)**: 수용체와 결합해 활성화하지만, 내인성 물질보다 **약한** 작용만 유발. 최대 반응 도달 불가.\n3. **길항제(antagonist)**: 수용체와 결합하지만 활성화하지 않고 단지 내인성 물질의 결합을 **차단**하여 효과를 억제.\n4. **역효현제(inverse agonist)**: 수용체와 결합하여 내인성 물질과 **반대 방향**의 작용을 유발. 기저 활성마저 낮춘다.\n\n그림 문항에서 라벨 ㄱ·ㄴ·ㄷ·ㄹ은 위 네 용어에 대응되며, 각각 \"같은 방향 작용 유발 / 약한 작용 / 차단 / 반대 방향 작용\"의 설명과 짝을 맞춰야 한다. 족보 정답 ①의 순서가 ㄱ-ㄴ-ㄷ-ㄹ 순서이므로, 시험지 그림의 배치 순서가 위 네 용어의 전형적 순서(효현제→부분효현제→길항제→역효현제)와 일치했을 가능성이 높다.\n\n함정 요소는 네 용어의 정의를 혼동하는 경우다. 특히 **길항제**(차단, 활성화 ×)와 **역효현제**(반대 방향 활성화)는 둘 다 \"내인성 물질을 억제\"하는 것처럼 보이지만, 역효현제는 여전히 활성화 작용을 갖는다는 점이 결정적으로 다르다. 또한 **효현제**와 **부분 효현제**는 모두 활성화하지만 반응 크기에서 차이가 있다.\n\n그림 OCR 미완성으로 선지별 상세 복원은 불가하므로 족보 정답 ①을 수용하되, 실제 시험에서 유사 그림이 나오면 **네 용어의 정의-방향성-강도**를 기준으로 즉시 매칭할 수 있도록 준비할 것.\n\n근거: 교재발췌 \"3. 독성물질과 표적과의 반응\" 비공유 결합 항목, 강의안 lec-08 슬라이드 11~14 (수용체 결합 용어).", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L08-mechanism-3", "round": "2024-중간", "num": "31", "qid": "", "body": "아래의 독성물질과 표적분자가 잘못 짝지어진 것을 고르시오.\n\na. aflatoxin - 지질\nb. 복어독 tetratoxin(TTX) - acetylcholine esterase\nc. CO - 적혈구의 혈색소(Hb)\nd. 사염화탄소 - DNA 구아닌\ne. 유기인계 - Na⁺ 통로", "jokboAnswer": "a, b, d, e", "claudeAnswer": "a, b, d, e", "explanation": "L08 최다 출제 유형의 정석 문항으로, 5개 선지 중 **4개가 틀리는** 극단적 함정 구조다. 교재발췌 라인 451~478이 판정 기준이다.\n\n선지별 판정:\n- a **틀림** — Aflatoxin 표적은 **DNA의 guanine**(특히 N-7 위치). 지질이 아니다. \"aflatoxin은 DNA의 guanine에 결합하여 DNA 주형을 변화시킴으로써 전사 장애 및 유전정보 복제 이상을 초래한다\"(교재발췌 라인 479~481).\n- b **틀림** — TTX 표적은 **막전위 의존성 Na⁺ 통로**. AChE가 아니다. AChE 억제는 유기인계의 기전(교재발췌 라인 457~462, 468~470).\n- c 옳음 — CO → Hb → COHb → 산소 공급 억제(교재발췌 라인 451~455).\n- d **틀림** — CCl4 표적은 **세포막 지질**. DNA 구아닌이 아니다. \"Carbon tetrachloride는 자유기를 생성시킴으로써 지질에 작용하여 지질과산화를 일으키기 때문에 그 표적 분자는 세포막 지질이다\"(교재발췌 라인 462~465).\n- e **틀림** — 유기인계 표적은 **AChE**. Na⁺ 통로가 아니다. Na⁺ 통로는 TTX 표적(교재발췌 라인 468~470).\n\n배경 포인트는 **b와 e가 서로 바꿔치기 쌍**이라는 점이다. TTX의 표적을 AChE로, 유기인계 표적을 Na⁺ 통로로 서로 맞바꿔 배치했다. 그리고 **a와 d도 바꿔치기 쌍**이다. Aflatoxin을 지질로(실제는 DNA guanine), CCl4를 DNA 구아닌으로(실제는 막지질). 이 네 가지 바꿔치기를 한 번에 잡아내려면 **정답 매칭 5쌍을 암기**한 상태에서 체크리스트를 돌려야 한다.\n\n함정 요소는 발문이 **\"잘못 짝지어진 것을 고르시오\"** 인데 정답이 4개나 된다는 극단성이다. \"하나만 고르면 되겠지\" 하고 a만 골라 답하면 틀린다. 다중 정답 발문일 가능성을 항상 염두에 둬야 한다.\n\n근거: 교재발췌 라인 451~481, 강의안 lec-08 슬라이드 5~7.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L08-mechanism-3", "round": "2024-중간", "num": "38", "qid": "", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고른 것은?\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.\n\n①. a, b, c, d, e  ②. a, c, d  ③. b, d, f  ④. c, d, e  ⑤. c, e, f", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e가 틀림)", "explanation": "6개 서술 중 틀린 것만 골라 묶은 선지 세트에서 맞는 조합을 찾는 구조다. 교과서 05장 \"단백질 산화적 손상\" 소절이 근거다.\n\n**혈색소가 왜 산화 표적인가**(a, b, f = 옳음):\n- a 옳음 — \"고농도 외래물질이 혈액에 분포되어 있어 적혈구는 쉽게 외래물질에 노출될 수 있다\".\n- b 옳음 — \"적혈구는 핵과 세포질세망을 가지고 있지 못함으로써 새롭게 합성된 단백질로 손상된 단백질을 대치할 수 없다\".\n- f 옳음 — 혈색소 내 산소가 자동산화(autoxidation, Fe²⁺→Fe³⁺)를 촉진하는 이유가 됨.\n\n**산화 손상의 구체 형태**(c, d, e 중 어느 것이 맞는가):\n- c **틀림** — 변성된 혈색소(globin)가 적혈구 세포막에 이중결합한 것은 **Heinz body**다. **Howell-Jolly body**는 적혈구 내에 남은 **잔류 핵물질(DNA)** 로 완전히 다른 개념이다. 이름이 비슷해서 헷갈리지만 형성 물질부터 다르다.\n- d **틀림** — 산화 방향이 **정반대**다. 정상 Hb의 Fe는 **Fe²⁺**(산소 결합 가능 상태)이며, 독성물질에 의해 **Fe³⁺로 산화**되어 **MetHb**(메트헤모글로빈)를 형성하면 산소 운반이 불가능해진다. 선지의 \"Fe³⁺→Fe²⁺\"는 환원 방향이라 실제 독성 기전과 반대.\n- e **틀림** — α·β-글로빈 사슬의 시스테인 잔기가 산화되면 **disulfide(S-S) 결합**을 형성한다. **ester 결합**은 산-알코올 결합으로 완전히 다른 화학 반응.\n\n따라서 틀린 것은 **c, d, e** 세 개 → 정답 ④.\n\n함정 요소 세 가지가 연속 배치된 고난도 문항이다. (1) Heinz ↔ Howell-Jolly 이름 유사성, (2) Fe 산화 방향 뒤집기, (3) disulfide ↔ ester 결합 종류 바꿔치기. 세 함정을 모두 놓치지 않으려면 **\"Heinz/Fe²⁺→Fe³⁺/disulfide\"** 세 키워드를 묶어 암기해야 한다. 2025-mid #38에서 동일 선지가 그대로 재출제되었다는 점에서 매년 출제 가능성이 높다.\n\n근거: 교과서 05장 \"단백질 산화적 손상\" 소절, 강의안 lec-08 슬라이드 (혈색소 산화 슬라이드).", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L08-mechanism-3", "round": "2023-기말", "num": "37", "qid": "", "body": "다음 문장이 설명하는 것을 고르시오.\n아세틸콜린 에스터레이즈를 비가역적으로 억제하여 독성을 크게 늘렸다. 살서제로 사용된 살충제의 섭취 등 부적절한 사용으로 개와 고양이에서 중독을 초래한다. 죽은 동물의 위 내에서 고농도로 저류되는데, 근육보다는 내장 섭취로 인한 2차 중독이 빈번히 일어난다. 보통 산성토양에선 안정성이 증가하고, 알칼리에선 분해 속도가 증가한다.\n\n①. 디페닐 지방족 화합물\n②. 유기인산염\n③. 방향족 탄화수소\n④. 사이클로디엔 화합물\n⑤. 이버멕틴", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "서술 중심 식별 문항으로 네 가지 특징을 동시에 만족하는 화합물군을 골라야 한다. 특징 분해:\n\n(1) **\"AChE 비가역 억제\"** — 교재발췌 §7(라인 1478~1523) 근거. AChE serine -OH에 phosphate ester 공유결합을 형성하는 것은 유기인계(organophosphates)의 결정적 특성이다. 카바메이트는 가역 억제이므로 제외.\n(2) **\"내장 섭취로 인한 2차 중독\"** — 유기인계는 지용성으로 내장 조직에 축적되어 육식동물·청소동물에 2차 중독을 일으키는 전형적 사례.\n(3) **\"산성토양 안정성 증가·알칼리 분해 가속\"** — 유기인계의 화학적 안정성 특성으로, 농약 각론에서 반복 서술되는 특징.\n(4) **\"살서제·살충제\"** — 유기인계는 대표적 살충제 계열.\n\n선지별 판정:\n- ① **틀림** — 디페닐 지방족 화합물은 **유기염소계(DDT 계열)** 의 분류어다. DDT는 Na⁺ 통로에 작용하는 신경독성을 보이며 AChE와 무관.\n- ② **옳음** — 네 특징을 모두 만족.\n- ③ **틀림** — 방향족 탄화수소는 PAHs 계열로 DNA adduct(구아닌 N-2)를 형성하는 발암물질. AChE 억제와 무관.\n- ④ **틀림** — 사이클로디엔 화합물(dieldrin·aldrin·chlordane)은 **유기염소계** 하위 분류로, GABA 수용체 차단이 주 기전. AChE와 무관.\n- ⑤ **틀림** — Ivermectin은 **GABA 수용체 효능제**(무척추동물의 glutamate-gated Cl⁻ 통로 주작용). AChE와 무관하며 오히려 치료용.\n\n함정 요소는 \"AChE 비가역\"만 읽고 반사적으로 답을 고르는 게 아니라, **네 특징이 모두 유기인계에 해당함**을 확인해야 한다는 점이다. 특히 ①③④는 유기염소계 혹은 PAH 계열의 하위 분류어라 혼동될 수 있다.\n\n근거: 교재발췌 §7 \"효소 불활성화\" 라인 1478~1523, 강의안 lec-08 슬라이드 18.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L08-mechanism-3", "round": "2022-중간", "num": "22", "qid": "", "body": "아래의 독성 물질과 표적분자가 잘못 짝지어진 것 2개를 모두 고르시오.\n\n①. CO - 적혈구의 혈색소(Hb)\n②. 복어독인 tetradotoxin(TTX) - (OCR 미복원)\n③. 사염화탄소 - 지질\n④. 유기인제 살충제 - (OCR 미복원)", "jokboAnswer": "2, 4", "claudeAnswer": "②, ④", "explanation": "독성물질과 표적 분자의 매칭에서 틀린 두 개를 고르는 문항이다. 교재발췌 라인 451~478의 다섯 쌍(CO-Hb, TTX-Na⁺ 통로, CCl4-막지질, Aflatoxin-DNA guanine, 유기인계-AChE)이 판단 기준이다. OCR 미복원 부분이 있지만 족보 정답이 ②, ④임을 감안하면 원본에서 이 두 선지가 TTX와 유기인제의 표적을 서로 **바꿔치기**했을 가능성이 가장 높다.\n\n선지별 판정:\n- ① 옳음 — CO는 적혈구 혈색소(Hb)와 결합하여 COHb를 생성하고 산소 운반을 방해한다. 정확한 표적(교재발췌 라인 451~455).\n- ② 틀림 — TTX의 올바른 표적은 **막전위 의존성 Na⁺ 통로**(교재발췌 라인 457~462)이다. 원문에서 OCR로 복원되지 않은 부분에 \"AChE\" 같은 오답이 제시되었을 것으로 추정된다. TTX↔유기인계 표적 바꿔치기 함정은 L08에서 가장 빈번한 출제 패턴이다.\n- ③ 옳음 — CCl4는 자유기(CCl3·)를 생성해 세포막 지질에 작용하고 지질과산화를 일으킨다(교재발췌 라인 462~465).\n- ④ 틀림 — 유기인계 살충제의 올바른 표적은 **AChE(acetylcholinesterase)** 이다(교재발췌 라인 468~470). OCR 미복원 부분에 \"Na⁺ 통로\" 같은 오답이 있었을 것으로 추정된다.\n\n함정 요소는 원문 OCR 손실이지만, 해답 구조는 명확하다. TTX와 유기인계 표적을 서로 바꿔 제시하는 것이 거의 고정된 함정 형식이며, Q135(2024-mid #31), Q030(2025-mid #31)에서도 정확히 동일 구조로 반복된다.\n\n근거: 교재발췌 라인 451~478, 강의안 lec-08 슬라이드 5~7.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L08-mechanism-3", "round": "2022-기말", "num": "35", "qid": "", "body": "다음 중 틀린 내용을 모두 고르시오.\n\n①. 유기인산염은 아세틸콜린에스터레이스를 가역적으로 억제시켜 독성을 증가시킨다.\n②. 카바메이트는 아세틸콜린에스터레이스를 비가역적으로 억제시켜 독성을 증가시킨다.\n③. 파라옥손이 파라티온으로 전환되면 10배 이상의 높은 독성이 발현된다.\n④. 카바메이트는 농약, 해충 퇴치 목걸이로 쓰여, 광범위한 독성을 발현한다.\n⑤. 카바메이트는 파리, 개미 등 미끼의 주성분으로 쓰여서 광범위한 중독원이 존재한다.", "jokboAnswer": "1, 2, 3", "claudeAnswer": "①, ②, ③", "explanation": "\"틀린 것을 모두\" 고르는 문항으로 각 선지를 개별 판정해야 한다. 교재발췌 §7 \"효소 불활성화\"(라인 1478~1523)가 핵심 근거다.\n\n배경: 유기인계 살충제와 카바메이트는 둘 다 **AChE 억제제**로 작용해 ACh 축적을 유발한다는 점에서 같다. 그러나 결합의 성질이 결정적으로 다르다. 유기인계(parathion·paraoxon 등)는 AChE serine -OH에 **phosphate ester 공유결합**을 형성하고 가수분해가 매우 느려 **비가역** 억제가 된다. 카바메이트는 카바모일화 후 **자발적 가수분해**로 효소가 재활성화되므로 **가역** 억제다. 활성화 방향도 중요하다. 유기인계 모화합물 **parathion(P=S)** 이 CYP450에 의해 **탈황화(desulfuration)** 되어 **paraoxon(P=O)** 이 되면 친전자성이 극대화되어 독성이 약 10배 증가한다.\n\n선지별 판정:\n- ① **틀림** — 유기인산염은 AChE를 **비가역적**으로 억제한다(교재발췌 라인 1508~1518: \"이 결합은 매우 안정적이고 변성된 효소는 쉽게 가수분해되지 않는다\"). \"가역적\"은 정반대 서술.\n- ② **틀림** — 카바메이트는 AChE를 **가역적**으로 억제한다. \"비가역적\"은 정반대 서술. ①과 ②가 서로 가역성을 맞바꾼 쌍둥이 함정.\n- ③ **틀림** — 활성화 방향이 정반대다. **파라티온(P=S) → 파라옥손(P=O)** 방향으로 전환되어야 독성이 10배 증가한다(교재발췌 라인 1511~1513: \"parathion은 대사에 의한 탈황화(desulfuration)로 더욱 독성이 강한 반응성 대사산물인 paraoxon으로 된다\"). 선지의 \"파라옥손 → 파라티온\"은 **역방향**.\n- ④ 옳음 — 카바메이트는 농약·외부기생충 목걸이 등 다양한 제품에 쓰여 광범위한 중독원이 된다.\n- ⑤ 옳음 — 카바메이트는 파리·개미 미끼의 주성분으로 사용된다.\n\n함정 요소는 **쌍둥이 가역성 함정(①②)** 과 **역방향 활성화 함정(③)** 이다. 유기인계의 \"비가역\"과 탈황화 방향은 절대 외워둬야 하는 지점으로, L04 대사활성화 단원과 결합한 교차 지식이다.\n\n근거: 교재발췌 §7 \"효소 불활성화\" 라인 1478~1523, 강의안 lec-08 슬라이드 18~19 (AChE 억제 기전).", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}]}, "L09-mechanism-4-1-3": {"lecture": "L09-mechanism-4-1-3", "title": "독성기전 4-1·3", "slug": "mechanism-4-1-3", "questions": [{"lecture": "L09-mechanism-4-1-3", "round": "2025-mid", "num": "35", "qid": "", "body": "다음 중 MD에 관한 설명으로 틀린 것은?\n\n①. 사립체 내부에 카디오리핀은 높은 친화성을 가지고 있어 많은 독성물질이 내막에 축적된다.\n②. 사립체 내막은 높은 양전하성 막전압을 띄고 있어 음전하를 띤 독성물질이 투과되어 축적된다.\n③. 사립체 투과성 전이 소공이 독성 물질에 의해 열림으로써 사립체가 손상된다.\n④. 효소는 외인성 물질과 상호작용할 수 있는 높은 선택성을 가지고 있기 때문에 효소의 기능 변동에 의한 결과는 선택적이고 예측 가능한 독성효과이다.\n⑤. 괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상이다.", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "본 문항은 **[2022-mid] #26과 사실상 동일한 반복 출제**이다. 문두 \"MD\"는 문맥상 **Mitochondrial Damage(사립체 손상)**의 약자로, 선지는 카디오리핀·막전압·MPTP·효소 선택성·괴사를 ①~⑤에 그대로 다시 배치했다. [2022-mid] #26 해설을 그대로 적용하면 된다.\n\n- **① 옳음** — Cardiolipin과 독성물질의 높은 친화성으로 내막 축적. 교재 p.54 §4.6 직접 서술.\n\n- **② 틀림 (정답)** — 사립체 내막은 **음전하성** 막전압을 띤다. 따라서 **양전하** 독성물질이 끌려 들어간다. 본 선지는 부호를 정반대로 뒤집었다. 교재 p.54: \"내측이 높은 **음전하성** 막전압... **양전하**를 띄는 독성물질이 투과될 수 있다.\"\n\n- **③ 옳음** — MPTP 개구 → 사립체 손상. 교재 p.54 명시.\n\n- **④ 옳음** — 효소 선택성 → 예측 가능 독성효과. 교재 §4.2 일치.\n\n- **⑤ 옳음** — 괴사 = ATP 비의존·급성·치명적. 교재 §4.9 일치.\n\n함정 요소: **문두 \"MD\"를 못 알아보면 당황**할 수 있다. 본문 내용이 모두 사립체 관련임을 확인한 뒤 \"Mitochondrial Damage\"로 해석하면 된다. 또한 [2022-mid] #26과 선지가 **한 글자 수준까지 거의 동일**하다는 점이 핵심 — 족보를 풀어본 학생은 곧바로 ②를 고를 수 있다. 출제자가 **3년 연속 동일 함정**을 유지하고 있으므로 이번 중간고사에도 동일 구조(막전압 부호 역전)가 재등장할 확률이 매우 높다.\n\n**근거 위치**: 교재 p.54 \"6. 에너지 생산 장애\" 사립체 내막 전압·cardiolipin·MPTP 단락 + §4.2 효소 선택성 + §4.9 괴사 정의.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L09-mechanism-4-1-3", "round": "2025-mid", "num": "37", "qid": "", "body": "다음 설명 중 틀린 것은?\n\n①. DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자에 매우 민감하다.\n②. DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\n③. 어떤 독성물질도 RNA 중합효소 I, II, III를 억제하여 mRNA 합성에 영향을 미칠 수 없다.\n④. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 종양을 일으킬 수 있다.\n⑤. Sulfur 함유 아미노산인 Serine, Threonine은 산화에 특히 민감하다.", "jokboAnswer": "③", "claudeAnswer": "**③** (⑤도 명백히 틀리지만 채점 기준은 ③)", "explanation": "이 문항은 [2024-mid] #37(다중선택형)을 **단일 정답형으로 변형**한 문항이다. a·b 선지를 올바른 방향(α 민감·β 저항)으로 고쳐 옳게 만든 반면, RNA 중합효소 억제 여부를 전면 부정문으로 바꿔 정답 오답으로 세웠다.\n\n- **① 옳음** — 교재 p.52 §4.5: \"DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다.\" [2024-mid] #37의 a·b에서 역전됐던 방향이 원래대로 복원됨. 정확.\n\n- **② 옳음** — 교재 p.52 §4.5: \"DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\" 정확.\n\n- **③ 틀림 (정답)** — \"**어떤 독성물질도** RNA 중합효소를 억제할 수 없다\"는 **전면 부정문**은 교재 서술과 정면으로 충돌. 교재 p.52~53 §4.5 3): \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다.\" 또한 **actinomycin D**(G=C 염기쌍 사이 삽입으로 전사 차단, 포유동물에서 저용량은 rRNA·고용량은 mRNA 영향), **acridine**(전사 저해), **α-amanitin**(버섯독, I·II·III 모두 억제), **rifampin**(RNA pol 결합) 등 대표 억제제가 다수 교재에 명시되어 있다. 따라서 \"어떤 독성물질도\" 억제할 수 없다는 진술은 명백한 오답.\n\n- **④ 옳음** — 교재 p.52 §4.5: \"DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이, 결국 종양을 일으킬 수 있다.\" 본 선지는 \"돌연변이\"만 빼고 서술했으나 나머지 세 결과(세포자멸사·괴사·종양)가 정확해 옳은 선지로 분류.\n\n- **⑤ 틀림 (채점 외 오답)** — Sulfur 함유 아미노산은 **Cysteine·Methionine**이지 Serine·Threonine이 아니다. Ser·Thr은 hydroxyl기 함유 AA. [2024-mid] #37의 f와 동일한 오답이며 이름과 분류가 이중으로 모순된다. **이 선지도 틀리지만 채점 기준은 ③**으로 확정된다 — 단일 정답형에서 두 선지가 모두 틀릴 때 출제자가 \"더 명백한 오답\"을 정답으로 지정하며, ③의 \"어떤 독성물질도 ~할 수 없다\"라는 전면 부정문이 ⑤의 분류 오류보다 교과서 서술과 직접적으로 충돌한다고 판단된다.\n\n함정 요소: (1) **⑤의 함정** — Sulfur AA를 Cys·Met이 아닌 Ser·Thr로 바꿔치기 한 오답이 [2024-mid]에 이어 또 등장. 명백한 오답이지만 \"단일 정답형\"이라는 틀 때문에 ③과 ⑤ 중 하나를 골라야 한다. 교재 본문과의 직접 충돌 강도를 기준으로 ③을 선택하는 것이 정답. (2) **③의 \"어떤 ~도 없다\" 패턴** — 과학 시험의 원칙상 \"절대적 부정문\"은 거의 항상 오답. 이 패턴을 알아보면 가장 빠르게 정답을 찍을 수 있다. (3) **[2024-mid] #37과의 관계** — 문장 순서와 표현이 매우 유사해, 전년도 족보를 풀어본 학생은 ①·②가 이제는 \"옳은\" 선지로 바뀌었음을 주의해야 한다. a·b 위치에 있던 α↔β 역전 함정이 없어졌다는 점이 핵심 변화.\n\n**근거 위치**: 교재 p.52 §4.5 \"2) DNA 합성 장애 및 손상\" · p.52~53 \"3) RNA 합성 장애 및 손상\"(actinomycin D·acridine·α-amanitin·rifampin 예시 포함) + 생화학 기초(Sulfur AA = Cys·Met).", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L09-mechanism-4-1-3", "round": "2024-mid", "num": "37", "qid": "", "body": "많은 독성물질은 유전자 조절, 세포내 신호전달, 핵산 및 단백질 합성 장애를 일으켜 그 독성효과를 나타낸다. 다음 중 틀린 것을 모두 고르시오.\n\na. DNA 중합효소 β는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다.\nb. DNA 중합효소 α는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\nc. 화학물질에 의한 신호전달 이상은 주로 단백질의 메틸화 상태의 변화에 의하여 일어난다.\nd. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이 결국 종양을 일으킬 수 있다.\ne. 많은 독성 물질은 그 농도에 따라 RNA 중합효소 1, 2 및 3에 대한 억제 정도가 달라진다.\nf. sulfur 함유 아미노산인 세린과 트레오닌은 산화에 특히 민감하다.\n\n족보 원본 해설: \"중합효소 알파는 sulfhydryl기를 가진다. 중합효소 베타는 sulfhydryl기를 가지고 있지 않다.\"", "jokboAnswer": "a, b, c, f", "claudeAnswer": "**a, b, c, f** (족보와 일치)", "explanation": "이 문항은 §4.5 핵산·단백질 합성 장애의 세부 문장 6개를 한꺼번에 검증하는 다중선택형이다. 각 선지를 교재 본문과 한 줄씩 대조한다.\n\n- **a 틀림** — 교재 p.52 §4.5 2): \"DNA 중합효소 **α**는 하나 또는 그 이상의 **sulfhydryl기**를 가지고 있어 이를 변형시키는 인자에 매우 민감하다... DNA 중합효소 **β**는 sulfhydryl기를 가지고 있지 않아 저항성을 가진다.\" 선지는 α↔β를 뒤집어 서술했다. **민감한 것은 α, 저항성인 것은 β**.\n\n- **b 틀림** — a와 동일한 α↔β 역전. b 혼자서도 틀림. 교재 원문과 정면 충돌.\n\n- **c 틀림** — 교재 p.52 §4.5 1) \"신호전달 조절 장애\": \"PKC를 활성화시키는 물질은 이 신호경로를 통한 단백질(신호전달계)의 **인산화(phosphorylation)**를 촉진한다.\" 즉 신호전달 이상의 핵심은 **인산화** 상태 변화이지 메틸화가 아니다. 메틸화는 DNA/히스톤 수준 후성유전학적 조절에서 자주 언급되지만, §4.5가 다루는 \"화학물질에 의한 신호전달 이상\"은 인산화 경로이다.\n\n- **d 옳음** — 교재 p.52 §4.5 2): \"DNA 산화는 **세포자멸사 및 괴사**를 일으킬 뿐만 아니라 **돌연변이**, 결국 **종양**을 일으킬 수 있다.\" 정확히 일치. 소거.\n\n- **e 옳음** — 교재 p.52~53 §4.5 3) RNA 합성 장애: \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다.\" 그대로 일치. α-amanitin(세 가지 모두 억제), actinomycin D(농도 의존적으로 rRNA→mRNA 영향) 예시가 이를 뒷받침.\n\n- **f 틀림** — **Sulfur 함유 아미노산은 Cysteine(Cys, -CH₂-SH)과 Methionine(Met, -CH₂-CH₂-S-CH₃)** 두 개이다. Serine(-CH₂-OH)과 Threonine(-CH(OH)-CH₃)은 **hydroxyl기(-OH) 함유 아미노산**으로 황 원소를 갖지 않는다. 따라서 \"sulfur 함유 아미노산인 세린·트레오닌\"이라는 서술은 이중으로 틀림(이름과 분류가 모순). Cys·Met은 실제로 **sulfhydryl기(Cys의 -SH)와 티오에테르(Met의 -S-)**를 가져 산화적 스트레스에 취약하다. 이 지식은 교재 §4.2 서술에서 \"아미노산의 sulfhydryl기\"가 산화 표적으로 언급되는 맥락과 연결된다.\n\n따라서 **틀린 선지는 a·b·c·f** 네 개. d·e 두 개만 옳다.\n\n함정 요소: (1) **a·b가 쌍으로 틀림** — 두 선지 모두 α↔β가 같은 방향으로 뒤집혀 있어, 얼핏 \"하나만 맞추면 되겠지\"하고 한쪽만 고르기 쉽다. 둘 다 체크해야 감점 없음. (2) **c의 \"메틸화\"** — 후성유전학 단원(L11·L13)에서 메틸화를 자주 다루므로 익숙한 단어지만, §4.5의 신호전달 이상은 **인산화**가 정답. (3) **f의 serine/threonine** — 생화학에서 \"serine/threonine kinase\"(Ser·Thr 인산화)가 친숙해 이름이 익숙하다는 이유로 그냥 맞다고 넘길 수 있다. 아미노산 곁사슬의 원소를 떠올려야 구분 가능.\n\n**근거 위치**: 교재 p.52 §4.5 \"1) 신호전달 조절 장애\" · \"2) DNA 합성 장애 및 손상\" · p.52~53 \"3) RNA 합성 장애\" + 생화학 기초(Cys·Met의 황 함유).", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L09-mechanism-4-1-3", "round": "2022-mid", "num": "26", "qid": "", "body": "세포성 기능 및 구조장애에 대한 아래의 설명 중 틀린 것을 고르시오.\n\n①. 사립체 내부에 카디오리핀(cardiolipin)은 높은 친화성을 가지고 있어 많은 독성물질이 내막에 축적된다.\n②. 사립체 내막은 높은 양전하성 막전압을 띄고 있어 음전하를 띤 독성물질이 투과되어 축적된다.\n③. 사립체 투과성 전이 소공(mitochondrial permeability transition pore, MPTP)이 독성물질에 의해 열림으로써 사립체가 손상된다.\n④. 효소는 외인성 물질과 상호작용할 수 있는 높은 선택성을 가지고 있기 때문에 효소의 기능 변동에 의한 결과는 선택적이고 예측 가능한 독성효과이다.\n⑤. 괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상이다.", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "이 문항은 세포 수준 독성 기전 5개 문장을 나열하고 **틀린 것 하나**를 가려내게 하는 전형적인 복합 개념 검증형이다. ①·③·⑤는 §4.6 에너지 생산 장애, ④는 §4.2 효소 기능 장애, ⑤는 §4.9 괴사에 각각 대응한다.\n\n각 선지를 교재 본문과 대조한다:\n\n- **① 옳음** — 교재 p.54 §4.6: \"내막은 cardiolipin을 많이 함유하고 있다. 따라서 많은 독성물질이 cardiolipin과 높은 친화성을 가지고 있기 때문에 내막에 축적될 수 있다.\" 정확히 일치.\n\n- **② 틀림 (정답)** — 교재 p.54 §4.6의 원문은 \"내측이 높은 **음전하성** 막전압을 띄고 있음으로 내·외의 전기화학적 전위차를 유지하고 있다. 이러한 전위차로 인하여 **양전하**를 띄는 독성물질이 투과될 수 있다\"이다. 본 선지는 \"**양전하성** 막전압 → **음전하** 독성물질\"로 전하의 부호를 **정반대로 뒤집어** 놓았다. 물리적으로도 간단히 확인할 수 있다 — 내막 matrix 쪽이 음전하라는 것은 호흡사슬이 H⁺(proton)를 외막간 공간으로 퍼낸다는 전자전달계의 기본 원리에서 유도되며, 따라서 **양전하 양이온성 물질**이 전기화학적 경사를 따라 matrix로 끌려 들어간다. Rhodamine 123·MPP⁺ 같은 대표적 사립체 타게팅 프로브가 모두 양이온인 것도 같은 이유.\n\n- **③ 옳음** — 교재 p.54 §4.6 MPTP 단락: \"이 통로는 정상적으로 닫혀있으나 독성물질에 의해 열림으로써 사립체 내·외의 전위차가 붕괴된다.\" 정확.\n\n- **④ 옳음** — 교재 §4.2 효소 기능 장애: 효소는 외인성 물질과의 상호작용에서 **높은 선택성**을 가지므로 효소 기능 변동 결과는 **선택적·예측 가능**. 정확.\n\n- **⑤ 옳음** — 교재 §4.9 괴사: \"괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상\"으로 서술되며, 이는 ATP 의존적·계획적인 세포자멸사와 대비된다. 정확.\n\n함정 요소: ②의 \"양전하성/음전하\"는 **부호 두 개가 동시에 뒤집혀** 있어 얼핏 읽으면 물리적으로 그럴듯하게 보인다(양↔음이 짝지어 흐르는 점은 맞음). 그러나 **막전압의 부호와 독성물질의 부호를 짝 맞춰 외워야** 한다 — **(내막) 음전하 → 양전하 물질 축적**. 이 문항은 [2025-mid] #35와 선지까지 거의 동일한 반복 출제이다. 3년 연속 동일 함정이 등장했으므로 이번 시험에서도 출제 가능성이 매우 높다.\n\n**근거 위치**: 교재 p.54 \"6. 에너지 생산 장애\" 사립체 내막 전압·cardiolipin·MPTP 단락 + §4.2 효소 기능 장애 + §4.9 괴사.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L09-mechanism-4-1-3", "round": "2021-fin", "num": "36", "qid": "", "body": "외부자극에 의해 사망수용체들이 자극을 받으면 단백질 분해효소인 ( )들이 활성화되어 세포사멸이 유도되게 된다.", "jokboAnswer": "caspase", "claudeAnswer": "caspase", "explanation": "이 단답형 문항은 **세포자멸사(apoptosis)의 외부 경로(extrinsic pathway)**를 그대로 묻는다. 교재 p.58 §4.10 \"세포자멸사\"는 \"외부자극에 의한 세포자멸사는 다양한 과정을 통하여 일어날 수 있다. 그 하나는 **Fas(사망 수용체), TNF 수용체 그리고 TRAIL 수용체**들의 자극으로 단백질 분해효소인 **caspase**들을 직접 활성화시켜 일어나는 세포자멸사이다\"라고 서술한다.\n\n배경적으로 세포사는 크게 두 가지로 나뉜다 — **괴사(necrosis)**는 ATP를 쓰지 않고 급성·치명적으로 일어나며 calpain·cathepsin이 주요 분해효소이고, **세포자멸사(apoptosis)**는 ATP 의존성 계획된 죽음으로 **caspase 계열 단백질 분해효소**가 실행자이다. Caspase는 세포질 내에서 비활성 pro-form으로 존재하다가 외부(Fas/TNF/TRAIL) 또는 내부(cytochrome c 유출) 신호를 받으면 절단 활성화되어 downstream 기질(PARP·lamin·ICAD 등)을 분해해 세포 구조를 계획적으로 해체한다.\n\n괄호에 들어갈 단어는 **caspase**(또는 \"caspase들\"). 복수형으로 기재해도 정답 처리된다. 단답형이라 오답 선지 소거 과정은 없으나, 혼동 가능 단어로 **calpain**(괴사 경로 Ca²⁺ 의존 cysteine protease)이나 **cathepsin**(리소좀 protease, 괴사에서 막 파열 후 유출)이 있다. 두 단어는 \"사망수용체 자극\"이라는 표현과 결합하지 않으므로 모두 배제된다.\n\n함정 요소는 **\"단백질 분해효소\"라는 표현**이다. Caspase를 처음 배울 때 단순히 \"자멸사 효소\"로 외우면 단백질 분해효소라는 일반적 기능 설명과 연결이 되지 않아 당황할 수 있다. Caspase는 **Cys**teine-**asp**artate-specific prote**ase**의 축약어로, 기질의 **aspartate 잔기 뒤**를 잘라내는 시스테인 단백질 분해효소임을 알고 있으면 완벽히 매칭된다.\n\n**근거 위치**: 교재 p.58 \"10. 세포자멸사(Apoptosis)\" \"Fas(사망 수용체), TNF 수용체 그리고 TRAIL 수용체들의 자극으로 단백질 분해효소인 caspase들을 직접 활성화시켜 일어나는 세포자멸사이다\" 구문.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L09-mechanism-4-1-3", "round": "2021-fin", "num": "43", "qid": "", "body": "많은 독성물질은 사립체 내막의 ( )과 높은 친화성을 가지고 있기 때문에 내막에 축적될 수 있다.", "jokboAnswer": "cardiolipin", "claudeAnswer": "cardiolipin (카디오리핀)", "explanation": "이 문항은 **사립체(mitochondria) 내막의 분자적 특성**을 묻는 단답형이다. 교재 p.54 §4.6 \"6. 에너지 생산 장애\"는 사립체 내막의 이중 특성을 다음과 같이 서술한다 — (1) 내측이 높은 **음전하성 막전압**을 띠어 양전하 독성물질이 끌려 들어가고, (2) 내막이 **cardiolipin**을 많이 함유하고 있어 \"많은 독성물질이 cardiolipin과 높은 친화성을 가지고 있기 때문에 내막에 축적될 수 있다\"고 명시한다.\n\n배경: Cardiolipin은 일반 인지질과 다른 독특한 구조를 가진 **다이인지질(diphosphatidylglycerol)** — 두 개의 phosphatidic acid가 글리세롤로 연결된 특수 인지질이다. 이 구조 덕분에 사립체 내막에만 고농도로 존재하며(타 세포막에는 거의 없음) 음이온성을 띤다. 전자전달계 복합체 I·III·IV와 물리적으로 결합해 복합체 구조를 안정화시키고 cytochrome c를 내막 쪽에 묶어두는 역할도 한다.\n\n독성학적 의미: Cardiolipin은 (a) 지용성 양이온 독성물질의 친화성 결합 부위로 작용해 내막에 축적시키고, (b) 산화적 스트레스(ROS)에 의해 과산화되면 cytochrome c와의 결합이 풀려 cytochrome c가 세포질로 유출될 수 있다. 이 cytochrome c 유출은 caspase 활성화 → 세포자멸사로 이어지므로, cardiolipin 과산화는 미토콘드리아 내부 경로 세포사의 시발점이 된다.\n\n함정 요소: \"내막 인지질\"이라는 표현만 보면 phosphatidylcholine이나 phosphatidylethanolamine을 떠올리기 쉬우나, 이들은 사립체 내막 특이적이지 않다. **사립체 내막 = cardiolipin**은 교재가 특정하는 유일한 분자이다.\n\n**근거 위치**: 교재 p.54 \"6. 에너지 생산 장애\" \"내막은 cardiolipin을 많이 함유하고 있다. 따라서 많은 독성물질이 cardiolipin과 높은 친화성을 가지고 있기 때문에 내막에 축적될 수 있다\" 구문.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L09-mechanism-4-1-3", "round": "2021-fin", "num": "66", "qid": "", "body": "사립체의 이 통로는 정상적으로 닫혀있으나 독성물질에 의해 열림으로써 사립체 내외의 전위차가 붕괴되어 사립체에서 세포질내로 신호 분자 등이 유출됨으로써 사립체가 독성물질에 의해서 손상되게 만들 수 있다. 이 통로의 이름은?", "jokboAnswer": "사립체 투과성 전이 소공 (미표기 — 교과서 기준)", "claudeAnswer": "**사립체 투과성 전이 소공 (MPTP, mitochondrial permeability transition pore)**", "explanation": "이 문항은 §4.6 에너지 생산 장애의 핵심 기전 구조물인 **MPTP**를 단답으로 묻는다. 교재 p.54 §4.6은 MPTP를 \"다양한 단백질 복합체로 구성된 **거대통로(megachannel)**인 미토콘드리아 투과성 전이 소공이 내·외막을 가로지르고 있어 cytochrome c와 같은 거대분자가 이동될 수 있다. 이 통로는 **정상적으로 닫혀있으나 독성물질에 의해 열림으로써 사립체 내·외의 전위차가 붕괴**된다\"고 서술한다. 문항 본문이 교재 원문을 거의 그대로 옮긴 것이다.\n\n배경: MPTP는 사립체 내·외막을 관통하는 초대형 단백질 복합체로, 구성 성분은 **Cyclophilin D**(matrix 측 조절 단백질), **ANT**(adenine nucleotide translocator, 내막), **VDAC**(voltage-dependent anion channel, 외막) 등이 핵심이다. 정상 상태에서는 닫혀 있어 내막의 proton gradient(양전하·음전하 분리)를 유지해 ATP 합성이 가능하도록 한다.\n\nMPTP 개구 요인(교재 §4.6 명시): **ROS·RNS 증가, Ca²⁺ 과축적, 양이온 투과성 증가, ATP 결핍, 대사 억제**.\n\nMPTP 개구 결과: (1) 막전압 소실 → ATP 합성 정지, (2) cytochrome c 등 거대분자 세포질 유출 → caspase 활성 → **세포자멸사**, (3) 삼투압 변화로 matrix 종창 → 외막 파열 → **괴사**.\n\n함정 요소: 영문 약자 **MPTP**만 답하거나 한글 **\"사립체 투과성 전이 소공\"**만 답해도 모두 정답으로 처리된다. \"mitochondrial permeability transition pore\" 풀네임까지 쓰면 완벽. 다만 \"Ca²⁺ 채널\"이나 \"VDAC\"만 단독으로 답하면 오답 — VDAC은 MPTP의 **구성 성분**이지 통로 자체의 이름이 아니다.\n\n**근거 위치**: 교재 p.54 \"6. 에너지 생산 장애\" MPTP 기술 단락.", "tail": "", "scoreable": false, "correctIndices": []}]}, "L11-mechanism-4-4-6": {"lecture": "L11-mechanism-4-4-6", "title": "독성기전 4-4·6", "slug": "mechanism-4-4-6", "questions": [{"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "35", "qid": "Q034", "body": "다음 중 MD에 관한 설명으로 틀린 것은?\n\n①. 사립체 내부에 카디오리핀은 높은 친화성을 가지고 있어 많은 독성물질이 내막에 축적된다.\n②. 사립체 내막은 높은 양전하성 막전압을 띄고 있어 음전하를 띤 독성물질이 투과되어 축적된다.\n③. 사립체 투과성 전이 소공이 독성 물질에 의해 열림으로써 사립체가 손상된다.\n④. 효소는 외인성 물질과 상호작용할 수 있는 높은 선택성을 가지고 있기 때문에 효소의 기능 변동에 의한 결과는 선택적이고 예측 가능한 독성효과이다.\n⑤. 괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상이다.", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "Q288(2022-mid #26)과 본문·선지가 거의 동일한 반복 출제다. \"MD\"는 mitochondrial dysfunction(사립체 기능 장애)의 약어로 추정된다.\n\n판단 근거는 Q288 해설과 동일하다. 교과서 §4.6 원문 \"내측이 높은 음전하성 막전압을 띄고 있음으로 내·외의 전기화학적 전위차를 유지하고 있다. 이러한 전위차로 인하여 **양전하**를 띠는 독성물질이 투과될 수 있다\"가 기준이다. 선지 ②는 **\"양전하성 막전압 → 음전하 독성물질\"**로 양쪽 모두를 정반대로 기술했다. 이 함정이 2022년·2025년 두 번 동일하게 출제되었으므로 \"음전하성 막전압 + 양전하 독성물질\"이 절대 암기 공식임을 확정할 수 있다.\n\n정답 선지 근거: ② \"양전하성 막전압 + 음전하 독성물질\"은 교과서 §4.6과 정반대.\n\n오답 선지 소거:\n- ① cardiolipin의 내막 특이 축적 — §4.6 원문.\n- ③ MPTP 개구 = 사립체 손상 — §4.6 원문.\n- ④ 효소 선택성 → 예측 가능 독성 — §4.7 \"효소 불활성화\"의 전제.\n- ⑤ 괴사 = ATP 비의존성·급성·치명 — §4.9 괴사 정의.\n\n함정 요소: 3년차 반복 출제임에도 여전히 ②를 옳다고 오판하는 학생이 많다. 이유는 ① \"막전압\"이라는 단어가 신경세포 막전위(안쪽 음전하, 바깥쪽 양전하)의 선입견과 섞이고, ② \"음전하 독성물질이 축적된다\"는 표현이 직관적으로 그럴듯하게 들리기 때문이다. 반드시 \"**미토콘드리아 matrix는 전자전달계의 양성자 펌프로 음전하가 쌓이는 공간**\"이라는 생화학 원리를 기준으로 판단해야 한다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "37", "qid": "Q036", "body": "다음 설명 중 틀린 것은?\n\n①. DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자에 매우 민감하다.\n②. DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\n③. 어떤 독성물질도 RNA 중합효소 I, II, III를 억제하여 mRNA 합성에 영향을 미칠 수 없다.\n④. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 종양을 일으킬 수 있다.\n⑤. Sulfur 함유 아미노산인 Serine, Threonine은 산화에 특히 민감하다.", "jokboAnswer": "③", "claudeAnswer": "③ (엄밀히는 ⑤도 틀리나 채점 정답은 ③ — \"틀린 것\" 단일 정답형)", "explanation": "Q141(2024-mid #37)과 같은 개념군을 5지선다 단일 정답형으로 재구성한 문항이다. 본문이 긍정문·부정문이 섞여 있어 각 선지를 한 줄씩 교과서와 대조해야 한다.\n\n- **① 옳음**: §4.5 (2) \"DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다\" 원문과 일치.\n- **② 옳음**: 같은 단락 \"DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 저항성을 가진다\" 원문과 일치.\n- **③ 틀림 (채점 정답)**: \"어떤 독성물질도 RNA pol을 억제할 수 없다\"는 **완전 부정형 정반대 진술**이다. 교과서 §4.5 (3) \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다\" 및 같은 단락에서 Actinomycin D·acridine·α-Amanitin이 실제 RNA 합성 억제제로 명시된다. 반증 자료가 교과서에 직접 있다.\n- **④ 옳음**: §4.5 (2) \"DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이 결국 종양을 일으킬 수 있다\" 원문과 일치.\n- **⑤ 틀림 (실질 오답이나 채점 대상 아님)**: Sulfur 함유 AA는 Cysteine·Methionine이며 Serine·Threonine은 hydroxyl(-OH)기 함유 AA다. 이 선지도 교과서적으로 틀리지만, 문항이 \"틀린 것 하나\"를 묻는 단일 정답형이고 ③이 교과서 원문과 더 직접적으로 충돌하므로 ③이 채점 정답으로 설정된 것으로 보인다.\n\n함정 요소: ⑤도 틀리다는 점을 인지하면 \"정답이 둘이니 출제 오류\"로 판단하고 시간을 허비할 수 있다. 단일 정답형에서 복수 오답이 있을 때는 **출제자가 의도한 \"더 명백한 교과서 역전 진술\"**을 고르는 것이 관행이다. ③은 \"어떤 독성물질도... 없다\"는 절대 부정형으로 교과서의 \"많은 독성물질이... 억제한다\"를 직접 뒤집어 명백하므로 우선 순위다.", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "38", "qid": "Q037", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고르시오.\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.", "jokboAnswer": "c, d, e", "claudeAnswer": "c, d, e", "explanation": "Q142(2024-mid #38)와 본문·선지가 거의 완전히 동일한 재출제 문항이다. 2년 연속 같은 본문이 등장했다는 사실 자체가 \"혈색소 산화 손상 3대 함정(Heinz vs Howell-Jolly / Fe²⁺↔Fe³⁺ / disulfide↔ester)\"이 고빈출 중의 고빈출임을 의미한다.\n\n판단 근거는 Q142 해설과 완전히 동일하다.\n- **a 옳음** — 외래물질 노출 (§4.5 원문).\n- **b 옳음** — 손상 단백질 대치 불가 (§4.5 원문: \"핵과 세포질세망을 가지고 있지 못함으로써 새롭게 합성된 단백질로 손상된 단백질을 대치할 수 없다\").\n- **c 틀림** — Heinz body의 정의를 Howell-Jolly body로 오기. Howell-Jolly body는 핵 잔재물(세포질 내 작은 DNA 조각)이지 세포막 침착 구조가 아니다.\n- **d 틀림** — 산화 방향 역전. 정답은 Fe²⁺(정상 Hb) → Fe³⁺(MetHb) 산화.\n- **e 틀림** — α·β-글로빈 산화는 Cys -SH기의 disulfide(S-S) 결합 형성. Ester 결합은 카복실산과 알코올 사이의 결합으로 단백질 산화와 무관.\n- **f 옳음** — 혈색소 내 고농도 산소 (§4.5 원문).\n\n따라서 틀린 선지 = c, d, e.\n\n함정 요소: Q142와 완전히 동일한 함정이 재출제된다는 점에서, **이 세 함정은 반드시 한 줄 한 줄 암기**해야 한다. \"Heinz = 세포막 이중결합 = globin disulfide 응집체 / Howell-Jolly = 핵 잔재물 / MetHb = Fe³⁺ / globin 산화 = disulfide\" 네 짝이 시험장에서 바로 떠올라야 한다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "40", "qid": "Q039", "body": "다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증을 유발한다. 이와 같은 조혈세포의 파괴로 인하여 면역 기능을 담당하는 림프구 전구세포가 감소한다.\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.\n\n① TRAIL, Benzene\n② TCDD, Benzene\n③ Caspase, TRAIL\n④ Benzene, TCDD\n⑤ TCDD, Caspase", "jokboAnswer": "④", "claudeAnswer": "④", "explanation": "Q143(2024-mid #40)의 본문을 그대로 5지선다로 재출제한 문항. Q143에서 서술한 Benzene·TCDD 기전 분석이 그대로 적용된다.\n\n판정 흐름:\n- 첫 번째 빈칸: \"CYP → hydroquinone → myeloperoxidase → quinoid → pancytopenia\" 4단계 경로는 **Benzene**의 고유 기전. 다른 어떤 물질도 교과서에서 이 4단계를 가지지 않는다.\n- 두 번째 빈칸: \"가장 강력한 면역억제\" + \"흉선 피질 T 세포 분화 억제\" + \"Ca²⁺ 의존성 endonuclease\" 세 조건을 모두 만족하는 물질은 **TCDD**.\n\n따라서 ④ Benzene, TCDD가 정답.\n\n오답 선지 소거:\n- ① TRAIL은 세포자멸사 경로의 사망 수용체 리간드로 외인성 독성물질이 아님.\n- ② 두 빈칸이 뒤바뀜 — \"TCDD가 hydroquinone 경로\", \"Benzene이 흉선 T세포 분화 억제\"는 정반대.\n- ③ Caspase는 세포자멸사 실행 효소, 외인성 독성물질이 아님.\n- ⑤ 두 번째 빈칸에 Caspase가 들어갈 수 없음(같은 이유).\n\n함정 요소: 선지에 **TRAIL·Caspase** 같은 세포자멸사 내재 분자를 끼워넣어 외인성 독성물질 이름과 혼동시킨다. 교과서 §4.8은 \"면역 억제를 일으키는 **독성물질**\" 단락이므로 외인성 화학물질(Benzene·TCDD)만이 빈칸에 적합하다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-fin", "num": "32", "qid": "Q076", "body": "다음 설명에 해당하는 심혈관계 약물의 올바른 짝을 고르시오.\n\n- 치료지수가 좁아 중독 위험이 크므로 주의가 필요하다.\n- 투여 시 지방을 제외한 체중이나 체표면적을 기준으로 용량을 계산해야 한다.\n- 고양이가 개보다 민감하므로 더욱 주의해야 한다.\n- Na⁺/K⁺-ATPase를 억제한다. 독성 기전 또한 Na⁺/K⁺-ATPase 억제와 관련있다.\n- 심장 박동을 느리게 만들어 심장 허약 등과 관련있다.\n\n①. Digoxin - Digitoxin\n②. Diltiazem - Verapamil\n③. Nifedipine - Nipidipine\n④. Albuterol - Nifedipine\n⑤. Verapamil - Albuterol", "jokboAnswer": "미표기 (채점 정답 ①로 판정)", "claudeAnswer": "① Digoxin — Digitoxin", "explanation": "본 문항은 주 주제가 \"심혈관계 약물의 종류\"로 교과서 22장(의약품) 세부 영역에 속하지만, **기전 서술 \"Na⁺/K⁺-ATPase 억제\"**가 L11 §4.4 \"이온 항상성 장애\"의 핵심 물질 분류인 **Cardiac glycosides(Digitalis 군)** 기전을 정확히 반영한다. 따라서 적어도 기전 선지 판정은 L11 범위로 완전히 해설 가능하다.\n\n배경: 교과서 §4.4는 이온 펌프(Na⁺/K⁺-ATPase·Ca²⁺ ATPase) 억제의 대표 독성물질로 **Cardiac glycosides(Digitalis·Digoxin·Digitoxin)**를 든다. 이들은 모두 식물 유래(Digitalis purpurea·Digitalis lanata) 강심배당체로 Na⁺/K⁺-ATPase α-subunit에 결합하여 능동 수송을 차단한다. 결과 연쇄는:\n1. 세포 내 Na⁺ 축적 →\n2. Na⁺/Ca²⁺ 교환기의 역수송(reverse mode)으로 Ca²⁺ 배출이 차단됨 →\n3. 세포 내 Ca²⁺↑ →\n4. 근형질세망 Ca²⁺ 방출 촉진 + 세포 외 Ca²⁺ 유입 →\n5. 심근 수축력↑ (therapeutic) + 부정맥·심세동 (toxic).\n\n문항의 핵심 포인트: 다섯 개 서술 중 \"Na⁺/K⁺-ATPase 억제\"가 독특한 기전 서명이다. Digoxin과 Digitoxin은 모두 cardiac glycoside로 이 기전을 공유한다. 두 약물의 차이는 주로 약동학(Digoxin은 신장 배설·반감기 짧음·수용성, Digitoxin은 간 대사·반감기 김·지용성)에 있지 기전은 동일하다.\n\n정답 선지 근거: ①번 Digoxin-Digitoxin은 두 약물 모두 cardiac glycoside로 Na⁺/K⁺-ATPase를 억제한다. 치료지수가 좁고(치료 용량과 중독 용량이 가까움), 고양이가 개보다 민감하다는 부차적 임상 정보도 모두 일치한다.\n\n오답 선지 소거:\n- ② Diltiazem·Verapamil: **Ca²⁺ 채널 차단제**(CCB). L형 Ca²⁺ 통로 억제 → 심근 수축력↓·방실 전도 지연. Na⁺/K⁺-ATPase가 아님.\n- ③ Nifedipine(·Nipidipine): 역시 Ca²⁺ 채널 차단제(dihydropyridine 계열). 주로 혈관 확장 효과. 기전 불일치.\n- ④ Albuterol: β₂-adrenergic agonist (기관지 확장제). 심혈관 기전 설명과 완전 불일치.\n- ⑤ Verapamil·Albuterol: 두 약 모두 Na⁺/K⁺-ATPase 억제제가 아님.\n\n함정 요소: 심혈관 약물 이름 암기가 안 되면 Na⁺/K⁺-ATPase 기전만으로 판단해야 한다. L11 관점에서는 \"cardiac glycoside의 전형 기전\"을 기억하면 ①번이 유일한 정답이다. 경계 판정: 약물 이름 자체는 22장(의약품) 범위지만 기전은 L11 범위 내이므로 해설은 온전히 작성 가능하다.", "tail": "— 교차 경계 문항", "scoreable": true, "correctIndices": [0]}, {"lecture": "L11-mechanism-4-4-6", "round": "2024-mid", "num": "37", "qid": "Q141", "body": "많은 독성물질은 유전자 조절, 세포내 신호전달, 핵산 및 단백질 합성 장애를 일으켜 그 독성효과를 나타낸다. 다음 중 틀린 것을 모두 고르시오.\n\na. DNA 중합효소 β는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다.\nb. DNA 중합효소 α는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\nc. 화학물질에 의한 신호전달 이상은 주로 단백질의 메틸화 상태의 변화에 의하여 일어난다.\nd. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이 결국 종양을 일으킬 수 있다.\ne. 많은 독성 물질은 그 농도에 따라 RNA 중합효소 1, 2 및 3에 대한 억제 정도가 달라진다.\nf. sulfur 함유 아미노산인 세린과 트레오닌은 산화에 특히 민감하다.", "jokboAnswer": "a, b, c, f", "claudeAnswer": "a, b, c, f", "explanation": "이 문항은 교과서 §4.5 \"핵산 및 단백질 합성 장애\"의 네 가지 핵심 함정을 한꺼번에 묶어 검증하는 종합 문항이다. 각 선지는 교과서 한 줄 한 줄을 정확히 \"거꾸로\" 또는 \"대체어\"로 오염시켰다.\n\n- **a 틀림**: 교과서 §4.5 (2)는 \"DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자에 매우 민감하다\"고 한다. 선지는 α ↔ β를 뒤바꿨다. β가 -SH기를 가지고 민감하다는 진술은 완전한 역전.\n- **b 틀림**: 같은 단락 \"DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다\"가 원문. 선지는 α가 -SH기 없고 저항성이라 뒤바꿨다. a·b는 한 쌍으로 설계된 역전 함정.\n- **c 틀림**: 교과서 §4.5 (1) \"신호전달 장애\"에서는 \"PKC를 활성화시키는 물질은 신호전달계의 인산화를 촉진한다\"로 서술한다. 신호전달은 단백질 **인산화(phosphorylation)** 조절에 의해 일어나며, **메틸화(methylation)**는 주로 DNA 메틸화(유전자 발현 조절)·히스톤 메틸화의 맥락이지 신호전달 축의 주요 수식이 아니다.\n- **d 옳음**: 교과서 §4.5 (2) \"DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이를 일으켜 궁극적으로 종양을 일으킬 수 있다\" 원문과 일치.\n- **e 옳음**: 교과서 §4.5 (3) \"RNA 합성 장애\"에서 \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다\"고 서술한다.\n- **f 틀림**: Sulfur(황) 함유 아미노산은 **Cysteine(-CH₂-SH)**과 **Methionine(-CH₂-CH₂-S-CH₃)**. Serine(-CH₂-OH)과 Threonine(-CH(OH)-CH₃)은 hydroxyl(-OH)기 함유 아미노산이며 황이 없다. 산화에 민감한 것은 Cys의 -SH기와 Met의 티오에테르기다.\n\n함정 요소: a·b는 역전 쌍, c는 수식 바꿔치기(인산화→메틸화), f는 아미노산 분류 오류로, 각각 다른 차원의 오답 패턴을 한 문항에 몰아넣었다. 특히 \"세린·트레오닌이 sulfur AA\"라는 명백한 생화학 상식 오류를 끼워넣어 해당 선지를 \"맞다\"고 오판하는 실수가 흔하다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2024-mid", "num": "38", "qid": "Q142", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고른 것은?\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.\n\n①. a, b, c, d, e  ②. a, c, d  ③. b, d, f  ④. c, d, e  ⑤. c, e, f", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e가 틀림)", "explanation": "이 문항은 교과서 §4.5 \"(4) 단백질 산화적 손상\" 단락의 세 갈래 정보(취약성 이유·Heinz body·MetHb·disulfide)를 한 번에 검증한다. 배경을 짚으면, 적혈구는 산화 스트레스에 극도로 취약한데 그 이유는 **세 가지가 서로 보강**하기 때문이다: ① 혈색소 자체에 고농도 산소가 결합되어 있어 자동산화(autoxidation)가 상시 일어나고, ② 혈액에 분포된 외래물질이 혈관 내 적혈구에 쉽게 접근하며, ③ **적혈구는 핵·세포질세망이 없어 손상된 단백질을 새로 합성해 대치할 수 없다**. 이 세 조건이 모두 \"맞는 취약성 이유\"다.\n\n- **a 옳음**: \"외래물질 노출\" = §4.5 원문 그대로.\n- **b 옳음**: \"손상 단백질 대치 불가\" = §4.5 원문 그대로.\n- **c 틀림**: 변성 혈색소가 적혈구 세포막에 이중결합한 구조는 **Heinz body**다. **Howell-Jolly body**는 비장에서 미처 제거되지 못한 **핵 잔재물(nuclear remnant)** — 적혈구 세포질 내 작은 푸른 점으로 관찰되며, 무비장증(asplenia)·혈액학적 질환에서 볼 수 있다. 두 구조는 원인·외형·위치(세포막 vs 세포질) 모두 다르다.\n- **d 틀림**: 산화 방향이 정반대. 정상 Hb의 철은 **Fe²⁺**(ferrous, 산소 결합 가능)이며, 독성물질(nitrite·phenylhydroxylamine·nitrosobenzene)이 이를 **Fe³⁺**(ferric)로 산화시켜 **methemoglobin(MetHb)**을 만든다. MetHb는 산소를 결합하지 못하므로 산소 운반 능력이 상실된다. \"Fe³⁺→Fe²⁺\"는 정반대.\n- **e 틀림**: α·β-글로빈 사슬의 산화는 각 사슬의 Cys 잔기의 -SH기가 산화되어 **disulfide(S-S) 결합**을 형성한다. 이 분자내·분자간 S-S 가교가 혈색소 단백질을 응집시켜 Heinz body를 만든다. **ester 결합(-CO-O-)**은 카복실산과 알코올 사이에 형성되는 전혀 다른 결합이다.\n- **f 옳음**: 혈색소에 결합한 고농도 산소가 자동산화의 근원이 되므로 취약성 이유로 맞다.\n\n따라서 c·d·e 세 개가 틀림 → ④.\n\n함정 요소: c는 Heinz body ↔ Howell-Jolly body 용어 바꿔치기(혈액학에서 자주 혼동), d는 산화 방향 역전, e는 \"disulfide\"를 \"ester\"로 교체한 것이다. 세 함정이 모두 한 단락 안에서 서로 인접한 문장에서 온 것이라 교과서를 정확히 암기하지 않으면 어느 하나를 \"맞다\"고 오판하기 쉽다. Q037(2025-mid #38)과 본문이 거의 동일하게 반복된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L11-mechanism-4-4-6", "round": "2024-mid", "num": "40", "qid": "Q143", "body": "다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증(Pancytopenia)를 유발한다. ...\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.", "jokboAnswer": "미표기 (Benzene / TCDD — 본문 서술 기준)", "claudeAnswer": "첫 번째 빈칸 = Benzene / 두 번째 빈칸 = TCDD", "explanation": "문항 본문은 교과서 §4.8 \"면역 억제\" 두 단락을 이어 붙인 것이다. 면역 억제를 일으키는 독성물질은 다양하지만 교과서가 **가장 대표적**이라 명시하는 두 물질이 Benzene과 TCDD이며, 각각의 기전·표적 세포·임상 결과가 완전히 다르다는 점이 핵심이다.\n\n**첫 번째 빈칸 — Benzene**: 골수 독성의 대명사. 간 CYP → hydroquinone → 골수 myeloperoxidase → quinoid 대사체 + ROS → 골수 원조세포(조혈 모세포) 파괴 → **pancytopenia**(적혈구·백혈구·혈소판 모두 감소) + 림프구 전구세포(T·B) 감소. Benzene 만성 노출은 사람에서 재생불량성 빈혈·급성 백혈병의 원인으로 등록되어 있다. 교과서 본문 \"hydroquinone → myeloperoxidase → quinoid → pancytopenia\"의 4단계 용어 조합이 Benzene 말고는 성립하지 않는다.\n\n**두 번째 빈칸 — TCDD(2,3,7,8-tetrachlorodibenzo-p-dioxin)**: 면역 억제의 **가장 강력한** 독성물질. TCDD는 AhR(aryl hydrocarbon receptor)과 결합하여 핵 내로 이동하고 특정 유전자를 활성화하는데, 흉선 피질 상피세포에서 이 기전이 **T 세포 분화·성숙을 억제**한다. 동시에 **Ca²⁺ 의존성 endonuclease**를 활성화하여 피질 미성숙 T 세포(thymocyte)의 DNA를 절단시켜 세포자멸사를 유도한다. 결과적으로 흉선이 현저히 위축되고 T 세포 매개 면역이 저하된다. 교과서의 \"가장 강력한 면역억제\"·\"흉선 피질\"·\"T 세포 분화 억제\"·\"Ca²⁺ 의존성 endonuclease\" 네 구절은 모두 TCDD 고유의 특징이다.\n\n함정 요소: 단답 자리에 \"Paraquat\"·\"TRAIL\"·\"Caspase\"·\"Aflatoxin\"을 끼워넣는 선지가 있다. Paraquat는 폐독성, TRAIL·Caspase는 세포자멸사 경로의 내재 분자이지 외인성 독성물질 이름이 아니다. Aflatoxin은 간독성·DNA 공유결합 기전으로 \"myeloperoxidase 단계\"가 없다. 두 빈칸을 혼동하는 것도 흔한 오류다 — Benzene↔TCDD 바꿔치면 \"Benzene이 흉선 T세포 분화 억제\"가 되어 사실과 정반대다.\n\nQ039(2025-mid #40)에 동일 본문·선지로 재출제되었다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2022-mid", "num": "26", "qid": "Q288", "body": "세포성 기능 및 구조장애에 대한 아래의 설명 중 틀린 것을 고르시오.\n\n①. 사립체 내부에 카디오리핀(cardiolipin)은 높은 친화성을 가지고 있어 많은 독성물질이 내막에 축적된다.\n②. 사립체 내막은 높은 양전하성 막전압을 띄고 있어 음전하를 띤 독성물질이 투과되어 축적된다.\n③. 사립체 투과성 전이 소공(mitochondrial permeability transition pore, MPTP)이 독성물질에 의해 열림으로써 사립체가 손상된다.\n④. 효소는 외인성 물질과 상호작용할 수 있는 높은 선택성을 가지고 있기 때문에 효소의 기능 변동에 의한 결과는 선택적이고 예측 가능한 독성효과이다.\n⑤. 괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상이다.", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "이 문항은 교과서 §4.6 \"에너지 생산 장애\" 단락의 핵심 함정 문항으로, 2025-mid #35에도 거의 동일한 본문으로 재출제되었다. 배경을 짚으면, 미토콘드리아 내막은 호흡쇄가 양성자(H⁺)를 matrix에서 막간 공간으로 퍼내기 때문에 **matrix 쪽이 음전하(-150~-180 mV), 막간 공간이 양전하**의 화학전기적 구배(electrochemical gradient)를 형성한다. 이 음전하성 matrix는 양전하 독성물질(lipophilic cation)을 끌어들여 축적시킨다. 이 방향이 모든 판단의 기준이다.\n\n문항의 핵심 포인트는 \"양전하 vs 음전하\" 두 쌍을 정확히 교차시키는 것이다. **\"음전하성 막전압 + 양전하 독성물질 축적\"**(교과서)이 정답 방향이고, **\"양전하성 막전압 + 음전하 독성물질 축적\"**(선지 ②)이 정반대 오답이다.\n\n정답 선지 근거: ② \"내막이 양전하성 막전압 → 음전하 독성물질 축적\"은 두 쌍 모두 뒤집힌 완전 반대 진술이다.\n\n오답 선지 소거:\n- ① 옳음. cardiolipin의 내막 특이성·독성물질 친화성은 §4.6 본문 그대로.\n- ③ 옳음. MPTP 개구 = 사립체 손상. §4.6 본문 명시.\n- ④ 옳음. 효소의 기질 선택성 때문에 효소 억제 기전의 독성은 타겟 예측 가능 (§4.7 \"효소 불활성화\"의 전제).\n- ⑤ 옳음. 괴사(necrosis)는 ATP 비의존성·급성·치명적(세포자멸사는 ATP 의존성·계획적·조절 가능). §4.9·4.10 서술과 일치.\n\n함정 요소: \"양전하성 막전압·음전하 독성물질\" 쌍은 직관적으로 \"내막 안쪽이 양전하 같다\"는 선입견(세포막 외부가 양전하라는 신경세포 일반 지식)과 혼동되기 쉽다. 반드시 **미토콘드리아 내막은 반대 방향**임을 기억해야 한다. 교과서 §4.6 원문 \"내측이 높은 음전하성 막전압을 띄고 있음으로... 양전하를 띠는 독성물질이 투과될 수 있다\"를 암기 기준으로 삼아야 한다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L11-mechanism-4-4-6", "round": "2021-fin", "num": "7", "qid": "Q343", "body": "신경세포에 존재하는 복어독인 tetrodotoxin의 주요표적은?", "jokboAnswer": "흥분성 조직의 막전위 의존성 Na⁺ 통로 (원본 해설 없음)", "claudeAnswer": "흥분성 조직의 막전위 의존성 Na⁺ 통로 (voltage-gated Na⁺ channel)", "explanation": "복어독(tetrodotoxin, TTX)은 섹션 4-4 \"이온 항상성 장애\"에서 이온 통로에 작용하는 대표 독성물질로 제시된다. 교과서 p.46 \"TTX과 saxitoxin은 Na⁺ 통로에 친화성이 높아서 통로를 차단함으로서 신경과 심근세포의 활동전위 발생이 억제된다\"는 구절이 근거다. TTX는 흥분성 조직(신경세포·심근세포)의 막전위 의존성(voltage-gated) Na⁺ 통로 외구(outer pore)에 결합하여 Na⁺ 유입을 물리적으로 막는다. Na⁺ 유입이 없으면 탈분극이 일어나지 못하므로 활동전위 자체가 발생하지 못해 신경 전도 장애·심장 박동 장애가 초래된다.\n\n문항이 묻는 핵심은 \"TTX의 표적이 AChE인가 Na⁺ 통로인가\"를 구분하는 것이다. 이는 독성물질-표적 매칭 문항(Q135·Q285·Q030·Q037)에서 TTX↔유기인계의 표적이 매년 바꿔치기되는 함정과 동일한 축에 놓여 있다. AChE는 유기인제 살충제(parathion·paraoxon)의 표적이지 TTX의 표적이 아니다. TTX는 통로 차단(물리적 폐색), 유기인제는 효소 억제(공유결합)로 기전 수준에서도 구분된다.\n\n함정 요소: 시험에서는 TTX의 표적으로 \"AChE\", \"Na⁺/K⁺-ATPase\", \"Ca²⁺ 통로\" 등을 끼워넣는다. TTX는 **Na⁺ 통로에만** 선택성이 있으며 Ca²⁺·K⁺ 통로에는 거의 작용하지 않는다는 선택성이 핵심 근거다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2021-fin", "num": "32", "qid": "Q368", "body": "RNA 합성에 대한 선택적인 억제제이며, DNA에 존재하는 두 개의 연속적인 G=C 염기쌍 사이에 삽입되어 DNA의 주형을 변형시킴으로써 주형을 따라 이동하는 RNA 중합효소의 움직임을 차단하여 RNA합성 즉, 전사를 억제하는 대표적인 물질 두 가지는?", "jokboAnswer": "actinomycin D, acridine", "claudeAnswer": "Actinomycin D (dactinomycin), Acridine", "explanation": "문항 본문은 교과서 05장 §4.5 (3) \"RNA 합성 장애\" 원문과 거의 동일하다. 교과서 p.51 \"actinomycin D (dactinomycin)와 acridine은 RNA 합성에 대한 선택적인 억제제이다. 이는 DNA에 존재하는 두개의 연속적인 G=C 염기쌍 사이에 삽입되어 DNA의 주형을 변형시킴으로써 주형을 따라 이동하는 RNA 중합효소의 움직임을 차단하여 RNA 합성 즉, 전사를 억제한다.\" 본문이 교과서 구절과 이렇게 가까우면 단답형이라도 반드시 **두 물질 모두**(Actinomycin D와 Acridine)를 쓰는 것이 채점 기준이다.\n\n핵심 포인트는 **\"물리적 삽입(intercalation)\"**이라는 기전 유형이다. Actinomycin D·Acridine은 DNA와 공유결합하지 않는다 — DNA 이중나선의 염기쌍 사이에 평면 고리 구조가 끼어 들어가 주형의 3차원 구조를 변형시킨다. 이것이 RNA 중합효소의 주형을 따라 이동하는 운동을 물리적으로 막는다. Aflatoxin B₁(Guanine N-7 공유결합)과는 기전이 달라, Aflatoxin은 epoxide 중간체가 DNA를 영구 변형시키는 반면 intercalator는 가역적·비공유적이다.\n\n함정 요소: \"G≡C 염기쌍\"을 \"A=T 염기쌍\"으로 오기하는 선지, \"번역(translation)\"을 \"전사(transcription)\"로 바꿔치기하는 선지, Actinomycin D의 기전을 \"60S 리보솜 불활성화\"(Ricin의 기전)로 뒤바꾸는 선지가 전형적이다. G≡C 염기쌍이 선택되는 이유는 G·C가 세 개의 수소결합을 가져 염기쌍 사이 공간이 intercalator가 끼기 유리한 기하학적 조건을 제공하기 때문이다(A=T는 두 개).", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2021-fin", "num": "35", "qid": "Q371", "body": "( )은 CYP에 의하여 hydroquinone으로 되고 이것은 골수에 많이 존재하는 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시킨다. 이로 인해 골수에서 많은 조혈세포의 파괴로 인해 면역 기능을 결정하는 림프구 전구세포(T 및 B 세포)가 감소시키고 결과적으로 범혈구감소증(pancytopenia)을 유발시킨다.", "jokboAnswer": "Benzene", "claudeAnswer": "Benzene (벤젠)", "explanation": "문항 본문은 교과서 05장 §4.8 \"면역 억제\" 원문 그대로다. 교과서는 면역 억제의 두 대표 독성물질로 Benzene과 TCDD를 대비시키는데, Benzene의 기전은 대사적 활성화 경로가 핵심이다. 원래 Benzene 자체는 비활성이지만, 간 CYP450에 의해 **hydroquinone**(수산기 두 개를 가진 benzene 환원체)으로 1차 활성화된다. 이 hydroquinone이 **골수에 선택적으로 분포**하면 그곳에 풍부한 **myeloperoxidase**(호중구·골수계 세포에 발현)가 두 번째 산화 단계를 수행하여 **반응성 quinoid 대사체**(p-benzoquinone 등)를 생성한다. Quinoid는 친전자성으로 골수 원조세포의 단백질·DNA와 공유결합하며 동시에 redox cycling으로 ROS를 만든다. 이 두 공격으로 골수가 황폐화되어 **pancytopenia**(적혈구·백혈구·혈소판 모두 감소) + 림프구 전구세포 감소가 초래된다.\n\n문항의 핵심 포인트는 \"CYP → hydroquinone → myeloperoxidase → quinoid\"의 **2단계 활성화 경로**를 인식하는 것이다. 이 두 단계 효소계(CYP는 간·myeloperoxidase는 골수)의 조직 분포가 Benzene의 **선택적 골수 독성**을 설명한다.\n\n함정 요소: 단답형 빈칸에서 \"Paraquat\"(폐 선택 독성·redox cycling)이나 \"Aflatoxin B₁\"(간 선택 독성·DNA 공유결합)를 쓰는 오류가 잦다. Paraquat은 hydroquinone을 거치지 않고 직접 NADPH-CYP450 reductase에서 환원형 자유기(PQ⁺·)를 생성하며, Aflatoxin B₁은 epoxide로 활성화되어 DNA를 직접 공격한다. 두 물질 모두 myeloperoxidase 단계가 없으므로 본 문항의 답이 될 수 없다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2021-fin", "num": "43", "qid": "Q379", "body": "많은 독성물질은 사립체 내막의 ( )과 높은 친화성을 가지고 있기 때문에 내막에 축적될 수 있다.", "jokboAnswer": "cardiolipin", "claudeAnswer": "Cardiolipin (카디오리핀)", "explanation": "교과서 05장 §4.6 \"에너지 생산 장애\" 원문 그대로다. \"내막은 cardiolipin을 많이 함유하고 있다. 따라서 많은 독성물질이 cardiolipin과 높은 친화성을 가지고 있기 때문에 내막에 축적될 수 있다.\" Cardiolipin(diphosphatidylglycerol)은 네 개의 지방산 사슬을 가진 독특한 이중 인지질로, 진핵세포에서는 **오직 미토콘드리아 내막에만** 풍부하게 존재한다. 이 특이성 때문에 cardiolipin은 미토콘드리아 기능·구조의 마커이자 독성물질이 내막에 **선택적으로 축적**되는 분자적 이유가 된다.\n\n문항의 포인트는 \"독성물질의 친화 대상 = cardiolipin\"이라는 **분자-기질** 매칭이다. 미토콘드리아 내막에는 cardiolipin 외에도 다양한 인지질이 있지만, 특히 양전하를 띠는 친지질성 독성물질(예: 특정 항생제·quinone·TCDD 대사체)이 cardiolipin의 음전하성 포스페이트 그룹과 상호작용하여 내막에 농축된다.\n\n함정 요소: 단답형에서 \"phosphatidylcholine\", \"sphingomyelin\", \"MPTP\"(구조물이 아닌 통로), \"cytochrome c\"(단백질이지 지질이 아님) 등을 쓰는 오류가 있다. 문항이 \"지질과 결합\"임을 명시하지 않고 \"내막 친화성\"만 묻기 때문이다. 반드시 \"내막에 특이적인 인지질 = cardiolipin\"으로 연결해야 한다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2021-fin", "num": "66", "qid": "Q402", "body": "사립체의 이 통로는 정상적으로 닫혀있으나 독성물질에 의해 열림으로써 사립체 내외의 전위차가 붕괴되어 사립체에서 세포질내로 신호 분자 등이 유출됨으로써 사립체가 독성물질에 의해서 손상되게 만들 수 있다. 이 통로의 이름은?", "jokboAnswer": "사립체 투과성 전이 소공 (미표기, 교과서 용어 기준)", "claudeAnswer": "사립체 투과성 전이 소공 (MPTP, mitochondrial permeability transition pore)", "explanation": "교과서 05장 §4.6 \"에너지 생산 장애\" 근거. \"다양한 단백질 복합체로 구성된 거대통로(megachannel)인 미토콘드리아 투과성 전이 소공(MPTP)이 내·외막을 가로지르고 있다. 이 통로는 정상적으로 닫혀있으나 독성물질에 의해 열림으로써 사립체 내·외의 전위차가 붕괴되고 cytochrome c와 같은 거대분자가 이동될 수 있다.\" MPTP는 VDAC(외막)·ANT(내막)·cyclophilin D 등이 결합하여 형성되는 조절 가능한 거대 통로로, 직경이 커서 1.5 kDa 이하의 분자는 모두 통과할 수 있다.\n\n문항의 포인트는 MPTP의 개구 **결과**를 이해하는 것이다. MPTP가 열리면 ① 내·외막 전위차(ΔΨm)가 즉각 붕괴되어 ATP 합성이 정지되고, ② cytochrome c가 세포질로 유출되어 caspase-9 활성화 → caspase-3 → 세포자멸사(apoptosis)를 유도하며, ③ 삼투압에 따라 물이 matrix로 유입되어 미토콘드리아가 종창되고 외막이 파열되면 괴사(necrosis)로 이어진다. 즉 MPTP 개구는 apoptosis와 necrosis 모두의 공통 분기점이다.\n\n함정 요소: 빈칸을 \"VDAC\", \"ANT\", \"UCP\"(uncoupling protein) 등으로 쓰는 오류가 있다. 이들은 MPTP의 구성 요소 또는 별개의 수송체지 \"투과성 전이 소공\" 자체가 아니다. 교과서 공식 용어는 \"MPTP\" 또는 \"사립체 투과성 전이 소공\"으로 한국어·영어 모두 통용된다. MPTP를 차단하는 약리학적 도구는 **Cyclosporine A**(cyclophilin D 결합)으로 개념학습 Unit 8.5에서 보강된다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2021-fin", "num": "72", "qid": "Q409", "body": "생체 내 신경전달물질은 ACh의 분해를 억제함으로써 생체 내에 ACh이 축적되고, 따라서 각종 기관의 무스카린성 및 니코틴성 수용체와 중추의 ACh 수용체를 과다하게 자극함으로써 관련기관과 중추신경계의 비정상적인 자극 증상을 나타나게 하는 대표적인 유기인제 물질은?\n\n(본문 OCR 미복원 — 원문은 위와 같은 맥락에서 서술된 단답형 문항)", "jokboAnswer": "미표기", "claudeAnswer": "parathion (파라티온)", "explanation": "이 문항은 L11 족보 파일에 수록되어 있으나 주제 중심(AChE 비가역 억제)이 교과서 §4.7 \"효소 불활성화\"에 속하여 주 분류는 L13이다. L11 찐족보분석에서는 **교차 문항**으로 기재한다(L11 본 파일에 수록된 모든 문항을 다룬다는 원칙에 따름).\n\n배경: 교과서 §4.7 근거. **Parathion**은 P=S(티오포스페이트) 구조의 유기황인산계 살충제로, 그 자체는 AChE에 대한 억제력이 약하다. 생체 내 간 CYP450에 의해 **탈황화(desulfuration)**가 일어나면 P=S가 P=O로 변환되어 **Paraoxon**이 된다. Paraoxon은 친전자성 인(electrophilic P)을 가져 AChE 활성 부위의 **Serine -OH**를 친전자 공격하고 phosphate ester 공유결합을 형성한다. 이 결합은 매우 안정하여 가수분해가 극히 느리므로 AChE가 **비가역적으로 불활성화**된다. AChE가 차단되면 시냅스에서 ACh이 분해되지 않고 축적되어 **무스카린성 수용체**(평활근·분비샘·심장), **니코틴성 수용체**(골격근 신경근접합부·자율신경절), **중추 ACh 수용체**가 모두 과자극된다. 임상적으로는 SLUD(Salivation·Lacrimation·Urination·Defecation) + 근섬유다발 수축·마비·의식 변화·호흡 부전이 나타난다.\n\n문항 본문의 네 조건 — ① \"ACh 분해 억제\", ② \"ACh 축적\", ③ \"무스카린·니코틴·중추 수용체 과자극\", ④ \"대표적 유기인제\" — 을 모두 만족시키는 물질은 parathion이다. 동일 본문이 L13 Q397(2021-fin #61)에 완전한 형태로 있고, Q397의 정답이 parathion이므로 Q409도 parathion이다 (OCR 일부 미복원이지만 문맥상 동일 문항의 반복 또는 변형).\n\nL11과의 연결: Parathion-paraoxon은 §4.7에 주 분류되지만, AChE 억제 → ACh 축적 → **신경 근접합부·평활근·심근 이온 채널 과활성화**의 하류 결과가 §4.4 이온 항상성 장애의 생리학적 맥락과 직접 연결된다. 특히 콜린성 과자극이 일으키는 심근 부정맥·평활근 경련·골격근 근섬유다발 수축은 모두 Na⁺/Ca²⁺ 이온 항상성 붕괴의 임상 표현이다.\n\n함정 요소: 유기인계 물질명(parathion·malathion·diazinon·chlorpyrifos) 중 어느 것인지 구분이 필요할 때, \"대표적·광범위 사용·AChE 비가역 억제·탈황화로 10배 독성 증가\"의 조합이 언급되면 교과서 §4.7의 표준 예시인 **parathion**이다. Malathion은 포유류의 carboxylesterase에 의해 해독되어 포유류에서는 독성이 훨씬 낮고, diazinon·chlorpyrifos는 교과서 §4.7에 대표 예시로 명시되지 않는다.", "tail": "— 교차 (본 L 족보 수록, 주 분류는 L13)", "scoreable": false, "correctIndices": []}]}, "L13-mechanism-4-7-11": {"lecture": "L13-mechanism-4-7-11", "title": "독성기전 4-7·11", "slug": "mechanism-4-7-11", "questions": [{"lecture": "L13-mechanism-4-7-11", "round": "2025-중간", "num": "41", "qid": "", "body": "생체의 이롭거나 유해한 외부자극 또는 환경 변화에 대한 병리학적 적응에 대한 용어와 설명이 올바르게 짝지어진 것은?\n[그림: 생체의 병리학적 적응 용어와 설명]\n\n(선지 OCR 불완전 — 족보 원문이 그림 기반 문항으로 추정되며 텍스트 복원 실패)", "jokboAnswer": "①", "claudeAnswer": "①", "explanation": "1) **배경 — 2년 연속 동일 주제 출제 확인**: 족보 원문이 그림 기반으로 OCR 복원이 불완전하지만, [2024-중간] #41과 **문항 발문이 축자 일치**(\"생체의 이롭거나 유해한 외부자극 또는 환경 변화에 대한 병리학적 적응에 대한 용어와 설명이 올바르게 짝지어진 것은?\")하며 정답 선지 번호도 ①로 동일하다. 따라서 2024년과 실질적으로 동일한 문항으로 판단한다.\n\n2) **문항이 묻는 핵심 포인트**: [2024-중간] #41과 동일. 7개 병리학적 적응 용어 각각의 **방향성 정의**를 정확히 매칭.\n   - 비대(hypertrophy) = 세포 **크기** 증가 (수 그대로)\n   - 위축(atrophy) = 세포 **크기** 감소\n   - 증생(hyperplasia) = 세포 **수** 증가\n   - 화생(metaplasia) = 다른 종류 세포로 **대치** (기능 상실)\n   - 형성이상(dysplasia) = **핵 비대 + 유사분열** 증가 (분화 능력 유지)\n   - 역형성(anaplasia) = 비전형적 핵 + 유사분열 + **분화 조절 능력 상실**\n   - 종양(neoplasia) = 죽은 세포보다 더 많은 비정상 세포 **무한 증식**\n\n3) **정답 ① 근거**: [2024-중간] #41에서 상술한 7개 매칭이 그대로 적용된다 (1=ㄷ, 2=ㅁ, 3=ㅅ, 4=ㄱ, 5=ㄹ, 6=ㅂ, 7=ㄴ로 추정). 그림 기반 선지 세부는 복원 불가하나 출제자가 정답 배열을 동일하게 유지한 것으로 보인다.\n\n4) **오답 선지 소거**: 텍스트 복원 불가로 선지별 구체 소거는 불가능하나, [2024-중간] #41 해설에서 정리한 오답 패턴 (비대↔위축, 비대↔증생, 화생↔역형성, 형성이상↔역형성, 종양↔증생) 중 하나가 각 오답 선지에 해당할 것이다.\n\n5) **함정 요소**:\n   - **전년도 동일 문항 재출제 패턴**: L13 족보 4문항 중 2문항이 \"면역반응 순서 동일 재출제\", 다른 2문항이 \"병리학적 적응 동일 재출제\"이다. 즉 **L13 족보의 50%가 2회 반복 출제**되며, 이는 출제자가 이 두 주제를 시험 핵심으로 고정시킨 것을 의미한다. 시험 직전 반드시 이 두 cascade/매칭을 암기해야 한다.\n   - **그림 의존 문항**: 2025년은 표·그림 형태로 출제된 것으로 추정되며, 2024년 텍스트 선지를 표로 재구성했을 가능성이 크다. 그림이라도 내용은 동일.\n   - **암기 구호**: [2024-중간] #41과 동일 — \"**비크↑ 위크↓ 증수↑ 화대 형핵 역분 종무**\".\n\n**근거 위치**: 교재발췌.md lines 1738-1783 (교재 §4.11 \"수복 장애\" p.45-46). [2024-중간] #41과 동일 근거. 족보 원문 OCR 제한으로 그림 내용 상세 확인 불가.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L13-mechanism-4-7-11", "round": "2024-중간", "num": "36", "qid": "", "body": "대부분의 독성물질은 분자량이 작아서 항원으로서 역할을 하지 못한다. 독성물질이 항원-항체 복합체를 형성하여 일으키는 일반적인 반응의 순서는?\n\na. 유리된 보체단백질이 세포 표면을 손상시키고 괴사, 세포융해, 비만세포에서 histamine 유리, 백혈구의 식균작용 촉진, 그리고 평활근을 수축시킨다.\nb. 항원에 반복된 노출은 항체와 결합하여 항원-항체 복합체를 형성한다.\nc. 항원-항체 반응에 의해 보체단백질이 유리된다.\nd. 항원이 림프구를 자극하여 IgA, D, E, G, M을 생성한다.\ne. 내인성 단백질과 결합하여 항원을 생성한다.\n\n① a-b-d-c-e  ② b-d-c-e-a  ③ b-e-c-d-a  ④ e-d-b-c-a  ⑤ e-b-d-d-a", "jokboAnswer": "④", "claudeAnswer": "④ (e → d → b → c → a)", "explanation": "1) **배경 — 반복 출제 확인**: 이 문항은 2년 전 [2022-중간] #27의 \"가·나·다·라·마\" 한글 표기를 \"a·b·c·d·e\" 알파벳으로만 치환한 **완전 동일 문항**이다. 표기 대응표는 다음과 같다:\n   | 2022 한글 | 2024 알파벳 | 의미 |\n   |:---:|:---:|:---|\n   | 가 | a | 보체 → 세포 손상 6종 |\n   | 나 | c | 항원-항체 반응 → 보체 유리 |\n   | 다 | b | 반복 노출 → 항원-항체 복합체 |\n   | 라 | d | 항원 → 림프구 자극 → 항체 |\n   | 마 | e | Hapten + 내인성 단백질 → 완전 항원 |\n\n   따라서 2022의 정답 \"마-라-다-나-가\"는 2024의 \"**e-d-b-c-a**\"와 정확히 대응한다.\n\n2) **문항이 묻는 핵심 포인트**: [2022-중간] #27과 동일. 시작점은 e(항원 형성), 종착점은 a(세포 손상 6종). 중간은 d(항체 생성) → b(복합체) → c(보체 유리) 순.\n\n3) **정답 ④ 근거 — 왜 e-d-b-c-a인가**:\n   - **e**: 독성물질(hapten) + 내인성 단백질 → **완전 항원 생성** (교재 lines 730-731).\n   - **d**: 완전 항원 → 림프구 자극 → **IgA·D·E·G·M 항체 생성** (교재 lines 732-733).\n   - **b**: 동일 항원에 반복 노출 → **항원-항체 복합체 형성** (교재 lines 734-735, 746).\n   - **c**: 복합체 반응 → **보체단백질 유리** (교재 lines 747-748).\n   - **a**: 유리된 보체 → **세포 표면 손상 6종** (교재 lines 749-752).\n\n4) **오답 선지 소거**:\n   - ① a-b-d-c-e: **a로 시작**(세포 손상이 맨 앞). 종착 효과를 시작으로 놓은 역전 오답. e(항원 형성)가 맨 뒤 — 완전히 뒤집힌 순서.\n   - ② b-d-c-e-a: **b(복합체 형성)로 시작** — 항원 형성(e)과 항체 생성(d)이 없이 복합체가 먼저 형성될 수 없으므로 오답.\n   - ③ b-e-c-d-a: b로 시작하는 순간 오답 확정. \"복합체 형성 후 항원 형성\"은 시간 역전.\n   - ④ e-d-b-c-a: **정답**. 인과 순서 완전 부합.\n   - ⑤ e-b-d-d-a: 표기 자체에 **\"d-d\" 중복**이 있다 (원본 OCR 오류로 보이며 정답 불가). 또한 항원 형성(e) 직후 복합체 형성(b)으로 건너뛰어 항체 생성(d) 단계를 누락.\n\n5) **함정 요소**:\n   - 2022년에 이미 출제된 문항이 2년 뒤 **선지 표기만 바꿔 재출제**됨. 개념학습.md 빈출 Top에 \"면역반응 cascade 2회 출제\"로 등록되어 있으며, 🔴 2회 이상 빈출 마커가 붙는 핵심 암기 대상.\n   - 출제자는 알파벳 치환으로 \"새 문항처럼\" 위장했으나, **정답 번호조차 ④로 동일**하다. 즉 선지 배열 순서도 의도적으로 유지한 것으로 보이며, 족보를 풀어본 시험생에게 유리한 구조.\n   - ⑤ 선지의 \"d-d\" 중복 타이핑은 원본 OCR/타이핑 오류일 가능성이 크나, 해설 작성 시 **오타가 있는 선지는 자동 오답 처리**되는 것이 시험장 상식이므로 ⑤를 선택하지 않는 것이 안전.\n   - **핵심 암기 구호**: \"**E-D-B-C-A**\" = \"이**디**비씨에이\" = \"이 디비(DB) CA(원산지)\".\n\n**근거 위치**: 교재발췌.md lines 723-758 (교과서 05장 p.43-44 \"4) 면역반응\" 단락 전문). [2022-중간] #27과 동일 근거.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L13-mechanism-4-7-11", "round": "2024-중간", "num": "41", "qid": "", "body": "생체의 이롭거나 유해한 외부자극 또는 환경 변화에 대한 병리학적 적응에 대한 용어와 설명이 올바르게 짝지어진 것은?\n\n용어 목록:\n1. 비대(hypertrophy)\n2. 위축(atrophy)\n3. 증생(hyperplasia)\n4. 화생(metaplasia)\n5. 형성이상(dysplasia)\n6. 역형성(anaplasia)\n7. 종양(neoplasia)\n\n설명 목록:\nㄱ. 정상 세포는 생존할 수 없는 환경에서 생존할 수 있는 세포로 대치하여 적응하는 현상\nㄴ. 죽은 세포보다 더 많은 원세포 형태가 같지 않은 세포를 만들어 성장하고 분화하는 현상\nㄷ. 생체 내·외 스트레스나 기능감소로 인해 세포 크기가 증가하는 현상\nㄹ. 핵이 크고 유사분열이 발생하는 현상\nㅁ. 생체 내·외 스트레스나 기능감소로 인해 세포 크기가 줄어드는 현상\nㅂ. 비전형적인 핵과 활발한 유사분열 양상을 가져 분화 조절 능력을 상실하는 현상\nㅅ. 독성물질 혹은 물리적 손상에 반응하여 세포 수가 증가하는 현상\n\n① 1ㄷ-2ㅁ-3ㅅ-4ㄱ-5ㄹ-6ㅂ-7ㄴ  (OCR로 ②~⑤ 선지 미복원 — 족보 원문에 ①만 기록됨)", "jokboAnswer": "①", "claudeAnswer": "① (1=ㄷ, 2=ㅁ, 3=ㅅ, 4=ㄱ, 5=ㄹ, 6=ㅂ, 7=ㄴ)", "explanation": "1) **배경 — 왜 병리학적 적응을 분류하는가**: 교재 §4.11 \"수복 장애\"(교재 p.45-46, 교재발췌.md lines 1690-1786)는 생체가 유해 환경 변화에 대해 항상성을 유지하기 위한 적응 능력을 가지며, 이 회복이 **완전하거나 불완전**할 수 있다고 서술한다. 불완전 회복 시 조직은 **세포 수 변동, 세포 구조·기능 변동, 다른 세포로의 대치** 등 병리학적 변화를 초래한다. 이것이 \"병리학적 적응(pathological adaptation)\"이다. 이 7개 용어는 각각 **어느 방향·어느 크기·어느 세포 종류의 변화**를 의미하는지 정확히 매칭해야 한다.\n\n2) **문항이 묻는 핵심 포인트**: 7개 용어 각각이 \"세포 **크기**↑/↓\", \"세포 **수**↑\", \"세포 **종류** 교체\", \"**핵 이상 + 유사분열 증가**\", \"**분화 조절 상실**\", \"**무한 증식**\" 중 어느 차원에 속하는지 단순 매칭. 단 혼동을 유도하기 위해 \
