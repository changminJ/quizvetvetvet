}

// ─────── Utility: split question body into prompt + choices ───────
const CIRCLED_ALL = "①②③④⑤⑥⑦⑧⑨⑩";
const LETTERS_AZ = "abcdefghij";
function circleToLetter(ch) {
  const i = CIRCLED_ALL.indexOf(ch);
  return i >= 0 ? LETTERS_AZ[i] : ch;
}

function splitBody(body) {
  const lines = body.split("\n");

  const circleLineIdx = [];
  for (let i = 0; i < lines.length; i++) {
    if (/^[①②③④⑤⑥⑦⑧⑨⑩]/.test(lines[i].trim())) circleLineIdx.push(i);
  }
  if (circleLineIdx.length === 0) return { prompt: body, choices: [] };

  // 마지막 원문자 라인이 combinator인지 판정 (한 줄에 원문자 6개 이상)
  const lastIdx = circleLineIdx[circleLineIdx.length - 1];
  const lastLine = lines[lastIdx].trim();
  const lastCircleCount = (lastLine.match(/[①②③④⑤⑥⑦⑧⑨⑩]/g) || []).length;
  const isCombinator = circleLineIdx.length > 5 && lastCircleCount >= 6;

  if (isCombinator) {
    // statement + combinator 모드 — 본문 ①~⑩ → a~j로 변환
    const firstIdx = circleLineIdx[0];
    const promptLines = lines.slice(0, firstIdx);
    const stmtOutLines = [];
    for (let i = firstIdx; i < lastIdx; i++) {
      const ln = lines[i];
      const m = ln.match(/^(\s*)([①②③④⑤⑥⑦⑧⑨⑩])[.)]?\s*(.*)$/);
      if (m) {
        stmtOutLines.push(m[1] + circleToLetter(m[2]) + ". " + m[3]);
      } else if (ln.trim()) {
        stmtOutLines.push(ln);
      }
    }
    const prompt = [...promptLines, "", ...stmtOutLines].join("\n").trim();

    // combinator 라인에서 5개 선지 추출 (각 선지 내부 ①~⑩은 a~j로)
    const re = /(?:^|\s)([①②③④⑤⑥⑦⑧⑨⑩])[.)\s]*/g;
    const positions = [];
    let match;
    while ((match = re.exec(lastLine)) !== null) {
      // 첫 문자가 실제 선지 라벨인지 확인: 직전이 공백/시작 AND 직후가 공백/마침표
      const labelPos = match.index + match[0].indexOf(match[1]);
      const afterPos = labelPos + 1;
      const afterCh = lastLine[afterPos] || " ";
      if (/[\s.)]/.test(afterCh)) {
        positions.push({ labelPos, label: match[1], contentStart: afterPos });
      }
    }
    if (positions.length >= 2) {
      const choices = [];
      for (let k = 0; k < positions.length; k++) {
        const p = positions[k];
        const end = (k + 1 < positions.length) ? positions[k + 1].labelPos : lastLine.length;
        let content = lastLine.slice(p.contentStart, end).replace(/^[.)\s]+/, "").trim();
        content = content.replace(/[①②③④⑤⑥⑦⑧⑨⑩]/g, circleToLetter);
        choices.push(p.label + " " + content);
      }
      return { prompt, choices };
    }
  }

  // 일반 모드
  const firstChoiceIdx = circleLineIdx[0];
  const prompt = lines.slice(0, firstChoiceIdx).join("\n").trim();
  const choiceLines = lines.slice(firstChoiceIdx);
  const choices = [];
  let cur = null;
  for (const raw of choiceLines) {
    const ln = raw.replace(/^\s+/, "");
    if (!ln) continue;
    const matches = [...ln.matchAll(/[①②③④⑤⑥⑦⑧⑨⑩]/g)];
    if (matches.length >= 2) {
      if (cur !== null) { choices.push(cur); cur = null; }
      for (let k = 0; k < matches.length; k++) {
        const s = matches[k].index;
        const e = (k + 1 < matches.length) ? matches[k + 1].index : ln.length;
        const seg = ln.slice(s, e).trim();
        if (seg) choices.push(seg);
      }
    } else if (/^[①②③④⑤⑥⑦⑧⑨⑩]/.test(ln)) {
      if (cur !== null) choices.push(cur);
      cur = ln;
    } else if (cur !== null) {
      cur += " " + ln.trim();
    }
  }
  if (cur !== null) choices.push(cur);
  return { prompt, choices };
}

// ─────── Utility: render markdown-ish explanation ───────
function renderExplanation(text) {
  if (!text) return null;
  // Replace **bold** → <strong>
  const html = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br />");
  return <div dangerouslySetInnerHTML={{ __html: html }} />;
}

// ─────── Main App ───────
function App({ data }) {
  const lectureKeys = Object.keys(data);
  const [activeL, setActiveL] = useState(lectureKeys[0]);
  const [selections, setSelections] = useState({});  // { "L01-history:2025-중간-3": Set<idx> }
  const [submitted, setSubmitted] = useState(false);
  const [wrongOnly, setWrongOnly] = useState(false);
  const [uncertainOnly, setUncertainOnly] = useState(false);
  const [uncertainSet, setUncertainSet] = useState(new Set());  // keys of uncertain-flagged Qs

  const current = data[activeL];
  const allQuestions = current.questions;
  const questions = allQuestions.filter((q) => q.scoreable !== false);
  const nonScoreable = allQuestions.filter((q) => q.scoreable === false);

  const answeredCount = useMemo(() => {
    let c = 0;
    for (const q of questions) {
      const key = qKey(activeL, q);
      const s = selections[key];
      if (s && s.size > 0) c++;
    }
    return c;
  }, [selections, activeL, questions]);

  // compute results per question
  const results = useMemo(() => {
    const out = {};
    for (const q of questions) {
      const key = qKey(activeL, q);
      const chosen = selections[key] || new Set();
      const correct = parseAnswer(q.claudeAnswer);
      out[key] = {
        chosen,
        correct,
        isCorrect: setsEqual(chosen, correct) && correct.size > 0,
      };
    }
    return out;
  }, [selections, activeL, questions]);

  const totalCorrect = useMemo(() => {
    if (!submitted) return 0;
    return Object.values(results).filter((r) => r.isCorrect).length;
  }, [results, submitted]);

  function handleChoiceClick(q, idx) {
    const key = qKey(activeL, q);
    if (submitted || uncertainSet.has(key)) return;
    setSelections((prev) => {
      const cur = new Set(prev[key] || []);
      if (cur.has(idx)) cur.delete(idx);
      else cur.add(idx);
      return { ...prev, [key]: cur };
    });
  }

  function handleUncertain(q) {
    const key = qKey(activeL, q);
    setUncertainSet((prev) => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  }

  function handleSubmit() {
    if (answeredCount === 0) {
      if (!confirm("답을 선택하지 않은 문항이 많습니다. 그래도 제출할까요?")) return;
    }
    setSubmitted(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function handleReset() {
    if (!confirm("처음부터 다시 시작합니다. 선택·결과가 모두 초기화됩니다.")) return;
    setSelections({});
    setSubmitted(false);
    setWrongOnly(false);
    setUncertainOnly(false);
    setUncertainSet(new Set());
    window.scrollTo({ top: 0 });
  }

  function changeLecture(newL) {
    if (submitted || Object.keys(selections).length > 0 || uncertainSet.size > 0) {
      if (!confirm(`다른 L로 이동하면 현재 선택·결과가 초기화됩니다. 진행할까요?`)) return;
    }
    setSelections({});
    setSubmitted(false);
    setWrongOnly(false);
    setUncertainOnly(false);
    setUncertainSet(new Set());
    setActiveL(newL);
    window.scrollTo({ top: 0 });
  }

  const visibleQuestions = useMemo(() => {
    let list = questions;
    if (uncertainOnly) {
      list = list.filter((q) => uncertainSet.has(qKey(activeL, q)));
    }
    if (submitted && wrongOnly) {
      list = list.filter((q) => !results[qKey(activeL, q)].isCorrect);
    }
    return list;
  }, [submitted, wrongOnly, uncertainOnly, uncertainSet, questions, results, activeL]);

  return (
    <div className="max-w-4xl mx-auto px-4 py-6">
      <Header
        lectureKeys={lectureKeys}
        data={data}
        activeL={activeL}
        onChangeL={changeLecture}
      />
      <ProgressBar
        answered={answeredCount}
        total={questions.length}
        submitted={submitted}
        totalCorrect={totalCorrect}
      />
      <div className="my-4 flex flex-wrap items-center gap-3">
        {uncertainSet.size > 0 && (
          <label className="flex items-center gap-2 text-sm">
            <input
              type="checkbox"
              checked={uncertainOnly}
              onChange={(e) => setUncertainOnly(e.target.checked)}
            />
            🤔 확신 없는 문제만 ({uncertainSet.size}문항)
          </label>
        )}
        {submitted && (
          <label className="flex items-center gap-2 text-sm">
            <input
              type="checkbox"
              checked={wrongOnly}
              onChange={(e) => setWrongOnly(e.target.checked)}
            />
            오답만 보기 ({questions.length - totalCorrect}문항)
          </label>
        )}
        {submitted && (
          <button
            onClick={handleReset}
            className="ml-auto px-3 py-1 bg-slate-700 text-white rounded text-sm hover:bg-slate-800"
          >
            처음부터 다시
          </button>
        )}
      </div>
      <div className="space-y-4">
        {visibleQuestions.map((q, idx) => (
          <QuestionCard
            key={qKey(activeL, q)}
            q={q}
            idx={questions.indexOf(q)}
            chosen={selections[qKey(activeL, q)] || new Set()}
            onClick={(i) => handleChoiceClick(q, i)}
            submitted={submitted}
            result={results[qKey(activeL, q)]}
            uncertain={uncertainSet.has(qKey(activeL, q))}
            onUncertain={() => handleUncertain(q)}
          />
        ))}
      </div>
      {submitted && nonScoreable.length > 0 && !wrongOnly && (
        <div className="mt-8">
          <h2 className="text-lg font-bold text-slate-700 mb-2">
            📚 추가 학습 문항 (채점 불가 · {nonScoreable.length}개)
          </h2>
          <p className="text-xs text-slate-500 mb-3">
            아래는 답변 형식이 a~e 직접·매칭형·서술형이어서 ①~⑤ 클릭 채점이 불가한 문항. 해설 확인용.
          </p>
          <div className="space-y-3">
            {nonScoreable.map((q, idx) => (
              <NonScoreCard key={qKey(activeL, q)} q={q} idx={idx} />
            ))}
          </div>
        </div>
      )}
      {!submitted && (
        <div className="mt-6 sticky bottom-4 flex justify-center">
          <button
            onClick={handleSubmit}
            className="px-8 py-3 bg-emerald-600 text-white font-bold rounded-lg shadow-lg hover:bg-emerald-700"
          >
            전체 제출 ({answeredCount}/{questions.length})
          </button>
        </div>
      )}
      {submitted && (
        <div className="mt-6 flex justify-center gap-3">
          <button
            onClick={handleReset}
            className="px-6 py-2 bg-slate-700 text-white rounded hover:bg-slate-800"
          >
            처음부터 다시
          </button>
        </div>
      )}
      <footer className="mt-10 text-xs text-slate-400 text-center">
        근거: 각 L 찐족보분석.md · 족보 정답은 오류 가능, Claude 독립 재판정 채점
      </footer>
    </div>
  );
}

function qKey(L, q) {
  return `${L}:${q.round}-${q.num}-${q.qid}`;
}

function Header({ lectureKeys, data, activeL, onChangeL }) {
  const yearKeys = lectureKeys.filter((k) => k.startsWith("Y"));
  const lKeys = lectureKeys.filter((k) => !k.startsWith("Y"));
  return (
    <header className="mb-4">
      <h1 className="text-2xl font-bold mb-1">수의독성학 족보 퀴즈 <span className="text-xs text-slate-400 font-normal">build 2026-04-24-v4</span></h1>
      <p className="mb-3 font-bold" style={{color: "#1d4ed8"}}>
        정창민 110476661159에 70달러씩 기부 바랍니다. <span className="ml-3" style={{color: "#dc2626"}}>박영찬 바보</span>
      </p>
      {yearKeys.length > 0 && (
        <div className="flex flex-wrap gap-1 mb-2">
          <span className="text-xs text-slate-500 px-1 py-1">📅 연도별:</span>
          {yearKeys.map((k) => (
            <button
              key={k}
              onClick={() => onChangeL(k)}
              className={`px-3 py-1 text-xs rounded border font-semibold ${
                k === activeL
                  ? "bg-amber-600 text-white border-amber-600"
                  : "bg-amber-50 text-amber-800 border-amber-300 hover:bg-amber-100"
              }`}
            >
              {data[k].title} ({data[k].questions.length})
            </button>
          ))}
        </div>
      )}
      <div className="flex flex-wrap gap-1">
        <span className="text-xs text-slate-500 px-1 py-1">📖 L별:</span>
        {lKeys.map((k) => (
          <button
            key={k}
            onClick={() => onChangeL(k)}
            className={`px-2.5 py-1 text-xs rounded border ${
              k === activeL
                ? "bg-slate-900 text-white border-slate-900"
                : "bg-white text-slate-700 border-slate-300 hover:bg-slate-100"
            }`}
          >
            {k.split("-")[0]} · {data[k].title} ({data[k].questions.length})
          </button>
        ))}
      </div>
    </header>
  );
}

function ProgressBar({ answered, total, submitted, totalCorrect }) {
  const pct = total ? Math.round((answered / total) * 100) : 0;
  const correctPct = total ? Math.round((totalCorrect / total) * 100) : 0;
  return (
    <div className="mb-2">
      <div className="flex justify-between text-xs text-slate-600 mb-1">
        <span>
          진행: {answered}/{total}
        </span>
        {submitted && (
          <span className="font-semibold">
            정답률: {totalCorrect}/{total} ({correctPct}%)
          </span>
        )}
      </div>
      <div className="h-2 bg-slate-200 rounded overflow-hidden">
        <div
          className={submitted ? "h-full bg-emerald-500" : "h-full bg-sky-500"}
          style={{ width: `${submitted ? correctPct : pct}%` }}
        />
      </div>
    </div>
  );
}

function QuestionCard({ q, idx, chosen, onClick, submitted, result, uncertain, onUncertain }) {
  const { prompt, choices } = useMemo(() => splitBody(q.body), [q.body]);
  const correctSet = result?.correct || new Set();
  const isCorrect = result?.isCorrect;
  const jokboSet = parseAnswer(q.jokboAnswer);
  const revealed = submitted || uncertain;
  const answerDiffers = revealed && !setsEqual(jokboSet, correctSet) && jokboSet.size > 0;

  let borderClass = "border-slate-200";
  if (uncertain && !submitted) {
    borderClass = "border-amber-400 bg-amber-50";
  } else if (submitted) {
    borderClass = isCorrect ? "border-emerald-500 bg-emerald-50" : "border-rose-500 bg-rose-50";
  }

  return (
    <div className={`border-2 ${borderClass} rounded-lg p-4 bg-white`}>
      <div className="flex items-start justify-between mb-2 gap-2">
        <div className="text-xs font-mono text-slate-500">
          #{idx + 1} · {q.round} · #{q.num}
          {q.qid && <span className="ml-1 text-slate-400">({q.qid})</span>}
          {uncertain && <span className="ml-2 px-1.5 py-0.5 bg-amber-200 text-amber-900 rounded text-[10px]">🤔 확신 없음</span>}
        </div>
        <div className="flex items-center gap-1">
          {!submitted && (
            <button
              onClick={onUncertain}
              className={`text-[11px] px-2 py-0.5 rounded border ${
                uncertain
                  ? "bg-amber-500 text-white border-amber-500"
                  : "bg-white text-amber-700 border-amber-400 hover:bg-amber-50"
              }`}
            >
              {uncertain ? "↩ 취소" : "🤔 확신 없어요"}
            </button>
          )}
          {submitted && (
            <span
              className={`text-xs font-bold px-2 py-0.5 rounded ${
                isCorrect ? "bg-emerald-600 text-white" : "bg-rose-600 text-white"
              }`}
            >
              {isCorrect ? "정답" : "오답"}
            </span>
          )}
        </div>
      </div>
      <div className="mb-3 whitespace-pre-wrap text-[15px] leading-relaxed">{prompt}</div>
      <div className="space-y-1.5">
        {choices.map((c, i) => {
          const isChosen = chosen.has(i);
          const isRight = correctSet.has(i);
          let cls = "bg-white border-slate-300 hover:bg-slate-50";
          if (!revealed) {
            if (isChosen) cls = "bg-sky-100 border-sky-500";
          } else {
            if (isRight && isChosen) cls = "bg-emerald-100 border-emerald-600";
            else if (isRight && !isChosen) cls = "bg-emerald-50 border-emerald-400 border-dashed";
            else if (!isRight && isChosen) cls = "bg-rose-100 border-rose-600";
            else cls = "bg-white border-slate-200 text-slate-500";
          }
          return (
            <button
              key={i}
              disabled={revealed}
              onClick={() => onClick(i)}
              className={`choice-btn w-full text-left border rounded px-3 py-2 text-[14px] ${cls}`}
            >
              {c}
            </button>
          );
        })}
      </div>
      {revealed && (
        <div className="mt-4 pt-3 border-t border-slate-200">
          <div className="flex flex-wrap gap-2 mb-2 text-xs">
            <span className="px-2 py-0.5 bg-slate-100 rounded">
              족보 정답: <strong>{q.jokboAnswer || "미표기"}</strong>
            </span>
            <span className="px-2 py-0.5 bg-indigo-100 rounded">
              Claude 정답: <strong>{q.claudeAnswer}</strong>
            </span>
            {answerDiffers && (
              <span className="px-2 py-0.5 jokbo-diff rounded text-amber-900 font-semibold">
                ⚠️ 족보≠Claude
              </span>
            )}
            {uncertain && !submitted && (
              <span className="px-2 py-0.5 bg-amber-200 text-amber-900 rounded font-semibold">
                🤔 확신 없어 조기공개 · 채점 제외
              </span>
            )}
          </div>
          <details open={uncertain && !submitted}>
            <summary className="text-sm font-semibold text-slate-700 py-1">해설 보기</summary>
            <div className="mt-2 text-[13px] leading-relaxed text-slate-700 bg-slate-50 p-3 rounded">
              {renderExplanation(q.explanation)}
            </div>
          </details>
        </div>
      )}
    </div>
  );
}

function NonScoreCard({ q, idx }) {
  const { prompt, choices } = useMemo(() => splitBody(q.body), [q.body]);
  return (
    <div className="border border-amber-300 bg-amber-50 rounded-lg p-4">
      <div className="text-xs font-mono text-amber-800 mb-2">
        #{idx + 1} · {q.round} · #{q.num}
        {q.qid && <span className="ml-1 text-amber-600">({q.qid})</span>}
        <span className="ml-2 px-1.5 py-0.5 bg-amber-200 rounded">답변형식: 특수</span>
      </div>
      <div className="mb-2 whitespace-pre-wrap text-[14px] leading-relaxed">{prompt}</div>
      {choices.length > 0 && (
        <div className="space-y-1 mb-3">
          {choices.map((c, i) => (
            <div key={i} className="text-[13px] px-2 py-1 bg-white border border-amber-200 rounded">
              {c}
            </div>
          ))}
        </div>
      )}
      <div className="flex flex-wrap gap-2 mb-2 text-xs">
        <span className="px-2 py-0.5 bg-slate-100 rounded">
          족보: <strong>{q.jokboAnswer}</strong>
        </span>
        <span className="px-2 py-0.5 bg-indigo-100 rounded">
          Claude: <strong>{q.claudeAnswer}</strong>
        </span>
      </div>
      <details>
        <summary className="text-sm font-semibold text-slate-700">해설 보기</summary>
        <div className="mt-2 text-[13px] leading-relaxed bg-white p-3 rounded border border-amber-200">
          {renderExplanation(q.explanation)}
        </div>
      </details>
    </div>
  );
}

// ─────── Load data (embedded by build_quiz_data.py) ───────
function __boot() {
  const rootEl = document.getElementById("root");
  const dataEl = document.getElementById("quiz-data");
  if (!dataEl) {
    rootEl.innerHTML =
      `<div class="max-w-2xl mx-auto p-6 text-rose-700">quiz-data script 태그를 찾을 수 없음.</div>`;
    return;
  }
  let data;
  try {
    data = JSON.parse(dataEl.textContent);
  } catch (err) {
    rootEl.innerHTML =
      `<div class="max-w-2xl mx-auto p-6 text-rose-700">
        JSON.parse 실패: ${err.message}<br/>
        <code>python tools/build_quiz_data.py</code>로 재생성 필요.
      </div>`;
    return;
  }
  if (!data || Object.keys(data).length === 0) {
    rootEl.innerHTML = `<div class="max-w-2xl mx-auto p-6 text-rose-700">데이터 비어있음.</div>`;
    return;
  }
  const root = ReactDOM.createRoot(rootEl);
  root.render(<App data={data} />);
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", __boot);
} else {
  __boot();
}
</script>
</body>
</html>
