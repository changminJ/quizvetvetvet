 **높음** → 세포막 통과 용이. ④가 반대 서술.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "12", "qid": "Q011", "body": "12. 수소이온과 관련된 생체이물에 대한 설명 중 틀린 것은?\n\n① 약산성의 환경인 장에서는 약산성의 화학물질과 약이 잘 흡수된다.\n② 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n③ 살리실산염에 의한 중독에서 탄산수소소듐을 투여하면 오줌의 알칼리성을 증가시킨다.\n④ 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n⑤ 대부분의 생체이물들의 흡수는 작은창자에서 이루어지는데 이는 약알칼리성인 장내 pH와 수백만 개의 융모로 구성된 매우 넓은 표면적과 특별한 흡수성 상피 때문이다.", "jokboAnswer": "1", "claudeAnswer": "**①**", "explanation": "교과서 p.12. 소장은 약**알칼리성** 환경 → 약**염기성** 물질 흡수 ↑. ①의 \"약산성의 환경인 장\" + \"약산성 화학물질 잘 흡수\"는 두 가지 오류.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "13", "qid": "Q012", "body": "13. 생체이물들의 체내이용 제한요소들 중 틀린 것을 모두 고르시오.\n\n① 간장 내의 대사\n② 작은 창자 내의 제1상, 제2상 관련 양쪽 효소들\n③ 소화기계 내의 매우 강한 pH, 가수분해 효소들, 미생물들\n④ 폐포 표면의 90%를 차지하는 capillary bud\n⑤ 작은 창자의 특별한 흡수 상피", "jokboAnswer": "4, 5", "claudeAnswer": "**④⑤**", "explanation": "교과서 p.13. ①②③ = 체내이용 제한 요소. ④ 폐포 모세혈관상 = 흡수 촉진; ⑤ 소장 흡수성 상피 = 흡수 촉진 → 제한요소 아님.", "tail": "", "scoreable": true, "correctIndices": [3, 4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "14", "qid": "Q013", "body": "14. 생체이물에 노출되는 주요 경로 중 하나인 호흡경로에 대한 설명 중 틀린 것은?\n\n① 폐는 심장박출량 100%를 받아들이고 기관지에서 말단 폐포까지 기도의 많은 분지는 흡수를 위한 거대한 표면적을 제공한다.\n② 폐포 표면의 90%가 모세혈관상(capillary bed)에 노출되어 있기 때문에 폐를 통한 흡수는 매우 신속하다.\n③ 폐의 해부학적 부위와 관계없이 화학물질은 확산, 퇴적, 축적된다.\n④ 폐흡수 과정을 통해 전달되는 화학물질은 간장 일차 통과 대사를 거친 후 직접 심장을 통하여 체순환으로 들어간다.\n⑤ 능동적 확산은 생체이물의 흡수에 중요한 역할을 한다.", "jokboAnswer": "3, 4, 5", "claudeAnswer": "**③④⑤**", "explanation": "교과서 p.13.\n- ③ 오류: 입자 크기·기도 구조에 따라 침착 부위 달라짐.\n- ④ 오류: 폐흡수 → 간 초회통과 **없이** 체순환 직접 진입.\n- ⑤ 오류: **수동적** 확산이 주요 기전.", "tail": "", "scoreable": true, "correctIndices": [2, 3, 4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "15", "qid": "Q014", "body": "15. 동물 종에 따른 흡수에 대한 내용 중 틀린 것을 모두 고르시오.\n\n① 초식동물에 비해 육식동물에서 지방용해성 외래독성물질 축적률이 낮다.\n② 섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높인다.\n③ 어린 송아지와 새끼 양은 매우 거친 먹이에 적응할 정도로 성장할 때까지는 단위동물과 유사하다.\n④ 혐기성인 반추수의 1위는 비반추동물에 비해 화학물질을 매우 효과적으로 증가시킨다.\n⑤ 반추동물은 나이 의존적인 화학물질의 흡수를 보인다.", "jokboAnswer": "1, 2, 4", "claudeAnswer": "**①②④**", "explanation": "교과서 p.14.\n- ① 오류: 육식동물 = 축적률 **높음**.\n- ② 오류: 섬유소 → 생체이용률 **감소**.\n- ④ 오류: 반추 1위 = 화학물질 효과적 **감소**. \"증가\"는 틀림.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "16", "qid": "Q015", "body": "16. 생체이물의 분포에 관한 내용으로 틀린 것을 모두 고르시오.\n\n① 관류율은 확산이 느릴 때 그 속도를 제한한다.\n② 생체이물의 신체 기관 내 분포는 확산율, 그리고 해당기관에서의 상대적 친화성에 의해 주로 영향을 받는다.\n③ 혈중 단백질 결합률이 높은 화합물들은 대부분 낮은 조직분포를 보인다.\n④ propranolol은 높은 단백질 결합률을 보이기 때문에 많은 조직들에서 낮은 조직 분포율을 보인다.\n⑤ 혈중 단백질 결합이 증가하면 관류율이 높은 기관에서 이것은 혈액에서 기관으로 확산율을 증가시킬 수 있다.", "jokboAnswer": "1, 4", "claudeAnswer": "**①④**", "explanation": "교과서 p.14.\n- ① 오류: 관류율 = 확산 **빠를 때** 속도 제한.\n- ④ 오류: propranolol은 조직 친화력 높아 조직분포 **높음**.", "tail": "", "scoreable": true, "correctIndices": [0, 3]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "17", "qid": "Q016", "body": "17. 약물 또는 생체이물의 역학적 형태를 단순화시켜 기술한 비구획성 독동학 매개변수에 대해 틀린 것을 모두 고르시오.\n\n① AUC: 시료채취 기간에 걸친 약물 노출의 양적인 측정이다.\n② Cmax: 약물의 농도 측정 과정 동안 유지된 약물의 최고 농도로 약물 흡수 정도를 결정하기 위하여 자주 이용된다.\n③ Tmax: 최고 농도에 도달한 시간을 의미하며 약물 흡수 속도를 평가하는 데 유용하다.\n④ Cmin: 시간 대비 혈중약물농도 곡선에서 배출단계 동안에 도달한 최저 약물농도로 최고혈중농도에 대한 최저혈중농도 비율은 약물배출 속도에 대해 값진 정보를 제공할 수 있다.\n⑤ AUCi-task: 약물의 안전성 평가를 위한 독동학 연구에서 0시간부터 12시간까지 측정된다.", "jokboAnswer": "5", "claudeAnswer": "**⑤**", "explanation": "교과서 p.15. AUC = 0~2시간. \"12시간\" = 오류.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "18", "qid": "Q017", "body": "18. 분포용적에 관한 설명 중 틀린 것을 모두 고르시오.\n\na. 독성물질이 큰 조직분포를 보이고 약물이 폭 넓게 조직들과 결합될 경우에도 Vd는 조직용적을 초과할 수 없다.\nb. Vd는 혈관 내분포의 지표로 간주되며, L(리터) 단위 또는 L/체중 kg 단위로 표시된다.\nc. 투여용량을 체내에 존재하는 혈중농도로 나눈 값이며, 조직적으로 독성물질이 체내에 분포된 독성물질의 양을 나타낸다.\nd. Vd는 독성물질 특이적이며 중앙혈액분획 내의 모든 독성물질의 분포를 나타낸다.\ne. 더 큰 Vd를 가진 독성물질이 큰 조직분포를 보인다.\n\n① bcde  ② abd  ③ abde  ④ bce  ⑤ abcd", "jokboAnswer": "2 (② abd)", "claudeAnswer": "**② abd**", "explanation": "교과서 p.15.\n- a 오류: Vd는 조직용적 초과 가능 (겉보기 값).\n- b 오류: Vd = 전신 분포 지표.\n- c 옳음.\n- d 오류: Vd는 전신 분포 나타냄.\n- e 옳음.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "19", "qid": "Q018", "body": "19. 다음 중 독동학 구획 모형에 대한 설명으로 옳지 않은 것은?\n\n① 약물 기반의 생리학이나 해부학적 구조의 기질적 특성에 대한 정보가 필요하다.\n② 복합적 투여 용량에서 약물의 축적 정도를 설명하거나 예측하는 데 값진 정보를 제공한다.\n③ 특별한 노출 정도까지 도달하기 위한 약물의 효용성, 투여 용량 및 투약 방식을 선택하는 데 이용할 수 있다.\n④ 특별한 조직의 생물학 구획 간의 개별적인 전달 속도, 배출 경로에서 개별적인 기여와 비율 등을 정확하게 평가하고 반영할 수 있다.\n⑤ 서로 다른 투여 용량에서 체순환 내에서의 약물의 시간적 과정을 평가하거나 예측하는 데 사용할 수 있다.", "jokboAnswer": "1, 3, 4", "claudeAnswer": "**①④**", "explanation": "교과서 p.14~15.\n- ① 오류: 구획모형 = 생리·해부 정보 없이도 단순화 기술 가능.\n- ② 옳음.\n- ③ 재검토: 족보 정답이 ③을 틀렸다고 하나 교과서에서 구획모형의 용도 중 투여용량·방식 선택 활용을 언급. 불분명.\n- ④ 오류: 개별 조직 구획 간 전달속도·배출 기여 **정확하게** 평가 = 구획모형 한계.\n- **Claude 재판정: ①④**.", "tail": "", "scoreable": true, "correctIndices": [0, 3]}, {"lecture": "L05-factors", "round": "2025-중간", "num": "20", "qid": "", "body": "독성에 영향을 미치는 물리화학적 요인 중 틀린 것을 모두 고르시오.\n\n① 페노티아진(phenothiazine)은 입자의 크기가 작아져도 독성이 증가하지 않는다.\n② 독성물질의 화학구조는 체내흡수·분포·작용기전에 영향을 미친다.\n③ 독성물질에서 용질을 충분히 녹일 수 있는 운반체의 액량 및 농도는 흡수 속도에 영향을 미친다.\n④ 독성물질의 물리적 제형이나 입자의 크기는 독성에 영향을 미치지 않는다.\n⑤ 지용성 물질은 지질막을 잘 통과하므로 흡수가 빠르고 지방이나 신경조직에 잘 축적된다.", "jokboAnswer": "①, ④", "claudeAnswer": "①, ④", "explanation": "[2024-중간] #20을 5지 단일 선지형으로 재구성한 문항. 틀린 것 **모두** 고르라는 형태로 정답이 2개(①·④).\n\n- **① 틀림**: 교재 p.17 \"페노티아진은 입자가 작을수록 독성이 높아진다\". 족보 선지는 \"작아져도 증가하지 않는다\"로 정반대.\n- **② 옳음**: 교재 p.17 \"화학 구조는 체내 흡수, 분포, 대사 및 작용기전에 큰 영향\" — 일치.\n- **③ 옳음**: 교재 p.17-18 운반체·용매는 흡수에 영향. 액량·농도 포함.\n- **④ 틀림**: 교재 p.17 \"제형, 순도, 입자 크기 등에 따라 독성이 다르게 발현된다\" — 영향 **큼**. 족보 선지 반대.\n- **⑤ 옳음**: 교재 p.17 지용성 → 지질막 통과·지방·신경 축적 — 그대로.\n\n따라서 ①·④ 두 선지가 틀려 정답.\n\n함정 요소는 ①과 ④가 결국 같은 개념을 다른 어휘로 표현한 점이다. ①은 구체 물질(페노티아진), ④는 일반 진술(제형·입자 크기)로 서술만 다르지 본질은 동일(\"입자 크기 → 독성\")이다. 둘 다 방향이 뒤집혀 있으므로 함께 골라야 한다. ②·③·⑤는 교재 원문과 일치하여 방향이 올바르다.", "tail": "", "scoreable": true, "correctIndices": [0, 3]}, {"lecture": "L05-factors", "round": "2025-중간", "num": "21", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 설명 중 틀린 것을 모두 고르시오.\n\na. 독성 정도는 투여 횟수에 크게 영향을 받지 않는다.\nb. 동물 종에 따라 대사효소의 활성도 또는 흡수율에 따라 선택적 독성이 유발되는 경우가 있다.\nc. 동일종의 동물에서 독성은 체중이나 체표면적에 비례한다.\nd. 배설 경로는 흡수 속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\ne. 연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서 독성의 차이가 나타난다.\nf. 대사과정에서 궁극적인 독성물질로 활성화되는 경우에는 피하나 복강내 투여가 오히려 경구 투여보다 높은 독성을 발현한다.", "jokboAnswer": "a, d, f", "claudeAnswer": "a, d, f", "explanation": "[2022-중간] #14 / [2024-중간] #21·#35의 선지 a~f를 순서만 뒤섞어 재출제. 2022·2024에서는 \"a, b, c\"가 틀린 3개였지만 2025는 선지 순서를 바꿨기 때문에 틀린 3개가 **a, d, f**로 이동했다 (내용은 동일).\n\n- **a 틀림**: 투여 횟수 → 독성 큰 영향 (교재 p.18).\n- **b 옳음**: 종간 선택적 독성, 대사효소·흡수율 차이 (교재 p.19).\n- **c 옳음**: 체중·체표면적 비례 (교재 p.20).\n- **d 틀림**: 노출(투여) 경로가 절대적 요인이며 배설 경로가 아님 (교재 p.18).\n- **e 옳음**: 연령별 차이 (교재 p.20).\n- **f 틀림**: 다이옥신 예외 — 경구 > 피하·복강내 (교재 p.19). 족보 선지 반대.\n\n따라서 a·d·f가 틀린 정답.\n\n함정 요소는 2022·2024에서 \"a, b, c가 틀림\"이라는 패턴을 암기한 수험생이 반사적으로 a·b·c를 고르는 것을 유도한다. 그러나 2025에서는 옛날의 b·c 위치에 d·f가 배치되어 있다. 선지 번호가 아니라 **내용의 방향**으로 판정해야 한다. 통제 지점 3개: (i) 투여 횟수 \"영향 없음\" 서술, (ii) **\"배설\"** 경로라는 단어, (iii) \"피하·복강내 > 경구\" 서술. 이 세 문구가 보이면 무조건 틀림.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "22", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 관한 내용 중 틀린 것을 모두 고르시오.\n\n① 페노바비탈(phenobarbital)의 LD₅₀은 경구투여에서보다 혈관내투여에서가 높다.\n② 다이옥신은 대사과정에서 궁극적인 독성물질로 활성화되어 경구투여에서보다 피하나 복강내투여에서가 높은 독성을 발휘한다.\n③ 아플라톡신 B₁에 의한 간암독성은 랫드가 마우스보다 훨씬 민감하다.\n④ 포유류에는 말라티온 분해효소가 존재하여 효소가 없는 해충에 비해 독성이 낮다.\n⑤ thiamine(vitamin B₁)을 체내에서 합성하는 반추류는 thiaminase를 함유하는 고사리 중독에 말보다 더 민감하다.", "jokboAnswer": "①, ②, ⑤", "claudeAnswer": "①, ②, ⑤", "explanation": "[2022-중간] #15, [2024-중간] #22와 같은 5대 함정 문항이지만 **틀린 것 모두 고르기**로 형식을 바꾸고 3개 선지를 동시에 뒤집었다.\n\n- **① 틀림**: 교재 p.19 페노바비탈 LD₅₀ — 경구 280 > IV 80 mg/kg. 즉 LD₅₀ 수치는 **경구가 더 높다**(IV가 낮음). 족보 선지는 \"IV가 경구보다 높다\"로 정반대. LD₅₀ 수치와 독성 방향을 명확히 구분하지 않으면 걸리는 함정.\n- **② 틀림**: 교재 p.19 다이옥신 예외 — **경구가 피하·복강내보다 독성 강함**. 족보 선지는 반대.\n- **③ 옳음**: 랫드 15 ppb >> 마우스 10,000 ppb (교재 p.20).\n- **④ 옳음**: 포유류 carboxylesterase → 말라티온 분해 → 독성 **낮음**. 교재 p.19. 족보 선지가 이번에는 방향이 맞게 서술됨 (흔치 않은 경우).\n- **⑤ 틀림**: 교재 p.19 \"반추류는 고사리 중독에 말보다 **덜** 민감\". 족보 선지는 \"더 민감\"으로 반대. 반추위 미생물 thiamine 합성이 thiaminase 공격을 상쇄.\n\n틀린 선지 ①·②·⑤ 세 개 → 정답.\n\n함정 요소는 역대 문항과 달리 이번에는 **④(말라티온)가 맞는 서술**로 나왔다는 점이다. 매년 ④자리에 말라티온이 뒤집혀 나오던 패턴이 깨졌다. 대신 ①(페노바비탈 LD₅₀)과 ⑤(반추류)가 뒤집혀 있다. 문항 유형 자체에 대한 선입견으로 한두 개만 고르고 넘어가면 감점이다. **다섯 선지 모두 독립적으로 판정**해야 안전하다. 핵심 통제: (i) LD₅₀ 수치와 독성의 역방향 관계, (ii) 다이옥신=경구 강함, (iii) 반추류=저항성.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 4]}, {"lecture": "L05-factors", "round": "2025-중간", "num": "23", "qid": "", "body": "독성에 영향을 미치는 건강상태 요인에 대한 것으로 틀린 것은?\n\na. 영양상태, 섭취한 동식물의 종류, 각종 질환 보유 여부 등에 따라 특정 독성물질의 독성이 영향을 받음.\nb. 아세트아미노펜은 고단백 식이로 인해 독성이 증가하고 약효가 상승한다.\nc. 안티피린은 채식을 선호하는 인종보다 육류를 선호하는 인종에서 대사가 수월하여 약효가 높아진다.\nd. 암페타민은 저체온에서 독성이 증가한다.\ne. DDT는 저체온에서 독성이 증가한다.", "jokboAnswer": "미표기", "claudeAnswer": "b, c, d (틀린 것 3개)", "explanation": "[2024-중간] #23과 선지 a~d는 동일하지만, **e선지만 DDT 체온 방향이 바뀌어** \"저체온\" (옳음)으로 출제되었다. 즉 2024 버전의 e는 \"DDT 고체온\"(틀림)이었으나 2025 버전 e는 \"DDT 저체온\"(맞음)이 됐다.\n\n- **a 옳음**: 영양·질환 → 독성에 영향 (교재 p.20).\n- **b 틀림**: APAP는 고단백 식이로 독성 **감소**·약효 **저하** (교재 p.20). 족보 선지는 \"독성 증가, 약효 상승\"으로 반대.\n- **c 틀림**: 안티피린은 육류 소비자(Caucasians)에서 대사 수월 → 약효 **낮아짐** (교재 p.20). 족보 선지는 \"약효 높아진다\"로 반대. 빠른 대사는 약효를 떨어뜨림(반감기 단축).\n- **d 틀림**: 암페타민은 **고체온**에서 독성 증가 (교재 p.20). 족보 선지는 \"저체온\"으로 반대. 교감신경 흥분제는 고체온과 결합하면 더 위험.\n- **e 옳음**: DDT는 **저체온**에서 독성 증가 (교재 p.20). 족보 선지 방향 맞음. 저체온에서 DDT 대사·배설 저하로 축적 증가.\n\n틀린 것은 b·c·d 세 개.\n\n함정 요소는 **동일 선지 구조의 작년 문항을 기억한 수험생이 e도 자동으로 \"틀림\"으로 분류하는 실수**다. 2024·2025에서 e선지가 정반대로 달라졌으니 선지를 끝까지 독립적으로 읽어야 한다. 암페타민=**고체온**, DDT=**저체온**의 짝은 순서가 반대이므로 \"A가 앞의 단어, D가 뒤의 단어\"처럼 혼동을 방지하는 자기만의 암기 트릭이 필요하다. \"암**페**타민 = **고**, D**D**T = **저**\"로 초성 대조 외우기 추천.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "24", "qid": "", "body": "독성물질의 연용효과(Continuous use)와 그에 대한 설명이 맞게 짝지어진 것은?\n\na-축적  b-과민감화  c-내성  d-습관성\n\nㄱ- 반복 투여된 독성물질이 흡수에 비해 대사나 배설이 늦어 독성이 과도하게 나타나는 현상.\nㄴ- 이전의 반복노출에 의해 감수성이 증가해 동일용량 투여에도 과도한 반응이 유도되는 현상.\nㄷ- 이전의 반복 노출에 의해 감수성이 감소되어 동일용량 투여에도 불구하고 같은 정도의 독작용이 일어나지 않는 현상.\nㄹ- 일부 독성물질을 장기간 투여할 때 나타나는 탐닉 현상으로, 물질의 투여를 중단하면 금단 증상으로 건강상태가 현저하게 나빠진다.\n\n(선지 번호 원본 미복구)", "jokboAnswer": "미표기 (구조상 a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ)", "claudeAnswer": "a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ", "explanation": "[2024-중간] #24와 개념은 동일하지만 **ㄱ~ㄹ 설명 순서가 달라서** 매칭 결과가 바뀐다. 2024에서는 ㄱ이 내성 정의였지만, 2025에서는 **ㄱ이 축적 정의**로 바뀌었다. 따라서 매칭 결과도 달라진다.\n\n교재 p.21 연용효과 정의 기준 판정:\n- **a 축적 = ㄱ**: \"흡수 > 대사·배설 → 독성 과도\" = ㄱ 설명과 정확히 일치.\n- **b 과민감화 = ㄴ**: \"감수성 증가 → 과도한 반응\" = ㄴ 설명과 정확히 일치.\n- **c 내성 = ㄷ**: \"감수성 감소 → 같은 효과 미달\" = ㄷ 설명과 정확히 일치.\n- **d 습관성 = ㄹ**: \"탐닉·금단증상\" = ㄹ 설명과 정확히 일치.\n\n결과적으로 a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ. 선지 번호와 무관하게 **4개가 순서대로 1:1 대응**된다.\n\n함정 요소는 2024년에 내성 = ㄱ이었던 것을 반사적으로 외운 수험생이 2025년에도 같은 매칭(c-ㄱ)을 쓰는 실수다. 설명문 ㄱ~ㄹ의 **내용**으로 판정해야 하며, 번호 암기는 통하지 않는다. 요령: 정의의 핵심 단어만 추출해서 매칭하면 빠르다 — \"흡수>배설 = 축적\", \"감수성 증가 = 과민감화\", \"감수성 감소 = 내성\", \"탐닉·금단 = 습관성\". 각 정의는 딱 하나의 개념에만 대응되므로 매칭은 기계적이다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "25", "qid": "", "body": "생물학적 작용을 가진 두 개 이상의 독성물질에 의한 현상에 대해 알맞게 짝지어진 것은?\n\na-부가효과  ㄱ- 두 개 이상의 독성물질이 서로 반대로 작용하여 독성이 감소하는 것\nb-증강효과  ㄴ- 각각의 효과를 더한 것보다 크게 증가하는 효과\nc-상승효과  ㄷ- 특정 효과가 없는 A약물이 B약물의 효과를 더 증강시키는 것\nd-길항효과  ㄹ- 두 약물의 병용효과가 각각의 효과를 더한 만큼 증가하는 것\n\n(선지 번호 원본 미복구)", "jokboAnswer": "a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ (표기 오류 다수)", "claudeAnswer": "a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ", "explanation": "[2022-중간] #17, [2024-중간] #25와 완전히 동일한 병용효과 매칭. ㄱ~ㄹ 설명 순서가 동일하여 정답도 동일하다.\n\n- **a 부가 = ㄹ**: 1+1.2=2.2 (에테르+클로로폼)\n- **b 증강 = ㄷ**: 0+1>1 (이소프로판올+CCl₄)\n- **c 상승 = ㄴ**: 2.3+5.0=61.1배 (아트로핀+2-PAM)\n- **d 길항 = ㄱ**: 반대 작용, 독성 감소\n\n교재 pp.22-23 기준. 연용효과 매칭(c=ㄷ)과 혼동하지 말 것 — **병용효과는 c=ㄴ(상승)**이다.\n\n함정 요소: 이 문항은 2022·2024·2025 세 차례 거의 동일하게 출제되어 **\"병용효과 매칭 답은 ㄹ-ㄷ-ㄴ-ㄱ\"**로 암기하면 바로 답이 나온다. 다만 매년 선지 번호는 달라질 수 있으므로 ㄹ-ㄷ-ㄴ-ㄱ 조합을 찾아 그 번호를 고르는 것이 안전하다. 또 연용효과와 병용효과를 혼동하지 말 것: 연용은 반복 노출에서의 체내 반응, 병용은 여러 물질 동시 노출.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2025-중간", "num": "26", "qid": "", "body": "다음 빈칸에 적절히 선택된 것을 고르시오.\n[그림: 생체내 약물(독물)의 대사 경로 및 대사산물]\n\nA: 고지용성  B: 제2상 반응: 생합성  C: 포합  D: 산화, 환원, 가수분해  E: 제1상 반응\n\n① A-B-D-C-E  ② A-B-D-E-C  ③ A-D-E-C-B  ④ A-E-D-B-C  ⑤ A-E-C-B-D", "jokboAnswer": "④", "claudeAnswer": "④ (A-E-D-B-C)", "explanation": "[2024-중간] #26과 완전히 동일한 문항. 그림·선지·정답 모두 그대로. 정답 ④ A-E-D-B-C.\n\n교재 04장 대사 흐름도 (교재발췌.md chunk 8 근방) 기준:\n- **A 고지용성** → 외인성 독성물질이 고지용성 상태로 체내 진입.\n- **E 제1상 반응** → 대사 첫 단계 카테고리.\n- **D 산화·환원·가수분해** → E의 하위 내용. 작용기 노출·변형.\n- **B 제2상 반응: 생합성** → 대사 두 번째 단계 카테고리.\n- **C 포합(conjugation)** → B의 하위 내용. 글루쿠론산·술페이트·글루타티온 등과 결합 → 수용성 증가 → 배설.\n\n오답 소거는 [2024-중간] #26 해설과 동일하다. 카테고리(E, B)와 하위 내용(D, C)을 섞거나, 1·2상 순서를 뒤집거나, A를 제외하고 시작 위치를 바꾸면 전부 틀림.\n\n함정 요소는 없다. 2024년 동일 문항이 그대로 출제되었으므로 **답 ④ 고정 암기**로 충분하다. 다만 개념적으로는 1상(functional group 노출) → 2상(conjugation 부착) 순서의 필연성을 이해해야 다른 유사 문항에도 대응 가능하다. 이 문항은 L06 biotransformation 단원의 도입부 개념과 연결되며, L05 범위 내에서 완결되어 있다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "27", "qid": "Q026", "body": "27. 외인성 물질의 대사 중 틀린 것을 모두 고르시오.\n\n①. 친수성, 분자량 큰 물질은 지용성으로 바귀어 흡수는 어렵고 배설이 용이해진다.\n②. 외인성 물질이 대사적 활성화되어 생성된 물질을 반응성 대사산물이라 한다.\n③. 외인성 물질은 생화학적 활성이 없는 물질이 되거나 또는 더욱 생물학적 독성이 높은 물질이 될 수 있다.\n④. 외인성 물질들이 생체내 대사 거쳐 독성 있는 물질로 변환되는 과정을 대사적 활성화라고 한다.\n⑤. 대사는 외인성 물질의 배설, 덜 유해한 물질로의 변환을 통해 중요한 방어기전의 역할을 한다.", "jokboAnswer": "①", "claudeAnswer": "**①**", "explanation": "1) **배경**: [2024-중간] #27과 동일 핵심. 동일 함정 반복.\n\n2) **포인트·정답 근거**: ① 방향이 반대. 강의안 lec-07 chunk 4: 대사 = **지용성(친지성)** → **수용성(친수성)**.\n\n3) **오답 소거**: ②③④⑤ 모두 강의안 개념 그대로.\n\n4) **함정**: 지문 결과부(흡수 어렵고 배설 용이)가 맞아서 전체를 맞는 것으로 오인할 위험.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "28", "qid": "Q027", "body": "28. 다음 중 반응성 대사산물에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. 친전자성 물질은 체액이나 세포 내 친핵성 물질과 포합되어 비활성화되며 가장 많은 친핵성 또는 해독 분자는 핵산이다.\nb. 친핵성 물질은 상대편 분자의 친전자성 물질과 반응하며 생체 내에서 단백질, 지질, 핵산, GSH 등이 친전자성 물질이다.\nc. 자유기는 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다.\nd. 산화-환원적 스트레스를 일으키는 것은 생체에서 비교적 쉽게 환원될 수 있는 분자 산소(O₂) 이다.\ne. 정상적으로 O₂는 근육과 혈관에서 신호 분자이지만, 독성학으로는 산화적 스트레스의 주요 요소이다.\n\n①. a, b, c\n②. a, e\n③. b, d, e\n④. a, b, d, e\n⑤. a, b, e", "jokboAnswer": "⑤", "claudeAnswer": "**⑤**", "explanation": "1) **배경**: [2022-중간] #19, [2024-중간] #28의 확장판. e의 기체 분자만 O₂로 바뀜.\n\n2) **포인트**: 3개 함정을 동시에 잡아내야 함.\n\n3) **정답 근거**:\n   - a(**틀림**): 해독 분자 = **물**, 핵산 아님.\n   - b(**틀림**): 단백질·지질·핵산·GSH = **친핵성** (친전자성 아님).\n   - c·d(맞음).\n   - e(**틀림**): 근육·혈관 신호 분자 = **NO**. O₂도 아니고 CO도 아님.\n\n4) **오답 소거**: 틀린 3개 모두 포함 = ⑤.\n\n5) **함정**: b는 미묘 — \"단백질·지질·핵산·GSH는 친핵성 분자\"라고 외워야 함. 친전자성 물질이 이들을 **공격**하는 관계.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "29", "qid": "Q028", "body": "29. 반응성 대사산물을 생성하는 아래의 물질들에 대한 설명 중 틀린 것을 모두 고르시오.\n\n①. 대식세포에서는 ONOO⁻를 형성한 다음 NO₂와 HO·를 생성하기 때문에 대식세포는 RNS 생성의 중요한 경로가 된다.\n②. 벤젠은 산화-환원 순환을 거쳐 O₂⁻를 생성하는 대표적인 물질이다.\n③. 장내 세균총은 질산염(NO₃)을 아질산염(NO₂)으로 환원시켜 독성이 더욱 강한 물질로 된다.\n④. 전이 금속들은 제1상과 제2상 반응을 촉진시켜 HO·을 생성하도록 한다.\n⑤. paraquat는 산화-환원 순환(redox cycling)을 거쳐 O₂⁻를 생성시켜 선택적인 간독성을 일으키기 쉽다.", "jokboAnswer": "④⑤", "claudeAnswer": "**④⑤**", "explanation": "1) **배경**: [2022-중간] #20의 리메이크. ②에서 Benzene의 O₂⁻ 생성은 옳다고 다시 확인.\n\n2) **포인트·정답 근거**:\n   - ④(**틀림**): 전이 금속 = **Fenton 반응**(Fe²⁺+H₂O₂→Fe³⁺+HO·). 1·2상 반응과 무관.\n   - ⑤(**틀림**): Paraquat = **폐독성** (간독성 아님).\n\n3) **오답 소거**: ①②③ 모두 옳음.\n\n4) **함정**: ②의 \"벤젠→O₂⁻\"를 HO·로 착각하면 오답 포함해 과잉 선택할 수 있음 — Benzene은 **O₂⁻**.", "tail": "", "scoreable": true, "correctIndices": [3, 4]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "30", "qid": "Q029", "body": "30. 다음 중 반응성 대사산물을 생성하는 물질들에 대한 설명으로 틀린 것을 모두 고르시오.\n\n①. 대식세포에서는 ONOO⁻를 형성한 다음 NO₂와 HO·를 생성하기 때문에 대식세포는 RNS 생성의 중요한 경로가 된다.\n②. Paraquat는 산화-환원 순환(redox cycling)을 거쳐 O₂⁻를 생성시켜 간독성을 일으키기 쉽다.\n③. 장내 세균총은 질산염(NO₃)을 아질산염(NO₂)으로 환원시켜 독성이 더욱 강한 물질로 만든다.\n④. 전이 금속들은 제1상과 제2상 반응을 촉진시켜 HO·를 생성하도록 한다.\n⑤. Benzene은 산화-환원 순환을 거쳐 HO·를 생성하는 대표적인 물질이다.", "jokboAnswer": "②, ④, ⑤", "claudeAnswer": "**②, ④, ⑤**", "explanation": "1) **배경**: 3대 고정 함정이 모두 한 문항에 응축된 \"종합 문제\".\n\n2) **포인트·정답 근거**:\n   - ②(**틀림**): Paraquat = 폐독성.\n   - ④(**틀림**): 전이 금속 = Fenton 반응.\n   - ⑤(**틀림**): Benzene = **O₂⁻**(HO· 아님). 강의안 lec-07 chunk 6 슬라이드 2.\n\n3) **오답 소거**: ①③ 옳음.\n\n4) **함정**: Benzene의 ROS 산물을 HO·로 적어놓은 선지에 주의 — O₂⁻만 정답.", "tail": "", "scoreable": true, "correctIndices": [1, 3, 4]}, {"lecture": "L08-mechanism-3", "round": "2025-중간", "num": "31", "qid": "", "body": "아래의 독성물질과 표적 분자가 잘못 짝지어진 것을 고르시오.\n\n① aflatoxin - DNA 아데닌\n② 복어독 tetratoxin - acetylcholine esterase\n③ CO - 적혈구의 혈색소\n④ 사염화탄소 - 막지질\n⑤ 유기인계 - 나트륨 통로", "jokboAnswer": "3", "claudeAnswer": "강의자료 기준 실제로는 ①, ②, ⑤가 모두 틀리나, 족보 원본 채점 기준상 ③", "explanation": "본 문항은 **출제 오류 가능성이 높은 문항**이다. 교재발췌 라인 451~478 기준으로 선지를 객관적으로 판정하면:\n\n- ① **틀림** — Aflatoxin 표적은 **DNA의 guanine**(특히 N-7 위치)이다. \"아데닌\"이 아니다(교재발췌 라인 479~481).\n- ② **틀림** — TTX 표적은 **막전위 의존성 Na⁺ 통로**. AChE가 아니다.\n- ③ **옳음** — CO → Hb → COHb → 산소 공급 억제. 정확한 매칭.\n- ④ **옳음** — CCl4 → 자유기 → 세포막 지질과산화. 정확한 매칭.\n- ⑤ **틀림** — 유기인계 표적은 **AChE**. Na⁺ 통로는 TTX 표적.\n\n즉 강의자료 기준으로는 **①, ②, ⑤가 잘못 짝지어진 것**이고, ③은 정확히 옳은 매칭이다. 그런데 족보 정답이 ③으로 표기되어 있어 **발문(\"잘못 짝지어진 것을 고르시오\")과 모순**된다. 세 가지 가능성이 있다.\n\n(1) 족보 채점 정답 기록 오류 — 실제 정답은 ①, ②, ⑤ 다중 정답이었는데 기록만 ③으로 잘못 남았을 수 있다.\n(2) 출제자의 의도적 출제 오류 — 출제자가 \"혈색소는 적혈구가 아니라 다른 곳\"이라 오판한 경우(그러나 교과서·강의안과 상충).\n(3) 원본 시험에서 별도 공지가 있었을 가능성 — 실제 시험에서 정답 변경 또는 모두 정답 처리되었을 수 있다.\n\n**시험 전략**: 실제 시험에서 유사 유형이 나오면 **강의자료 기준(①②⑤ 틀림)** 으로 답해야 한다. Q135(2024-mid #31)와 내용이 거의 동일하며, 거기서는 \"a, b, d, e\" 네 개 모두 정답 처리되었다. Q030도 다중 정답(①②⑤)이 교재 기준 정답일 가능성이 높다.\n\n함정 요소는 발문을 읽지 않고 반사적으로 답하는 경우다. 항상 **5쌍 매칭**(Aflatoxin=DNA guanine, TTX=Na⁺ 통로, CO=Hb, CCl4=막지질, 유기인계=AChE)을 체크리스트로 돌려 **모든 선지를 판정**한 뒤 답해야 한다.\n\n근거: 교재발췌 라인 451~481, 강의안 lec-08 슬라이드 5~7.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2, 4]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "32", "qid": "Q031", "body": "32. 다음 중 틀린 것을 모두 고르시오.\n\n①. 독성물질은 단백질, 지질, 핵산, 친핵성 물질인 세포내 thiols(GSH)를 표적으로 하고, 특히 단백질은 친전자성 물질의 공격에 주요 표적이 된다.\n②. 독성물질과 분자 간의 결합에는 비공유결합과 공유결합이 존재하고, 수소 분리, 전자 전이, 효소 반응 등이 있다.\n③. 독성물질과 분자 간의 공유결합은 가역적이다.\n④. 독성물질과 분자 간의 비공유결합은 강하고 비가역적이다.\n⑤. 소량의 친전자성 물질이 DNA와의 공유결합할 수 있으며, DNA가 알킬화되는 경우 발암을 일으킬 수 있다.", "jokboAnswer": "③, ④", "claudeAnswer": "**③, ④**", "explanation": "1) **배경**: [2024-중간] #32의 축소판. 결합 양상만 집중.\n\n2) **포인트·정답 근거**:\n   - ③(**틀림**): 공유결합은 **비가역**(강하고 안정).\n   - ④(**틀림**): 비공유결합은 **약·가역**.\n\n3) **오답 소거**: ①②⑤ 옳음.\n\n4) **함정**: 강도·가역성 개념을 교차시킨 혼동. **강=비가역, 약=가역** 한 쌍으로 암기.", "tail": "", "scoreable": true, "correctIndices": [2, 3]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "33", "qid": "Q032", "body": "33.\n\n①\n②\n③\n④\n⑤\n\n> (본문 OCR 미완성 — 선지 전혀 수집 안 됨. 반응성 대사산물·자유기 매칭 문항으로 추정)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가**", "explanation": "topic이 물질-산물 짝짓기로 추정. 핵심 짝: **Paraquat → O₂⁻(폐독성)**, **Benzene → O₂⁻**, **전이금속 → HO·(Fenton)**, **대식세포 → ONOO⁻ → NO₂·+HO·(RNS)**, **NO → 근육·혈관 신호분자**. 이 매핑이 깨지는 선지를 제거하면 정답.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "34", "qid": "Q033", "body": "세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작의 올바른 순서는?\n\na. 지방산으로부터 생성된 지질 자유기는 산소 분자와 쉽게 반응하여 세포막 지질 손상의 증폭 및 확산을 유도\nb. 직접적인 독성 유발\nc. 외인성 물질에 의해 자유기 생성\nd. aldehyde가 단백질이나 DNA와 공유결합하여 산화적 손상\ne. 지방산으로부터 수소를 분리하여 지질 자유기(L·)가 생성되어 지질과산화가 시작\nf. 유독한 aldehyde가 생성\n\n①. c-e-f-a-d-b\n②. c-e-a-f-d-b\n③. d-c-a-f-e-b\n④. e-f-a-c-d-b\n⑤. d-c-e-a-f-b", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "1) **배경**: 교과서 5장 p.38 \"지질과산화(lipid peroxidation)\"는 자유기(free radical)가 세포막 인지질의 다가불포화지방산(PUFA)을 공격해 연쇄반응(chain reaction)으로 막 구조를 파괴하는 대표적 세포손상 기전. 개시(initiation) → 전파(propagation) → 종결(termination)의 3단계 프레임이며, 본 문항의 a~f는 이 큰 흐름을 6개의 소단계로 세분한 것.\n\n2) **포인트**: 6단계의 화학적 의미를 먼저 매핑.\n   - c = **외인성 물질에 의한 자유기(R·) 생성** (개시 트리거, 반응성 대사산물·ROS 등이 씨앗이 됨)\n   - e = R·이 지방산의 **α-탄소에서 수소를 분리 → L·(lipid radical) 생성**, 진정한 지질과산화의 시작점\n   - a = L·이 **O₂와 즉시 반응 → LOO·(lipid peroxyl radical)** 형성, 인접 지방산을 다시 공격해 손상이 막 전체로 확산·증폭(전파)\n   - f = 연쇄 종결 과정에서 **MDA(malondialdehyde)·4-HNE 같은 유독한 aldehyde** 생성\n   - d = aldehyde가 **단백질·DNA와 공유결합**하여 산화적 손상을 2차 표적으로 전파\n   - b = 최종적으로 세포·조직 수준의 **직접적 독성 유발**\n\n3) **정답 근거**: 순서는 반드시 **c → e → a → f → d → b**. 이유 ─ ① 자유기가 없으면 L·이 안 생기고(c 선행), ② L·이 없으면 O₂와의 반응(a)이 불가능하며, ③ LOO·의 연쇄반응 종결 산물로서 aldehyde(f)가 나오고, ④ aldehyde가 생겨야 단백질·DNA 공유결합(d)이 가능하며, ⑤ 이 손상이 누적되어야 독성(b)이 나타나기 때문. 이 흐름을 모두 만족하는 선지는 **② c→e→a→f→d→b**.\n\n4) **오답 소거**:\n   - ① c-e-**f-a**-d-b: a(O₂ 반응·확산)가 f(aldehyde 생성)보다 먼저 와야 함. LOO· 없이는 aldehyde가 생기지 않음.\n   - ③ **d-c**-a-f-e-b: d(공유결합)가 맨 앞에 오면 aldehyde 없이 공유결합이 일어난다는 모순. c(개시)가 반드시 선행.\n   - ④ **e-f-a**-c-d-b: c(자유기 생성)가 없이 e(L· 생성)부터 시작할 수 없음. 개시 트리거 누락.\n   - ⑤ **d-c-e-a-f-b**: 역시 d가 먼저 오는 순서 오류. aldehyde(f) 뒤에 d가 와야 논리가 성립.\n\n5) **함정**: a(O₂와 반응·확산)와 f(aldehyde 생성)의 순서를 바꾸기 쉽다. \"LOO·가 먼저 만들어져 연쇄반응을 확산시키는 **전파 단계(a)**\"가 먼저이고, 이 전파가 종결되며 나오는 산물이 aldehyde(f)라는 점을 기억. 또 [2024-중간] #34, [2025-중간] #34·#36에서 선지가 동일한 형태로 반복 출제되므로 순서 자체를 **c-e-a-f-d-b**로 통암기할 것.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "36", "qid": "Q035", "body": "세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작으로 올바른 순서는?\n\na. 지방산으로부터 생성된 지질 자유기는 산소 분자와 쉽게 반응하여 세포막 지질 손상의 증폭 및 확산을 유도\nb. 직접적인 독성 유발\nc. 외인성 물질에 대해 자유기 생성\nd. aldehyde가 단백질이나 DNA와 공유결합하여 산화적 손상\ne. 지방산으로부터 수소를 분리하여 지질 자유기(L·)가 생성되어 지질과산화가 시작\nf. 유독한 aldehyde가 생성\n\n①. c-e-f-a-d-b\n②. c-e-a-f-d-b\n③. d-c-a-f-e-b\n④. e-f-a-c-d-b\n⑤. d-c-e-a-f-b", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "Q033(2025-mid #34)과 동일 문항. c→e→a→f→d→b = ②. 지질과산화 발생 기작은 동일: 외인성 자유기 생성(c) → L·생성(e) → O₂와 반응·확산(a) → aldehyde 생성(f) → 단백질·DNA 공유결합(d) → 독성 유발(b).", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L08-mechanism-3", "round": "2025-중간", "num": "38", "qid": "", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고르시오.\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.", "jokboAnswer": "c, d, e", "claudeAnswer": "c, d, e", "explanation": "[2024-중간] #38(Q142)와 **선지 a~f가 완전히 동일**한 문항이다. 선지 묶음 형식만 제거하고 \"모두 고르시오\"로 바뀌었을 뿐 판정 로직은 같다.\n\n**옳은 서술 (혈색소가 산화 표적인 이유)**:\n- a 옳음 — 적혈구는 혈액에 분포된 외래물질에 쉽게 노출됨.\n- b 옳음 — 적혈구는 핵·세포질세망이 없어 손상 단백질을 새로 합성해 대치할 수 없음.\n- f 옳음 — 혈색소 내 산소가 자동산화(autoxidation)를 촉진하는 원인.\n\n**틀린 서술 (산화 손상의 구체 형태)**:\n- c **틀림** — 변성된 globin이 적혈구 세포막에 이중결합한 것은 **Heinz body**다. Howell-Jolly body는 적혈구 내 잔류 핵 DNA로 완전히 다른 것. 핵이 있는 세포(적혈모구)에서 핵이 제거되는 과정의 잔재물.\n- d **틀림** — 산화 방향이 정반대. 독성물질은 정상 **Fe²⁺**(산소 결합형)를 **Fe³⁺**(MetHb)로 산화시킨다. 선지의 \"Fe³⁺→Fe²⁺\"는 환원이며 독성 기전과 반대.\n- e **틀림** — α·β-글로빈 사슬 시스테인 잔기의 산화는 **disulfide(S-S) 결합**을 형성. ester 결합은 산-알코올 결합으로 무관.\n\n정답: c, d, e.\n\n함정 요소는 Q142와 동일한 세 가지다. (1) Heinz ↔ Howell-Jolly 이름 유사성 함정, (2) Fe 산화 방향 역서술 함정, (3) disulfide ↔ ester 결합 종류 바꿔치기 함정. 2024와 2025에 연속 출제되었다는 점이 **최고 출제 가능성 신호**다. **\"Heinz / Fe²⁺→Fe³⁺(MetHb) / disulfide\"** 세 키워드를 반드시 체화할 것.\n\n근거: 교과서 05장 \"단백질 산화적 손상\" 소절, 강의안 lec-08 슬라이드 (혈색소 산화).", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L08-mechanism-3", "round": "2025-중간", "num": "39", "qid": "", "body": "표적세포 또는 기관의 수용체에 결합하여 효과를 나타내는 외인성 물질에 대한 용어와 설명이 올바르게 짝지어진 것은?\n[그림: 표적세포 또는 기관의 수용체에 결합하여 효과를 나타내는 외인성 물질에 대한 용어와 설명]\n\n① ㄱ-ㄴ-ㄷ-ㄹ\n② ㄱ-ㄷ-ㄴ-ㄹ\n③ ㄴ-ㄱ-ㄷ-ㄹ\n④ ㄴ-ㄱ-ㄹ-ㄷ\n⑤ ㄹ-ㄱ-ㄴ-ㄷ", "jokboAnswer": "①", "claudeAnswer": "① (그림 OCR 미복원으로 ㄱ·ㄴ·ㄷ·ㄹ의 구체 내용 확인 불가, 족보 원본 정답 수용)", "explanation": "본 문항은 **그림 기반 매칭 문항**이라 족보 OCR에서 ㄱ·ㄴ·ㄷ·ㄹ 라벨의 구체 용어와 설명이 복원되지 않았다. 따라서 각 선지의 구체 근거를 완전 복원해 해설하기는 어렵다. 다만 이 문항이 묻는 **핵심 개념(수용체 결합 외인성 물질 4종 분류)** 은 반드시 암기해야 할 내용이다.\n\n교재발췌 \"3. 독성물질과 표적과의 반응\" 비공유 결합 항목에서 수용체 결합 외인성 물질을 네 범주로 분류한다.\n\n1. **효현제(agonist)**: 수용체와 결합하여 내인성 물질(호르몬·신경전달물질 등)과 **같은 방향**의 작용을 유발. 완전 활성화.\n2. **부분 효현제(partial agonist)**: 수용체와 결합해 활성화하지만, 내인성 물질보다 **약한** 작용만 유발. 최대 반응 도달 불가.\n3. **길항제(antagonist)**: 수용체와 결합하지만 활성화하지 않고 단지 내인성 물질의 결합을 **차단**하여 효과를 억제.\n4. **역효현제(inverse agonist)**: 수용체와 결합하여 내인성 물질과 **반대 방향**의 작용을 유발. 기저 활성마저 낮춘다.\n\n그림 문항에서 라벨 ㄱ·ㄴ·ㄷ·ㄹ은 위 네 용어에 대응되며, 각각 \"같은 방향 작용 유발 / 약한 작용 / 차단 / 반대 방향 작용\"의 설명과 짝을 맞춰야 한다. 족보 정답 ①의 순서가 ㄱ-ㄴ-ㄷ-ㄹ 순서이므로, 시험지 그림의 배치 순서가 위 네 용어의 전형적 순서(효현제→부분효현제→길항제→역효현제)와 일치했을 가능성이 높다.\n\n함정 요소는 네 용어의 정의를 혼동하는 경우다. 특히 **길항제**(차단, 활성화 ×)와 **역효현제**(반대 방향 활성화)는 둘 다 \"내인성 물질을 억제\"하는 것처럼 보이지만, 역효현제는 여전히 활성화 작용을 갖는다는 점이 결정적으로 다르다. 또한 **효현제**와 **부분 효현제**는 모두 활성화하지만 반응 크기에서 차이가 있다.\n\n그림 OCR 미완성으로 선지별 상세 복원은 불가하므로 족보 정답 ①을 수용하되, 실제 시험에서 유사 그림이 나오면 **네 용어의 정의-방향성-강도**를 기준으로 즉시 매칭할 수 있도록 준비할 것.\n\n근거: 교재발췌 \"3. 독성물질과 표적과의 반응\" 비공유 결합 항목, 강의안 lec-08 슬라이드 11~14 (수용체 결합 용어).", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2025-중간", "num": "40", "qid": "Q039", "body": "다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증을 유발한다. 이와 같은 조혈세포의 파괴로 인하여 면역 기능을 담당하는 림프구 전구세포가 감소한다.\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.\n\n① TRAIL, Benzene\n② TCDD, Benzene\n③ Caspase, TRAIL\n④ Benzene, TCDD\n⑤ TCDD, Caspase", "jokboAnswer": "④", "claudeAnswer": "**④**", "explanation": "1) **배경**: [2024-중간] #40의 선지화 버전.\n\n2) **포인트·정답 근거**: 첫 빈칸=**Benzene**(골수독성·pancytopenia), 둘째 빈칸=**TCDD**(흉선 T세포·Ca²⁺ endonuclease). 순서대로 \"Benzene, TCDD\" = ④.\n\n3) **오답 소거**: TRAIL·Caspase는 세포사멸 기구로, 독성물질이 아님. ②처럼 순서 뒤집으면 오답.\n\n4) **함정**: TRAIL과 Caspase를 독성물질로 착각 — 둘 다 숙주 단백질임.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L13-mechanism-4-7-11", "round": "2025-중간", "num": "41", "qid": "", "body": "생체의 이롭거나 유해한 외부자극 또는 환경 변화에 대한 병리학적 적응에 대한 용어와 설명이 올바르게 짝지어진 것은?\n[그림: 생체의 병리학적 적응 용어와 설명]\n\n(선지 OCR 불완전 — 족보 원문이 그림 기반 문항으로 추정되며 텍스트 복원 실패)", "jokboAnswer": "①", "claudeAnswer": "①", "explanation": "1) **배경 — 2년 연속 동일 주제 출제 확인**: 족보 원문이 그림 기반으로 OCR 복원이 불완전하지만, [2024-중간] #41과 **문항 발문이 축자 일치**(\"생체의 이롭거나 유해한 외부자극 또는 환경 변화에 대한 병리학적 적응에 대한 용어와 설명이 올바르게 짝지어진 것은?\")하며 정답 선지 번호도 ①로 동일하다. 따라서 2024년과 실질적으로 동일한 문항으로 판단한다.\n\n2) **문항이 묻는 핵심 포인트**: [2024-중간] #41과 동일. 7개 병리학적 적응 용어 각각의 **방향성 정의**를 정확히 매칭.\n   - 비대(hypertrophy) = 세포 **크기** 증가 (수 그대로)\n   - 위축(atrophy) = 세포 **크기** 감소\n   - 증생(hyperplasia) = 세포 **수** 증가\n   - 화생(metaplasia) = 다른 종류 세포로 **대치** (기능 상실)\n   - 형성이상(dysplasia) = **핵 비대 + 유사분열** 증가 (분화 능력 유지)\n   - 역형성(anaplasia) = 비전형적 핵 + 유사분열 + **분화 조절 능력 상실**\n   - 종양(neoplasia) = 죽은 세포보다 더 많은 비정상 세포 **무한 증식**\n\n3) **정답 ① 근거**: [2024-중간] #41에서 상술한 7개 매칭이 그대로 적용된다 (1=ㄷ, 2=ㅁ, 3=ㅅ, 4=ㄱ, 5=ㄹ, 6=ㅂ, 7=ㄴ로 추정). 그림 기반 선지 세부는 복원 불가하나 출제자가 정답 배열을 동일하게 유지한 것으로 보인다.\n\n4) **오답 선지 소거**: 텍스트 복원 불가로 선지별 구체 소거는 불가능하나, [2024-중간] #41 해설에서 정리한 오답 패턴 (비대↔위축, 비대↔증생, 화생↔역형성, 형성이상↔역형성, 종양↔증생) 중 하나가 각 오답 선지에 해당할 것이다.\n\n5) **함정 요소**:\n   - **전년도 동일 문항 재출제 패턴**: L13 족보 4문항 중 2문항이 \"면역반응 순서 동일 재출제\", 다른 2문항이 \"병리학적 적응 동일 재출제\"이다. 즉 **L13 족보의 50%가 2회 반복 출제**되며, 이는 출제자가 이 두 주제를 시험 핵심으로 고정시킨 것을 의미한다. 시험 직전 반드시 이 두 cascade/매칭을 암기해야 한다.\n   - **그림 의존 문항**: 2025년은 표·그림 형태로 출제된 것으로 추정되며, 2024년 텍스트 선지를 표로 재구성했을 가능성이 크다. 그림이라도 내용은 동일.\n   - **암기 구호**: [2024-중간] #41과 동일 — \"**비크↑ 위크↓ 증수↑ 화대 형핵 역분 종무**\".\n\n**근거 위치**: 교재발췌.md lines 1738-1783 (교재 §4.11 \"수복 장애\" p.45-46). [2024-중간] #41과 동일 근거. 족보 원문 OCR 제한으로 그림 내용 상세 확인 불가.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L16-treatment", "round": "2025-중간", "num": "43", "qid": "Q042", "body": "다음 중 옳지 않은 것을 모두 고르시오.\n\na. 활성탄은 수의임상에서 널리 사용되는 흡착제이다.\nb. 반추동물은 제1위가 커서 위세척이 비효율적이다.\nc. 제염 시에 심장질환, 간질이 있는 개, 고양이에서는 빠르게 위배출을 해야 한다.\nd. 의식이 있어도 경우에 따라 위세척을 할 때 마취를 실시하지 않아도 된다.\ne. 제염 시에 설치류, 토끼, 말, 반추류에서는 구토 유발은 효과적이다.\nf. 노출이 발생한 물질이 무해하거나 독성이 매우 낮은 경우에는 반드시 제염을 해야 할 필요가 없다.\ng. 대부분의 경우에서 독극물 섭취 후 6시간 이내에 구토, 위세척을 하면 효과가 유지된다.\n\n①. a, c  ②. d, e, g  ③. a, d, g  ④. c, d, e, g  ⑤. b, c, d, e, g", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e, g)", "explanation": "[2024-중간] #43(Q146)과 **본문·선지·답 완전 동일**의 2년 연속 재출제이다. 검증과 해설은 Q146과 같다.\n\n핵심 오답 4항 요약(교과서 07장 (3)항):\n- **c** — 심장질환·간질에서 위배출은 금기(미주신경 자극 부정맥 + 발작 유도 위험). \"빠르게 해야 한다\"는 정반대.\n- **d** — 의식 유무 관계없이 위세척 전 마취·기관내 삽관 필수(흡인성 폐렴 예방). \"마취 생략 가능\"은 오답.\n- **e** — 설치류·토끼·말·반추류는 구토 불가 종. \"효과적\"은 정반대.\n- **g** — 골든타임은 1시간. 6시간은 반복 함정.\n\n옳은 3항: a(활성탄 표준 흡착제), b(반추동물 제1위 커서 위세척 비효율), f(무해 물질 제염 불필요).\n\n정답 = **④**. 이 문항은 2024·2025 중간고사 2년 연속 완전히 똑같이 출제되었으므로, **c·d·e·g = 오답 조합** 이 7고려사항 전체 암기의 핵심 체크리스트라는 것을 확정할 수 있다. 시험 직전 이 4개 서술을 정확히 **반대 방향**(c → 금기, d → 마취 필수, e → 구토 불가, g → 1시간)으로 뒤집어 암기하는 것이 최선의 전략.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L17-antidotes", "round": "2025-중간", "num": "44", "qid": "", "body": "해독제에 대한 설명 중 틀린 것만 모두 고른 것은?\n\n가. 치료용량에 맞게 투여하면 독성물질에 의해 독성이 감소된다 하더라도 해독제를 추가적으로 투여하지 않아도 된다.\n나. 해독효과의 지속기간은 독성물질의 다른 약리작용기간과 다를 수 있다.\n다. 일부 해독제는 치료기간에는 독성이 없지만 대량이나 장기간 사용하면 독성이 없다.\n라. 해독제는 독성물질의 활성이나 영향에 대해 특이적 작용이 필요하지 않다.\n마. 해독제를 사용하기 위해 정확한 진단이 매우 중요하다.\n\n① 가, 나, 다  ② 가, 나, 다, 라  ③ 가, 다, 라  ④ 나, 다, 라, 마  ⑤ 가, 나, 다, 라, 마", "jokboAnswer": "③ (가, 다, 라)", "claudeAnswer": "③ (가, 다, 라)", "explanation": "[2024-중간] #44와 구조는 유사하지만 선지 a가 \"더 효과 좋은 약물 대체 여부\"(2024)에서 \"추가 투여 불필요\"(2025)로 바뀐 변형. 그러나 두 선지 모두 해독제 사용 원칙 위반이라는 점은 동일하다. 교과서 08장 서론을 기준으로 각 선지를 판정한다.\n\n선지 가 — **틀림**. \"치료용량에 맞게 투여하면 추가 투여 불필요\"는 해독제의 골든 타임과 반복 투여 원칙을 부정한다. 예를 들어 Atropine은 반감기 3시간이라 반복 투여가 필요하고, Vit K1은 2세대 항응고 살서제에서 6주 장기 투여가 필수다. \"한 번 투여 후 끝\"이라는 단정은 원칙 위반.\n\n선지 나 — **옳음**. 해독 효과 지속기간은 독성물질의 약리작용기간에 종속된다. 골든 타임 원칙의 본질.\n\n선지 다 — **틀림**. \"대량·장기간 사용하면 독성이 없다\"는 유효성 제한 원칙 정면 부정. 교과서는 \"과도 용량·장기 사용 시 해독제 자체 독성 발현 가능\"이라고 명시한다. [2024-중간] #44 선지 c와 완전히 동일한 함정.\n\n선지 라 — **틀림**. 해독제 정의 부정. 해독제는 정의상 \"독성물질의 활성이나 영향에 대해 **특이적 작용**을 나타내는 물질\"이므로 \"특이적 작용 불필요\"는 정반대. [2024-중간] #44 선지 d와 완전히 동일한 함정.\n\n선지 마 — **옳음**. 정확한 진단이 3대 전제 중 첫 번째.\n\n따라서 틀린 선지는 가·다·라, 정답 ③. [2024-중간] #44와 **정답 구조(a·c·d)까지 동일**한 사실상 동일 문항. \"해독제 원칙 틀린 것\"은 2년 연속 출제된 확정 빈출 주제로, 선지 변형에 대비해 원칙을 정확히 외워두어야 한다. 강의안 lec-17 슬라이드 3 기반.\n\n함정 요소는 선지 가의 \"치료용량\"이라는 단서. 치료용량이 맞다고 해서 반복 투여 여부를 결정할 수 없는데, \"치료용량 = 안전\"이라는 인상을 주는 심리적 함정이다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L17-antidotes", "round": "2025-중간", "num": "45", "qid": "", "body": "다음 중 해독제와 그에 대한 설명이 올바르게 짝지어진 것은?\n\n[표: 해독제(a~g)와 적응증(ㄱ~ㅅ) 매칭]\n- a. NAC (N-acetylcysteine) — ㄱ. 아세트아미노펜(APAP) GSH 전구체\n- b. 에탄올·4-MP — ㄴ. 메탄올·에틸렌 글리콜 ALDH 경쟁\n- c. Vitamin K1 — ㄷ. Coumarin·Warfarin 응고인자 회복\n- d. Atropine + 2-PAM — ㄹ. 유기인계·카바메이트 AChE\n- e. Ca-EDTA — ㅁ. 납(Pb)·아연(Zn) 킬레이션\n- f. BAL (Dimercaprol) — ㅂ. 비소(As)·수은(Hg)·안티몬(Sb)·납(Pb)\n- g. D-Penicillamine — ㅅ. 구리(Cu)·납(Pb)·수은(Hg)\n\n① (a-ㄴ, b-ㄱ, c-ㄷ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ)\n② (a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ)\n③ (a-ㄱ, b-ㄴ, c-ㅁ, d-ㄷ, e-ㄹ, f-ㅅ, g-ㅂ)\n④ (a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ)\n⑤ 정답 없음", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "7개의 해독제(a~g)와 7개의 적응증(ㄱ~ㅅ)을 한 번에 매칭하는 종합 매트릭스 문항. 각 선지를 비교하기 전에 **표준 매트릭스**를 먼저 확립해야 한다. 교과서 08장 각론과 강의안 lec-17 슬라이드 10 기준:\n\n| 해독제 | 적응증 | 기전·주의 |\n|---|---|---|\n| a. NAC (N-acetylcysteine) | **ㄱ**. APAP (아세트아미노펜) | GSH 전구체 공급 → NAPQI 중화. 섭식 후 8~16시간 골든타임. 6종 병용 금기(산화물질·amphotericin B·tetracycline·erythromycin·ampicillin·H₂O₂) |\n| b. 에탄올·4-MP | **ㄴ**. 메탄올·에틸렌 글리콜 | ALDH 경쟁(강의안 표기) 20배 친화도 → 독성 대사체(formate·oxalate) 형성 차단. 에탄올 4h/4-MP 3~8h 골든타임 |\n| c. Vitamin K1 (Phytonadione) | **ㄷ**. Coumarin·Warfarin | 응고인자 합성 회복. **IV 투여 절대 금기**(아나필락시스). 2세대 항응고제(Brodifacoum) 6주 투여 |\n| d. Atropine + 2-PAM | **ㄹ**. 유기인계·카바메이트 | Atropine: muscarinic 차단 (BBB 통과). 2-PAM: AChE 재활성 (aging 전 24h) |\n| e. Ca-EDTA | **ㅁ**. Pb·Zn | 킬레이트화 → 24h 내 95% 소변 배설. 필수 2가 양이온(Ca·Mg·Cu)도 킬레이트 주의 |\n| f. BAL (Dimercaprol) | **ㅂ**. As·Hg·Sb·Pb | dithiol(이중 SH기) 구조, 5각 고리 복합체. 근육내 투여 |\n| g. D-Penicillamine | **ㅅ**. Cu·Pb·Hg | monothiol(β,β-dimethyl cysteine) 단일 SH기. 경구 투여. 양(sheep) 구리에는 ammonium molybdate |\n\n이 표를 바탕으로 선지 검증:\n- 선지 ①(a-ㄴ, b-ㄱ, ...) — a와 b 서로 뒤바꿈. NAC가 메탄올·EG, 에탄올·4-MP가 APAP로 배치됨 → **틀림**.\n- 선지 ②(a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ) — 표와 완전히 일치 → **정답**.\n- 선지 ③(a-ㄱ, b-ㄴ, c-ㅁ, d-ㄷ, e-ㄹ, f-ㅅ, g-ㅂ) — Vit K1이 Pb·Zn로, Atropine+2-PAM이 Coumarin으로 배치됨 → **틀림**.\n- 선지 ④(a-ㄷ, b-ㄴ, c-ㄱ, ...) — NAC가 Coumarin, Vit K1이 APAP로 뒤바뀜 → **틀림**.\n- 선지 ⑤ 정답 없음 — ②가 정답이므로 **틀림**.\n\n함정 요소는 7개 매칭을 모두 확인해야 해서 인지 부하가 크다는 점. 시간 압박 하에서는 자주 헷갈리는 핵심 쌍에 집중하는 것이 효율적:\n1. **BAL(f) vs D-Penicillamine(g)**: BAL은 **As·Hg·Sb·Pb**(dithiol), D-Penicillamine은 **Cu·Pb·Hg**(monothiol). Pb·Hg 공통이지만 BAL에는 As·Sb가, D-Penicillamine에는 Cu가 특징적.\n2. **에탄올·4-MP vs NAC**: 에탄올·4-MP는 **메탄올·EG(ALDH 경쟁)**, NAC는 **APAP(GSH 전구체)**. 선지 ①의 가장 큰 함정.\n3. **Ca-EDTA**: Pb·Zn 고정. Cu는 Ca-EDTA가 아닌 D-Penicillamine.\n\n이 3개 쌍만 안정적으로 외워두면 매트릭스 매칭 문항의 90%가 풀린다. 강의안 lec-17 슬라이드 10의 매트릭스 표를 시험 직전에 반드시 복습할 것.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "1", "qid": "Q045", "body": "다음 중 신약 개발·허가 절차에 대한 설명으로 틀린 것을 모두 고른 것은?\n\n①. 효능은 인증기관이 과학적인 방법으로 검증하면 된다.\n②. 전임상 안전성 시험은 개별기관의 인증을 받은 GLP에서만 수행 가능하다.\n③. GLP 인증 기관에는 IACUC 설치가 권장된다.\n④. 1상 임상시험은 정상인 지원자를 대상으로 안전성과 체내동태를 검토한다.\n⑤. 2상 임상시험은 환자를 대상으로 유효성을 확인한다.\n⑥. 3상 임상시험은 보통 3개 기관 90명 이상의 환자를 대상으로 유효성·용법용량·주의사항을 면밀히 검토한다.\n⑦. 시판 후 일정 기간 동안 부작용 증례를 수집하여 부작용이 나타나면 판매가 취소된다.\n\n① ①②③  ② ①②  ③ ①③⑤  ④ ②③④  ⑤ ①②③④", "jokboAnswer": "⑤", "claudeAnswer": "① (①②③)", "explanation": "- ① **틀림** — 효능 탐색 = 모든 연구기관·개인 가능. \"인증기관만\" = 함정.\n- ② **틀림** — 전임상 안전성 = **MFDS 인증 GLP 전용**. \"개별기관 인증\"은 함정.\n- ③ **틀림** — IACUC = **의무 설치**. \"권장\"은 함정.\n- ④ 옳음 — Phase 1 = 일반인 지원자, 안전성·체내동태.\n- ⑤ 옳음 — Phase 2 = 환자, 유효성.\n- ⑥ 옳음 — Phase 3 = 3개 기관·90명.\n- ⑦ 옳음 — Phase 4 = 시판 후 감시·판매 취소.\n→ 틀린 것 = ①②③ → **①번 선지**.\n\n⚠️ 족보 정답 ⑤(①②③④)는 ④까지 틀림으로 보지만, 교과서 기준 ④(Phase 1 = 일반인 지원자)는 **옳음**이므로 **강의자료 기준 ①(①②③)이 정답**. 족보는 ④를 \"환자·정상인\" 혼동으로 오기한 것으로 추정. (강의안 lec-18 슬라이드 5)", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "2", "qid": "Q046", "body": "다음 독성학 용어와 설명의 매칭 중 틀린 것을 모두 고른 것은?\n\na. LD50 — 시험동물의 50%를 사망하게 하는 추정 용량\nb. MTD — 90일 반복투여에서 체중증가를 10% 이내로 억제하는 최고 용량\nc. NOAEL — 부작용이 관찰되지 않는 최고 용량\nd. ED50 — 대상 동물의 50%에서 효과를 나타내는 용량\ne. ADI/TDI — NOAEL × 안전계수(100)\n\n① a, b  ② c, d  ③ b, e  ④ d, e  ⑤ a, e", "jokboAnswer": "d, e", "claudeAnswer": "e만 틀림 (선지 중 e 단독을 포함한 조합이 없으면 가장 가까운 ④ d, e)", "explanation": "- a~d 교과서 정의와 모두 일치(옳음).\n- e **틀림** — ADI = **NOAEL ÷ 안전계수(100)**. \"×\"은 함정. 안전계수 100 = 종간 10 × 개체간 10.\n\n⚠️ 족보 정답 \"d, e\"에서 d(ED50)를 틀리다고 본 것은 **오류**. 교과서 정의 \"50%에서 효과 용량\"은 **ED50의 표준 정의와 일치**. 따라서 강의자료 기준 **e 단독 틀림**. 5지선다 형식상 e를 포함한 ④(d, e) 또는 ⑤(a, e) 중 선택해야 하면 **④**가 가장 근접. (강의안 lec-18 슬라이드 10)", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "3", "qid": "Q047", "body": "대조군 8종 설명 중 틀린 것을 모두 고른 것은?\n\na. 비투여 대조군 — 기본 상태 기준값 확보\nb. 용매 대조군 — 시험물질 없이 용매만 투여, 용매 효과 보정\nc. 음성 대조군 — 정상 반응 비교 기준\nd. 양성 대조군 — 시판중 약물과 직접 비교, 상대 위치 평가\ne. 모의 대조군 — 수술·처치 효과 분리\n\n① a, c  ② b, e  ③ c, d  ④ a, d  ⑤ b, d", "jokboAnswer": "b, e", "claudeAnswer": "d만 틀림 (선지 중 d 단독 없음 → ⑤ b, d 또는 ③ c, d 중 d 포함 선지)", "explanation": "- a 옳음 — 비투여 대조군 정의 일치.\n- b 옳음 — 용매 대조군 정의 일치.\n- c 옳음 — 음성 대조군 정의 일치.\n- d **틀림** — \"시판약 상대 비교\"는 **비교물질(Reference) 대조군** 정의. 양성(Positive)은 시험계 신뢰성 검증.\n- e 옳음 — 모의(Sham) = 수술·처치 효과 분리.\n\n⚠️ 족보 정답 \"b, e\"는 **오류**. 교과서 기준 b·e 모두 옳음. **강의자료 기준 d 단독 틀림**. 5지선다 형식상 d 포함한 ⑤(b, d) 또는 ③(c, d)가 근접하나, 단독 오답인 d만 고려하면 **추가 오답이 없어 선지 구성 자체가 불완전**. (강의안 lec-18 슬라이드 9)", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "5", "qid": "Q049", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵, S9 mix 대사활성화\"는 어떤 독성시험인가?\n\n① 면역독성  ② 생식발생  ③ 국소독성  ④ 유전독성  ⑤ 발암성", "jokboAnswer": "④", "claudeAnswer": "④ 유전독성", "explanation": "4년 연속 완전 동일. Ames + 염색체이상 + 소핵 + S9 mix = **유전독성시험** 3법. 즉답. (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "6", "qid": "Q050", "body": "발암성시험에 대한 설명으로 틀린 것을 모두 고른 것은?\n\na. 마우스 등 1종 이상의 설치류를 사용한다.\nb. 이유 후 12주 이상 성숙한 시기에 투여를 시작한다.\nc. 단회투여예비 → 반복투여예비 시험을 통해 최고 투여 용량을 결정한다.\nd. MTD를 시험자가 임의로 결정한다.\ne. 저용량 또는 음성 대조군 누적사망률이 95%에 이를 때 시험을 종료한다.", "jokboAnswer": "미표기", "claudeAnswer": "a, b, d, e", "explanation": "- a **틀림** — **설치류 2종 이상** 필수. \"1종 이상\"은 함정.\n- b **틀림** — **이유 후 6주 이내** 어린 동물 시작. \"12주 성숙기\"는 함정.\n- c 옳음 — DRF 순서(단회예비 → 반복예비 → MTD 결정).\n- d **틀림** — MTD = 체중증가 10% 이내 억제, **객관적** 결정.\n- e **틀림** — 누적사망률 **20%** 도달 시 종료.\nQ161·Q223·Q301 완전 동일. 발암성 4대 함정이 4년 연속. (강의안 lec-18 슬라이드 22)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-fin", "num": "32", "qid": "Q076", "body": "다음 설명에 해당하는 심혈관계 약물의 올바른 짝을 고르시오.\n\n- 치료지수가 좁아 중독 위험이 크므로 주의가 필요하다.\n- 투여 시 지방을 제외한 체중이나 체표면적을 기준으로 용량을 계산해야 한다.\n- 고양이가 개보다 민감하므로 더욱 주의해야 한다.\n- Na⁺/K⁺-ATPase를 억제한다. 독성 기전 또한 Na⁺/K⁺-ATPase 억제와 관련있다.\n- 심장 박동을 느리게 만들어 심장 허약 등과 관련있다.\n\n①. Digoxin - Digitoxin\n②. Diltiazem - Verapamil\n③. Nifedipine - Nipidipine\n④. Albuterol - Nifedipine\n⑤. Verapamil - Albuterol", "jokboAnswer": "미표기 (채점 정답 ①로 판정)", "claudeAnswer": "① Digoxin — Digitoxin", "explanation": "본 문항은 주 주제가 \"심혈관계 약물의 종류\"로 교과서 22장(의약품) 세부 영역에 속하지만, **기전 서술 \"Na⁺/K⁺-ATPase 억제\"**가 L11 §4.4 \"이온 항상성 장애\"의 핵심 물질 분류인 **Cardiac glycosides(Digitalis 군)** 기전을 정확히 반영한다. 따라서 적어도 기전 선지 판정은 L11 범위로 완전히 해설 가능하다.\n\n배경: 교과서 §4.4는 이온 펌프(Na⁺/K⁺-ATPase·Ca²⁺ ATPase) 억제의 대표 독성물질로 **Cardiac glycosides(Digitalis·Digoxin·Digitoxin)**를 든다. 이들은 모두 식물 유래(Digitalis purpurea·Digitalis lanata) 강심배당체로 Na⁺/K⁺-ATPase α-subunit에 결합하여 능동 수송을 차단한다. 결과 연쇄는:\n1. 세포 내 Na⁺ 축적 →\n2. Na⁺/Ca²⁺ 교환기의 역수송(reverse mode)으로 Ca²⁺ 배출이 차단됨 →\n3. 세포 내 Ca²⁺↑ →\n4. 근형질세망 Ca²⁺ 방출 촉진 + 세포 외 Ca²⁺ 유입 →\n5. 심근 수축력↑ (therapeutic) + 부정맥·심세동 (toxic).\n\n문항의 핵심 포인트: 다섯 개 서술 중 \"Na⁺/K⁺-ATPase 억제\"가 독특한 기전 서명이다. Digoxin과 Digitoxin은 모두 cardiac glycoside로 이 기전을 공유한다. 두 약물의 차이는 주로 약동학(Digoxin은 신장 배설·반감기 짧음·수용성, Digitoxin은 간 대사·반감기 김·지용성)에 있지 기전은 동일하다.\n\n정답 선지 근거: ①번 Digoxin-Digitoxin은 두 약물 모두 cardiac glycoside로 Na⁺/K⁺-ATPase를 억제한다. 치료지수가 좁고(치료 용량과 중독 용량이 가까움), 고양이가 개보다 민감하다는 부차적 임상 정보도 모두 일치한다.\n\n오답 선지 소거:\n- ② Diltiazem·Verapamil: **Ca²⁺ 채널 차단제**(CCB). L형 Ca²⁺ 통로 억제 → 심근 수축력↓·방실 전도 지연. Na⁺/K⁺-ATPase가 아님.\n- ③ Nifedipine(·Nipidipine): 역시 Ca²⁺ 채널 차단제(dihydropyridine 계열). 주로 혈관 확장 효과. 기전 불일치.\n- ④ Albuterol: β₂-adrenergic agonist (기관지 확장제). 심혈관 기전 설명과 완전 불일치.\n- ⑤ Verapamil·Albuterol: 두 약 모두 Na⁺/K⁺-ATPase 억제제가 아님.\n\n함정 요소: 심혈관 약물 이름 암기가 안 되면 Na⁺/K⁺-ATPase 기전만으로 판단해야 한다. L11 관점에서는 \"cardiac glycoside의 전형 기전\"을 기억하면 ①번이 유일한 정답이다. 경계 판정: 약물 이름 자체는 22장(의약품) 범위지만 기전은 L11 범위 내이므로 해설은 온전히 작성 가능하다.", "tail": "— 교차 경계 문항", "scoreable": true, "correctIndices": [0]}, {"lecture": "L09-mechanism-4-1-3", "round": "2025-mid", "num": "35", "qid": "", "body": "다음 중 MD에 관한 설명으로 틀린 것은?\n\n①. 사립체 내부에 카디오리핀은 높은 친화성을 가지고 있어 많은 독성물질이 내막에 축적된다.\n②. 사립체 내막은 높은 양전하성 막전압을 띄고 있어 음전하를 띤 독성물질이 투과되어 축적된다.\n③. 사립체 투과성 전이 소공이 독성 물질에 의해 열림으로써 사립체가 손상된다.\n④. 효소는 외인성 물질과 상호작용할 수 있는 높은 선택성을 가지고 있기 때문에 효소의 기능 변동에 의한 결과는 선택적이고 예측 가능한 독성효과이다.\n⑤. 괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상이다.", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "본 문항은 **[2022-mid] #26과 사실상 동일한 반복 출제**이다. 문두 \"MD\"는 문맥상 **Mitochondrial Damage(사립체 손상)**의 약자로, 선지는 카디오리핀·막전압·MPTP·효소 선택성·괴사를 ①~⑤에 그대로 다시 배치했다. [2022-mid] #26 해설을 그대로 적용하면 된다.\n\n- **① 옳음** — Cardiolipin과 독성물질의 높은 친화성으로 내막 축적. 교재 p.54 §4.6 직접 서술.\n\n- **② 틀림 (정답)** — 사립체 내막은 **음전하성** 막전압을 띤다. 따라서 **양전하** 독성물질이 끌려 들어간다. 본 선지는 부호를 정반대로 뒤집었다. 교재 p.54: \"내측이 높은 **음전하성** 막전압... **양전하**를 띄는 독성물질이 투과될 수 있다.\"\n\n- **③ 옳음** — MPTP 개구 → 사립체 손상. 교재 p.54 명시.\n\n- **④ 옳음** — 효소 선택성 → 예측 가능 독성효과. 교재 §4.2 일치.\n\n- **⑤ 옳음** — 괴사 = ATP 비의존·급성·치명적. 교재 §4.9 일치.\n\n함정 요소: **문두 \"MD\"를 못 알아보면 당황**할 수 있다. 본문 내용이 모두 사립체 관련임을 확인한 뒤 \"Mitochondrial Damage\"로 해석하면 된다. 또한 [2022-mid] #26과 선지가 **한 글자 수준까지 거의 동일**하다는 점이 핵심 — 족보를 풀어본 학생은 곧바로 ②를 고를 수 있다. 출제자가 **3년 연속 동일 함정**을 유지하고 있으므로 이번 중간고사에도 동일 구조(막전압 부호 역전)가 재등장할 확률이 매우 높다.\n\n**근거 위치**: 교재 p.54 \"6. 에너지 생산 장애\" 사립체 내막 전압·cardiolipin·MPTP 단락 + §4.2 효소 선택성 + §4.9 괴사 정의.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "35", "qid": "Q034", "body": "다음 중 MD에 관한 설명으로 틀린 것은?\n\n①. 사립체 내부에 카디오리핀은 높은 친화성을 가지고 있어 많은 독성물질이 내막에 축적된다.\n②. 사립체 내막은 높은 양전하성 막전압을 띄고 있어 음전하를 띤 독성물질이 투과되어 축적된다.\n③. 사립체 투과성 전이 소공이 독성 물질에 의해 열림으로써 사립체가 손상된다.\n④. 효소는 외인성 물질과 상호작용할 수 있는 높은 선택성을 가지고 있기 때문에 효소의 기능 변동에 의한 결과는 선택적이고 예측 가능한 독성효과이다.\n⑤. 괴사는 에너지를 사용하지 않고 급성적으로 일어나는 치명적인 세포손상이다.", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "Q288(2022-mid #26)과 본문·선지가 거의 동일한 반복 출제다. \"MD\"는 mitochondrial dysfunction(사립체 기능 장애)의 약어로 추정된다.\n\n판단 근거는 Q288 해설과 동일하다. 교과서 §4.6 원문 \"내측이 높은 음전하성 막전압을 띄고 있음으로 내·외의 전기화학적 전위차를 유지하고 있다. 이러한 전위차로 인하여 **양전하**를 띠는 독성물질이 투과될 수 있다\"가 기준이다. 선지 ②는 **\"양전하성 막전압 → 음전하 독성물질\"**로 양쪽 모두를 정반대로 기술했다. 이 함정이 2022년·2025년 두 번 동일하게 출제되었으므로 \"음전하성 막전압 + 양전하 독성물질\"이 절대 암기 공식임을 확정할 수 있다.\n\n정답 선지 근거: ② \"양전하성 막전압 + 음전하 독성물질\"은 교과서 §4.6과 정반대.\n\n오답 선지 소거:\n- ① cardiolipin의 내막 특이 축적 — §4.6 원문.\n- ③ MPTP 개구 = 사립체 손상 — §4.6 원문.\n- ④ 효소 선택성 → 예측 가능 독성 — §4.7 \"효소 불활성화\"의 전제.\n- ⑤ 괴사 = ATP 비의존성·급성·치명 — §4.9 괴사 정의.\n\n함정 요소: 3년차 반복 출제임에도 여전히 ②를 옳다고 오판하는 학생이 많다. 이유는 ① \"막전압\"이라는 단어가 신경세포 막전위(안쪽 음전하, 바깥쪽 양전하)의 선입견과 섞이고, ② \"음전하 독성물질이 축적된다\"는 표현이 직관적으로 그럴듯하게 들리기 때문이다. 반드시 \"**미토콘드리아 matrix는 전자전달계의 양성자 펌프로 음전하가 쌓이는 공간**\"이라는 생화학 원리를 기준으로 판단해야 한다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L09-mechanism-4-1-3", "round": "2025-mid", "num": "37", "qid": "", "body": "다음 설명 중 틀린 것은?\n\n①. DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자에 매우 민감하다.\n②. DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\n③. 어떤 독성물질도 RNA 중합효소 I, II, III를 억제하여 mRNA 합성에 영향을 미칠 수 없다.\n④. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 종양을 일으킬 수 있다.\n⑤. Sulfur 함유 아미노산인 Serine, Threonine은 산화에 특히 민감하다.", "jokboAnswer": "③", "claudeAnswer": "**③** (⑤도 명백히 틀리지만 채점 기준은 ③)", "explanation": "이 문항은 [2024-mid] #37(다중선택형)을 **단일 정답형으로 변형**한 문항이다. a·b 선지를 올바른 방향(α 민감·β 저항)으로 고쳐 옳게 만든 반면, RNA 중합효소 억제 여부를 전면 부정문으로 바꿔 정답 오답으로 세웠다.\n\n- **① 옳음** — 교재 p.52 §4.5: \"DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다.\" [2024-mid] #37의 a·b에서 역전됐던 방향이 원래대로 복원됨. 정확.\n\n- **② 옳음** — 교재 p.52 §4.5: \"DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\" 정확.\n\n- **③ 틀림 (정답)** — \"**어떤 독성물질도** RNA 중합효소를 억제할 수 없다\"는 **전면 부정문**은 교재 서술과 정면으로 충돌. 교재 p.52~53 §4.5 3): \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다.\" 또한 **actinomycin D**(G=C 염기쌍 사이 삽입으로 전사 차단, 포유동물에서 저용량은 rRNA·고용량은 mRNA 영향), **acridine**(전사 저해), **α-amanitin**(버섯독, I·II·III 모두 억제), **rifampin**(RNA pol 결합) 등 대표 억제제가 다수 교재에 명시되어 있다. 따라서 \"어떤 독성물질도\" 억제할 수 없다는 진술은 명백한 오답.\n\n- **④ 옳음** — 교재 p.52 §4.5: \"DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이, 결국 종양을 일으킬 수 있다.\" 본 선지는 \"돌연변이\"만 빼고 서술했으나 나머지 세 결과(세포자멸사·괴사·종양)가 정확해 옳은 선지로 분류.\n\n- **⑤ 틀림 (채점 외 오답)** — Sulfur 함유 아미노산은 **Cysteine·Methionine**이지 Serine·Threonine이 아니다. Ser·Thr은 hydroxyl기 함유 AA. [2024-mid] #37의 f와 동일한 오답이며 이름과 분류가 이중으로 모순된다. **이 선지도 틀리지만 채점 기준은 ③**으로 확정된다 — 단일 정답형에서 두 선지가 모두 틀릴 때 출제자가 \"더 명백한 오답\"을 정답으로 지정하며, ③의 \"어떤 독성물질도 ~할 수 없다\"라는 전면 부정문이 ⑤의 분류 오류보다 교과서 서술과 직접적으로 충돌한다고 판단된다.\n\n함정 요소: (1) **⑤의 함정** — Sulfur AA를 Cys·Met이 아닌 Ser·Thr로 바꿔치기 한 오답이 [2024-mid]에 이어 또 등장. 명백한 오답이지만 \"단일 정답형\"이라는 틀 때문에 ③과 ⑤ 중 하나를 골라야 한다. 교재 본문과의 직접 충돌 강도를 기준으로 ③을 선택하는 것이 정답. (2) **③의 \"어떤 ~도 없다\" 패턴** — 과학 시험의 원칙상 \"절대적 부정문\"은 거의 항상 오답. 이 패턴을 알아보면 가장 빠르게 정답을 찍을 수 있다. (3) **[2024-mid] #37과의 관계** — 문장 순서와 표현이 매우 유사해, 전년도 족보를 풀어본 학생은 ①·②가 이제는 \"옳은\" 선지로 바뀌었음을 주의해야 한다. a·b 위치에 있던 α↔β 역전 함정이 없어졌다는 점이 핵심 변화.\n\n**근거 위치**: 교재 p.52 §4.5 \"2) DNA 합성 장애 및 손상\" · p.52~53 \"3) RNA 합성 장애 및 손상\"(actinomycin D·acridine·α-amanitin·rifampin 예시 포함) + 생화학 기초(Sulfur AA = Cys·Met).", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "37", "qid": "Q036", "body": "다음 설명 중 틀린 것은?\n\n①. DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자에 매우 민감하다.\n②. DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 sulfhydryl에 작용하는 독성물질에 대해서 저항성을 가진다.\n③. 어떤 독성물질도 RNA 중합효소 I, II, III를 억제하여 mRNA 합성에 영향을 미칠 수 없다.\n④. DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 종양을 일으킬 수 있다.\n⑤. Sulfur 함유 아미노산인 Serine, Threonine은 산화에 특히 민감하다.", "jokboAnswer": "③", "claudeAnswer": "③ (엄밀히는 ⑤도 틀리나 채점 정답은 ③ — \"틀린 것\" 단일 정답형)", "explanation": "Q141(2024-mid #37)과 같은 개념군을 5지선다 단일 정답형으로 재구성한 문항이다. 본문이 긍정문·부정문이 섞여 있어 각 선지를 한 줄씩 교과서와 대조해야 한다.\n\n- **① 옳음**: §4.5 (2) \"DNA 중합효소 α는 하나 또는 그 이상의 sulfhydryl기를 가지고 있어 이를 변형시키는 인자(독성물질)에 매우 민감하다\" 원문과 일치.\n- **② 옳음**: 같은 단락 \"DNA 중합효소 β는 sulfhydryl기를 가지고 있지 않아 저항성을 가진다\" 원문과 일치.\n- **③ 틀림 (채점 정답)**: \"어떤 독성물질도 RNA pol을 억제할 수 없다\"는 **완전 부정형 정반대 진술**이다. 교과서 §4.5 (3) \"많은 독성물질은 그 농도에 따라 RNA 중합효소 I, II, III에 대한 억제 정도가 달라진다\" 및 같은 단락에서 Actinomycin D·acridine·α-Amanitin이 실제 RNA 합성 억제제로 명시된다. 반증 자료가 교과서에 직접 있다.\n- **④ 옳음**: §4.5 (2) \"DNA 산화는 세포자멸사 및 괴사를 일으킬 뿐만 아니라 돌연변이 결국 종양을 일으킬 수 있다\" 원문과 일치.\n- **⑤ 틀림 (실질 오답이나 채점 대상 아님)**: Sulfur 함유 AA는 Cysteine·Methionine이며 Serine·Threonine은 hydroxyl(-OH)기 함유 AA다. 이 선지도 교과서적으로 틀리지만, 문항이 \"틀린 것 하나\"를 묻는 단일 정답형이고 ③이 교과서 원문과 더 직접적으로 충돌하므로 ③이 채점 정답으로 설정된 것으로 보인다.\n\n함정 요소: ⑤도 틀리다는 점을 인지하면 \"정답이 둘이니 출제 오류\"로 판단하고 시간을 허비할 수 있다. 단일 정답형에서 복수 오답이 있을 때는 **출제자가 의도한 \"더 명백한 교과서 역전 진술\"**을 고르는 것이 관행이다. ③은 \"어떤 독성물질도... 없다\"는 절대 부정형으로 교과서의 \"많은 독성물질이... 억제한다\"를 직접 뒤집어 명백하므로 우선 순위다.", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "38", "qid": "Q037", "body": "혈색소는 대표적인 단백질 산화적 손상의 표적이다. 이유와 결과로 알맞지 않은 것을 모두 고르시오.\n\na. 적혈구는 쉽게 외래물질에 노출될 수 있기 때문이다.\nb. 적혈구의 손상(산화)된 단백질을 대치할 수 없기 때문이다.\nc. 혈색소가 적혈구 세포막에 이중결합한 것을 Howell-Jolly body라 한다.\nd. Fe³⁺이 독성물질에 의해 Fe²⁺로 산화되어 산소를 공급하지 못한다.\ne. 혈색소의 α-, β-글로빈 사슬의 산화는 ester 결합을 형성한다.\nf. 혈색소에는 높은 농도의 산소가 존재하기 때문이다.", "jokboAnswer": "c, d, e", "claudeAnswer": "c, d, e", "explanation": "Q142(2024-mid #38)와 본문·선지가 거의 완전히 동일한 재출제 문항이다. 2년 연속 같은 본문이 등장했다는 사실 자체가 \"혈색소 산화 손상 3대 함정(Heinz vs Howell-Jolly / Fe²⁺↔Fe³⁺ / disulfide↔ester)\"이 고빈출 중의 고빈출임을 의미한다.\n\n판단 근거는 Q142 해설과 완전히 동일하다.\n- **a 옳음** — 외래물질 노출 (§4.5 원문).\n- **b 옳음** — 손상 단백질 대치 불가 (§4.5 원문: \"핵과 세포질세망을 가지고 있지 못함으로써 새롭게 합성된 단백질로 손상된 단백질을 대치할 수 없다\").\n- **c 틀림** — Heinz body의 정의를 Howell-Jolly body로 오기. Howell-Jolly body는 핵 잔재물(세포질 내 작은 DNA 조각)이지 세포막 침착 구조가 아니다.\n- **d 틀림** — 산화 방향 역전. 정답은 Fe²⁺(정상 Hb) → Fe³⁺(MetHb) 산화.\n- **e 틀림** — α·β-글로빈 산화는 Cys -SH기의 disulfide(S-S) 결합 형성. Ester 결합은 카복실산과 알코올 사이의 결합으로 단백질 산화와 무관.\n- **f 옳음** — 혈색소 내 고농도 산소 (§4.5 원문).\n\n따라서 틀린 선지 = c, d, e.\n\n함정 요소: Q142와 완전히 동일한 함정이 재출제된다는 점에서, **이 세 함정은 반드시 한 줄 한 줄 암기**해야 한다. \"Heinz = 세포막 이중결합 = globin disulfide 응집체 / Howell-Jolly = 핵 잔재물 / MetHb = Fe³⁺ / globin 산화 = disulfide\" 네 짝이 시험장에서 바로 떠올라야 한다.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L11-mechanism-4-4-6", "round": "2025-mid", "num": "40", "qid": "Q039", "body": "다음 빈칸에 들어갈 말로 각각 알맞은 것을 고르시오.\n\n( )은 CYP에 의하여 hydroquinone으로 되고, 이것은 골수에서 myeloperoxidase에 의해 반응성 quinoid 대사체로 활성화되고 ROS를 생산하여 골수에서 원조세포를 손상시켜 범혈구감소증을 유발한다. 이와 같은 조혈세포의 파괴로 인하여 면역 기능을 담당하는 림프구 전구세포가 감소한다.\n\n( )은 가장 강력한 면역억제 효과를 갖는 독성물질로써 소량에 의해서 조혈계 및 면역계에 독성을 일으킨다. ... 흉선 피질의 상피세포를 포함한 T 세포의 분화를 억제한다. ... Ca²+ 의존성 endonuclease를 활성화시켜 피질세포의 세포사멸을 유도한다.\n\n① TRAIL, Benzene\n② TCDD, Benzene\n③ Caspase, TRAIL\n④ Benzene, TCDD\n⑤ TCDD, Caspase", "jokboAnswer": "④", "claudeAnswer": "④", "explanation": "Q143(2024-mid #40)의 본문을 그대로 5지선다로 재출제한 문항. Q143에서 서술한 Benzene·TCDD 기전 분석이 그대로 적용된다.\n\n판정 흐름:\n- 첫 번째 빈칸: \"CYP → hydroquinone → myeloperoxidase → quinoid → pancytopenia\" 4단계 경로는 **Benzene**의 고유 기전. 다른 어떤 물질도 교과서에서 이 4단계를 가지지 않는다.\n- 두 번째 빈칸: \"가장 강력한 면역억제\" + \"흉선 피질 T 세포 분화 억제\" + \"Ca²⁺ 의존성 endonuclease\" 세 조건을 모두 만족하는 물질은 **TCDD**.\n\n따라서 ④ Benzene, TCDD가 정답.\n\n오답 선지 소거:\n- ① TRAIL은 세포자멸사 경로의 사망 수용체 리간드로 외인성 독성물질이 아님.\n- ② 두 빈칸이 뒤바뀜 — \"TCDD가 hydroquinone 경로\", \"Benzene이 흉선 T세포 분화 억제\"는 정반대.\n- ③ Caspase는 세포자멸사 실행 효소, 외인성 독성물질이 아님.\n- ⑤ 두 번째 빈칸에 Caspase가 들어갈 수 없음(같은 이유).\n\n함정 요소: 선지에 **TRAIL·Caspase** 같은 세포자멸사 내재 분자를 끼워넣어 외인성 독성물질 이름과 혼동시킨다. 교과서 §4.8은 \"면역 억제를 일으키는 **독성물질**\" 단락이므로 외인성 화학물질(Benzene·TCDD)만이 빈칸에 적합하다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L14-diagnosis", "round": "2025-mid", "num": "42", "qid": "", "body": "중독의 진단에 대해 아래의 설명 중 옳은 것을 모두 고른 것은?\n\na. 독성검사를 위해 샘플들은 채취한 즉시 냉동(frozen)하는 것이 원칙이다.\nb. 건초, 곡물 등과 같이 매우 건조한 샘플들은 냉암소 보관한다.\nc. 전혈(whole blood)의 경우에는 냉동보관하여야 한다.\nd. 모든 혈청(serum), 혈장(plasma) 샘플은 원심분리한 후에 상층액을 분리하여 냉동보관하여야 한다.\ne. 오줌(urine)은 약 100 mL 이상 되는 양을 채취하고 절대 주사바늘이 꽂혀있는 상태로 운반하면 안 된다.\n\n①. a, c, d  ②. a, b, e  ③. b, c, e  ④. a, b, d, e  ⑤. a, c, d, e", "jokboAnswer": "④", "claudeAnswer": "④ (a, b, d, e)", "explanation": "1) 배경 — [2023-fin] #1·[2024-mid] #42와 a~e 선지 본문이 완전 동일하지만, 발문만 \"**틀린 것**\"에서 \"**옳은 것**\"으로 뒤집혔다. 선지 b가 이전의 \"냉동 보관\"에서 \"냉암소 보관\"으로 정확한 진술로 수정된 차이도 있다.\n\n2) 핵심 포인트 — \"옳은 것\" 묶음이므로 a~e 각각을 교과서 기준으로 판정하고, 옳은 것만 묶으면 된다. 틀린 진술은 하나(c)뿐.\n\n3) 정답 선지 근거\n- a 옳음 — \"채취 즉시 냉동이 원칙\" (교과서 §3 원문).\n- b 옳음 — \"건조 샘플 냉암소 보관\" (교과서 §3 예외 1, 원문 일치).\n- d 옳음 — \"혈청·혈장 원심분리 후 상층액 냉동\" (교과서 §3).\n- e 옳음 — \"오줌 100 mL 이상, 주사바늘 운반 금지\" (교과서 §5).\n→ 옳은 것: a·b·d·e → 정답 ④.\n\n4) 오답 선지 소거\n- ① (a, c, d) — c(전혈 냉동)가 틀린 진술. 포함 오류.\n- ② (a, b, e) — d가 옳은 진술인데 누락. 불완전.\n- ③ (b, c, e) — c 포함 오류. 또 a·d 누락. 이중 오류.\n- ⑤ (a, c, d, e) — c 포함 오류.\n\n5) 함정 요소 — 발문이 뒤집힌 형태이기 때문에 \"틀린 것을 고르는 습관\"으로 접근한 학생은 c만 골라내고 \"정답은 c 하나\"라고 착각해 ①·③·⑤ 같은 오답 묶음에 빠진다. \"옳은 것 모두\"라는 발문을 반드시 확인해야 한다. 또한 c(전혈 냉동)는 4년 연속 틀린 선지로 고정되어 있는 핵심 함정 — 발문이 어떻든 c만 빠지면 나머지 전부가 옳다는 패턴을 기억하면 빠르게 풀 수 있다.\n\n근거 위치: 교과서 06장 §3·§5, 강의안 lec-14 슬라이드 5.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L14-diagnosis", "round": "2025-fin", "num": "53", "qid": "", "body": "Dithionite에 의한 paraquat 검출법에는 산에 ( )를 가하여 알칼리화시키고 Sodium dithionite을 첨가하여 푸른색을 띄면 양성이라 할 수 있다.\n\n①. 수산화칼슘  ②. 수산화나트륨  ③. 수산화칼슘  ④. 수산화암모늄  ⑤. 수산화알루미늄\n\n(비고: ①③이 모두 수산화칼슘으로 표기된 것은 족보 원본 OCR 오류 가능성 있음. [2024-fin] #48에서는 ①=수산화칼슘, ③=수산화칼륨으로 구분되어 있음.)", "jokboAnswer": "②", "claudeAnswer": "② (수산화나트륨, NaOH)", "explanation": "1) 배경 — [2024-fin] #48과 문항 본문이 사실상 동일. Dithionite에 의한 Paraquat 정성 검출법은 수의독성학 분석독성학 파트의 대표 기출로, 2년 연속 기말에 출제됨. Paraquat가 오줌 표본의 타겟 독극물(강의안 표 6.1)이자 사후 표본 중 폐(기타 항목)의 타겟이라는 점과 연결되어 중요도가 높다.\n\n2) 핵심 포인트 — 알칼리화 시약을 고르는 단일 빈칸 문항. 선지가 모두 \"수산화~\" 계열이므로 반드시 **표준 프로토콜의 시약명**을 정확히 알아야 한다.\n\n3) 정답 선지 근거 — ② **수산화나트륨(NaOH)**. Paraquat 환원 반응은 알칼리성 조건에서 진행되며, Sodium dithionite가 Paraquat²⁺를 Paraquat⁺• 라디칼로 환원시키면 **진한 푸른색(blue)**을 형성한다. NaOH는 강염기이면서 용해도가 높아 안정적으로 알칼리 조건을 만들어 주므로 표준 시약으로 채택됨. 강의안 lec-14 분석독성학 슬라이드 및 lec-15 파라콰트 슬라이드에 동일 프로토콜 기술.\n\n4) 오답 선지 소거\n- ① 수산화칼슘 Ca(OH)₂ — 용해도 낮음. pH 조절 어려움. Dithionite법에 미사용.\n- ③ 수산화칼슘 (원본 OCR로 ①과 중복) — [2024-fin] #48 기준 원래는 수산화칼륨이었을 가능성 높음. 어느 쪽이든 오답.\n- ④ 수산화암모늄 NH₄OH — 약염기·휘발성. 알칼리 강도 부족.\n- ⑤ 수산화알루미늄 Al(OH)₃ — 양쪽성·용해도 낮음. 사용 안 함.\n\n5) 함정 요소 — 2025-fin 원본에서 ①과 ③이 모두 \"수산화칼슘\"으로 표기된 것은 족보 OCR 또는 인쇄 오류 가능성이 높다. 정답은 변함없이 **②** 수산화나트륨. 실제 시험장에서 이런 동일 선지가 보이면 당황하지 말고 나머지 선지 중에서 정답 후보를 좁히면 된다. 또 한 가지, 색상 파트(\"푸른색\")를 \"붉은색\"으로 바꾸는 변형이 가능하므로 **NaOH 알칼리화 → Sodium dithionite → 푸른색 양성**이라는 완전한 한 줄을 통째로 암기해야 한다.\n\n근거 위치: 강의안 lec-14·lec-15 분석독성학 섹션, 교과서 06장 §7, 강의안 표 6.1(오줌·폐 Paraquat 타겟).", "tail": "", "scoreable": true, "correctIndices": [1]}]}, "Y2024-모아보기": {"lecture": "Y2024-모아보기", "title": "2024년 모아보기", "slug": "y2024", "questions": [{"lecture": "L03-concepts", "round": "2024-중간", "num": "7", "qid": "", "body": "약리학과 독성학의 차이를 비교했을 때 틀린 것을 고르시오.\n\n① 약리학과 다르게 독성학은 경구 투여, 흡입, 피하주사, 안구노출 등 비교적 노출 경로가 제한적이다.\n② 용량 개념으로 볼 때 약리학은 노출량, 독성학은 투여량의 개념으로 볼 수 있다.\n③ 약리학은 합리적으로 계획하고 자발적으로 투여한다.\n④ 독성물질의 경우 우발적으로 의식하지 못하고 노출된다.\n⑤ 약리학과 독성학은 분포, 대사, 배설, 용량반응관계 등 유사점이 많다.", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "교재 p.7 \"약리학과 독성학의 비교\"를 기준으로 각 선지 판정:\n- ① 옳음 — 교재 p.7: \"독성물질의 노출은 주로 경구섭취, 흡입, 피부노출, 그리고 그 외에 안구노출 등으로 비교적 노출 경로가 제한적인 편이다.\" (주의: \"피하주사\"는 약물 투여 경로로 일반적이지만, 독성물질 노출 경로로 포함되는지는 문항에 따라 판정이 갈린다. 본 문항에서는 \"독성학은 ~ 제한적\"이라는 전체 결론이 옳으므로 옳은 선지로 본다.)\n- ② **틀림** — 교재 p.7: \"🔴 **약리학은 투여량(amount of administration)의 개념, 독성학은 노출량(amount of exposure)의 개념**.\" ②는 이를 정확히 뒤집음.\n- ③ 옳음 — \"약물은 합리적으로 계획하여(rationally designed) 자발적으로(voluntarily) 투여된다.\"\n- ④ 옳음 — \"독성물질은 예상하지 못한 사이에 우발적으로(accidentally) 의식하지 못하고서(involuntarily) 노출이 일어난다.\"\n- ⑤ 옳음 — \"체내에서의 분포, 대사, 배설의 원리나 용량-반응 관계의 적용 등에서는 약물이나 독성물질이나 서로 유사한 점이 많다.\"\n\n정답은 **②**. 족보 정답 일치.\n\n**함정 요소**:\n- ②는 \"약리학·독성학 비교\" 문항의 단골 오답 선지. [2025-중간] #7(Q006)도 완전히 동일한 패턴으로 ③ 정답.\n- ① \"피하주사\"가 독성물질 노출 경로로 제시된 점이 미묘 — 교재 원문은 경구·흡입·피부·안구 4개를 명시한다. 피하주사는 엄밀히 약물의 비경구 투여 경로이나, 문항 맥락에서 ②가 명백한 오답이므로 ①은 옳은 것으로 판정한다.\n\n근거 위치: 교재 p.7 \"약리학과 독성학의 비교\".", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L03-concepts", "round": "2024-중간", "num": "8", "qid": "", "body": "용량반응관계는 독성학의 근간을 이루는 가장 기본적이면서도 중요한 개념이다. 이에 대한 가정으로 틀린 것은?\n\n① 용량반응관계의 이론은 생체에 노출된 독성물질의 양에 비례하여 독성작용의 정도를 나타낸다.\n② 독성물질의 작용은 독성물질이 표적으로 하는 분자(molecule) 또는 수용체(receptor)에 작용하여 독성반응을 일으킨다.\n③ 독성반응의 크기는 그 특정 수용체에서의 독성물질 농도(concentration)와 상관관계가 있다.\n④ 특정 수용체에서의 독성물질의 농도는 그 독성물질의 노출량(dose)와 관련이 있다.\n⑤ 수용체의 종류와 수에 관련이 있다.", "jokboAnswer": "모두 맞음 (정답 없음)", "claudeAnswer": "**모두 맞음** (정답 없음 유형)", "explanation": "교재 p.8 \"4. 용량반응관계\" 전체를 근거로 각 선지 판정:\n- ① 옳음 — 교재 원문: \"용량-반응 관계의 이론은 생체에 노출된 독성물질의 양에 비례하여 생체에서 독성작용의 정도가 나타난다는 것에 기반을 두고 있다.\"\n- ② 옳음 — 3대 전제 첫째: \"독성물질의 작용은 독성물질이 표적으로 하는 분자(molecule) 또는 수용체(receptor)에 작용해서 독성 반응을 일으킨다.\"\n- ③ 옳음 — 3대 전제 둘째: \"독성 반응의 크기는 그 특정 수용체에서의 독성물질의 농도(concentration)와 상관관계가 있다.\"\n- ④ 옳음 — 3대 전제 셋째: \"특정 수용체에서의 독성물질의 농도는 그 독성물질의 노출량(dose)과 관련이 있다.\"\n- ⑤ 옳음 — 교재 p.8: \"발현되는 독성 반응의 크기 정도는 특정 독성물질이 어떤 수용체를 통해 작용하는가, 또한 표적기관에 이 독성물질의 수용체가 얼마나 많이 존재하고 있는가 등에 따라서도 영향을 받는다.\" 수용체의 종류·수가 반응에 관련된다는 진술은 교재 서술과 일치.\n\n따라서 **정답은 \"모두 맞음\"**. 족보 정답과 일치한다.\n\n**함정 요소**:\n- \"정답 없음\" 유형 문항은 수험생이 무리하게 오답을 찾으려다 함정에 빠지기 쉽다. 5개 선지가 모두 옳은 진술인지 교재 원문과 1:1 대조하는 신중함 필요.\n- 변형 문항(개념학습 Unit 2.4 적용 문항 #2)은 ⑤를 \"수용체의 종류와 수에는 영향을 받지 않는다\"로 뒤집어 틀린 선지로 만든다. 선지 표현이 긍정/부정으로 바뀔 때 주의.\n\n근거 위치: 교재 p.8 \"4. 용량반응관계\".", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "10", "qid": "Q113", "body": "독동학, 독력학에 대한 설명 중 틀린 것을 고르시오.\n\n① ADME 과정이 1차역학이고 선형인 약동학과는 달리 특별히 높은 용량에서 독동학은 1차역학이고 선형을 포함한다.\n② 독성물질이 체내에서 어떤 생리적 움직임을 보이는가를 연구하는 학문을 독력학, 독성물질의 독성효과에 대한 분자적 기전, 상호작용을 연구하는 학문을 독동학이라고 한다.\n③ 독동학은 1차역학을 따르고 역학과정이 선형으로 기대되는 약물의 낮은 농도와 관련된 ADME과정의 역학이다.\n④ 독력학의 기본 목적은 독성 시험조건 아래에서 생체이물의 투여용량과 체내에 순환하고 있는 농도 사이에 상관관계와 관련된 정보를 얻는데 있다.\n⑤ 독력학적 정보를 통해 후속 임상시험에서 투여용량의 점진적인 증가를 위한 근거로 사용된다.", "jokboAnswer": "미표기", "claudeAnswer": "**①②④**", "explanation": "교과서 p.11.\n- ① 오류: 높은 용량에서 독동학은 **0차역학·비선형**.\n- ② 오류: 독동학 = ADME; 독력학 = 분자 기전. 명칭 뒤바뀜.\n- ③ 옳음.\n- ④ 오류: 투여용량-체내농도 상관관계 = **독동학**의 목적. \"독력학\"은 잘못된 주어.\n- ⑤ 옳음.", "tail": "", "scoreable": true, "correctIndices": [0, 1, 3]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "11", "qid": "Q114", "body": "투여경로에 따른 약물흡수 관련 특이 요소에 대한 설명 중 틀린 것은?\n\n① 매우 작은 분자들(200Da 이하, 직경 4×10⁻⁴ μm 이하)은 별 어려움 없이 세포 구멍을 통과한다.\n② 이온화된 유형은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다.\n③ 이온화된 유형은 지방용해성이 낮기 때문에 세포막의 지방층을 통과하기 어렵다.\n④ 세포막 양쪽의 pH와 pKa가 이온화 정도의 결정에 중요한 역할을 한다.\n⑤ 원칙적으로 지방이 많은 세포막을 통해 이루어진다.", "jokboAnswer": "2", "claudeAnswer": "**②**", "explanation": "교과서 p.12. ②는 이온화형을 \"지방에 잘 용해\"라고 서술 — 오류.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "12", "qid": "Q115", "body": "수소이온과 관련된 생체이물에 대한 설명 중 틀린 것은?\n\n① 산의 환경인 위에서는 약산성의 화학물질과 약물이 잘 흡수된다.\n② 알칼리 환경의 작은창자에서는 약염기성의 화학물질과 약물이 잘 흡수된다.\n③ 대부분의 생체이물들의 흡수는 작은창자에서 이루어지는데 이는 약알칼리성인 장내 pH와 수백만 개의 융모로 구성된 매우 넓은 표면적과 특별한 흡수성 상피 때문이다.\n④ 살리실산염(salicylate)에 의한 중독에서 탄산수소소듐(sodium bicarbonate)을 투여하면 오줌의 알칼리성을 감소(pH 8.0에서 6.5)시킨다.\n⑤ 탄산수소소듐은 살리실산염의 비이온화를 대폭 감소(약 25배)시켜 신장 재흡수를 방지하고 신장 배출을 증가(약 5배)시킨다.", "jokboAnswer": "4", "claudeAnswer": "**④**", "explanation": "교과서 p.12. NaHCO3 투여 → 소변 알칼리성 **증가**(pH 6.5→8.0). ④는 방향 반대 서술.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "13", "qid": "Q116", "body": "생체이물들의 체내이용 제한요소들 중 틀린 것을 모두 고르시오.\n\na. 간장 내의 대사\nb. 작은 창자 내의 제1상, 제2상 관련 양쪽 효소들\nc. 폐포 표면의 90%를 차지하는 capillary bud\nd. 소화기계 내의 매우 강한 pH, 가수분해 효소들, 미생물들\ne. 작은 창자의 특별한 흡수 상피\n\n① cde  ② 모두 맞음  ③ ce  ④ abcd  ⑤ 모두 틀림", "jokboAnswer": "미표기", "claudeAnswer": "**③ ce**", "explanation": "교과서 p.13. a(간 대사)·b(소장 1·2상 효소)·d(강산 pH·효소·미생물) = 체내이용 **제한** 요소. c(폐포 모세혈관상)·e(소장 흡수성 상피) = 흡수 **촉진** 요소 → 제한요소 아님. 틀린 것(제한요소 아닌 것): ce = ③.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "14", "qid": "Q117", "body": "생체이물에 노출되는 주요 경로 중 하나인 흡입경로에 대한 설명 중 틀린 것을 모두 고르시오.\n\na. 폐는 심장박출량 100%를 받아들이고 기관지에서 말단 폐포까지 기도의 많은 분지는 흡수를 위한 거대한 표면적을 제공한다.\nb. 폐포 표면의 90%가 모세혈관상(capillary bed)에 노출되어 있기 때문에 폐를 통한 흡수는 매우 신속하다.\nc. 폐의 해부학적 부위와 상관없이 화학물질은 확산, 퇴적, 축적된다.\nd. 폐흡수 과정을 통해 전달되는 화학물질은 간장 일차통과 대사를 거치지 않고 심장을 통하여 직접 체순환으로 들어간다.\ne. 수동적 확산은 생체이물의 흡수에 중요한 역할을 한다.\n\n① a, c, d  ② b, e  ③ c, d, e  ④ c, d  ⑤ a, b, c", "jokboAnswer": "4 (④ c, d)", "claudeAnswer": "⚠️ **재판정**: **c만 틀림**", "explanation": "교과서 p.13.\n- c 오류: 화학물질 침착은 입자 크기·기도 구조에 따라 달라짐. \"부위 무관\"은 틀림.\n- d 옳음: 폐흡수 → 간 초회통과 **없이** 체순환 직접 진입. 교과서 명확히 기술.\n- 족보 정답이 d를 틀렸다고 한 것은 교과서 내용과 불일치. **Claude 재판정: c만 틀림**.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "15", "qid": "Q118", "body": "동물 종에 따른 흡수에 대한 내용으로 옳지 않은 것은?\n\n① 초식동물에 비해 육식동물에서 지방용해성 외래독성물질 축적률이 높다.\n② 섬유소가 풍부한 먹이의 섭취는 독성화합물의 생체이용률을 높인다.\n③ 어린 송아지와 새끼 양은 매우 거친 먹이에 적응할 정도로 성장할 때까지는 단위동물과 유사하다.\n④ 혐기성인 반추수의 제1위는 비반추동물에 비해 화학물질을 매우 효과적으로 감소시킨다.\n⑤ 반추동물은 나이 의존적인 화학물질의 흡수를 보인다.", "jokboAnswer": "2", "claudeAnswer": "**②**", "explanation": "교과서 p.14. ②는 생체이용률을 \"높인다\" → 오류. 섬유소 풍부 먹이 → 생체이용률 **낮춤**.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "16", "qid": "Q119", "body": "생체이물의 분포에 대한 설명 중 틀린 것을 모두 고르시오.\n\na. propranolol은 높은 단백 결합률을 보이지만, 많은 조직에 높은 친화력을 보이기에 높은 조직 분포를 보인다.\nb. 관류율은 확산이 느릴 때 그 속도를 제한한다.\nc. 혈중 단백질 결합률이 높은 화합물들은 대부분 높은 조직분포를 보인다.\nd. 생체이물의 신체 기관내 분포는 확산률, 관류율, 그리고 해당기관에서의 상대적 친화성에 주로 영향을 받는다.\ne. 혈중 단백질 결합이 증가하면 관련 기관에서 혈액에서 기관으로 확산률이 증가하지 않는다.", "jokboAnswer": "미표기", "claudeAnswer": "**bc**", "explanation": "교과서 p.14.\n- a 옳음: propranolol 예외.\n- b 오류: 관류율 = 확산 **빠를 때** 속도 제한.\n- c 오류: 단백결합 ↑ → **낮은** 조직분포 (일반).\n- d 옳음.\n- e 옳음: 단백결합 ↑ → 자유형 감소 → 기관 이동 감소.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "17", "qid": "Q120", "body": "약물 또는 생체이물의 역학적 행태를 단순화시켜 기술한 비구획성 독동학 매개변수에 대해 틀린 것을 고르시오.\n\n① AUC은 시료채취 기간에 걸친 약물 노출의 양적인 측정이다.\n② Cmax는 약물의 농도 측정 과정 동안 유지된 약물의 최고 농도로 약물흡수 정도를 결정하기 위하여 자주 이용된다.\n③ Tmax는 최고농도에 도달한 시간을 의미하며 약물흡수 속도를 평가하는데 유용하다.\n④ Cmin은 시간 대비 혈중약물농도 곡선에서 배출단계 동안에 도달한 최저 약물농도로 최고혈중농도에 대한 최저혈중농도 비율은 약물배출 속도에 대해 값진 정보를 제공할 수 있다.\n⑤ 약물의 안전성 평가를 위한 독동학 연구에서, AUCt0-tlast는 0시간부터 12시간까지 측정된다.", "jokboAnswer": "5", "claudeAnswer": "**⑤**", "explanation": "교과서 p.15. AUC = 0~2시간 측정. \"12시간\" = 오류.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "18", "qid": "Q121", "body": "분포용적에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. 독성물질이 큰 조직분포를 보이고 약물이 폭 넓게 조직들과 결합될 경우에도 Vd는 조직용적을 초과할 수 없다.\nb. Vd는 혈관 내분포의 지표로 간주되며 L(리터) 단위 또는 L/체중 kg 단위로 표시된다.\nc. 투여용량을 체내에 존재하는 혈중농도로 나눈 값이며, 조직적으로 독성물질이 체내에 분포된 독성물질의 양을 나타낸다.\nd. Vd는 독성물질 특이적이며 중앙혈액분획 내의 모든 독성물질의 분포를 나타낸다.\ne. 좀 더 큰 Vd를 가진 독성물질이 큰 조직 분포를 보인다.\n\n① bcde  ② abd  ③ abde  ④ bce  ⑤ abcd", "jokboAnswer": "2 (② abd)", "claudeAnswer": "**② abd**", "explanation": "교과서 p.15.\n- a 오류: Vd는 조직용적 초과 가능 (겉보기 값).\n- b 오류: Vd = 전신 분포 지표, 혈관 내 분포 지표 아님.\n- c 옳음: Vd = 투여량 ÷ 혈중농도.\n- d 오류: Vd는 전신(중앙+말초) 분포 나타냄.\n- e 옳음: 큰 Vd → 광범위 조직분포.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "19", "qid": "Q122", "body": "독동학 구획 모형에 대한 설명으로 옳지 않은 것을 보기에서 모두 찾아라.\n\na. 약물 기반의 생리학이나 해부학적 구조의 기질적 특성에 대한 정보가 필요하다.\nb. 복합적 투여 용량에서 약물의 축적 정도를 설명하거나 예측하는 데 값진 정보를 제공한다.\n\n*(이하 OCR 미완성)*", "jokboAnswer": "미표기", "claudeAnswer": "**a** (+ c, d 추정 — Q007, Q018 동일 유형 참조)", "explanation": "교과서 p.14~15. a(\"정보가 필요하다\") = 오류 → 구획모형은 생리·해부 정보 **없이도** 단순화 기술 가능.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L05-factors", "round": "2024-중간", "num": "20", "qid": "", "body": "대사산물의 물리화학적 요인에 대하여 틀린 것을 모두 고른 것은?\n\na. 물리적 제형이나 입자의 크기 등은 독성에 영향을 미치지 않는다.\nb. 화학 구조는 체내 흡수, 분포 및 작용 기전에 영향을 미치지 않는다.\nc. 용질을 충분히 녹일 수 있는 운반체가 잘 흡수시킬 수 있으며, 독성물질 투여 시의 액량 및 농도 역시 흡수 속도에 영향을 미친다.\nd. 지용성 물질이 지질막을 잘 통과하므로 흡수가 빠르고 지방이나 신경조직에 잘 축적된다.\ne. 페노티아진은 입자가 작아도 독성이 높아지지 않는다.\n\n① a, b, c  ② a, b, e  ③ b, c, d, e  ④ a, b, d, e  ⑤ 모두 틀림", "jokboAnswer": "미표기", "claudeAnswer": "② (a, b, e)", "explanation": "물리화학적 요인 5선지 중 방향이 뒤집힌 것만 고르는 전형적 문항. 교재 p.17(교재발췌.md 슬라이드 4/1) \"1. 물리화학적 요인\"을 기준으로 판정한다.\n\n- **a 틀림**: 교재 p.17 \"독성물질의 제형, 순도, 입자 크기 등에 따라 독성이 다르게 발현된다\". 즉 제형·입자 크기는 독성에 **크게 영향**. 족보 선지의 \"영향을 미치지 않는다\"는 정반대.\n- **b 틀림**: 교재 p.17 \"화학구조는 체내 흡수, 분포, 대사 및 작용기전에 큰 영향을 미친다\". 족보 선지의 \"영향 없다\"는 정반대.\n- **c 옳음**: 교재 p.17-18 \"용질을 충분히 녹일 수 있는 운반체나 용매는 세포막 투과 속도 혹은 흡수 속도에 영향을 미친다\". 액량·농도도 흡수에 영향을 주는 것이 맞다.\n- **d 옳음**: 교재 p.17 \"지용성 물질이 지질막을 잘 통과하므로 흡수가 빠르고, 지방이나 신경조직에 잘 축적된다\" — 거의 그대로.\n- **e 틀림**: 교재 p.17 \"페노티아진(phenothiazine)은 입자가 작을수록 독성이 높아진다\". 족보 선지의 \"작아도 높아지지 않는다\"는 정반대.\n\n따라서 틀린 선지는 a·b·e 세 개로 정답은 ②이다.\n\n함정 요소는 다음과 같다. 첫째, a와 b 모두 \"영향을 미치지 않는다\"라는 동일 구조 부정으로 일반화하여 그럴듯하게 느끼기 쉽다. 교재는 둘 다 **큰 영향**을 명시한다. 둘째, e는 페노티아진이라는 구체 사례를 인용하면서 방향을 뒤집는데, 교재에 예시로 명시된 \"작을수록 독성↑\"를 기억하지 못하면 보편적으로 \"입자 크기는 중요하다\" 정도의 직관만으로는 판정이 어렵다. 셋째, 선지 ⑤ \"모두 틀림\"은 c·d를 함께 틀림으로 몰아가려는 함정이지만 c·d는 교재 기술과 일치한다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "21", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 아래의 설명 중 틀린 것들로만 묶여있는 것은?\n\na. 독성 정도는 투여횟수에는 크게 영향을 받지 않는다.\nb. 배설 경로는 흡수 속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다.\nc. 대사과정에서 궁극적인 독성물질로 활성화되는 경우에는 피하나 복강내 투여가 오히려 경구투여보다 높은 독성을 발현한다.\nd. 동물 종에 따라 대사효소의 활성도 또는 흡수율에 따라 선택적 독성이 유발되는 경우가 있다.\ne. 연령에 따른 신체발달, 대사기능 완성도, 호르몬 등에 의해서 독성의 차이가 나타난다.\nf. 동일종의 동물에서 독성은 체중이나 체표면적에 비례한다.\n\n① a, b, c  ② a, b, e  ③ b, c, e  ④ b, d, f  ⑤ c, e, f", "jokboAnswer": "①", "claudeAnswer": "① (a, b, c)", "explanation": "[2022-중간] #14와 선지 a~f가 거의 동일한 반복 출제 문항이다. 교재 p.18-20 기준 판정은 동일하다.\n\n- **a 틀림**: 교재 p.18 \"투여 횟수가 달라지면 ... 축적·내성 등의 성질에 따라 독성 정도가 달라진다\". 투여 횟수 = 독성에 큰 영향.\n- **b 틀림**: 교재 p.18 \"**노출경로**는 흡수속도와 대사에 큰 변화를 일으켜 독성에 절대적인 요인으로 작용한다\". \"배설 경로\"가 아니다.\n- **c 틀림**: 교재 p.19 다이옥신 예외 — \"경구 > 피하·복강내\". 족보 선지는 방향 반대.\n- **d·e·f 옳음**: 각각 종간 차이·연령 차이·체중·체표면적 비례로 교재와 일치.\n\n틀린 것 a·b·c → 정답 ①. 2022년과 2024년 두 차례 반복 출제된 템플릿 문항으로, 선지 표현도 거의 동일하다.\n\n함정 요소는 b의 \"배설\"이라는 단어 하나만 바꾸는 점, 그리고 c의 일반론화(\"다이옥신\" 언급 없이 \"대사 활성화 경우\")에 있다. 매년 같은 틀로 출제되므로 **a·b·c = 틀림 / d·e·f = 맞음**을 통으로 암기하는 것이 효율적이다.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "22", "qid": "", "body": "독성을 나타내는 생물학적 인자 중 틀린 것은?\n\n① 포유류는 말라티온 분해효소가 있어 해충보다 독성이 높다.\n② 다이옥신은 대사과정에서 궁극적인 독물로 활성화되어 경구투여에서가 피하나 복강내 주사보다 높은 독성을 갖는다.\n③ 반추류는 thiamine(vitamin B₁)을 가져 thiaminase를 함유하는 고사리 중독에서 독성이 덜하다.\n④ 페노바비탈의 LD₅₀은 경구투여에서 혈관내투여보다 높다.\n⑤ 아플라톡신 B₁에 의한 간암독성은 랫드가 마우스보다 민감하다.", "jokboAnswer": "①", "claudeAnswer": "①", "explanation": "[2022-중간] #15의 ④선지와 거의 동일하게 말라티온 선지의 방향이 뒤집힌 문항이다. 선지 배치 순서만 달라졌고 판정 논리는 동일하다.\n\n- **① 틀림(정답)**: 교재 p.19 \"포유류에는 말라티온 분해효소가 존재하여 효소가 없는 해충에 비해 독성이 월등히 낮다\". 족보 선지는 \"독성이 높다\"로 정반대. 포유류 carboxylesterase → malathion 가수분해 → 무독화.\n- **② 옳음**: 다이옥신 경구 > 피하·복강내 예외. 교재 p.19.\n- **③ 옳음**: 반추류의 thiamine 자체 합성 → 고사리 저항성. 교재 p.19.\n- **④ 옳음**: 페노바비탈 LD₅₀ 경구 280 > IV 80 mg/kg. 교재 p.19.\n- **⑤ 옳음**: 랫드 15 ppb >> 마우스 10,000 ppb. 교재 p.20.\n\n5대 함정 중 말라티온 하나만 방향이 틀려 ①이 정답이다.\n\n함정 요소는 \"분해효소가 있다\"(맞는 사실)에 \"독성이 높다\"(틀린 결론)를 접착제처럼 붙여 한 문장으로 만든 점이다. 효소가 **분해**하면 독성은 **낮아진다**는 일반 원리를 끊임없이 상기해야 한다. 또 ④선지의 \"LD₅₀이 경구 > IV\"가 수치상 맞지만 독성 방향과 혼동될 수 있다 — LD₅₀ 수치 ↑ = 독성 ↓라는 역방향 관계를 반드시 기억할 것.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "23", "qid": "", "body": "독성에 영향을 미치는 건강상태 요인에 대한 것으로 틀린 것은?\n\na. 영양상태, 섭취한 동식물의 종류, 각종 질환 보유여부 등에 따라 특정 독성물질의 독성이 영향을 받음.\nb. 아세트아미노펜은 고단백 식이로 인해 독성이 증가하고 약효가 상승된다.\nc. 안티피린은 채식을 선호하는 인종보다 육류를 선호하는 인종에서 대사가 수월하여 약효가 높아진다.\nd. 암페타민은 저체온에서 독성이 증가한다.\ne. DDT는 고체온에서 독성이 증가한다.\n\n① 모두 맞음  ② b, c, d  ③ a, b, c, d  ④ b, c, d, e  ⑤ 모두 틀림", "jokboAnswer": "④", "claudeAnswer": "④ (b, c, d, e)", "explanation": "건강상태 관련 4가지 세부 기전(APAP·안티피린·암페타민·DDT)이 모두 방향이 뒤집혀 틀린 것으로 구성된 문항. 교재 p.20(교재발췌.md 슬라이드 3)의 건강상태·체온 항목 기준 판정.\n\n- **a 옳음**: 교재 p.20 \"간·신장 질환, 영양 상태, 감염, 스트레스 등은 독성물질의 대사 및 배설에 영향을 미친다\" — 영양·질환 요인이 독성에 영향을 준다는 일반 진술. 정확.\n- **b 틀림**: 교재 p.20 \"아세트아미노펜은 고단백식이로 독성이 **감소**하고 약효가 **저하**되며\" — 족보 선지는 \"독성 증가·약효 상승\"으로 둘 다 뒤집힘. 고단백은 APAP의 GSH 합성을 돕거나 포합 해독을 증가시키는 방향.\n- **c 틀림**: 교재 p.20 \"안티피린은 육류를 다량 소비하는 Caucasians에서 채식을 선호하는 Asians보다 대사가 수월하여 약효가 **낮아진다**\" — 족보 선지는 \"약효가 높아진다\"로 뒤집힘. 대사가 수월해지면 빨리 분해되어 약효 **지속 시간이 짧아지고 효과가 낮아진다**.\n- **d 틀림**: 교재 p.20 \"암페타민은 **고체온**에서 독성이 증가\" — 족보 선지는 \"저체온\"으로 반대. 암페타민 = 교감신경 자극 = 고체온에서 더 위험.\n- **e 틀림**: 교재 p.20 \"DDT는 **저체온**에서 독성이 증가\" — 족보 선지는 \"고체온\"으로 반대. DDT = 저체온에서 대사 저하로 축적 증가.\n\n틀린 선지 b·c·d·e 네 개로 정답 ④.\n\n함정 요소는 암페타민과 DDT의 체온 방향이 서로 **반대**라는 점이다. 암페타민=고체온, DDT=저체온으로 짝을 지어 암기해야 섞이지 않는다. 또 안티피린 선지에서 \"대사가 수월 → 약효가 높아진다\"는 직관적으로 맞아 보이지만, 약물학적으로는 **대사가 빠르면 약효 농도·지속이 짧아져 오히려 약효가 낮아진다**는 원리를 기억해야 한다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "24", "qid": "", "body": "독성물질의 연용효과(Continuous use)와 그에 대한 설명이 맞게 짝지어진 것은?\n\na. 축적  b. 과민감화  c. 내성  d. 습관성\n\nㄱ. 이전의 반복 노출에 의해 감수성이 감소되어 동일용량 투여에도 불구하고 같은 정도의 독작용이 일어나지 않는 현상.\nㄴ. 이전의 반복노출에 의해 감수성이 증가해 동일용량 투여에도 과도한 반응이 유도되는 현상.\nㄷ. 일부 독성물질을 장기간 투여할 때 나타나는 탐닉 현상으로, 물질의 투여를 중단하면 금단 증상으로 건강상태가 현저하게 나빠진다.\nㄹ. 반복 투여된 독성물질이 흡수에 비해 대사나 배설이 늦어 독성이 과도하게 나타나는 현상.\n\n① a-ㄴ, b-ㄷ, c-ㄱ, d-ㄹ  ② a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ  ③ a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ  ④ a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ  ⑤ a-ㄷ, b-ㄹ, c-ㄱ, d-ㄴ", "jokboAnswer": "⑤ (오류)", "claudeAnswer": "③ (a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ)", "explanation": "족보 정답 ⑤는 오류이며, 교재 p.21 연용효과 정의 기준 정답은 ③이다. 각 개념을 정의에 그대로 대응시키면 매칭이 결정된다.\n\n- **a 축적(accumulation) = ㄹ**: \"흡수 > 대사·배설 → 독성 과도\" 정의가 ㄹ에 그대로 있음. 교재 p.21.\n- **b 과민감화(hypersensitization) = ㄴ**: \"감수성 **증가** → 과도한 반응\" 정의가 ㄴ에 그대로. 알레르기가 대표.\n- **c 내성(tolerance) = ㄱ**: \"감수성 **감소** → 동일 용량에 같은 독작용 안 일어남\" 정의가 ㄱ에 그대로. 수용체 민감 소실 / 효소 유도가 기전.\n- **d 습관성(habituation) = ㄷ**: \"장기 투여 탐닉 → 중단 시 금단증상\" 정의가 ㄷ에 그대로.\n\n따라서 a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ → 선지 ③이 정답이다. 족보가 ⑤로 표기한 것은 명백한 오류로, ⑤는 \"a-ㄷ, b-ㄹ\"로 축적과 습관성이 바뀌어 있어 정의와 어긋난다.\n\n함정 요소는 이 문항이 병용효과 매칭(부가·증강·상승·길항 = a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ = ②)과 표면 구조가 유사하다는 점이다. 병용효과 매칭은 b가 ㄷ이지만, 연용효과 매칭은 b가 ㄴ이다 — 두 매칭을 혼동하지 말 것. 연용효과 매칭은 **\"감수성 증가(ㄴ) = 과민감화(b)\"**라는 키를 먼저 잡으면 나머지가 자동으로 결정된다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "25", "qid": "", "body": "생물학적 작용을 가진 두 개 이상의 독성물질에 의한 현상에 대하여 알맞게 짝지은 것은?\n\na - 부가효과  ㄱ - 두 개 이상의 독성물질이 서로 반대로 작용하여 독성이 감소하는 것.\nb - 증강효과  ㄴ - 각각의 효과를 더한 것보다 크게 증가하는 효과\nc - 상승효과  ㄷ - 특정 효과가 없는 A 약물이 B 약물의 효과를 더 증강시키는 것\nd - 길항효과  ㄹ - 두 약물의 병용효과가 각각의 효과를 더한 만큼 증가하는 것\n\n① a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ  ② a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ  ③ a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ  ④ a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ  ⑤ a-ㄷ, b-ㄹ, c-ㄱ, d-ㄴ", "jokboAnswer": "②", "claudeAnswer": "② (a-ㄹ, b-ㄷ, c-ㄴ, d-ㄱ)", "explanation": "[2022-중간] #17과 동일 구조의 병용효과 매칭. 답 ② 고정. 교재 pp.22-23 기준.\n\n- **a 부가(additive) = ㄹ**: 1+1.2=2.2 (Ether+Chloroform 마취)\n- **b 증강(potentiation) = ㄷ**: 0+1>1 (Isopropanol+CCl₄)\n- **c 상승(synergistic) = ㄴ**: 합 초과, Atropine+2-PAM=61.1배\n- **d 길항(antagonistic) = ㄱ**: 반대 작용, 독성 감소\n\n매칭 암기 요령: **\"ㄹ-ㄷ-ㄴ-ㄱ\"을 거꾸로(ㄱ이 마지막)** 기억하면 a·b·c·d 순서에 맞는다. 또는 \"0+1>1은 증강, 더해서 61.1은 상승\"이라는 수식 단서로 추론해도 된다.\n\n함정 요소는 선지 ①이 \"a-ㄱ(부가를 길항 정의)\"로 완전히 뒤집힌 함정, ⑤가 \"a-ㄷ, b-ㄹ(부가와 증강을 통째로 바꿈)\"로 중간 함정을 구성한다는 점이다. 첫 번째 글자만 봐도 함정 여부를 걸러낼 수 있다 — a는 반드시 ㄹ이다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "26", "qid": "", "body": "다음 빈칸에 적절히 선택된 것을 고르시오.\n[그림: 생체내 약물(독물)의 대사경로 및 대사산물]\n\nA: 고지용성\nB: 제2상 반응: 생합성\nC: 포합\nD: 산화, 환원, 가수분해\nE: 제1상 반응\n\n① A-B-D-C-E  ② A-B-D-E-C  ③ A-D-E-C-B  ④ A-E-D-B-C  ⑤ A-E-C-B-D", "jokboAnswer": "④", "claudeAnswer": "④ (A-E-D-B-C)", "explanation": "독성물질 체내 대사 경로의 큰 흐름을 순서대로 배치하는 문항. 교재 04장 슬라이드 (교재발췌.md chunk 8 도식)에 따르면 외인성 고지용성 물질은 다음 순서로 대사·배설된다.\n\n1. **A 고지용성(외인성 물질 진입)** — 첫 단계. 지용성이 커야 세포막·간세포 진입 가능.\n2. **E 제1상 반응** — 두 번째 단계. 1상의 카테고리 이름.\n3. **D 산화·환원·가수분해** — 1상 반응의 구체 내용. 즉 E의 하위 설명으로 이어짐.\n4. **B 제2상 반응: 생합성** — 세 번째 단계 카테고리. 1상을 거친 중간대사체에 결합 그룹을 붙임.\n5. **C 포합(conjugation)** — 2상 반응의 구체 내용. B의 하위 설명. 최종적으로 수용성 증가 → 배설.\n\n따라서 순서는 **A → E → D → B → C**이고, 선지 번호는 ④이다.\n\n다른 선지 소거:\n- ① A-B-D-C-E: 2상이 1상보다 먼저 나옴 → 틀림.\n- ② A-B-D-E-C: 1·2상이 뒤섞임 → 틀림.\n- ③ A-D-E-C-B: 반응 카테고리(E, B) 없이 하위 내용(D, C)이 먼저 나옴 → 틀림.\n- ⑤ A-E-C-B-D: 포합(C)이 2상(B)보다 먼저 나오고, 1상 세부(D)가 맨 뒤로 감 → 틀림.\n\n함정 요소는 **카테고리(E 1상, B 2상)와 그 하위 내용(D 산화·환원·가수분해, C 포합)을 섞는 것**이다. 카테고리가 먼저 나오고 그 다음에 하위 내용이 이어지는 계층 구조를 기억해야 한다. 또한 1상 → 2상 순서가 절대 바뀌지 않는다는 점(1상은 functional group 노출, 2상은 그에 conjugation 부착)이 핵심이다. L06 biotransformation 단원과 주제가 이어지지만 본 문항은 L05 교재 04장 내에서 완결된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "27", "qid": "Q130", "body": "27. 외인성 물질대사에 관해 옳지 않은 것을 고르시오.\n\n①. 친수성 물질이나 분자량이 큰 물질은 대사를 통해 지용성 물질로 바뀌게 되는데 이는 흡수를 어렵고 배설을 용이하게 한다.\n②. 대사적 활성화는 독성 물질들 중 일부는 그 물질 자체(모물질)에 의하여 독성을 일으킬 수 있지만 많은 물질들은 생체 내 대사를 거침으로서 독성을 일으킬 수 있는 물질로 변환되는 것이다.\n③. 반응성 대사산물이란 대사적 활성화로 생성된 물질이다.\n④. 외인성 물질들은 bioinactivation이나 detoxification이 될 수 있다.\n⑤. 대사는 외인성 물질을 배설하고 덜 유해한 물질을 해독하는 방어기전이다.", "jokboAnswer": "미표기", "claudeAnswer": "**①**", "explanation": "1) **배경**: 강의안 lec-07(chunk 3, 슬라이드 4)은 \"대사의 목적 = 신장에서 재흡수되지 않고 배설되도록 **수용성(극성, 이온화) 물질로 변환**\"이라 명시.\n\n2) **포인트**: 대사의 방향성 — **지용성→수용성**이 맞는데 선지 ①은 반대로 서술.\n\n3) **정답 근거**: \"친수성을 지용성으로\"는 완전히 뒤집힌 방향. 실제로는 지용성 모물질 → 수용성 대사산물 → 담즙·소변 배설.\n\n4) **오답 소거**: ②③④⑤는 강의안 개념 그대로.\n\n5) **함정**: \"흡수 어렵게·배설 용이하게\"라는 결과 부분은 맞아서 선지 전체가 맞아 보이게 만드는 구조 — 방향성이 틀리면 전체가 오류.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "28", "qid": "Q131", "body": "28. 반응성 대사산물에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. 친전자성 물질은 체액이나 세포내 친핵성 물질과 포함되어 비활성화되며 가장 많은 친핵성 또는 해독 분자는 핵산이다.\nb. 친핵성 물질은 상대편 분자의 친전자성 물질과 반응하며 생체 내에서 단백질, 지질, 핵산, GHS 등이 친핵성 물질이다.\nc. 자유기는 일반적으로 불안정하고, 매우 큰 반응성을 가진 고립전자의 화학종으로 수명이 짧다.\nd. 산화-환원적 스트레스를 일으키는 것은 생체에서 비교적 쉽게 환원될 수 있는 분자 산소(O₂)이다.\ne. 정상적으로 CO(Carbon Oxide)는 근육과 혈관에서 신호 분자이지만, 독성학으로는 산화적 스트레스의 주요 요소이다.\n\n①. a, b, e\n②. a, e\n③. b, d, e\n④. a, b, d, e\n⑤. b, e", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "1) **배경**: [2022-중간] #19와 유사 구조. e의 \"CO\" 함정이 추가.\n\n2) **포인트**: 두 고정 함정 — ①\"가장 많은 해독 분자=핵산\"(X, 물), e\"신호 분자=CO\"(X, NO).\n\n3) **정답 근거**:\n   - a(**틀림**): 가장 많은 친핵·해독 분자는 **물**.\n   - b(맞음): 친핵성 물질 열거 ○.\n   - c·d(맞음).\n   - e(**틀림**): 근육·혈관의 신호 분자는 **NO(nitric oxide)** — CO가 아님. 강의안 lec-07 chunk 7 슬라이드 1.\n\n4) **오답 소거**: a·e만 틀리므로 ②.\n\n5) **함정**: CO와 NO는 둘 다 작은 기체 분자라 혼동 유발. **CO = 독성(Hb 결합), NO = 생리 신호**로 구분.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "29", "qid": "Q132", "body": "29. 반응성 대사산물을 생성하는 아래의 물질들에 대한 설명 중 틀린 것은?\n\n> (body OCR 미완성 — 이하 내용 잘림)", "jokboAnswer": "미표기", "claudeAnswer": "**판정 불가** (본문 미복원)", "explanation": "[2022-중간] #20, [2025-중간] #29·#30과 동일 유형. 핵심 오답 후보: Paraquat=간독성(X, 폐), 전이금속=1·2상 반응(X, Fenton), Benzene=HO·(X, O₂⁻), 대식세포 ONOO⁻(○), 장내 세균총 NO₃⁻→NO₂⁻(○). 선지 복원 후 해당 항목 대조.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L04-toxicokinetics", "round": "2024-중간", "num": "30", "qid": "Q134", "body": "30. 외인성 물질의 독성효과 및 대사에 관한 설명으로 틀린 것을 고르시오.\n\nA. 흡수된 독성물질은 위장관 점막세포, 간, 폐 등을 통과하면서 일차통과효과를 통해 독성이 증가한다.\nB. 표적기관에 모세혈관의 투과성 항진, 특수 수송계 존재, 가역적인 세포 내 결합, 재분포는 표적으로의 분포를 촉진한다.\nC. 독성물질은 생체 외로 제거되기 전에 신세뇨관에서 생체 내로 재흡수되어 독성이 약화된다.\nD. 수용성 독성물질은 배설되기 어려우므로 생체 내 대사를 거쳐 배설되기 쉬운 화합물로 변화되어야 한다.\nE. 혈장단백과 결합, 특수 장벽 존재, 저장 부위로부터 유리, 세포밖으로 배출 등은 표적으로의 분포를 촉진한다.\n\n① a, c  ② a, c, d, e  ③ 모두 맞음  ④ b, c, e  ⑤ a, b, c, d", "jokboAnswer": "2 (② a, c, d, e)", "claudeAnswer": "**A, C, D** (E는 부분 오류)", "explanation": "교과서 p.12~14.\n- A 오류: 일차통과효과는 독성 **감소**.\n- B 옳음: 표적 분포 촉진 요소.\n- C 오류: 신세뇨관 재흡수 → 반감기 **연장** + 독성 **강화** (약화 아님).\n- D 오류: **지용성** 물질이 배설 어려움. \"수용성\"은 틀림.\n- E 부분 오류: 혈장단백 결합·특수 장벽·세포 배출 = 분포 **제한**. \"저장부위로부터 유리\"는 촉진 요소. 혼합됨.\n→ 족보 정답 a,c,d,e 중 a·c·d는 명확히 틀림.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L08-mechanism-3", "round": "2024-중간", "num": "31", "qid": "", "body": "아래의 독성물질과 표적분자가 잘못 짝지어진 것을 고르시오.\n\na. aflatoxin - 지질\nb. 복어독 tetratoxin(TTX) - acetylcholine esterase\nc. CO - 적혈구의 혈색소(Hb)\nd. 사염화탄소 - DNA 구아닌\ne. 유기인계 - Na⁺ 통로", "jokboAnswer": "a, b, d, e", "claudeAnswer": "a, b, d, e", "explanation": "L08 최다 출제 유형의 정석 문항으로, 5개 선지 중 **4개가 틀리는** 극단적 함정 구조다. 교재발췌 라인 451~478이 판정 기준이다.\n\n선지별 판정:\n- a **틀림** — Aflatoxin 표적은 **DNA의 guanine**(특히 N-7 위치). 지질이 아니다. \"aflatoxin은 DNA의 guanine에 결합하여 DNA 주형을 변화시킴으로써 전사 장애 및 유전정보 복제 이상을 초래한다\"(교재발췌 라인 479~481).\n- b **틀림** — TTX 표적은 **막전위 의존성 Na⁺ 통로**. AChE가 아니다. AChE 억제는 유기인계의 기전(교재발췌 라인 457~462, 468~470).\n- c 옳음 — CO → Hb → COHb → 산소 공급 억제(교재발췌 라인 451~455).\n- d **틀림** — CCl4 표적은 **세포막 지질**. DNA 구아닌이 아니다. \"Carbon tetrachloride는 자유기를 생성시킴으로써 지질에 작용하여 지질과산화를 일으키기 때문에 그 표적 분자는 세포막 지질이다\"(교재발췌 라인 462~465).\n- e **틀림** — 유기인계 표적은 **AChE**. Na⁺ 통로가 아니다. Na⁺ 통로는 TTX 표적(교재발췌 라인 468~470).\n\n배경 포인트는 **b와 e가 서로 바꿔치기 쌍**이라는 점이다. TTX의 표적을 AChE로, 유기인계 표적을 Na⁺ 통로로 서로 맞바꿔 배치했다. 그리고 **a와 d도 바꿔치기 쌍**이다. Aflatoxin을 지질로(실제는 DNA guanine), CCl4를 DNA 구아닌으로(실제는 막지질). 이 네 가지 바꿔치기를 한 번에 잡아내려면 **정답 매칭 5쌍을 암기**한 상태에서 체크리스트를 돌려야 한다.\n\n함정 요소는 발문이 **\"잘못 짝지어진 것을 고르시오\"** 인데 정답이 4개나 된다는 극단성이다. \"하나만 고르면 되겠지\" 하고 a만 골라 답하면 틀린다. 다중 정답 발문일 가능성을 항상 염두에 둬야 한다.\n\n근거: 교재발췌 라인 451~481, 강의안 lec-08 슬라이드 5~7.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "32", "qid": "Q136", "body": "32. 보기 중 틀린 선지로만 이루어진 것을 고르시오.\n\na. 독성물질과 분자 간의 결합에는 비공유결합과 공유결합이 존재하고, 수소 분리, 전자 전이, 효소 반응 등이 있다.\nb. 독성물질과 분자 간의 비공유결합은 강하고 비가역적이다.\nc. 독성물질과 분자의 비공유결합은 가역적이다.\nd. 독성물질은 단백질, 지질, 핵산, 친핵성 물질인 세포내 thiols(GSH)를 표적으로 하고, 특히 단백질은 친핵성 물질의 공격에 주요 표적이 된다.\ne. 소량의 친핵성 물질이 DNA와의 공유결합할 수 있으며, DNA가 알킬화되는 경우 발암을 일으킬 수 있다.\nf. 수용성 화합물은 배설되기 어려우므로 생체내 대사를 거쳐 배설되기 쉬운 화합물로 바뀌어야 한다.\n\n①. a, c, e\n②. a, d, f\n③. b, c, f\n④. b, d, e, f\n⑤. 모두 틀림", "jokboAnswer": "④", "claudeAnswer": "**④**", "explanation": "1) **배경**: 강의안 lec-07 chunk 5. 친전자·친핵 개념과 결합 양상 종합 점검.\n\n2) **포인트**: 4개의 공통 혼동 — 결합 강도·표적 분자·DNA 공격자·배설 성향.\n\n3) **정답 근거**:\n   - b(**틀림**): 비공유결합 = 약·가역. 강·비가역은 **공유**결합.\n   - d(**틀림**): 단백질은 **친전자성** 물질의 표적 (단백질이 친핵성이기 때문).\n   - e(**틀림**): DNA와 공유결합 → 알킬화 → 발암은 **친전자성** 물질.\n   - f(**틀림**): 배설 어려운 것은 **지용성(친지성)**. 수용성은 배설 쉬움.\n   - a·c(맞음).\n\n4) **오답 소거**: 틀린 4개 모두 포함 = ④.\n\n5) **함정**: d에서 \"친핵성 물질\"이라 써놓고 주체-객체를 뒤집음. \"단백질 = 친핵성 표적\" = \"**친전자성** 물질이 공격\"이 맞음.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "33", "qid": "Q137", "body": "33. 산화적 스트레스 방어계의 종류와 물질을 알맞게 짝지은 것은?\n\na. GSH\nb. SOD\nc. Catalase\nd. Metallothionein\n\nㄱ. 비효소적 자유기 포착자. 산화된 단백질의 sulfhydryl기를 환원.\nㄴ. 구리와 아연 이온 의존성 효소. O₂⁻를 H₂O₂로 전환을 촉매함.\nㄷ. 과산화소체에 고농도로 존재. H₂O₂를 H₂O로 전환을 촉매함.\nㄹ. 아연, cadmium 등을 투여하면 급속히 출현하는 금속 결합 단백질로, 중금속을 격리.\n\n①. a-ㄷ, b-ㄹ, c-ㄱ, d-ㄹ\n②. a-ㄴ, b-ㄴ, c-ㄹ, d-ㄷ\n③. a-ㄹ, b-ㄴ, c-ㄱ, d-ㄷ\n④. a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ\n⑤. a-ㄴ, b-ㄴ, c-ㄷ, d-ㄹ", "jokboAnswer": "⑤", "claudeAnswer": "**올바른 매칭 = a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ** (선지에 이 조합 없음 — **문항 오류**)", "explanation": "1) **배경**: 교재 5장 p.36-37. 방어계 4인방 매칭은 기본 중 기본이나, 선지 구성에서 착오가 발생한 출제.\n\n2) **포인트**: 족보 정답 ⑤는 \"a-ㄴ\"(GSH=Cu·Zn 효소)로 잘못 연결 → 해설 자체와 모순.\n\n3) **정답 근거**: 올바른 매칭은 a-ㄱ(GSH=비효소적 sulfhydryl 환원), b-ㄴ(SOD=Cu/Zn), c-ㄷ(Catalase=과산화소체), d-ㄹ(Metallothionein=금속 격리). 선지에 이 조합이 없음.\n\n4) **오답 소거**: 모든 선지가 오류를 포함하므로 정답 선지 없음.\n\n5) **함정**: \"족보는 ⑤로 표기되었으나 강의안·교재 근거로는 선지 오류. 각 방어계 역할을 정확히 외워야 함\". 실전에서 선지 오류 확인 시 a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ 매칭만 암기.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L06-mechanism-1-2", "round": "2024-중간", "num": "34", "qid": "Q138", "body": "34. 세포막 지질의 손상은 세포손상과 세포 생존능력의 결손을 야기할 수 있다. 그 발생기작의 올바른 순서는?\n\na. 지방산으로부터 생성된 지질 자유기는 산소 분자와 쉽게 반응하여 세포막 지질 손상의 증폭 및 확산을 유도\nb. 직접적인 독성 유발\nc. 외인성 물질에 의해 자유기 생성\nd. aldehyde가 단백질이나 DNA와 공유결합하여 산화적 손상\ne. 지방산으로부터 수소를 분리하여 지질 자유기(L·)가 생성되어 지질과산화가 시작\nf. 유독한 aldehyde가 생성\n\n①. c→e→f→a→d→b\n②. c→e→a→f→d→b\n③. d→c→a→f→e→b\n④. e→f→a→c→d→b\n⑤. d→c→e→a→f→b", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "1) **배경**: 교재 5장 p.38 지질과산화. [2022-중간] #25, [2025-중간] #34·#36과 동일 문항.\n\n2) **포인트**: c로 시작·b로 끝 + e(L·)→a(LOO·)→f(aldehyde)→d(공유결합).\n\n3) **정답 근거**: c(자유기 생성)→e(L· 개시)→a(LOO· 확산)→f(aldehyde 생성)→d(DNA·단백질 공유결합)→b(독성) = ②.\n\n4) **오답 소거**: ①은 f와 a 순서 뒤바뀜. ③④⑤는 시작점이 틀림.\n\n5) **함정**: ①이 ②와 비슷해 보이지만 f·a 순서 교체 — **L·+O₂→LOO·(a) 먼저, aldehyde(f)는 나중**.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L05-factors", "round": "2024-중간", "num": "35", "qid": "", "body": "독성에 영향을 미치는 생물학적 요인에 대한 아래의 설명 중 틀린 것들로만 묶여있는 것은?\n(Q124 / Q278과 동일 선지 a~f)\n\n① a, b, c  ② a, b, e  ③ b, c, e  ④ b, d, f  ⑤ c, e, f", "jokboAnswer": "①", "claudeAnswer": "① (a, b, c)", "explanation": "[2022-중간] #14, [2024-중간] #21과 같은 선지 a~f 구조가 2024년 중간고사 내에서 한 번 더 반복 출제되었다. 같은 시험지에 같은 문항이 두 번 실린 이례적 경우. 판정은 동일하다.\n\n- **a 틀림**: 투여 횟수 → 독성 큰 영향 (교재 p.18, 축적·내성 결과).\n- **b 틀림**: **노출 경로**가 절대적 요인 (\"배설 경로\" 아님, 교재 p.18).\n- **c 틀림**: 다이옥신은 경구 > 피하·복강내 (교재 p.19 예외).\n- **d·e·f 옳음**: 종간 차이·연령·체중·체표면적 비례 모두 정확.\n\n틀린 것 a·b·c → 정답 ①.\n\n함정 요소는 이전 2022·2024년 타 문항과 완전히 동일한 구조라는 점이다. 다만 한 시험지에 같은 내용이 두 번 출제되었다는 점에서, 실제 시험에서 \"이거 아까 봤는데?\" 싶으면 동일 정답 ①을 자신있게 써도 된다. **a·b·c 세트 = 생물학적 요인 단골 오답 3종**으로 외우면 시험 직전 복습에 효율적이다.", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L13-mechanism-4-7-11", "round": "2024-중간", "num": "36", "qid": "", "body": "대부분의 독성물질은 분자량이 작아서 항원으로서 역할을 하지 못한다. 독성물질이 항원-항체 복합체를 형성하여 일으키는 일반적인 반응의 순서는?\n\na. 유리된 보체단백질이 세포 표면을 손상시키고 괴사, 세포융해, 비만세포에서 histamine 유리, 백혈구의 식균작용 촉진, 그리고 평활근을 수축시킨다.\nb. 항원에 반복된 노출은 항체와 결합하여 항원-항체 복합체를 형성한다.\nc. 항원-항체 반응에 의해 보체단백질이 유리된다.\nd. 항원이 림프구를 자극하여 IgA, D, E, G, M을 생성한다.\ne. 내인성 단백질과 결합하여 항원을 생성한다.\n\n① a-b-d-c-e  ② b-d-c-e-a  ③ b-e-c-d-a  ④ e-d-b-c-a  ⑤ e-b-d-d-a", "jokboAnswer": "④", "claudeAnswer": "④ (e → d → b → c → a)", "explanation": "1) **배경 — 반복 출제 확인**: 이 문항은 2년 전 [2022-중간] #27의 \"가·나·다·라·마\" 한글 표기를 \"a·b·c·d·e\" 알파벳으로만 치환한 **완전 동일 문항**이다. 표기 대응표는 다음과 같다:\n   | 2022 한글 | 2024 알파벳 | 의미 |\n   |:---:|:---:|:---|\n   | 가 | a | 보체 → 세포 손상 6종 |\n   | 나 | c | 항원-항체 반응 → 보체 유리 |\n   | 다 | b | 반복 노출 → 항원-항체 복합체 |\n   | 라 | d | 항원 → 림프구 자극 → 항체 |\n   | 마 | e | Hapten + 내인성 단백질 → 완전 항원 |\n\n   따라서 2022의 정답 \"마-라-다-나-가\"는 2024의 \"**e-d-b-c-a**\"와 정확히 대응한다.\n\n2) **문항이 묻는 핵심 포인트**: [2022-중간] #27과 동일. 시작점은 e(항원 형성), 종착점은 a(세포 손상 6종). 중간은 d(항체 생성) → b(복합체) → c(보체 유리) 순.\n\n3) **정답 ④ 근거 — 왜 e-d-b-c-a인가**:\n   - **
