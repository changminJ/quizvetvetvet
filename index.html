"스트레스나 기능 변화\"라는 공통 표현을 ㄷ·ㅁ 양쪽에 쓰고, 방향(증가/감소)만 반대로 제시한다.\n\n3) **정답 ① 근거 — 7개 매칭 판정**:\n   - **1 비대(hypertrophy) = ㄷ (세포 크기 증가)**: 교재 lines 1743-1746 \"비대(hypertrophy)는 분열하지 못하는 심장근 및 골격근 세포에서 잘 나타나며, 생체 내·외의 스트레스나 기능 부하가 클 때 조직이나 기관의 크기가 커진다.\" 단, 설명 ㄷ은 \"기능**감소**로 세포 크기가 증가\"라고 되어 있는데 이는 원문 \"기능 **부하**가 **클 때**\"와 다소 차이가 있다 — 다만 선지 구성상 \"크기 증가\"는 비대밖에 없으므로 ㄷ이 1에 귀속 (출제 오류로 보이나 소거법상 정답).\n   - **2 위축(atrophy) = ㅁ (세포 크기 감소)**: 교재 lines 1747-1749 \"위축(atrophy)은 비대와 반대로 호르몬 결핍, 영양 결핍, 조직의 혈액량 감소 등에 의해 조직 혹은 기관 크기가 감소한 경우이다.\"\n   - **3 증생(hyperplasia) = ㅅ (세포 수 증가)**: 교재 lines 1738-1742 \"증생(hyperplasia)은 유사분열 능력이 있는 조직에서 잘 일어나며...독성 물질 혹은 물리적 손상에 반응하여 세포의 숫적 증가를 초래하여 조직 덩어리 및 기관의 크기를 증가시킨다.\" — 설명 ㅅ 문구와 거의 축자 일치.\n   - **4 화생(metaplasia) = ㄱ (다른 세포로 대치)**: 교재 lines 1750-1753 \"화생(metaplasia)은 정상 세포는 생존할 수 없는 환경에서 생존할 수 있는 세포로 대치된 것으로, 대치된 세포는 정상 세포와 같은 기능을 수행하지 못한다.\" — 설명 ㄱ과 축자 일치.\n   - **5 형성이상(dysplasia) = ㄹ (핵 비대 + 유사분열)**: 교재 §4.11 본문에는 dysplasia 정의가 독립 항목으로 없으나 설명 ㄹ \"핵이 크고 유사분열이 발생하는 현상\"은 전형적 dysplasia 정의에 부합. 역형성(ㅂ)과의 구분: dysplasia는 \"핵 비대 + 유사분열 증가\"만 있고 **분화 조절 능력은 남아 있음** (전암 단계), anaplasia는 **분화 조절 능력 완전 상실** (악성).\n   - **6 역형성(anaplasia) = ㅂ (분화 조절 능력 상실)**: 교재 lines 1781-1783 \"역형성(anaplasia)은 비전형적인 핵을 지고 있고, 활발한 유사분열 양상을 가져 분화 조절 능력이 상실된 경우이다.\" — 설명 ㅂ과 축자 일치.\n   - **7 종양(neoplasia) = ㄴ (무한 성장·분화)**: 교재 lines 1776-1780 \"종양(neoplasia)은 세포의 죽음 및 대치가 엄격하게 조절되는 정상 분화 조직과는 다르게 주어진 기간 동안에 죽은 세포보다 더 많은 원세포 형태와 같지 않은 세포를 만들어 성장하고 분화하는 경우이다.\" — 설명 ㄴ과 축자 일치.\n\n4) **오답 선지 소거**: 족보 원문에 ①만 기록되어 있고 ②~⑤는 OCR로 복원되지 않았으나, 병리학적 적응 매칭 문제의 전형적 오답 패턴은 다음과 같다:\n   - **ㄷ ↔ ㅁ 혼동**: 비대(크기↑)와 위축(크기↓) 방향을 뒤집은 선지 (1-ㅁ, 2-ㄷ). 출제 단골 함정.\n   - **ㄷ ↔ ㅅ 혼동**: 비대(크기↑)와 증생(수↑)을 섞은 선지 (1-ㅅ, 3-ㄷ). 개념학습.md에서 경고한 \"비대 vs 증생\" 핵심 함정.\n   - **ㄱ ↔ ㅂ 혼동**: 화생(세포 종류 교체)과 역형성(분화 조절 상실)을 바꾼 선지.\n   - **ㄹ ↔ ㅂ 혼동**: 형성이상(핵 비대만)과 역형성(핵 비대 + 분화 조절 상실)을 바꾼 선지.\n   - **ㄴ ↔ ㅅ 혼동**: 종양(무한 증식)과 증생(정상 자극 반응 세포 수 증가)을 섞은 선지.\n\n5) **함정 요소**:\n   - **\"기능 감소\"(ㄷ) vs \"기능 부하\"(교재 원문)**: 설명 ㄷ은 \"스트레스나 **기능감소**로 세포 크기가 증가\"라고 기술하는데 교재 원문은 \"스트레스나 **기능 부하**가 **클 때** 크기가 커진다\"고 한다. 이것은 출제 과정에서 \"스트레스\"를 ㄷ·ㅁ 양쪽에 공통 표현으로 쓰려다 발생한 **표현 불일치**로 보이나, 선지 구성상 소거법 정답은 여전히 ①. 시험에서는 \"크기 증가\"라는 결과에 집중해 비대(1)로 귀속.\n   - **비대 ↔ 증생 구분 필수**: 둘 다 \"조직·기관 크기 증가\"라는 공통점이 있지만, **비대는 개별 세포 크기↑(수는 그대로)**, **증생은 세포 수↑(개별 크기는 정상)**. 교재는 비대를 \"분열하지 못하는 심장근·골격근\"에, 증생을 \"유사분열 능력 있는 조직\"에 국한시켜 명확히 구분한다.\n   - **2년 연속 출제**: [2024-중간] #41과 [2025-중간] #41이 동일 주제·동일 정답 선지(①)로 출제. 🔴 최우선 암기 대상.\n   - **암기 구호**: \"**비크↑**(비대 크기↑) **위크↓**(위축 크기↓) **증수↑**(증생 수↑) **화대**(화생 대치) **형핵**(형성이상 핵) **역분**(역형성 분화상실) **종무**(종양 무한증식)\".\n\n**근거 위치**: 교재발췌.md lines 1738-1783 (교재 §4.11 \"수복 장애\" p.45-46 병리학적 적응 7종 정의).", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L13-mechanism-4-7-11", "round": "2022-중간", "num": "27", "qid": "", "body": "면역반응은 항원-항체 복합체의 형성으로 나타나는데, 분자량이 작은 물질은 항원으로서 역할을 하지 못한다. 이 때 일어나는 과정의 순서로 옳은 것은?\n\n가. 유리된 보체 단백질이 세포 표면을 손상시키고 괴사, 세포융해, 비만세포에서 histamine 유리, 백혈구의 식균작용 촉진, 그리고 평활근을 수축시킨다.\n나. 이 항원-항체 반응에 의해 보체단백질이 유리된다.\n다. 항원에 반복된 노출은 항체와 결합하여 항원-항체 복합체를 형성한다.\n라. 이 항원이 림프구를 자극하여 항체(IgA, D, E, G 및 M)를 형성한다.\n마. 내인성 단백질과 결합하여 항원을 형성한다.\n\n① 가-라-마-다-나  ② 가-다-마-라-나  ③ 마-다-라-가-나  ④ 마-라-다-나-가  ⑤ 마-라-나-다-가", "jokboAnswer": "④", "claudeAnswer": "④ (마 → 라 → 다 → 나 → 가)", "explanation": "1) **배경 — 왜 독성물질이 단독으로 항원이 되지 못하나**: 교재 05장 \"4) 면역반응\" 단락(교재발췌.md lines 725-727)은 \"면역반응은 항원-항체 복합체의 형성으로 나타난다. 항원인 **대부분의 독성물질은 분자량이 작아서 항원으로서 역할을 하지 못한다**\"고 명시한다. 면역계는 일정 크기 이상의 분자만 \"이물질\"로 인식하므로, 분자량 500 Da 이하의 소분자 독성물질(= hapten)은 그대로는 면역 반응을 유발하지 못하고, **내인성 단백질(carrier protein)과 공유결합**으로 붙어 충분히 큰 **hapten-단백질 결합체 = 완전 항원**이 되어야만 림프구에 인식된다.\n\n2) **문항이 묻는 핵심 포인트**: 이 cascade의 **시작점(가장 먼저 일어나는 단계)**과 **종착점(가장 나중에 일어나는 단계)**을 정확히 짚어야 한다. 시작은 반드시 **마(Hapten + 내인성 단백질 → 완전 항원)**이며, 종착은 **가(유리된 보체 → 세포 표면 손상 6종)**이다. 중간 세 단계는 \"라(림프구 자극 → 항체 생성) → 다(반복 노출 → 항원-항체 복합체) → 나(보체단백질 유리)\"의 순서이다.\n\n3) **정답 ④ 근거 — 왜 마-라-다-나-가인가**:\n   - **마**: 독성물질(hapten) + 내인성 단백질 → **완전 항원 형성** (교재 lines 730-731 \"내인성 단백질과 결합하여 항원(독성물질-단백질 결합체)을 생성한다\").\n   - **라**: 형성된 항원이 림프구를 자극 → **항체(IgA·D·E·G·M) 생성** (교재 lines 732-733 \"이 항원이 림프구를 자극하여 항체(IgA, D, E, G 및 M)를 생성한다\").\n   - **다**: 동일 항원에 반복 노출 → **항원-항체 복합체 형성** (교재 lines 734-735, 746 \"항원에 반복된 노출은 항체와 결합하여 항원-항체 복합체를 형성한다\").\n   - **나**: 항원-항체 반응 → **보체단백질 유리** (교재 lines 747-748 \"이 항원-항체 반응에 의해 보체단백질이 유리된다\").\n   - **가**: 유리된 보체 → **세포 표면 손상 6종** — 괴사·세포융해·비만세포 histamine 유리·백혈구 식균 촉진·평활근 수축 (교재 lines 749-752).\n\n4) **오답 선지 소거**:\n   - ① 가-라-마-다-나: **가로 시작**하는 것부터 오답. 보체 유리(가)가 맨 마지막 효과인데 맨 앞에 배치.\n   - ② 가-다-마-라-나: 역시 가로 시작 + 마(항원 형성)가 다(항원-항체 복합체) 뒤에 와서 인과 역전.\n   - ③ 마-다-라-가-나: 시작은 옳으나 \"다(항원-항체 복합체) → 라(항체 생성)\"이 인과 역전. 항체가 먼저 생성돼야 복합체가 형성됨.\n   - ④ 마-라-다-나-가: **정답**. 인과 순서 완전 부합.\n   - ⑤ 마-라-나-다-가: \"라(항체 생성) → 나(보체 유리)\"로 \"다(항원-항체 복합체)\"를 건너뛰어 순서 뒤틀림. 보체는 항원-항체 복합체 형성 후 유리되므로 나가 다보다 뒤.\n\n5) **함정 요소**:\n   - 출제자는 **\"가(세포 손상 6종)\"가 가장 인상적 단어**(괴사·histamine·평활근 수축)라서 시험생이 맨 앞에 놓기 쉽다는 점을 노렸다(①·② 선지).\n   - **③과 ⑤는 중간 순서만 살짝 뒤틀어** 시험생이 초반·종반만 확인하고 통과하면 걸리도록 설계. 정답 선택 시 반드시 **중간 3단계(라→다→나) 순서까지 확인**해야 한다.\n   - **핵심 암기 구호**: \"**Hap**ten → **림**프구 → **복**합체 → **보**체 → **손**상\" (마·라·다·나·가의 한 글자 추출).\n\n**근거 위치**: 교재발췌.md lines 723-758 (교과서 05장 p.43-44 \"4) 면역반응\" 단락 전문).", "tail": "", "scoreable": true, "correctIndices": [3]}]}, "L14-diagnosis": {"lecture": "L14-diagnosis", "title": "중독 진단", "slug": "diagnosis", "questions": [{"lecture": "L14-diagnosis", "round": "2025-mid", "num": "42", "qid": "", "body": "중독의 진단에 대해 아래의 설명 중 옳은 것을 모두 고른 것은?\n\na. 독성검사를 위해 샘플들은 채취한 즉시 냉동(frozen)하는 것이 원칙이다.\nb. 건초, 곡물 등과 같이 매우 건조한 샘플들은 냉암소 보관한다.\nc. 전혈(whole blood)의 경우에는 냉동보관하여야 한다.\nd. 모든 혈청(serum), 혈장(plasma) 샘플은 원심분리한 후에 상층액을 분리하여 냉동보관하여야 한다.\ne. 오줌(urine)은 약 100 mL 이상 되는 양을 채취하고 절대 주사바늘이 꽂혀있는 상태로 운반하면 안 된다.\n\n①. a, c, d  ②. a, b, e  ③. b, c, e  ④. a, b, d, e  ⑤. a, c, d, e", "jokboAnswer": "④", "claudeAnswer": "④ (a, b, d, e)", "explanation": "1) 배경 — [2023-fin] #1·[2024-mid] #42와 a~e 선지 본문이 완전 동일하지만, 발문만 \"**틀린 것**\"에서 \"**옳은 것**\"으로 뒤집혔다. 선지 b가 이전의 \"냉동 보관\"에서 \"냉암소 보관\"으로 정확한 진술로 수정된 차이도 있다.\n\n2) 핵심 포인트 — \"옳은 것\" 묶음이므로 a~e 각각을 교과서 기준으로 판정하고, 옳은 것만 묶으면 된다. 틀린 진술은 하나(c)뿐.\n\n3) 정답 선지 근거\n- a 옳음 — \"채취 즉시 냉동이 원칙\" (교과서 §3 원문).\n- b 옳음 — \"건조 샘플 냉암소 보관\" (교과서 §3 예외 1, 원문 일치).\n- d 옳음 — \"혈청·혈장 원심분리 후 상층액 냉동\" (교과서 §3).\n- e 옳음 — \"오줌 100 mL 이상, 주사바늘 운반 금지\" (교과서 §5).\n→ 옳은 것: a·b·d·e → 정답 ④.\n\n4) 오답 선지 소거\n- ① (a, c, d) — c(전혈 냉동)가 틀린 진술. 포함 오류.\n- ② (a, b, e) — d가 옳은 진술인데 누락. 불완전.\n- ③ (b, c, e) — c 포함 오류. 또 a·d 누락. 이중 오류.\n- ⑤ (a, c, d, e) — c 포함 오류.\n\n5) 함정 요소 — 발문이 뒤집힌 형태이기 때문에 \"틀린 것을 고르는 습관\"으로 접근한 학생은 c만 골라내고 \"정답은 c 하나\"라고 착각해 ①·③·⑤ 같은 오답 묶음에 빠진다. \"옳은 것 모두\"라는 발문을 반드시 확인해야 한다. 또한 c(전혈 냉동)는 4년 연속 틀린 선지로 고정되어 있는 핵심 함정 — 발문이 어떻든 c만 빠지면 나머지 전부가 옳다는 패턴을 기억하면 빠르게 풀 수 있다.\n\n근거 위치: 교과서 06장 §3·§5, 강의안 lec-14 슬라이드 5.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L14-diagnosis", "round": "2025-fin", "num": "53", "qid": "", "body": "Dithionite에 의한 paraquat 검출법에는 산에 ( )를 가하여 알칼리화시키고 Sodium dithionite을 첨가하여 푸른색을 띄면 양성이라 할 수 있다.\n\n①. 수산화칼슘  ②. 수산화나트륨  ③. 수산화칼슘  ④. 수산화암모늄  ⑤. 수산화알루미늄\n\n(비고: ①③이 모두 수산화칼슘으로 표기된 것은 족보 원본 OCR 오류 가능성 있음. [2024-fin] #48에서는 ①=수산화칼슘, ③=수산화칼륨으로 구분되어 있음.)", "jokboAnswer": "②", "claudeAnswer": "② (수산화나트륨, NaOH)", "explanation": "1) 배경 — [2024-fin] #48과 문항 본문이 사실상 동일. Dithionite에 의한 Paraquat 정성 검출법은 수의독성학 분석독성학 파트의 대표 기출로, 2년 연속 기말에 출제됨. Paraquat가 오줌 표본의 타겟 독극물(강의안 표 6.1)이자 사후 표본 중 폐(기타 항목)의 타겟이라는 점과 연결되어 중요도가 높다.\n\n2) 핵심 포인트 — 알칼리화 시약을 고르는 단일 빈칸 문항. 선지가 모두 \"수산화~\" 계열이므로 반드시 **표준 프로토콜의 시약명**을 정확히 알아야 한다.\n\n3) 정답 선지 근거 — ② **수산화나트륨(NaOH)**. Paraquat 환원 반응은 알칼리성 조건에서 진행되며, Sodium dithionite가 Paraquat²⁺를 Paraquat⁺• 라디칼로 환원시키면 **진한 푸른색(blue)**을 형성한다. NaOH는 강염기이면서 용해도가 높아 안정적으로 알칼리 조건을 만들어 주므로 표준 시약으로 채택됨. 강의안 lec-14 분석독성학 슬라이드 및 lec-15 파라콰트 슬라이드에 동일 프로토콜 기술.\n\n4) 오답 선지 소거\n- ① 수산화칼슘 Ca(OH)₂ — 용해도 낮음. pH 조절 어려움. Dithionite법에 미사용.\n- ③ 수산화칼슘 (원본 OCR로 ①과 중복) — [2024-fin] #48 기준 원래는 수산화칼륨이었을 가능성 높음. 어느 쪽이든 오답.\n- ④ 수산화암모늄 NH₄OH — 약염기·휘발성. 알칼리 강도 부족.\n- ⑤ 수산화알루미늄 Al(OH)₃ — 양쪽성·용해도 낮음. 사용 안 함.\n\n5) 함정 요소 — 2025-fin 원본에서 ①과 ③이 모두 \"수산화칼슘\"으로 표기된 것은 족보 OCR 또는 인쇄 오류 가능성이 높다. 정답은 변함없이 **②** 수산화나트륨. 실제 시험장에서 이런 동일 선지가 보이면 당황하지 말고 나머지 선지 중에서 정답 후보를 좁히면 된다. 또 한 가지, 색상 파트(\"푸른색\")를 \"붉은색\"으로 바꾸는 변형이 가능하므로 **NaOH 알칼리화 → Sodium dithionite → 푸른색 양성**이라는 완전한 한 줄을 통째로 암기해야 한다.\n\n근거 위치: 강의안 lec-14·lec-15 분석독성학 섹션, 교과서 06장 §7, 강의안 표 6.1(오줌·폐 Paraquat 타겟).", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L14-diagnosis", "round": "2024-mid", "num": "42", "qid": "", "body": "중독의 진단에 대한 아래의 설명 중 틀린 것을 모두 고른 것은?\n\na. 독성검사를 위한 샘플들은 채취한 즉시 냉동(frozen)하는 것이 원칙이다.\nb. 건초, 곡물 등과 같이 매우 건조한 샘플들은 냉동 보관한다.\nc. 전혈(whole blood)의 경우에는 냉동보관하여야 한다.\nd. 모든 혈청(serum), 혈장(plasma) 샘플은 원심분리한 후에 상층액을 분리하여 냉동보관하여야 한다.\ne. 오줌(urine)은 약 100 mL 이상 되는 양을 채취하고 절대 주사바늘이 꽂혀 있는 상태로 운반하면 안된다.\n\n①. b, c, e  ②. a, c, e  ③. c, d  ④. b, c  ⑤. a, c, d", "jokboAnswer": "④", "claudeAnswer": "④ (b, c)", "explanation": "1) 배경 — [2023-fin] #1과 완전히 동일한 묶음 문항. 교과서 §3·§5의 보관 원칙 3층 구조를 반복 확인한다. 같은 문항이 중간·기말에 바로 다음 해 재출제될 정도로 출제자에게도 \"반드시 체화시켜야 할 개념\"으로 분류된 문항.\n\n2) 핵심 포인트 — a~e 중 \"냉동\"이 잘못 적용된 두 진술(b·c)을 모두 찾아야 한다.\n\n3) 정답 선지 근거\n- b 틀림 — 건조 시료(건초·곡물)는 **냉암소** 보관. 문항 b 진술이 \"냉동 보관\"으로 변형된 오답. (교과서 §3)\n- c 틀림 — 전혈은 **냉장(refrigerated)·EDTA** 튜브 보관. \"냉동 보관\"은 오답. (교과서 §3·§5)\n→ 틀린 것: b·c → 정답 ④.\n\n4) 오답 선지 소거\n- ① (b, c, e) — e는 \"오줌 100mL 이상, 주사바늘 운반 금지\"로 교과서 §5 원문과 일치하므로 옳은 진술. 포함 오류.\n- ② (a, c, e) — a는 \"채취 즉시 냉동이 원칙\"으로 교과서 §3 원문. 옳은 진술. 포함 오류.\n- ③ (c, d) — d는 \"혈청·혈장 원심분리 후 상층액 냉동\"으로 교과서 §3 원문. 옳은 진술. 포함 오류.\n- ⑤ (a, c, d) — a·d 모두 옳은 진술. 포함 오류.\n\n5) 함정 요소 — 학생이 c(전혈 냉동) 하나만 잡고 ③(c, d)로 답을 고르는 것이 가장 전형적인 오답 패턴이다. d(혈청·혈장 냉동)가 옳은 진술인데 c와 비슷해 보여 덩달아 묶어버리는 심리. 실제로는 b(건조 시료 냉동 → 냉암소가 정답)도 함께 틀렸다는 것을 놓치지 말아야 한다. 선지 순서상 b가 먼저이므로 b부터 검토하는 습관을 들이면 방지 가능.\n\n근거 위치: 교과서 06장 §3·§5, 강의안 lec-14 슬라이드 5.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L14-diagnosis", "round": "2024-fin", "num": "48", "qid": "", "body": "Dithionite에 의한 paraquat 검출법에는 산에 ( )를 가하여 알칼리화시키고 sodium dithionite을 첨가하여 푸른색을 띄면 양성이라 할 수 있다.\n\n①. 수산화칼슘  ②. 수산화나트륨  ③. 수산화칼륨  ④. 수산화암모늄  ⑤. 수산화알루미늄", "jokboAnswer": "②", "claudeAnswer": "② (수산화나트륨, NaOH)", "explanation": "1) 배경 — Paraquat(파라콰트)는 제초제로 광범위하게 사용되는 bipyridilium 계열 화합물이며 사람·동물에서 폐섬유화를 유발하는 고독성 물질. 강의안 표 6.1(오줌 타겟)과 사후 표본(폐)에 파라콰트가 별도로 명시될 정도로 수의독성학에서 중요도가 높다. Dithionite법은 오줌·조직 추출물에서 파라콰트를 신속히 확인하는 **정성 간이 검출법(qualitative spot test)**이다.\n\n2) 핵심 포인트 — 빈칸은 \"산에 무엇을 가하여 **알칼리화**시키는가\"이다. 따라서 강염기 또는 알칼리성 시약이 들어가야 하며, Dithionite법의 표준 프로토콜에서 규정된 정확한 시약을 골라야 한다.\n\n3) 정답 선지 근거 — ② **수산화나트륨(NaOH)**이 표준 시약. 반응 원리는 (i) NaOH로 pH를 알칼리성으로 올려 Paraquat 환원 반응 조건을 맞추고, (ii) Sodium dithionite(Na₂S₂O₄)가 Paraquat²⁺를 단일양이온 라디칼(Paraquat⁺•)로 환원시키면, (iii) 이 라디칼이 **푸른색(blue)**을 띠므로 양성으로 판정한다. 강의안 lec-14 분석독성학 슬라이드 및 lec-15 파라콰트 관련 슬라이드에 이 프로토콜이 직접 서술되어 있다.\n\n4) 오답 선지 소거\n- ① 수산화칼슘(Ca(OH)₂) — 석회수. 용해도가 낮아 pH 상승이 제한적이며 Dithionite법 프로토콜에 쓰이지 않음.\n- ③ 수산화칼륨(KOH) — 강염기이지만 표준 프로토콜에서는 NaOH가 지정되어 있어 오답.\n- ④ 수산화암모늄(NH₄OH) — 약염기이며 휘발성. 안정적인 알칼리화 조건을 만들 수 없어 부적합.\n- ⑤ 수산화알루미늄(Al(OH)₃) — 양쪽성 물질이나 용해도 및 알칼리 강도 부족. 사용 안 함.\n\n5) 함정 요소 — 선지가 모두 \"수산화~\"로 시작하는 동종 계열로 구성되어 학생이 이름의 친숙함으로 찍기 어렵게 설계됨. \"알칼리화 = 가장 대표적인 강염기 = NaOH\"라는 기준으로 판단해야 한다. 색상 파트에서 \"푸른색 양성\"을 \"붉은색\"으로 바꾸는 변형 함정이 미래에 등장할 수 있으므로 **NaOH → 푸른색** 세트로 암기.\n\n근거 위치: 강의안 lec-14·lec-15 분석독성학 섹션, 교과서 06장 §7(분석독성학 일반 원리), 강의안 표 6.1 오줌·폐 타겟.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L14-diagnosis", "round": "2023-fin", "num": "1", "qid": "", "body": "중독의 진단에 대한 아래의 설명 중 틀린 것을 모두 고른 것은?\n\na. 독성검사를 위한 샘플들은 채취한 즉시 냉동(frozen)하는 것이 원칙이다.\nb. 건초, 곡물 등과 같이 매우 건조한 샘플들은 냉동 보관한다.\nc. 전혈(whole blood)의 경우에는 냉동보관하여야 한다.\nd. 모든 혈청(serum), 혈장(plasma) 샘플은 원심분리한 후에 상층액을 분리하여 냉동보관하여야 한다.\ne. 오줌(urine)은 약 100 mL 이상 되는 양을 채취하고 절대 주사바늘이 꽂혀 있는 상태로 운반하면 안된다.\n\n①. b, c, e  ②. a, c, e  ③. c, d  ④. b, c  ⑤. a, c, d\n\n(족보 원본에 정답 미표기)", "jokboAnswer": "미표기", "claudeAnswer": "④ (b, c)", "explanation": "1) 배경 — 2023-fin 1번은 [2024-mid] #42·[2025-mid] #42와 a~e 선지 본문이 완전히 동일한 묶음 문항이다. 사실상 동일 문제가 3년 연속 출제된 핵심 기출. 교과서 §3·§5의 \"냉동이 원칙 + 두 예외(냉암소·냉장)\" 구조를 묻는다.\n\n2) 핵심 포인트 — \"틀린 것을 모두 고른\" 형태이므로 a~e 각각의 정오를 판정하고 틀린 것만 묶는다. 건조 시료·전혈이 \"냉동\"으로 잘못 기술된 부분을 찾는 게 급소.\n\n3) 정답 선지 근거\n- b 틀림 — 건조 시료(건초·곡물)는 **냉암소** 보관이 정답. \"냉동 보관\"은 오답 진술. 교과서 §3 \"건초, 곡물 등과 같이 매우 건조한 샘플들은 냉암소에 보관하고…\" 원문 참조.\n- c 틀림 — 전혈은 **냉장(EDTA 튜브)** 보관이 정답. \"냉동 보관\"은 오답. 교과서 §3·§5 일관 서술.\n→ 틀린 것: b·c → 정답 ④.\n\n4) 오답 선지 소거\n- ① (b, c, e) — e(오줌 100mL+주사바늘 금지)는 교과서 §5 원문대로 옳은 진술. e를 틀린 것으로 포함하면 오류.\n- ② (a, c, e) — a는 \"냉동이 원칙\"으로 교과서 §3 그대로 옳은 진술. 포함 오류.\n- ③ (c, d) — d(혈청·혈장 원심분리 후 냉동)는 교과서 §3 원문 그대로 옳음. 포함 오류.\n- ⑤ (a, c, d) — a·d 모두 옳은 진술. 포함 오류.\n\n5) 함정 요소 — 묶음 문항에서 학생이 가장 헷갈리는 지점은 b(건조→냉동)와 c(전혈→냉동) 두 함정이 **동시에 잠복**하는 구조다. 한쪽만 잡으면 ③·⑤ 같은 오답 묶음에 빠진다. 두 예외를 정확히 구분해서 모두 골라야 정답. 또한 족보 원본은 정답이 미표기되어 있으나 [2024-mid] #42와 완전 동일 문항이므로 정답도 동일하게 ④.\n\n근거 위치: 교과서 06장 §3·§5, 강의안 lec-14 슬라이드 5.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L14-diagnosis", "round": "2022-mid", "num": "28", "qid": "", "body": "다음 중 중독의 진단법으로 틀린 것은?\n\n①. 독성검사를 위한 샘플들은 채취한 즉시 냉동하는 것이 원칙이다.\n②. 건초, 곡물 등과 같이 건조한 샘플들은 냉암소에 보관한다.\n③. 전혈은 냉동하여 보관해야 한다.\n④. 혈청, 혈장 샘플은 원심분리한 후에 상층액을 분리하여 냉동보관하여야 한다.\n⑤. 오줌은 의약품이나 식물독소를 분석하기에 적절한 샘플로서 약 100 mL 이상 되는 양을 채취하고 절대 주사바늘이 꽂혀있는 상태에서 운반하면 안된다.", "jokboAnswer": "③", "claudeAnswer": "③", "explanation": "1) 배경 — 교과서 06장 §3은 독성검사 샘플 보관을 '냉동이 원칙, 두 예외(냉암소·냉장)'라는 3층 구조로 서술한다. 이 3층 구조는 4년 연속 족보 최다 빈출 주제이며, 강의안 lec-14 슬라이드 5 \"The Golden Rule\" 도표에서 시각적으로 정리된다.\n\n2) 핵심 포인트 — 이 문항은 '틀린 것' 단일 선택형이다. 따라서 선지 ①~⑤ 중 교과서 서술과 어긋나는 단 하나를 찾아야 한다. 기준은 \"냉동 원칙 vs 두 예외(냉암소·냉장)\"의 경계선.\n\n3) 정답 선지 근거 — ③은 \"전혈을 냉동\"이라고 서술한다. 그러나 교과서 §3·§5는 일관되게 **전혈(whole blood)은 EDTA 항응고제 튜브에 채취하여 냉장(refrigerated) 보관**이라 명시한다. 전혈을 냉동하면 적혈구가 용혈되어 분석 시 간섭이 발생하므로 반드시 냉장해야 한다는 것이 근거다. 따라서 ③이 틀린 진술 = 정답.\n\n4) 오답 선지 소거\n- ① 옳음 — \"채취 즉시 냉동이 원칙\" (교과서 §3 원문).\n- ② 옳음 — \"건초·곡물 등 건조 샘플은 냉암소\" (교과서 §3의 예외 1).\n- ④ 옳음 — \"혈청·혈장은 원심분리 후 상층액 분리 냉동\" (교과서 §3).\n- ⑤ 옳음 — \"오줌 100 mL 이상, 주사바늘 꽂힌 채 운반 금지\" (교과서 §5 원문).\n\n5) 함정 요소 — 이 문항은 전혈 냉장 원칙을 아는지 정면으로 묻는다. 많은 학생이 \"피는 당연히 냉동\"이라고 직관 오판하는 지점을 정확히 저격한 함정. 전혈=냉장, 혈청/혈장=원심분리 후 냉동이라는 대비를 반드시 세트로 암기.\n\n근거 위치: 교과서 06장 §3·§5, 강의안 lec-14 슬라이드 5.", "tail": "", "scoreable": true, "correctIndices": [2]}]}, "L16-treatment": {"lecture": "L16-treatment", "title": "중독 치료", "slug": "treatment", "questions": [{"lecture": "L16-treatment", "round": "2025-중간", "num": "43", "qid": "Q042", "body": "다음 중 옳지 않은 것을 모두 고르시오.\n\na. 활성탄은 수의임상에서 널리 사용되는 흡착제이다.\nb. 반추동물은 제1위가 커서 위세척이 비효율적이다.\nc. 제염 시에 심장질환, 간질이 있는 개, 고양이에서는 빠르게 위배출을 해야 한다.\nd. 의식이 있어도 경우에 따라 위세척을 할 때 마취를 실시하지 않아도 된다.\ne. 제염 시에 설치류, 토끼, 말, 반추류에서는 구토 유발은 효과적이다.\nf. 노출이 발생한 물질이 무해하거나 독성이 매우 낮은 경우에는 반드시 제염을 해야 할 필요가 없다.\ng. 대부분의 경우에서 독극물 섭취 후 6시간 이내에 구토, 위세척을 하면 효과가 유지된다.\n\n①. a, c  ②. d, e, g  ③. a, d, g  ④. c, d, e, g  ⑤. b, c, d, e, g", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e, g)", "explanation": "[2024-중간] #43(Q146)과 **본문·선지·답 완전 동일**의 2년 연속 재출제이다. 검증과 해설은 Q146과 같다.\n\n핵심 오답 4항 요약(교과서 07장 (3)항):\n- **c** — 심장질환·간질에서 위배출은 금기(미주신경 자극 부정맥 + 발작 유도 위험). \"빠르게 해야 한다\"는 정반대.\n- **d** — 의식 유무 관계없이 위세척 전 마취·기관내 삽관 필수(흡인성 폐렴 예방). \"마취 생략 가능\"은 오답.\n- **e** — 설치류·토끼·말·반추류는 구토 불가 종. \"효과적\"은 정반대.\n- **g** — 골든타임은 1시간. 6시간은 반복 함정.\n\n옳은 3항: a(활성탄 표준 흡착제), b(반추동물 제1위 커서 위세척 비효율), f(무해 물질 제염 불필요).\n\n정답 = **④**. 이 문항은 2024·2025 중간고사 2년 연속 완전히 똑같이 출제되었으므로, **c·d·e·g = 오답 조합** 이 7고려사항 전체 암기의 핵심 체크리스트라는 것을 확정할 수 있다. 시험 직전 이 4개 서술을 정확히 **반대 방향**(c → 금기, d → 마취 필수, e → 구토 불가, g → 1시간)으로 뒤집어 암기하는 것이 최선의 전략.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2024-중간", "num": "43", "qid": "Q146", "body": "다음 중 옳지 않은 것을 모두 고르시오.\n\na. 활성탄은 수의임상에서 널리 사용되는 흡착제이다.\nb. 반추동물은 제1위가 커서 위세척이 비효율적이다.\nc. 제염 시에 심장질환, 간질이 있는 개, 고양이에서는 빠르게 위배출을 해야 한다.\nd. 의식이 있어도 경우에 따라 위세척을 할 때 마취를 실시하지 않아도 된다.\ne. 제염 시에 설치류, 토끼, 말, 반추류에서 구토 유발은 효과적이다.\nf. 노출이 발생한 물질이 무해하거나 독성이 매우 낮은 경우에는 반드시 제염을 해야 할 필요가 없다.\ng. 대부분의 경우에서 독극물 섭취 후 6시간 이내에 구토, 위세척을 하면 효과가 유지된다.\n\n①. a, c  ②. d, e, g  ③. a, d, g  ④. c, d, e, g  ⑤. b, c, d, e, g", "jokboAnswer": "④", "claudeAnswer": "④ (c, d, e, g)", "explanation": "[2022-중간] #29(Q291)의 **확장 버전**으로, d항이 \"마취를 실시하지 않아도 된다\"는 **오답 서술로 교체**되어 틀린 것이 3개(b·c·f)→4개(c·d·e·g)로 늘어난 형태이다. [2025-중간] #43과 본문·선지 완전 동일로 2년 연속 재출제.\n\n각 항 검증(교과서 07장 (3)항):\n- **a 옳음** — 활성탄 = 수의임상 표준 흡착제 (3)g항.\n- **b 옳음** — 반추동물 제1위 커서 위세척 비효율 (3)d항 보충.\n- **c 틀림** ❗ — \"빠르게 위배출을 해야 한다\"는 정반대. 심장질환(미주신경 자극 → 부정맥)·간질(발작 유도) = 위배출 **금기** (3)e항. → 오답.\n- **d 틀림** ❗ — \"의식이 있어도 마취 생략 가능\"은 오답. 의식 유무 관계없이 위세척 전 **마취·기관내 삽관 필수**(흡인성 폐렴 예방) (3)g항. → 오답.\n- **e 틀림** ❗ — 설치류·토끼·말·반추류 = **구토 불가 종** (3)d항. → 오답.\n- **f 옳음** — 무해·저독성 물질 시 무리한 제염 불필요 (3)a항.\n- **g 틀림** ❗ — 골든타임 **1시간**. 6시간은 반복 함정 (3)c항. → 오답.\n\n틀린 것 4개 = c·d·e·g. 정답 = **④**.\n\n함정 분석: 선지 ⑤(b·c·d·e·g 5개)가 가장 그럴듯해 보이지만 b는 옳으므로 탈락. ②(d·e·g 3개)는 c를 빠뜨려 탈락. ③(a·d·g 3개)는 a를 잘못 포함해 탈락. ①(a·c 2개)은 a가 옳아 탈락. 오직 ④만 4개 모두 오답.\n\n이 구조는 교과서 7고려사항 a~g를 **매 항목 독립적으로 검증하는 훈련**을 요구한다. 단일 주제 암기(예: \"물·우유\"만)로는 풀 수 없고, 7고려사항 전체의 방향을 반대 서술로 만났을 때 반사적으로 판별할 수 있어야 한다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2024-중간", "num": "45", "qid": "Q148", "body": "비스테로이드성 항염증 치료제(NSAIDs)를 장기간 섭취하게 되면 어떤 동물에서든 중독이 유발될 수 있다. 고양이는 특히 salicylate에 민감한데 그것은 간의 ( )의 활성이 낮기 때문이다. 또한 고양이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해, 배설하지 못하고 메트헤모글로빈증(methemoglobinemia)으로 발전하는 중독의 위험이 매우 커서 사용을 금한다. 빈칸에 들어갈 것은?", "jokboAnswer": "glucuronyl transferase", "claudeAnswer": "glucuronyl transferase (글루쿠론산 전이효소)", "explanation": "이번에는 **선지 없이 단답 빈칸형**이다. 두 빈칸 모두 동일 답인 **glucuronyl transferase(UGT)**를 써야 한다. 5지선다 버전(Q328·Q250·Q187)과 내용은 동일하나 단답으로 답을 직접 써야 하므로 철자·한글 표기 정확성이 요구된다.\n\n허용되는 답 표기: **glucuronyl transferase, glucuronosyl transferase, UGT(UDP-glucuronosyltransferase), 글루쿠론산 전이효소, 글루쿠론산 전달효소**. 모두 동일 효소의 다른 표기.\n\n기전(교과서 07장 / 강의안 lec-16 슬라이드 12):\n- Salicylate 민감성: 간 UGT 활성 저하 → salicylate의 glucuronide 포합 배설 경로 차단 → 혈중 salicylate 농도 축적 → 산-염기 불균형·대사성 산증·중독 악화.\n- AAP 금기: 동일 UGT 결핍 → AAP의 glucuronidation 차단 → CYP로 **NAPQI** 대량 생성 → GSH 고갈 → 간 괴사 + MetHb + Heinz body → methemoglobinemia·저산소증·사망.\n\n두 임상 현상의 **공통 원인이 하나의 효소 결핍**이라는 것이 핵심이다. 이 원리를 이해하면 [2025-기말] #31(Q075) \"공통으로 들어갈 말\" 문제도 즉시 같은 답으로 풀린다.\n\n함정은 단답 시 \"Glucuronyl transferase\"라고 부정확하게 축약하거나 \"UDPGT\"처럼 약어만 쓰는 경우인데, 교과서 표기를 정확히 따르면 채점 안전.", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L16-treatment", "round": "2024-중간", "num": "52", "qid": "Q154", "body": "알칼리, 산을 제염하는 방법 중 가장 효과적인 것 두 개를 고르시오.\n\na. 위세척  b. 활성탄  c. 구토  d. 우유  e. 물\n\n①. a, b, c, e  ②. b, d  ③. a, c, e  ④. d, e", "jokboAnswer": "미표기 (교과서 기준 ④)", "claudeAnswer": "④ (d·e = 우유·물)", "explanation": "[2022-기말] #34·[2023-기말] #39·[2025-기말] #39의 **a~e 보기 변형**이다. 원래 ①~⑤ 선지에서 물이 ②, 우유가 ④였던 것이 여기서는 물이 e, 우유가 d로 재배치되었다. 정답 키워드는 동일 — **물·우유**.\n\n보기 검증(교과서 07장 (3)b항):\n- **a 위세척** ❌ 부식성 역류 → 점막 추가 손상\n- **b 활성탄** ❌ 강산·강알칼리 흡착 불가\n- **c 구토** ❌ 역류 + 흡인성 폐렴\n- **d 우유** ✓ 단백·지질 코팅 + 희석\n- **e 물** ✓ 농도 희석\n\n선지 조합:\n- ① a·b·c·e — a·b·c 금기 포함 → 오답\n- ② b·d — b 활성탄 금기 → 오답\n- ③ a·c·e — a·c 금기 포함 → 오답\n- ④ **d·e** ✓ — 우유·물만 정답\n\n정답 = ④.\n\n함정: 선지 구성이 ①~④ 4개뿐이고 정답이 ④에 배치되어 있어 \"가장 많은 보기를 포함한 선지가 정답\"이라는 시험 요령을 역이용. 오히려 ① (4개 포함)이 함정이고 ④ (2개만 포함)가 정답이다. 보기 a~e 배치를 바꾸는 변형에 흔들리지 않으려면 \"물·우유\" 두 키워드만 고정으로 기억하면 된다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2023-기말", "num": "2", "qid": "Q215", "body": "다음 중 틀린 내용은?\n\n①. 독소(toxin): 독물 중에서 생물체가 만들어낸 것을 특별히 독소라고 한다.\n②. 독성물질: 독물 혹은 독과 같은 의미이며 이들 용어는 독성을 지닌 모든 물질들을 지칭할 때 사용한다.\n③. 중독증: 독물에 노출됨에 따라 발생하는 병적 상태\n④. 노출경로: 약리학의 투여경로와 비슷한 개념이며, 독성학에서는 주로 경구, 피부 및 호흡의 세 가지 경로를 통하여 중독이 발생한다.\n⑤. 문턱용량: 독성물질의 노출 시에 독성이 보이는 최고용량을 의미한다.", "jokboAnswer": "⑤", "claudeAnswer": "⑤", "explanation": "⚠️ **경계 문항**. per_chapter_with_text.json 분류상 L16(07장 치료)에 포함되었으나 실제 주제는 L01 history·L03 concepts의 기본 용어 정의이다. 본 찐족보분석에서 회피성 \"본 L 판정 불가\" 처리 대신 교차 범위로 표시하고 해설을 작성한다.\n\n각 선지를 교과서 01장 history·03장 concepts의 기본 용어 정의에 대조한다.\n\n- **① 독소(toxin)** 옳음 — 독물(poison) 중에서 **생물체(동식물·미생물)가 만들어낸 것**을 특별히 toxin으로 구분한다(예: 뱀독·보툴리눔 독소). 용어 정의 정확.\n- **② 독성물질** 옳음 — 독물·독과 동의어로, 독성(toxicity)을 지닌 모든 물질의 총칭. 용어 위계 서술 정확.\n- **③ 중독증(intoxication)** 옳음 — 독물 노출로 발생하는 **병적 상태(pathologic condition)**. 표준 정의.\n- **④ 노출경로(route of exposure)** 옳음 — 약리학의 투여경로(route of administration)와 유사 개념으로, 독성학에서 주로 **경구(oral)·피부(dermal)·호흡(inhalation)** 3경로(± 비경구)로 구분. 표준 분류 정확.\n- **⑤ 문턱용량(threshold dose)** ❌ 틀림 — 문턱용량은 **독성이 나타나기 시작하는 최저 용량**(최소 유해 용량, minimum toxic dose)을 의미한다. \"독성이 보이는 **최고용량**\"은 정반대 진술. 최고용량은 보통 LD₅₀·MLD(최대 치사량)·최대 무독성 용량(NOAEL)처럼 다른 용어가 있으며, 문턱은 본질적으로 \"시작점\"이다.\n\n정답 = ⑤. 이 문항의 오답 함정은 \"용량-반응 곡선의 기준점\"을 최고/최저로 바꿔치기하는 고전적 정의 함정이다. 교차 범위 L01·L03 강의안의 용량-반응 그래프에서 **threshold**가 곡선이 x축에서 **올라가기 시작하는 최저점**으로 도식화되어 있다는 것을 떠올리면 즉시 판정 가능.", "tail": "⚠️", "scoreable": true, "correctIndices": [4]}, {"lecture": "L16-treatment", "round": "2023-기말", "num": "34", "qid": "Q250", "body": "다음 빈칸에 들어갈 말로 옳은 것은?\n고양이는 선천적으로 ( )가 부족하여 아세트아미노펜을 빨리 분해 배설하지 못하고, methemoglobinemia로 발전하는 중독의 위험이 매우 커서 사용을 금한다.\n고양이는 특히 salicylate에 민감한데, 이는 간의 ( ) 활성이 낮기 때문이다.\n\n①. COX  ②. Aspartate aminotransferase(AST)  ③. Alanine aminotransferase(ALT)  ④. Alkaline phosphatase(ALP)  ⑤. 글루쿠론산 전달효소", "jokboAnswer": "⑤", "claudeAnswer": "⑤ (글루쿠론산 전달효소 = glucuronyl transferase)", "explanation": "[2022-기말] #32(Q328)와 **선지 구성·본문이 거의 동일**한 3년 연속 반복 문제이다(단, 한글 표기가 \"글루쿠론산 전**이**효소\"→\"글루쿠론산 전**달**효소\"로 표기만 다름. 같은 효소).\n\n선지 분석은 Q328과 동일하다. COX는 NSAIDs 표적, AST/ALT/ALP는 간 손상 진단 **지표** 효소이지 결핍 효소가 아니다. 함정은 \"간\" 키워드로 AST/ALT/ALP를 오답 유도하는 것.\n\n핵심 기전(교과서 07장 / 강의안 lec-16 슬라이드 12) 요약:\n1. 고양이 간 **glucuronyl transferase(UGT) 활성 선천적 저하**\n2. AAP는 phase II glucuronidation 차단 → CYP가 **NAPQI** 생성\n3. NAPQI가 **glutathione 고갈** → 간 괴사\n4. NAPQI가 적혈구 Hb를 산화 → **MetHb + Heinz body** → methemoglobinemia → 저산소증\n5. Salicylate도 동일 UGT 경로 의존 → 배설 차단 → 축적 → 산염기 불균형\n\n정답 = ⑤. \"글루쿠론산 전달효소\" = \"글루쿠론산 전이효소\" = glucuronyl transferase = UGT. 이 다섯 표기가 모두 동의어임을 인지하면 매년 반복되는 변형에 흔들리지 않는다.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L16-treatment", "round": "2023-기말", "num": "39", "qid": "Q255", "body": "알칼리, 산을 제염하는 방법 중 가장 효과적인 것 2개를 쓰시오.\n\n①. 위세척  ②. 물  ③. 구토  ④. 우유  ⑤. 활성탄", "jokboAnswer": "2, 4", "claudeAnswer": "②·④ (물, 우유)", "explanation": "[2022-기말] #34(Q330)·[2025-기말] #39(Q083)와 **본문·선지 완전 동일**의 3년 연속 반복 출제이다. 정답 = ②·④.\n\n선지 분석(교과서 07장 (3)b항):\n- ① 위세척 ❌ 부식성 물질 역류 → 식도·구강 추가 손상\n- ② 물 ✓ 농도 희석 → 점막 손상 완화\n- ③ 구토 ❌ 역류 + 흡인성 폐렴 위험\n- ④ 우유 ✓ 단백질·지질이 점막 코팅 → 추가 손상 억제\n- ⑤ 활성탄 ❌ 강산·강알칼리 흡착 불가\n\n이 주제는 5회 출제되는 최빈출 패턴으로, 연도만 바꿔가며 동일 문제가 나오므로 \"물·우유\"는 반사적으로 나와야 한다.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}, {"lecture": "L16-treatment", "round": "2022-중간", "num": "29", "qid": "Q291", "body": "중독의 치료에 대한 아래의 설명 중 틀린 것으로만 짝지어진 것은?\n\na. 노출이 발생한 물질이 무해하거나 독성이 매우 낮은 경우에는 반드시 제염을 해야 할 필요가 없다.\nb. 제염 시에 설치류, 토끼, 말, 반추류에서 구토 유발은 효과적이다.\nc. 제염 시에 심장질환, 간질이 있는 개, 고양이에서는 위배출을 해야 한다.\nd. 의식이 있는 경우 위세척을 할 때 마취를 먼저 실시한다.\ne. 반추동물은 제1위가 커서 위세척이 비효율적인 제염법이다.\nf. 대부분의 경우에서 독극물 섭취 후 6시간 이내에 구토, 위세척을 하면 효과가 유지된다.\ng. 활성탄은 수의임상에서 널리 사용되는 흡착제이다.\n\n①. a, b, c  ②. c, e, g  ③. b, d, g  ④. b, c, f  ⑤. c, d, g", "jokboAnswer": "④", "claudeAnswer": "④ (b, c, f)", "explanation": "이 문항은 [2024-중간] #43·[2025-중간] #43과 선지 배열이 약간 다른 초기 버전(d항이 \"의식이 있는 경우 마취 먼저\"라는 옳은 서술로 등장)이다. 각 서술을 교과서 07장 (3)항 기준으로 검증한다.\n\n- **a 옳음** — 교과서 (3)a항 \"물질의 독성\" 항목. 노출 물질이 무해하거나 독성이 매우 낮다면 무리한 제염은 불필요. 제염 자체도 침습적 스트레스이므로 과잉 진료 회피.\n- **b 틀림** ❗ — 교과서 (3)d항 \"동물 종\" 항목. 설치류·토끼·말·반추류는 **구토 불가 종**. \"효과적\"은 정반대. → 오답 선지.\n- **c 틀림** ❗ — 교과서 (3)e항 \"질병 유무\" 항목. 심장질환·간질 = 위배출 **금기**(부정맥·발작 유발). \"해야 한다\"는 정반대. → 오답 선지.\n- **d 옳음** — 이 버전에서는 \"의식이 있는 경우 마취 먼저 실시\"로 정상 진술. 7고려사항 (7)g항의 원칙과 일치.\n- **e 옳음** — 교과서 (3)d항 보충. 반추동물 제1위(rumen)가 매우 커서 세척액으로 잔류물 제거 비효율.\n- **f 틀림** ❗ — 교과서 (3)c항 \"시간 경과\" 항목. 골든타임은 **1시간**. 6시간은 반복 함정. → 오답 선지.\n- **g 옳음** — 교과서 (3)g항. 활성탄 = 수의임상 표준 흡착제.\n\n틀린 것은 **b·c·f 3개**이므로 정답은 **④(b·c·f)**.\n\n출제자의 함정은 여러 항목을 섞은 조합 선지에서 옳은 항목이 1개라도 들어간 ①·②·③·⑤를 배제하는 것이다. ⑤(c·d·g)는 c만 맞고 d·g는 옳은 진술이라 탈락, ②(c·e·g)는 c만 맞음, ③(b·d·g)는 b만 맞음, ①(a·b·c)는 a가 옳아 탈락. 오직 ④만 3개 모두 오답이다. [2024·2025 중간] 버전에서는 d가 \"마취 없이도 된다\"는 오답으로 바뀌어 정답 조합이 c·d·e·g 4개로 확장된다는 차이가 있다.", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L16-treatment", "round": "2022-중간", "num": "30", "qid": "Q292", "body": "비스테로이드성 항염증 치료제(NSAIDs)를 장기간 섭취하게 되면 어떤 동물에서든 중독이 유발될 수 있다. 고양이는 특히 salicylate에 민감한데 그것은 간의 ( )의 활성이 낮기 때문이다. 또한 고양이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해, 배설하지 못하고 메트헤모글로빈증(methemoglobinemia)으로 발전하는 중독의 위험이 매우 커서 사용을 금한다.\n\n(본문 OCR 일부 미복원 — 선지 포함)\n\n이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해, 배설하지 못하고 메트헤모글로빈증으로 발전하는 중독의 위험이 매우 커서 사용을 금한다.\n\n①. cyclooxygenase (COX)  ②. phosphodiesterase  ③. glucuronyl transferase  ④. cholinesterase  ⑤. acetylcholinesterase", "jokboAnswer": "미표기 (교과서 기준 ③)", "claudeAnswer": "③ (glucuronyl transferase)", "explanation": "고양이 UGT 결핍 주제의 5지선다 빈칸 문항. 본문의 두 빈칸 모두 **glucuronyl transferase(UGT, 글루쿠론산 전이효소)** 하나로 귀결된다(교과서 07장 / 강의안 lec-16 슬라이드 12).\n\n선지 분석:\n- **① COX (cyclooxygenase)** — prostaglandin 합성 효소. NSAIDs의 표적이지만 고양이에서 결핍된 것이 아니다. NSAIDs가 COX를 억제하는 것과 고양이가 NSAIDs·AAP를 배설 못하는 것은 다른 이야기. 함정.\n- **② phosphodiesterase** — cAMP·cGMP를 분해하는 효소. methylxanthine(카페인·테오브로민) 독성과 관련(L-PDE 억제)이지만 UGT 결핍과 무관.\n- **③ glucuronyl transferase** ✓ — phase II 포합 효소. 고양이에서 활성이 낮음. UDP-glucuronic acid를 약물에 전이시켜 수용성 glucuronide로 배설. 이 경로 차단이 AAP → NAPQI → MetHb·Heinz body와 salicylate 축적의 **공통 원인**.\n- **④ cholinesterase** — acetylcholine 분해 효소. 유기인제·카바메이트 독성의 표적이며 UGT와 무관.\n- **⑤ acetylcholinesterase** — cholinesterase의 한 종류. 역시 유기인제 독성 표적으로 무관.\n\n정답 = ③. OCR 미완성으로 일부 선지 문구가 불완전하지만 ③번 위치가 glucuronyl transferase임은 [2022-기말] #32·[2023-기말] #34·[2024-기말] #32의 동일 선지 구조에서 확정된다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L16-treatment", "round": "2022-중간", "num": "번호미상", "qid": "Q293", "body": "(본문 OCR 미복원)\n\n이들은 선천적으로 ( ) 대사효소가 부족하여 아세트아미노펜을 빨리 분해·배설하지 못하고 메트헤모글로빈증(methemoglobinemia)으로 발전하는 중독의 위험이 매우 커서 사용을 금한다. 빈칸에 들어갈 것은?\n\n①. cyclooxygenase(COX)  ②. phosphodiesterase  ③. glucuronyl transferase  ④. cholinesterase  ⑤. acetylcholinesterase", "jokboAnswer": "미표기 (교과서 기준 ③)", "claudeAnswer": "③ (glucuronyl transferase)", "explanation": "**배경**: 고양이의 아세트아미노펜(AAP) 독성은 수의독성학 L16 / 교과서 07장의 대표 종 특이성(species-specific toxicity) 주제이다. 본 문항은 선천적으로 결핍된 phase II 포합 효소를 5지선다로 묻는 전형적인 빈칸 유형으로, [2022-중간] #30(Q292)과 동일 선지 세트·동일 답 구성의 반복 출제이다(OCR 미복원으로 번호·본문 일부 복원 불가).\n\n**핵심 포인트**: 고양이는 **glucuronyl transferase(UGT, 글루쿠론산 전이효소)** 활성이 선천적으로 매우 낮다(교과서 07장 / 강의안 lec-16 슬라이드 12). UGT는 UDP-glucuronic acid를 약물에 전이시켜 수용성 glucuronide로 만들어 배설하는 phase II 포합 효소. 이 경로가 차단되면 AAP가 CYP450을 통해 독성 대사체 **NAPQI**로 대사되고, glutathione(GSH)이 고갈되며 **간 괴사 + methemoglobinemia(MetHb) + Heinz body 빈혈**이 발생 → 저산소증·사망. 동일 UGT 결핍 기전은 salicylate 독성에도 적용된다.\n\n**정답 근거(③ glucuronyl transferase)**: 고양이가 AAP를 \"빨리 분해·배설하지 못하고\" methemoglobinemia로 발전한다는 서술은 phase II glucuronidation 결핍을 특정한 문장이다. 교과서 07장·강의안 lec-16 슬라이드 12에 \"고양이는 glucuronyl transferase 활성이 낮아 AAP를 포합 배설하지 못한다\"로 명시.\n\n**오답 소거**:\n- **① cyclooxygenase(COX)** — prostaglandin 합성 효소. NSAIDs의 표적이지만 고양이에서 결핍된 것이 아님. NSAIDs가 COX를 억제하는 것과 고양이가 AAP를 배설하지 못하는 것은 전혀 다른 이야기. 대표적 함정 선지.\n- **② phosphodiesterase** — cAMP·cGMP 분해 효소. methylxanthine(카페인·테오브로민) 독성과 관련(PDE 억제)이지만 UGT 결핍과 무관.\n- **④ cholinesterase** — acetylcholine 분해 효소. 유기인제·카바메이트 독성의 표적 효소로 AAP 대사와 무관.\n- **⑤ acetylcholinesterase** — cholinesterase의 한 종류. 역시 유기인제 독성 표적이며 UGT와 무관.\n\n**함정**: COX가 \"NSAIDs 관련 효소\"라는 연상으로 선택하기 쉬운 오답 1순위. NSAIDs의 약리학적 표적(COX)과 고양이의 대사 결핍(UGT)은 다른 층위이므로 혼동 금물. 또한 \"메트헤모글로빈증\"이라는 단어만 보고 혈액 관련 효소를 찾으려 하면 모두 무관 선지로 빠진다 — MetHb는 UGT 결핍 → NAPQI 축적 → 적혈구 손상의 **하류 결과**일 뿐이다.\n\nOCR 미복원으로 본 Q293의 문제 번호·본문 복원이 불완전하지만, ③번 위치가 glucuronyl transferase임은 [2022-기말] #32·[2023-기말] #34·[2024-기말] #32·[2025-기말] #31의 동일 선지 구조로 매년 연속 확인된다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L16-treatment", "round": "2022-기말", "num": "32", "qid": "Q328", "body": "다음 빈칸에 들어갈 말로 옳은 것은?\n고양이는 선천적으로 ( )가 부족하여 아세트아미노펜을 빨리 분해 배설하지 못하고 methemoglobinemia로 발전하는 중독의 위험이 매우 커서 사용을 금한다.\n고양이는 특히 salicylate에 민감한데, 이는 간의 ( ) 활성이 낮기 때문이다.\n\n①. COX  ②. Aspartate aminotransferase(AST)  ③. Alanine aminotransferase(ALT)  ④. Alkaline phosphatase  ⑤. 글루쿠론산 전이효소", "jokboAnswer": "⑤", "claudeAnswer": "⑤ (글루쿠론산 전이효소 = glucuronyl transferase)", "explanation": "이 버전부터는 선지 구성이 달라진다. 고양이에서 **결핍된 phase II 포합 효소**를 찾는 것인데, 오답 함정이 \"간 기능 평가 효소\" 묶음으로 구성된다(교과서 07장 / 강의안 lec-16 슬라이드 12).\n\n- **① COX** — NSAIDs 표적 효소(prostaglandin 합성). 고양이에서 결핍된 효소가 아님.\n- **② AST (Aspartate aminotransferase)** — 간·근육의 아미노산 대사 효소로, 혈청 상승이 **간세포 손상 지표**. 결핍 효소가 아니라 간 손상 때 **증가**하는 진단 지표. 함정.\n- **③ ALT (Alanine aminotransferase)** — 간 특이적 아미노산 대사 효소. 간세포 손상 시 혈청 상승. 역시 진단 지표이지 결핍 효소가 아님. 함정.\n- **④ ALP (Alkaline phosphatase)** — 간·뼈·장 유래 인산분해효소. 담즙 정체·뼈 대사 이상에서 상승. 간·담관 질환 지표. 함정.\n- **⑤ 글루쿠론산 전이효소 (glucuronyl transferase, UGT)** ✓ — phase II 포합 효소. 고양이에서 선천적 활성 저하.\n\n출제 함정의 핵심은 \"간\"이라는 키워드로 AST·ALT·ALP를 오답 유도하는 것이다. 하지만 이들은 **간 손상 때 혈청에서 상승하는 효소(진단 마커)**이지 고양이에서 **결핍된** 효소가 아니다. 결핍되어 대사가 차단되는 효소는 오직 UGT이다. AAP와 salicylate 두 빈칸 모두 UGT.\n\n[2023-기말] #34·[2024-기말] #32는 이 Q328과 **선지·본문이 거의 동일**하여 3년 연속 동일 문제의 반복. 정답 = ⑤.", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L16-treatment", "round": "2022-기말", "num": "34", "qid": "Q330", "body": "알칼리, 산을 제염하는 방법 중 가장 효과적인 것 두 개를 고르시오.\n\n①. 위세척  ②. 물  ③. 구토  ④. 우유  ⑤. 활성탄", "jokboAnswer": "2, 4", "claudeAnswer": "②·④ (물, 우유)", "explanation": "[2021-기말] #14(Q350) 단답형의 5지선다 버전이다. 선지 분석을 체계적으로 한다(교과서 07장 (3)b항).\n\n- **① 위세척** ❌ — 부식성 물질이 역류하면서 식도·구강을 추가 손상. 금기.\n- **② 물** ✓ — 부식성 물질의 농도를 희석하여 점막 손상 완화. 안전하고 즉시 가능.\n- **③ 구토** ❌ — 역류 시 점막 재손상 + 기도 흡인성 폐렴 위험. 금기.\n- **④ 우유** ✓ — 단백질·지질이 점막에 얇은 막을 형성해 추가 손상 억제 + 희석 효과. 응급 처치로 효과적.\n- **⑤ 활성탄** ❌ — 강산·강알칼리는 이온성 소분자라 활성탄이 흡착하지 못함. 무효.\n\n정답 = **②·④**. 중화제가 선지에 없어 함정이 단순하지만, \"위세척 = 제염의 표준\"이라는 일반 직관을 역이용해 ①을 고르게 유도하는 것이 1차 함정이고, \"활성탄 = 가장 널리 쓰이는 흡착제\"라는 Q428 지식을 역이용해 ⑤를 고르게 유도하는 것이 2차 함정이다.\n\n이 문항은 [2023-기말] #39·[2025-기말] #39에서 **동일 선지·동일 본문**으로 반복 출제된다. [2024-중간] #52는 a~e 보기로 형태만 바뀐 같은 내용이다.", "tail": "", "scoreable": true, "correctIndices": [1, 3]}]}, "L17-antidotes": {"lecture": "L17-antidotes", "title": "해독제", "slug": "antidotes", "questions": [{"lecture": "L17-antidotes", "round": "2025-중간", "num": "44", "qid": "", "body": "해독제에 대한 설명 중 틀린 것만 모두 고른 것은?\n\n가. 치료용량에 맞게 투여하면 독성물질에 의해 독성이 감소된다 하더라도 해독제를 추가적으로 투여하지 않아도 된다.\n나. 해독효과의 지속기간은 독성물질의 다른 약리작용기간과 다를 수 있다.\n다. 일부 해독제는 치료기간에는 독성이 없지만 대량이나 장기간 사용하면 독성이 없다.\n라. 해독제는 독성물질의 활성이나 영향에 대해 특이적 작용이 필요하지 않다.\n마. 해독제를 사용하기 위해 정확한 진단이 매우 중요하다.\n\n① 가, 나, 다  ② 가, 나, 다, 라  ③ 가, 다, 라  ④ 나, 다, 라, 마  ⑤ 가, 나, 다, 라, 마", "jokboAnswer": "③ (가, 다, 라)", "claudeAnswer": "③ (가, 다, 라)", "explanation": "[2024-중간] #44와 구조는 유사하지만 선지 a가 \"더 효과 좋은 약물 대체 여부\"(2024)에서 \"추가 투여 불필요\"(2025)로 바뀐 변형. 그러나 두 선지 모두 해독제 사용 원칙 위반이라는 점은 동일하다. 교과서 08장 서론을 기준으로 각 선지를 판정한다.\n\n선지 가 — **틀림**. \"치료용량에 맞게 투여하면 추가 투여 불필요\"는 해독제의 골든 타임과 반복 투여 원칙을 부정한다. 예를 들어 Atropine은 반감기 3시간이라 반복 투여가 필요하고, Vit K1은 2세대 항응고 살서제에서 6주 장기 투여가 필수다. \"한 번 투여 후 끝\"이라는 단정은 원칙 위반.\n\n선지 나 — **옳음**. 해독 효과 지속기간은 독성물질의 약리작용기간에 종속된다. 골든 타임 원칙의 본질.\n\n선지 다 — **틀림**. \"대량·장기간 사용하면 독성이 없다\"는 유효성 제한 원칙 정면 부정. 교과서는 \"과도 용량·장기 사용 시 해독제 자체 독성 발현 가능\"이라고 명시한다. [2024-중간] #44 선지 c와 완전히 동일한 함정.\n\n선지 라 — **틀림**. 해독제 정의 부정. 해독제는 정의상 \"독성물질의 활성이나 영향에 대해 **특이적 작용**을 나타내는 물질\"이므로 \"특이적 작용 불필요\"는 정반대. [2024-중간] #44 선지 d와 완전히 동일한 함정.\n\n선지 마 — **옳음**. 정확한 진단이 3대 전제 중 첫 번째.\n\n따라서 틀린 선지는 가·다·라, 정답 ③. [2024-중간] #44와 **정답 구조(a·c·d)까지 동일**한 사실상 동일 문항. \"해독제 원칙 틀린 것\"은 2년 연속 출제된 확정 빈출 주제로, 선지 변형에 대비해 원칙을 정확히 외워두어야 한다. 강의안 lec-17 슬라이드 3 기반.\n\n함정 요소는 선지 가의 \"치료용량\"이라는 단서. 치료용량이 맞다고 해서 반복 투여 여부를 결정할 수 없는데, \"치료용량 = 안전\"이라는 인상을 주는 심리적 함정이다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L17-antidotes", "round": "2025-중간", "num": "45", "qid": "", "body": "다음 중 해독제와 그에 대한 설명이 올바르게 짝지어진 것은?\n\n[표: 해독제(a~g)와 적응증(ㄱ~ㅅ) 매칭]\n- a. NAC (N-acetylcysteine) — ㄱ. 아세트아미노펜(APAP) GSH 전구체\n- b. 에탄올·4-MP — ㄴ. 메탄올·에틸렌 글리콜 ALDH 경쟁\n- c. Vitamin K1 — ㄷ. Coumarin·Warfarin 응고인자 회복\n- d. Atropine + 2-PAM — ㄹ. 유기인계·카바메이트 AChE\n- e. Ca-EDTA — ㅁ. 납(Pb)·아연(Zn) 킬레이션\n- f. BAL (Dimercaprol) — ㅂ. 비소(As)·수은(Hg)·안티몬(Sb)·납(Pb)\n- g. D-Penicillamine — ㅅ. 구리(Cu)·납(Pb)·수은(Hg)\n\n① (a-ㄴ, b-ㄱ, c-ㄷ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ)\n② (a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ)\n③ (a-ㄱ, b-ㄴ, c-ㅁ, d-ㄷ, e-ㄹ, f-ㅅ, g-ㅂ)\n④ (a-ㄷ, b-ㄴ, c-ㄱ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ)\n⑤ 정답 없음", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "7개의 해독제(a~g)와 7개의 적응증(ㄱ~ㅅ)을 한 번에 매칭하는 종합 매트릭스 문항. 각 선지를 비교하기 전에 **표준 매트릭스**를 먼저 확립해야 한다. 교과서 08장 각론과 강의안 lec-17 슬라이드 10 기준:\n\n| 해독제 | 적응증 | 기전·주의 |\n|---|---|---|\n| a. NAC (N-acetylcysteine) | **ㄱ**. APAP (아세트아미노펜) | GSH 전구체 공급 → NAPQI 중화. 섭식 후 8~16시간 골든타임. 6종 병용 금기(산화물질·amphotericin B·tetracycline·erythromycin·ampicillin·H₂O₂) |\n| b. 에탄올·4-MP | **ㄴ**. 메탄올·에틸렌 글리콜 | ALDH 경쟁(강의안 표기) 20배 친화도 → 독성 대사체(formate·oxalate) 형성 차단. 에탄올 4h/4-MP 3~8h 골든타임 |\n| c. Vitamin K1 (Phytonadione) | **ㄷ**. Coumarin·Warfarin | 응고인자 합성 회복. **IV 투여 절대 금기**(아나필락시스). 2세대 항응고제(Brodifacoum) 6주 투여 |\n| d. Atropine + 2-PAM | **ㄹ**. 유기인계·카바메이트 | Atropine: muscarinic 차단 (BBB 통과). 2-PAM: AChE 재활성 (aging 전 24h) |\n| e. Ca-EDTA | **ㅁ**. Pb·Zn | 킬레이트화 → 24h 내 95% 소변 배설. 필수 2가 양이온(Ca·Mg·Cu)도 킬레이트 주의 |\n| f. BAL (Dimercaprol) | **ㅂ**. As·Hg·Sb·Pb | dithiol(이중 SH기) 구조, 5각 고리 복합체. 근육내 투여 |\n| g. D-Penicillamine | **ㅅ**. Cu·Pb·Hg | monothiol(β,β-dimethyl cysteine) 단일 SH기. 경구 투여. 양(sheep) 구리에는 ammonium molybdate |\n\n이 표를 바탕으로 선지 검증:\n- 선지 ①(a-ㄴ, b-ㄱ, ...) — a와 b 서로 뒤바꿈. NAC가 메탄올·EG, 에탄올·4-MP가 APAP로 배치됨 → **틀림**.\n- 선지 ②(a-ㄱ, b-ㄴ, c-ㄷ, d-ㄹ, e-ㅁ, f-ㅂ, g-ㅅ) — 표와 완전히 일치 → **정답**.\n- 선지 ③(a-ㄱ, b-ㄴ, c-ㅁ, d-ㄷ, e-ㄹ, f-ㅅ, g-ㅂ) — Vit K1이 Pb·Zn로, Atropine+2-PAM이 Coumarin으로 배치됨 → **틀림**.\n- 선지 ④(a-ㄷ, b-ㄴ, c-ㄱ, ...) — NAC가 Coumarin, Vit K1이 APAP로 뒤바뀜 → **틀림**.\n- 선지 ⑤ 정답 없음 — ②가 정답이므로 **틀림**.\n\n함정 요소는 7개 매칭을 모두 확인해야 해서 인지 부하가 크다는 점. 시간 압박 하에서는 자주 헷갈리는 핵심 쌍에 집중하는 것이 효율적:\n1. **BAL(f) vs D-Penicillamine(g)**: BAL은 **As·Hg·Sb·Pb**(dithiol), D-Penicillamine은 **Cu·Pb·Hg**(monothiol). Pb·Hg 공통이지만 BAL에는 As·Sb가, D-Penicillamine에는 Cu가 특징적.\n2. **에탄올·4-MP vs NAC**: 에탄올·4-MP는 **메탄올·EG(ALDH 경쟁)**, NAC는 **APAP(GSH 전구체)**. 선지 ①의 가장 큰 함정.\n3. **Ca-EDTA**: Pb·Zn 고정. Cu는 Ca-EDTA가 아닌 D-Penicillamine.\n\n이 3개 쌍만 안정적으로 외워두면 매트릭스 매칭 문항의 90%가 풀린다. 강의안 lec-17 슬라이드 10의 매트릭스 표를 시험 직전에 반드시 복습할 것.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L17-antidotes", "round": "2024-중간", "num": "44", "qid": "", "body": "해독제에 대한 설명 중 틀린 것만 모두 고른 것은?\n\na. 치료용량에 맞춰 효과 높은 다른 약물로 대체해 사용할 수 있는 경우에도 이미 사용하기로 한 해독제를 그대로 사용한다.\nb. 해독효과의 지속기간은 독성물질의 다른 약리작용기간과 다를 수 있다.\nc. 일부 해독제는 치료기간에는 독성이 없지만 대량이나 장기간 사용하여도 독성이 없다.\nd. 해독제는 독성물질의 활성이나 영향에 대해 특이적 작용을 나타내는 것이 필요하지 않다.\ne. 해독제를 사용하기 위해 정확한 진단이 매우 중요하다.\n\n① a, b, c  ② b, c, d  ③ a, c, d  ④ c, d, e  ⑤ a, b, c, d", "jokboAnswer": "미표기", "claudeAnswer": "③ (a, c, d)", "explanation": "해독제 서론의 정의와 원칙을 정면으로 묻는 \"틀린 것만 고르기\" 문항이다. 교과서 08장 서론은 해독제를 \"독성물질의 활성이나 영향에 대해 **특이적 작용**을 나타내는 물질\"로 정의하고, 사용 3대 전제로 (1) 정확한 진단, (2) 골든 타임, (3) 유효성 제한·독성을 제시한다. 이 정의와 원칙에 비추어 선지를 하나씩 판정한다.\n\n선지 a는 **틀림**. \"더 효과 좋은 약물로 대체 가능한 경우에도 이미 결정한 해독제를 그대로 사용한다\"는 것은 임상적으로 잘못된 태도다. 해독제 선택은 환자 상태·독성물질 특성·효능을 고려해 지속적으로 재평가해야 한다.\n\n선지 b는 **옳음**. 교과서는 \"해독 효과의 지속기간은 독성물질의 작용 기간에 따라 달라진다\"고 명시한다. 골든 타임 원칙의 본질이다.\n\n선지 c는 **틀림**. \"대량·장기간 사용해도 독성이 없다\"는 유효성 제한 원칙 정면 부정. 교과서는 \"과도 용량이나 장기 사용은 해독제 자체 독성을 유발할 수 있다\"고 서술한다.\n\n선지 d는 **틀림**. 해독제 정의 자체 부정. 해독제는 정의상 독성물질에 **특이적 작용**을 나타내야 한다.\n\n선지 e는 **옳음**. 정확한 진단 없이 해독제를 투여하면 비노출 동물에게 해독제 자체가 부작용을 유발한다. 3대 전제 중 첫 번째.\n\n따라서 틀린 선지는 a·c·d, 정답은 ③. 족보 원본에 정답이 미표기되어 있으므로 수험자가 직접 판정해야 하는데, 교과서 정의·원칙에 충실하면 답이 분명하다. 함정은 \"이미 사용하기로 한 해독제를 그대로(a)\"처럼 \"일관성\"으로 포장된 표현, \"특이적 작용 불필요(d)\"처럼 정의 자체를 부정하는 표현을 알아채는 것이다. 강의안 lec-17 슬라이드 3이 이 원칙들을 한 장으로 정리한다.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L17-antidotes", "round": "2024-기말", "num": "36", "qid": "", "body": "빈칸에 들어갈 알맞은 단어를 고르시오.\n\n( )은 2가 알코올 중 가장 간단한 형태의 화합물로서, 자동차에 쓰이는 부동액과 세정제로 쓰이며 약한 녹색을 띄고, 가장 빈번한 중독의 요인이 되고 있다. ( )중독증은 연중 일어나지만 부동액을 많이 교환하는 봄철에 더 많이 발생할 수 있다. 대부분 개와 고양이가 노출될 우려가 크며, 이들 암수 모두 위험도가 같지만 정상적인 동물이 난소를 제거하거나 중성화된 동물보다 더 자주 중독된다. 특히 ( )는 단맛이 있어서 개 및 고양이와 같은 소동물과 어린이를 유인할 수 있어 중독증이 잘 발생한다. 사람과 고양이가 ( )에 특히 민감하고, 고양이에서 민감한 이유는 oxalate의 생성률이 높기 때문이다.\n\n① 에탄올  ② 에틸렌 글리콜  ③ 메탄올  ④ 이소프로필 알코올  ⑤ 에테르", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "[2022-기말] #40과 본문이 완전히 동일하다. 2년 간격(2022→2024)으로 동일 지문·동일 정답이 반복 출제된 대표 사례로, **EG 기본 특성 문항은 족보 3회차 이상 반복 예상**되는 핵심. 풀이 포인트는 동일: \"2가 알코올\" + \"부동액·녹색\" + \"단맛\" + \"사람·고양이 민감, oxalate 생성률 높음\" 네 단서 중 어느 하나만 잡아도 EG(②)가 특정된다. 에탄올(①, 1가)·메탄올(③, 1가)은 2가 조건에서 탈락, 이소프로필 알코올(④)은 부동액이 아닌 소독제, 에테르(⑤)는 알코올이 아닌 마취제. 메탄올 오답 유도에 특히 주의 — 메탄올은 사람(영장류) 시신경 손상으로 유명하지만 1가 알코올이고 EG보다 독성 발현 경로(formate 축적)가 다르다. EG의 고양이 민감 기전(oxalate 생성률 ↑ → calcium oxalate 신세뇨관 결정 → 급성 신부전)은 개념학습 Unit 8.5와 동일. 해독은 에탄올·4-MP(Fomepizole)로 ALDH를 경쟁 차단하여 EG의 oxalate 전환을 막는다. 교과서 08장 EG 각론·강의안 lec-17 기반.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L17-antidotes", "round": "2022-중간", "num": "45", "qid": "", "body": "에틸렌글리콜에 대한 설명이다. 빈칸에 알맞은 단어를 고르시오.\n\n( )은 2가 알코올 중 가장 간단한 형태의 화합물로서, 자동차에 쓰이는 부동액과 세정제로 쓰이며 약한 녹색을 띄고, 가장 빈번한 중독의 요인이 되고 있다. ( )중독증은 연중 일어나지만 부동액을 많이 교환하는 봄철에 더 많이 발생할 수 있다.\n\n① 에탄올  ② 에틸렌 글리콜  ③ 메탄올  ④ 이소프로필 알코올  ⑤ 에테르", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "본 문항은 \"2가 알코올 중 가장 간단한 화합물 + 부동액·세정제 + 약한 녹색\"이라는 세 가지 결정적 단서로 EG를 특정하는 빈칸 완성 문항이다. 교과서 08장 각론과 강의안 lec-17은 에틸렌 글리콜(EG, C₂H₆O₂)의 기본 특성을 \"2가 알코올 중 가장 간단한 형태, 자동차 부동액·세정제 원료, 약한 녹색, 단맛, 봄철 부동액 교환 시 중독 증가\"로 서술한다. 따라서 \"2가 알코올\"이라는 화학적 정의 하나만 잡아도 선지 중 EG(②) 외에는 모두 소거된다. 에탄올(①)과 메탄올(③)은 1가 알코올로 -OH기를 하나만 가지고 있고, 이소프로필 알코올(④)은 소독제로 쓰이는 2차 알코올이며, 에테르(⑤)는 C-O-C 구조의 휘발성 용매/마취제로 알코올이 아니다. 부동액의 색(약한 녹색)과 봄철 부동액 교환 시즌(겨울 후 부동액을 새것으로 바꾸면서 폐부동액이 유출) 맥락까지 얹어보면 EG가 유일한 답. 함정 요소는 \"1가/2가\" 구분을 놓칠 때 익숙한 에탄올·메탄올로 오인하는 것이다. 강의안 lec-17 EG 슬라이드가 이 설명과 동일 문구로 제시된다.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L17-antidotes", "round": "2022-기말", "num": "40", "qid": "", "body": "빈칸에 알맞은 단어를 고르시오.\n\n( )은 2가 알코올 중 가장 간단한 형태의 화합물로서, 자동차에 쓰이는 부동액과 세정제로 쓰이며 약한 녹색을 띄고, 가장 빈번한 중독의 요인이 되고 있다. ( )중독증은 연중 일어나지만 부동액을 많이 교환하는 봄철에 더 많이 발생할 수 있다. 대부분 개와 고양이가 노출될 우려가 크며, 이들 암수 모두 위험도가 같지만 정상적인 동물이 난소를 제거하거나 중성화된 동물보다 더 자주 중독된다. 특히 ( )는 단맛이 있어서 개 및 고양이와 같은 소동물과 어린이를 유인할 수 있어 중독증이 잘 발생한다. 사람과 고양이가 ( )에 특히 민감하고, 고양이에서 민감한 이유는 oxalate의 생성률이 높기 때문이다.\n\n① 에탄올  ② 에틸렌 글리콜  ③ 메탄올  ④ 이소프로필 알코올  ⑤ 에테르", "jokboAnswer": "②", "claudeAnswer": "②", "explanation": "[2022-중간] #45의 확장판으로, 빈칸 수가 늘고 \"단맛·사람·고양이 민감성·oxalate 생성률\"까지 추가된 버전. 단서가 더 많아져 오답을 피하기는 오히려 쉽다. 교과서 08장은 EG가 단맛(sweet)을 가져 개·고양이·어린이를 유인한다고 서술하고, 특히 고양이에서 EG가 더 위험한 이유를 \"oxalate 생성률이 높기 때문\"으로 명시한다. EG → glycoaldehyde → glycolic acid → glyoxylate → oxalate 경로에서 고양이의 최종 단계 전환율이 사람·개보다 높아 calcium oxalate 결정이 신세뇨관에 더 많이 침착되고 급성 신부전으로 이어진다. 중성화 여부가 중독 빈도에 영향을 준다는 점(정상 동물 > 중성화 동물)도 교과서 언급 내용이지만, 기전은 행동학적(활동 반경·탐색 행동 차이)으로 해석한다. 선지 소거는 [2022-중간] #45와 동일: ①③은 1가 알코올, ④는 소독제, ⑤는 마취제. 함정은 \"사람·고양이가 민감\"이라는 구절에서 사람이 특히 민감한 메탄올(시신경 손상)과 혼동하는 경우인데, 메탄올은 1가 알코올이므로 \"2가 알코올\" 조건에서 이미 소거된다. 강의안 lec-17 EG 슬라이드 기반.", "tail": "", "scoreable": true, "correctIndices": [1]}]}, "L18-safety-testing": {"lecture": "L18-safety-testing", "title": "안전성시험", "slug": "safety-testing", "questions": [{"lecture": "L18-safety-testing", "round": "2025-기말", "num": "1", "qid": "Q045", "body": "다음 중 신약 개발·허가 절차에 대한 설명으로 틀린 것을 모두 고른 것은?\n\n①. 효능은 인증기관이 과학적인 방법으로 검증하면 된다.\n②. 전임상 안전성 시험은 개별기관의 인증을 받은 GLP에서만 수행 가능하다.\n③. GLP 인증 기관에는 IACUC 설치가 권장된다.\n④. 1상 임상시험은 정상인 지원자를 대상으로 안전성과 체내동태를 검토한다.\n⑤. 2상 임상시험은 환자를 대상으로 유효성을 확인한다.\n⑥. 3상 임상시험은 보통 3개 기관 90명 이상의 환자를 대상으로 유효성·용법용량·주의사항을 면밀히 검토한다.\n⑦. 시판 후 일정 기간 동안 부작용 증례를 수집하여 부작용이 나타나면 판매가 취소된다.\n\n① ①②③  ② ①②  ③ ①③⑤  ④ ②③④  ⑤ ①②③④", "jokboAnswer": "⑤", "claudeAnswer": "① (①②③)", "explanation": "- ① **틀림** — 효능 탐색 = 모든 연구기관·개인 가능. \"인증기관만\" = 함정.\n- ② **틀림** — 전임상 안전성 = **MFDS 인증 GLP 전용**. \"개별기관 인증\"은 함정.\n- ③ **틀림** — IACUC = **의무 설치**. \"권장\"은 함정.\n- ④ 옳음 — Phase 1 = 일반인 지원자, 안전성·체내동태.\n- ⑤ 옳음 — Phase 2 = 환자, 유효성.\n- ⑥ 옳음 — Phase 3 = 3개 기관·90명.\n- ⑦ 옳음 — Phase 4 = 시판 후 감시·판매 취소.\n→ 틀린 것 = ①②③ → **①번 선지**.\n\n⚠️ 족보 정답 ⑤(①②③④)는 ④까지 틀림으로 보지만, 교과서 기준 ④(Phase 1 = 일반인 지원자)는 **옳음**이므로 **강의자료 기준 ①(①②③)이 정답**. 족보는 ④를 \"환자·정상인\" 혼동으로 오기한 것으로 추정. (강의안 lec-18 슬라이드 5)", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "2", "qid": "Q046", "body": "다음 독성학 용어와 설명의 매칭 중 틀린 것을 모두 고른 것은?\n\na. LD50 — 시험동물의 50%를 사망하게 하는 추정 용량\nb. MTD — 90일 반복투여에서 체중증가를 10% 이내로 억제하는 최고 용량\nc. NOAEL — 부작용이 관찰되지 않는 최고 용량\nd. ED50 — 대상 동물의 50%에서 효과를 나타내는 용량\ne. ADI/TDI — NOAEL × 안전계수(100)\n\n① a, b  ② c, d  ③ b, e  ④ d, e  ⑤ a, e", "jokboAnswer": "d, e", "claudeAnswer": "e만 틀림 (선지 중 e 단독을 포함한 조합이 없으면 가장 가까운 ④ d, e)", "explanation": "- a~d 교과서 정의와 모두 일치(옳음).\n- e **틀림** — ADI = **NOAEL ÷ 안전계수(100)**. \"×\"은 함정. 안전계수 100 = 종간 10 × 개체간 10.\n\n⚠️ 족보 정답 \"d, e\"에서 d(ED50)를 틀리다고 본 것은 **오류**. 교과서 정의 \"50%에서 효과 용량\"은 **ED50의 표준 정의와 일치**. 따라서 강의자료 기준 **e 단독 틀림**. 5지선다 형식상 e를 포함한 ④(d, e) 또는 ⑤(a, e) 중 선택해야 하면 **④**가 가장 근접. (강의안 lec-18 슬라이드 10)", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "3", "qid": "Q047", "body": "대조군 8종 설명 중 틀린 것을 모두 고른 것은?\n\na. 비투여 대조군 — 기본 상태 기준값 확보\nb. 용매 대조군 — 시험물질 없이 용매만 투여, 용매 효과 보정\nc. 음성 대조군 — 정상 반응 비교 기준\nd. 양성 대조군 — 시판중 약물과 직접 비교, 상대 위치 평가\ne. 모의 대조군 — 수술·처치 효과 분리\n\n① a, c  ② b, e  ③ c, d  ④ a, d  ⑤ b, d", "jokboAnswer": "b, e", "claudeAnswer": "d만 틀림 (선지 중 d 단독 없음 → ⑤ b, d 또는 ③ c, d 중 d 포함 선지)", "explanation": "- a 옳음 — 비투여 대조군 정의 일치.\n- b 옳음 — 용매 대조군 정의 일치.\n- c 옳음 — 음성 대조군 정의 일치.\n- d **틀림** — \"시판약 상대 비교\"는 **비교물질(Reference) 대조군** 정의. 양성(Positive)은 시험계 신뢰성 검증.\n- e 옳음 — 모의(Sham) = 수술·처치 효과 분리.\n\n⚠️ 족보 정답 \"b, e\"는 **오류**. 교과서 기준 b·e 모두 옳음. **강의자료 기준 d 단독 틀림**. 5지선다 형식상 d 포함한 ⑤(b, d) 또는 ③(c, d)가 근접하나, 단독 오답인 d만 고려하면 **추가 오답이 없어 선지 구성 자체가 불완전**. (강의안 lec-18 슬라이드 9)", "tail": "", "scoreable": true, "correctIndices": [2, 4]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "5", "qid": "Q049", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵, S9 mix 대사활성화\"는 어떤 독성시험인가?\n\n① 면역독성  ② 생식발생  ③ 국소독성  ④ 유전독성  ⑤ 발암성", "jokboAnswer": "④", "claudeAnswer": "④ 유전독성", "explanation": "4년 연속 완전 동일. Ames + 염색체이상 + 소핵 + S9 mix = **유전독성시험** 3법. 즉답. (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": true, "correctIndices": [3]}, {"lecture": "L18-safety-testing", "round": "2025-기말", "num": "6", "qid": "Q050", "body": "발암성시험에 대한 설명으로 틀린 것을 모두 고른 것은?\n\na. 마우스 등 1종 이상의 설치류를 사용한다.\nb. 이유 후 12주 이상 성숙한 시기에 투여를 시작한다.\nc. 단회투여예비 → 반복투여예비 시험을 통해 최고 투여 용량을 결정한다.\nd. MTD를 시험자가 임의로 결정한다.\ne. 저용량 또는 음성 대조군 누적사망률이 95%에 이를 때 시험을 종료한다.", "jokboAnswer": "미표기", "claudeAnswer": "a, b, d, e", "explanation": "- a **틀림** — **설치류 2종 이상** 필수. \"1종 이상\"은 함정.\n- b **틀림** — **이유 후 6주 이내** 어린 동물 시작. \"12주 성숙기\"는 함정.\n- c 옳음 — DRF 순서(단회예비 → 반복예비 → MTD 결정).\n- d **틀림** — MTD = 체중증가 10% 이내 억제, **객관적** 결정.\n- e **틀림** — 누적사망률 **20%** 도달 시 종료.\nQ161·Q223·Q301 완전 동일. 발암성 4대 함정이 4년 연속. (강의안 lec-18 슬라이드 22)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "1", "qid": "Q155", "body": "다음 중 신약 개발·허가 절차에 대한 설명으로 틀린 것을 모두 고른 것은?\n\n①. 효능은 인증기관이 과학적인 방법으로 검증하면 된다.\n②. 전임상 안전성 시험은 개별기관의 인증을 받은 GLP에서만 수행 가능하다.\n③. GLP 인증 기관에는 IACUC 설치가 권장된다.\n④. 1상 임상시험은 정상인 지원자를 대상으로 안전성과 체내동태를 검토한다.\n⑤. 2상 임상시험은 환자를 대상으로 유효성을 확인한다.\n⑥. 3상 임상시험은 보통 3개 기관 90명 이상의 환자를 대상으로 유효성·용법용량·주의사항을 면밀히 검토한다.\n⑦. 시판 후 일정 기간 동안 부작용 증례를 수집하여 부작용이 나타나면 판매가 취소된다.", "jokboAnswer": "① (원본 오기, \"모두\"를 묻는 형식이면 ①②③)", "claudeAnswer": "①, ②, ③", "explanation": "- ① **틀림** — 효능 탐색 = 모든 연구기관·개인 수행 가능.\n- ② **틀림** — 전임상 안전성 = **MFDS 인증 GLP**. \"개별기관 인증\"은 함정.\n- ③ **틀림** — IACUC = **의무 설치**. \"권장\"은 함정.\n- ④~⑦ 옳음.\nQ045·Q216과 본문 완전 동일. 3대 함정 ①②③은 매년 반복. (강의안 lec-18 슬라이드 5)", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "6", "qid": "Q160", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵, S9 mix\"는 어떤 독성시험인가? (Q049·Q222·Q300 동일)", "jokboAnswer": "미표기", "claudeAnswer": "유전독성", "explanation": "4년 연속 완전 동일. Ames + 염색체이상 + 소핵 + S9 mix = **유전독성시험**. (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "29", "qid": "Q184", "body": "Ames test에 대한 설명으로 옳지 않은 것을 모두 고른 것은?\n\na. S. typhimurium·E. coli를 사용한 복귀돌연변이 시험\nb. 정상 균주는 his 없어도 증식, 돌연변이 후 his 필요\nc. S9 mix 첨가로 대사 활성화 산물 검출 가능\nd. Ames test로 포유류 대사활성화 재연 가능\ne. 식품·천연물도 변이원성 함유 가능\n\n① b, d  ② b, c  ③ a, d  ④ c, d  ⑤ a, b, d", "jokboAnswer": "①②④ (원본 오기)", "claudeAnswer": "① (b, d)", "explanation": "- b **틀림** — his⁻ 정상(영양요구체) → 변이원 → his⁺ 복귀. 진술은 정반대.\n- d **틀림** — prokaryote 기반, 포유류 대사 완전 재연 ❌.\n- a·c·e 옳음.\n→ **①**. Q072·Q247·Q325 동일 b·d 함정. (강의안 lec-18 슬라이드 19-20)", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "1", "qid": "", "body": "다음 대조군 설명 중 옳지 않은 것은?\n\n①. 비투여 대조군 — 기본 상태 기준값 확보\n②. 용매 대조군 — 용매 자체 효과 보정\n③. 양성 대조군 — 시판중 약물과 직접 비교, 상대 위치 평가\n④. 위약 대조군 — 플라시보 효과 배제\n⑤. 모의 대조군 — 수술·처치 효과 분리\n\n① ①  ② ②  ③ ③  ④ ④  ⑤ ⑤", "jokboAnswer": "③", "claudeAnswer": "③", "explanation": "③ \"시판중 약물과 직접 비교·상대 위치 평가\"는 **비교물질(Reference) 대조군**의 정의. **양성(Positive)**은 시험계 신뢰성 검증이 목적. Q299·Q047·Q158 동일 함정. 다른 선지 ①②④⑤ 모두 정의 일치. (강의안 lec-18 슬라이드 9)", "tail": "중복 (Q220)", "scoreable": true, "correctIndices": [2]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "3", "qid": "Q216", "body": "다음 중 신약 개발·허가 절차에 대한 설명으로 틀린 것은?\n\n①. 효능은 인증기관이 과학적인 방법으로 검증하면 된다.\n②. 전임상 안전성 시험은 개별기관의 인증을 받은 GLP에서만 수행 가능하다.\n③. GLP 인증 기관에는 IACUC 설치가 권장된다.\n④. 1상 임상시험은 정상인 지원자를 대상으로 안전성과 체내동태를 검토한다.\n⑤. 2상 임상시험은 환자를 대상으로 유효성을 확인한다.", "jokboAnswer": "①", "claudeAnswer": "① (단, ①②③이 모두 교과서 기준 틀림 — \"틀린 것 1개\" 형식상 가장 명확한 오류 ①)", "explanation": "- ① **틀림** — 효능 탐색(Efficacy tests) = **모든 연구기관·개인** 수행 가능. \"인증기관만\" = 안전성 조건을 잘못 가져옴.\n- ② **틀림** — 전임상 안전성 = **MFDS(식약처) 인증** GLP. \"개별기관 인증\"은 함정 표현.\n- ③ **틀림** — IACUC = **의무 설치**. \"권장\"은 함정.\n- ④ 옳음 — Phase 1 = 일반인 지원자, 안전성·체내동태.\n- ⑤ 옳음 — Phase 2 = 환자, 유효성.\n\"틀린 것 1개\" 형식이라 족보 정답은 ①로 수렴. 그러나 [2025-기말] #1에서는 \"모두\"를 묻고 ①②③이 정답. **3대 함정(①②③)**은 4년 연속 동일. (강의안 lec-18 슬라이드 5)", "tail": "", "scoreable": true, "correctIndices": [0, 1, 2]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "5", "qid": "Q218", "body": "독성학 용량 용어 매칭 — 틀린 것을 고르시오. (Q296/Q046 동일 구조, ADI = NOAEL × 안전계수 함정 포함)", "jokboAnswer": "미표기", "claudeAnswer": "ADI 선지 (NOAEL × 안전계수로 제시된 선지)", "explanation": "Q296·Q046 완전 동일 구조. **ADI/TDI = NOAEL ÷ 안전계수(100)**. \"×\"로 제시된 선지가 틀림. 안전계수 100 = 종간 10 × 개체간 10. (강의안 lec-18 슬라이드 10)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "6", "qid": "Q219", "body": "대조군의 종류와 그 목적에 대한 설명으로 틀린 것은? (Q047·Q158·Q297·Q299 동일 구조)", "jokboAnswer": "미표기", "claudeAnswer": "양성 대조군을 \"시판약 상대 비교\"로 제시한 선지", "explanation": "4년 동일 함정. **양성(Positive) = 시험계 신뢰성**, **비교물질(Reference) = 표준약 상대 비교**. 두 정의가 뒤바뀌면 틀림. (강의안 lec-18 슬라이드 9)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "7", "qid": "Q221", "body": "반복투여독성시험에 대한 설명으로 틀린 것을 모두 고른 것은?\n\na. 군당 설치류 암수 각 5마리 이상\nb. 절식 후 경구투여 한계용량 2 g/kg\nc. MTD·NOAEL 포함 3단계 이상 용량으로 설계하며 용량-반응 관계가 나타나도록 한다.\nd. 회복군 추가 권장\ne. 반복투여독성시험 전 반드시 단기간 용량시험이 필요하다.\n\n① a, b, e  ② a, b, d  ③ a, c, e  ④ b, d, e  ⑤ c, d, e", "jokboAnswer": "①②⑤ (원본 오기)", "claudeAnswer": "① (a, b, e)", "explanation": "- a **틀림** — 군당 암수 각 **10마리 이상**. \"5마리\"는 함정.\n- b **틀림** — 반복투여는 **절식 없이** 매일 2 g/kg. \"절식 후\"는 단회 조건.\n- c **옳음(이 문항 버전)** — \"용량-반응 관계가 나타나도록\"으로 제시 = 옳음.\n- d **옳음** — 회복군 권장.\n- e **틀림** — DRF는 필요 시 실시. \"반드시 모든 시험에서\"는 과잉.\n→ 틀린 건 a·b·e → **①**. (강의안 lec-18 슬라이드 17)", "tail": "", "scoreable": true, "correctIndices": [0]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "8", "qid": "Q222", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵 시험, S9 mix 대사활성화\"는 어떤 독성시험에 해당하는가?\n\n① 발암성  ② 단회투여  ③ 면역독성  ④ 반복투여  ⑤ 유전독성", "jokboAnswer": "⑤", "claudeAnswer": "⑤ 유전독성", "explanation": "Q300·Q049·Q160과 완전 동일 본문. Ames + 염색체이상 + 소핵 + S9 mix = **유전독성시험** 3법. 4년 연속 동일 출제 → 즉답. (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": true, "correctIndices": [4]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "9", "qid": "Q223", "body": "발암성 시험에 대한 설명으로 틀린 것을 모두 고른 것은?\n\na. 마우스 등 1종 이상의 설치류를 사용한다.\nb. 이유 후 12주 이상 성숙한 시기에 투여를 시작한다.\nc. 단회투여예비 → 반복투여예비 시험을 통해 최고 투여 용량을 결정한다.\nd. MTD를 시험자가 임의로 결정한다.\ne. 저용량 또는 음성 대조군 누적사망률이 95%에 이를 때 종료한다.\n\n① a, d, e  ② a, b, d, e  ③ b, d  ④ c, e  ⑤ a, b", "jokboAnswer": "②", "claudeAnswer": "② (a, b, d, e)", "explanation": "- a **틀림** — **설치류 2종 이상** 필수. \"1종 이상\"은 함정.\n- b **틀림** — **이유 후 6주 이내** 투여 시작. \"12주 성숙기\"는 함정.\n- c 옳음 — DRF 순서.\n- d **틀림** — MTD = 체중증가 10% 기준 **객관적** 결정.\n- e **틀림** — 누적사망률 **20%** 종료. \"95%\"는 정반대.\n→ 틀린 건 a·b·d·e → **②**. 3년 완전 동일. (강의안 lec-18 슬라이드 22)", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "31", "qid": "Q247", "body": "Prokaryotic cell 유전자돌연변이 시험(Ames test)에 대한 옳은 것을 고르시오.\n\na. S. typhimurium·E. coli를 사용한 복귀돌연변이 시험 = Ames test\nb. 정상 균주는 his 없어도 증식, 돌연변이 후 his 필요(역전)\nc. S9 mix 첨가로 대사 활성화 산물 검출 가능\nd. Ames test로 포유류 대사활성화 재연 가능\ne. 식품·천연물도 변이원성 함유 가능\n\n① a, b, c  ② a, c, e  ③ b, c, d  ④ a, d, e  ⑤ c, d, e", "jokboAnswer": "②", "claudeAnswer": "② (a, c, e)", "explanation": "\"옳은 것\"을 고르는 형식. 틀린 선지 b·d 제외.\n- a 옳음 — Ames 정의.\n- b **틀림** — his⁻(영양요구체) 정상 → 변이원 → his⁺ 복귀. 문항 진술은 정상·변이 상태를 뒤바꿈.\n- c 옳음 — S9 mix 대사활성화.\n- d **틀림** — prokaryote 기반, 포유류 대사 완전 재연 ❌.\n- e 옳음 — 천연물도 변이원성.\n→ 옳은 것 = a·c·e → **②**. Q072(2025) 동일. (강의안 lec-18 슬라이드 19-20)", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "32", "qid": "Q248", "body": "유전독성 평가의 문제점으로 틀린 것을 모두 고른 것은? (Q073·Q326·Q185 동일 — ③양성=결정적·④양성률∝발암성 함정)", "jokboAnswer": "미표기", "claudeAnswer": "③, ④", "explanation": "Q073·Q326과 완전 동일. ③ \"양성=신약 부적합 결정적 사유\" → 틀림(추가 시험 근거일 뿐). ④ \"양성률∝인체 발암성\" → 틀림(비례 안 함, false positive 다수). 4년 연속. (강의안 lec-18 슬라이드 20)", "tail": "", "scoreable": true, "correctIndices": [2, 3]}, {"lecture": "L18-safety-testing", "round": "2023-기말", "num": "33", "qid": "Q249", "body": "다단계 발암 과정에 대한 설명으로 옳지 않은 것을 모두 고른 것은? (Q074·Q186·Q327 동일 구조 변형)", "jokboAnswer": "⑦ (원본 OCR 오류, 선지 번호 불일치)", "claudeAnswer": "Promotion=유전자 돌연변이 선지, 한 단계만으로 종양 선지", "explanation": "Q074·Q327과 구조 동일. ③ Promotion=돌연변이(❌ Initiation이 돌연변이, Promotion은 세포 증식) / ⑤ 한 단계만으로 종양(❌ Init+Prom+Prog 3단계 필수). (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "1", "qid": "Q105", "body": "1. 다음 중 틀린 것을 모두 고른 것은?\na. 효능은 인증기관이 과학적인 방법으로 검증하면 된다.\nb. 전임상 안전성 시험은 개별기관의 인증을 받은 GLP에서만 수행 가능하다.\nc. GLP 인증 기관에는 IACUC 설치가 권장된다.\nd. 1상 임상 시험은 정상인 지원자를 대상으로 안전성과 체내 동태 등을 검토한다.\ne. 2상 임상 시험은 환자를 대상으로 유효성을 확인한다.\nf. 3상 임상 시험에서는 보통 3개 기관 90명 이상의 환자를 대상으로 유효성 검토는 물론 용법/용량 및 주의사항을 면밀히 검토한다.\ng. 시판 후 일정 기간 동안(4상 임상 보고) 부작용 증례를 수집하여 부작용이 나타나면 판매가 취소된다.", "jokboAnswer": "a, b, c", "claudeAnswer": "**a, b, c** (강의자료 기준)", "explanation": "**1) 배경**. 이 문항은 **신약 개발·허가 절차**를 묻는 문항으로, L18 강의안 lec-18 Unit 1~2의 내용에 해당한다. 본 L18 자료가 1차 분류이며, 사전 OCR은 L01로 잘못 분류했음.\n\n**2) 포인트**. L18 개념학습 Unit 1의 서술(교과서 09장 p.2-3 기반)을 기준으로 7개 선지를 판정한다.\n- a(효능은 인증기관이 과학적 방법으로 검증하면 된다) → **틀림**. L18 개념학습에 따르면 \"효능 탐색은 식약처 인증 GLP 기관에서만 수행하는 것이 아니며, 모든 연구기관이 검증 가능\". 이 선지는 \"인증기관이 검증하면 된다\"고 한정하므로 오답.\n- b(전임상 안전성 시험은 **개별기관 인증 GLP**에서만 수행) → **틀림**. GLP는 **식약처(MFDS) 인증** 기관이어야 하며, 개별기관이 자체 인증하는 것이 아니다.\n- c(GLP 인증 기관에 IACUC 설치가 **권장**된다) → **틀림**. IACUC는 권장이 아니라 **의무 설치**.\n- d(1상 임상은 정상인 지원자 안전성·체내동태) → 옳음. L18 Unit 1.\n- e(2상 임상은 환자 유효성 확인) → 옳음.\n- f(3상 임상은 다기관 대규모, 용법·용량·주의사항 면밀 검토) → 옳음.\n- g(4상 시판 후 부작용 수집, 부작용 시 판매 취소) → 옳음.\n\n**3) 정답 근거**. L18 개념학습 Unit 1(safety-testing-개념학습.md line 51~101) + 교과서 09장 p.2-3. 틀린 선지 = a·b·c이므로 족보 정답 \"a, b, c\" 일치.\n\n**4) 오답 소거**. 족보에 선지 번호가 주어지지 않아 별도 소거 불필요. 다만 d·e·f·g는 임상시험 4단계 정의로서 모두 옳다는 점에서 출제자의 전형적 \"임상시험 정의형\" 서술이다.\n\n**5) 함정**:\n- a의 \"인증기관이 검증하면 된다\"는 완곡한 한정 진술. 효능은 인증기관 독점이 아니다.\n- c의 \"권장\"은 환경호르몬 시리즈의 \"일부 지역 국한\"처럼 정반대 뒤틀기. IACUC는 **의무**.\n- b의 \"개별기관 인증\"은 \"식약처 인증\"을 뒤바꾼 것.", "tail": "— PDF 검증 확정 (2024-중간 #1과 동일 문항)", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "2", "qid": "Q106", "body": "조류의 독성학과 관련된 생리학적 차이점에 대한 설명 중 틀린 것들을 모두 고른 것은?\n\na. 흡입독성물질에 대한 조류들의 감수성은 탄광에서 카나리아를 위험지표로서 이용함에서 잘 보인다.\nb. 좀 더 높은 질량의 절대분당 환기량이 조류의 감수성을 증가시킨다.\nc. 가스교환 조직의 절대 환기량과는 상관없다.\nd. 횡류와 count-current 가스교환 작용기전이 조류의 감수성을 증가시킨다.\ne. 조류와 포유류의 가스확산장벽은 유사하여 조류의 감수성과는 상관이 없다.\nf. 조류와 포유류 사이에는 대사작용 경로와 능력에는 크게 차이점이 없으며 유기인제 살충제에 대해서 동일한 독성을 보인다.", "jokboAnswer": "c, e, f", "claudeAnswer": "시험범위 밖 (강의자료 내 해설 근거 없음). 족보 정답 c·e·f는 일반 독성학 지식으로 합리적이나 본 시험범위 강의자료에는 직접 근거 없음.", "explanation": "**1) 배경**. 이 문항은 **조류독성학(avian toxicology)** 주제로, 족보-범위감사.md(L03 내부 분류는 02장이지만 실제 주제는 44장 조류독성학)에 따르면 별도 장(章)이며 현행 수의독성학 L01~L18 범위에 직접 포함되지 않는다. 그러나 PDF 검증 결과 본 문항은 2022-기말 #2로 출제되었으므로, 2022년 강의에서는 조류독성학을 일부 다뤘을 가능성이 있다.\n\n**2) 포인트**. 모든 선지가 현행 시험범위 강의자료에 해당 내용이 없으므로, CLAUDE.md 교차 단원 원칙 4번 \"**모든 선지**가 시험범위 밖일 때만 '시험범위 아님' 표기 가능\"에 해당. 다만 일반 독성학 지식 수준의 참고 해설을 다음과 같이 제공.\n\n**3) 정답 근거 (참고 수준)**. 일반 조류 호흡생리학 지식 기준:\n- 조류는 체질량당 분당 환기량이 포유류보다 **높다** (b 옳음).\n- 조류의 가스확산장벽은 포유류보다 **얇다** (e의 \"유사\" 서술은 틀림).\n- cross-current(교차류) 가스교환 → 가스 추출 효율 ↑ → 흡입 독성 감수성 ↑ (d 옳음).\n- 가스교환 조직 절대 환기량과는 **상관 있다** (c의 \"상관없다\"는 틀림).\n- 조류와 포유류 대사 경로는 **차이가 있다** (f의 \"차이 없다\"는 틀림).\n\n**4) 오답 소거**. a(탄광 카나리아)·b(분당 환기량)·d(cross-current) = 옳음. c·e·f = 틀림 → 정답 c·e·f.\n\n**5) 함정**. 조류독성학 별도 장이지만 강영선 교수 2022년 출제 사례. 2026년 시험 출제 가능성은 낮으나 **참고 학습 권장**.", "tail": "— PDF 검증 확정", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "3", "qid": "Q107", "body": "3. 왼쪽의 의약품 등의 독성시험기준에서 용량에 관한 용어와 오른쪽 설명이 알맞게 짝지은 것은?\n\nA. 반수치사량 / B. 최대내성용량 / C. 무해용량 / D. 반수유효용량 / E. 1일섭취허용량\n\nㄱ. 어떠한 독성증상도 나타나지 않을 것으로 기대되는 최대 용량\nㄴ. 생애 전 기간을 통해 매일 섭취해도 우려할만한 위해성이 없는 용량\nㄷ. 대조군에 비하여 10% 이내의 체중증가 억제 또는 상승을 나타내면서 사망에 이르지 않는, 독성증상이 나타날 것으로 기대되는 최소용량\nㄹ. 투여동물의 절반에서 효과를 나타내는 용량\nㅁ. 투여동물의 절반이 사망하는 용량", "jokboAnswer": "미표기", "claudeAnswer": "**A-ㅁ, B-ㄷ, C-ㄱ, D-ㄹ, E-ㄴ**", "explanation": "**1) 배경**. 독성시험에서 용량은 **\"어떤 효과를 기준으로 정의하느냐\"**에 따라 여러 용어로 나뉜다. L18 개념학습 Unit 2(line 205~248)가 이 용어들을 정리한다.\n\n**2) 포인트**. 5개 용어의 정의를 정확히 매칭해야 한다.\n- **A. 반수치사량 (LD50, Lethal Dose 50)** → 시험동물 **절반이 사망하는 용량**. 대표적 급성독성 지표.\n- **B. 최대내성용량 (MTD, Maximum Tolerated Dose)** → 대조군 대비 체중 억제 10% 이내이면서 사망에 이르지 않는, **독성증상이 나타날 것으로 기대되는 최소용량**. 발암성 시험 고용량 설정 기준.\n- **C. 무해용량 (NOAEL, No Observed Adverse Effect Level)** → **어떠한 독성 증상도 나타나지 않을 것으로 기대되는 최대 용량**. 안전용량 설정의 기반.\n- **D. 반수유효용량 (ED50, Effective Dose 50)** → 투여동물 **절반에서 효과를 나타내는 용량**. 약리학적 유효성 지표.\n- **E. 1일섭취허용량 (ADI, Acceptable Daily Intake)** → **생애 전 기간을 통해 매일 섭취해도 우려할 만한 위해성이 없는 용량**. NOAEL ÷ 안전계수(100)로 산출.\n\n**3) 정답 근거**. 교과서 09장 그림 9.2 + L18 개념학습 Unit 2 용량 용어 정의.\n\n**4) 오답 소거** (매칭 오답 패턴):\n- **A(반수치사량)를 ㄹ로 매칭** → ED50과 혼동. LD50은 \"절반 **사망**\", ED50은 \"절반 **효과**\"로 구분.\n- **B(최대내성용량)를 ㄱ로 매칭** → NOAEL과 혼동. MTD는 \"**독성 나타나는** 최소용량\", NOAEL은 \"**독성 나타나지 않는** 최대용량\"으로 정반대.\n- **C(무해용량)를 ㄷ으로 매칭** → MTD와 혼동(같은 이유).\n- **D(반수유효용량)를 ㅁ로 매칭** → LD50과 혼동.\n- **E(1일섭취허용량)를 ㄱ으로 매칭** → NOAEL과 혼동. NOAEL은 \"시험동물 기준 독성 없는 최대용량\"(일회성), ADI는 \"인간이 매일 섭취해도 안전한 양\"(평생).\n\n**5) 함정**.\n- **\"50\"이 붙는 것 = LD50·ED50**: 모두 \"절반\"을 의미하지만 사망이냐 효과냐가 다르다.\n- **\"NOAEL vs MTD\"**: 이름만 보면 헷갈리나, NOAEL은 \"무해 최대\", MTD는 \"독성 최소\"로 **반대 경계**를 나타낸다.\n- **\"ADI = NOAEL ÷ 100\"**: L18 Unit 2에 명시. 안전계수 100 = 종간 10 × 개체간 10.", "tail": "— PDF 검증 확정", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "4", "qid": "Q108", "body": "각각의 개념에 알파벳과 자음을 알맞은 것끼리 짝을 지으세요.\n\na. 비투여대조군 / b. 용매대조군 / c. 음성대조군 / d. 위약대조군 / e. 양성대조군 / f. 비교물질군 / g. 투여전대조군 / h. 모의대조군\n\n(ㄱ~ㅇ 설명문 ↔ 알파벳 a~h 매칭)", "jokboAnswer": "③ (ㄱ-g, ㄴ-a, ㄷ-c, ㄹ-f, ㅁ-b, ㅂ-d, ㅅ-h, ㅇ-f) — 족보 원본 표기", "claudeAnswer": "족보 표기 매칭 순서 확인 불가하나, L18 자료 기준으로 각 대조군 정의를 표준 정답 세트로 제시", "explanation": "**1) 배경**. L18 Unit 9.4 대조군 8종을 매칭하는 문항. 각 대조군의 목적·기능을 정확히 분리 암기 필요.\n\n**2) 포인트** — 대조군 8종 표준 매칭 (L18 Unit 9.4, 교재 09장 p.5-6 근거):\n\n| 대조군 | 영문 | 기능 |\n|---|---|---|\n| **비투여 대조군** | Untreated control | 아무 처치도 하지 않아 기본(baseline) 상태 확인 |\n| **용매 대조군** | Vehicle control | 시험물질 없이 용매만 투여 — 용매 자체 영향 배제 |\n| **음성 대조군** | Negative control | 효과가 나타나지 않는 군 — 정상 반응 비교 기준 |\n| **위약 대조군** | Placebo control | 유효성분 없는 위약 투여 — 심리적(플라시보) 영향 배제 |\n| **양성 대조군** | Positive control | 효과·독성이 이미 입증된 물질 투여 — 실험 시스템 신뢰성 검증 |\n| **비교물질군** | Reference control | 이미 효과가 알려진 표준약·기준물질과 직접 비교 — 상대적 위치 평가 |\n| **투여전 대조군** | Predosing control | 투여 전 동일 개체 baseline — 개체 내(within-subject) 비교 |\n| **모의 대조군** | Sham control | 수술·처치만 동일하게 시행 — 처치 자체 영향 분리 |\n\n**3) 정답 근거**. 위 표의 8개 쌍이 완결된 정답 세트. 족보가 ③ 매칭 세트를 정답으로 표기.\n\n**4) 오답 소거** — 매칭 오답 패턴:\n- Positive ↔ Reference 뒤바꿈\n- Vehicle ↔ Negative 뒤바꿈\n- Predosing ↔ Untreated 뒤바꿈\n\n**5) 함정**:\n- **Positive control ≠ Reference control** — 이 둘의 혼동이 족보 반복 함정. Positive는 시스템 신뢰성 검증(시험이 작동하는지 확인), Reference는 표준약과 상대 비교.\n- **Vehicle control ≠ Negative control** — Vehicle은 \"용매 영향 배제\", Negative는 \"전체 비교 기준\". L18 Unit 9.4 Q047·Q158·Q300에서 반복 함정.\n- **Predosing ≠ Untreated** — Predosing은 \"같은 동물의 투여 전\", Untreated는 \"처치 자체를 안 한 다른 동물군\".", "tail": "— PDF 검증 확정", "scoreable": false, "correctIndices": []}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "5", "qid": "Q109", "body": "다음 중 반복투여에 관한 설명으로 틀린 것을 모두 고르시오.\n\na. 설치류는 군당 암, 수 각각 5마리 이상으로 한다.\nb. 절식하여 위내용물이 존재하지 않는 상태로 매일 2g/kg까지 투여할 수 있다.\nc. 용량 단계는 최대내성용량(MTD), 무해용량(NOAEL)을 포함하여 3단계 이상 설정하고 용량 반응 관계는 나타날 필요가 없다.\nd. 독성변화의 회복성과 지연성, 독성 검토를 위해 회복군 추가가 권장된다.\ne. 모든 반복투여에서 단기간 용량시험으로부터 용량 설정이 필요하다.\n\n① a,b  ② a,b,c,e  ③ b,d  ④ b,c,e  ⑤ c,d,e", "jokboAnswer": "② (a, b, c, e)", "claudeAnswer": "**② (a, b, c, e)**", "explanation": "**1) 배경**. L18 Unit 9.5 반복투여독성시험 범위. 단회투여(acute)와 반복투여(repeated) 시험의 동물 수·용량·기간·기타 조건을 비교 암기 필요.\n\n**2) 포인트**. 5개 선지 각각의 사실 여부를 판정.\n\n**3) 정답 근거** — 각 선지 판정 (L18 Unit 9.5 + 교재 09장 p.6-7 근거):\n- **a. 설치류 군당 암수 각 5마리 이상 — 틀림.** L18 Unit 9.5 비교표에 따르면 반복투여독성은 🔴 **설치류 군당 20마리**(단회투여는 10마리). 정확히는 \"암수 각 10마리씩 합 20마리\"로 설정하며, 5마리는 단회도 못 채우는 수다.\n- **b. 절식하여 매일 2g/kg까지 투여 — 틀림.** 반복투여 한계용량은 2g/kg이 맞지만, 반복투여는 🔴 **절식하지 않고 매일 투여**한다. 절식은 단회투여 한계용량 5g/kg 시험의 조건이다. \"절식 + 매일\"의 조합 자체가 오류.\n- **c. MTD·NOAEL 포함 3단계 이상, 용량반응관계 나타날 필요 없다 — 틀림.** 용량은 3단계 이상 설정, MTD·NOAEL 포함은 옳은 조건이나, 🔴 **용량-반응 관계가 나타나도록** 설계하는 것이 필수다. 교재 09장 p.7에 \"용량 단계는 용량-반응이 명확히 나타나도록 설정\"이라고 명시.\n- **d. 회복성·지연성 검토 위해 회복군 추가 권장 — 옳음.** L18 Unit 9.5 \"🔵 **회복군** 추가가 권장되며, 독성변화의 회복성과 지연성 독성을 검토한다.\"\n- **e. 모든 반복투여에서 단기간 용량시험으로부터 용량 설정 — 틀림.** 단기간 용량시험(range-finding study)은 용량 설정의 일반적 출발점이나, \"모든 반복투여에서 필수\"는 과한 일반화다. 경우에 따라 기존 단회독성·독성동태 자료로 용량을 설정할 수도 있다. 교재에 \"모든 경우 필수\"라는 서술은 없다.\n\n따라서 틀린 것은 **a, b, c, e**로 정답은 **②**.\n\n**4) 오답 소거**. d만 옳고 나머지 4개가 틀림. 단순 오답 소거가 아니라 4개 모두 골라내야 ② 적중.\n\n**5) 함정**:\n- a: \"5마리\"는 숫자 함정. 단회 10·반복 20을 정확히 기억할 것.\n- b: \"절식 + 2g/kg\"을 붙여 놓은 것이 핵심 함정. 절식=5g/kg(단회), 비절식=2g/kg(반복).\n- c: \"용량반응관계 필요 없다\"는 절대 오답 패턴. 용량반응관계는 독성시험의 근간.\n- d: 유일한 옳은 선지 — \"회복군\"이 유도하는 함정을 피해야.", "tail": "— PDF 검증 확정", "scoreable": true, "correctIndices": [1]}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "6", "qid": "Q110", "body": "다음에 해당하는 독성시험은?\n\n- 박테리아를 이용한 복귀돌연변이 시험\n- 포유류 배양세포를 이용한 체외 염색체이상시험 또는 마우스 림포마 TK 시험\n- 설치류 조혈세포를 이용한 체내 소핵시험\n\n① 면역독성시험  ② 생식발생독성시험  ③ 국소독성시험  ④ 발암성시험  ⑤ 유전독성시험", "jokboAnswer": "⑤ 유전독성시험", "claudeAnswer": "**⑤ 유전독성시험 (genotoxicity test)**", "explanation": "**1) 배경**. L18 Unit 9.6 유전독성시험 범위. 유전독성시험 표준 3종 배터리(in vitro 2 + in vivo 1)를 정확히 암기.\n\n**2) 포인트**. 문항이 제시한 3가지 시험은 **유전독성시험 표준 3종 배터리**다:\n1. **박테리아 복귀돌연변이 시험 = Ames test**: *S. typhimurium* 4균주(TA98·TA100·TA102·TA1535 등)와 *E. coli* WP2 uvrA를 사용. his⁻(히스티딘 영양요구) 균주가 돌연변이원에 의해 his⁺로 복귀하는 빈도를 측정한다. S9 mix(포유류 간 대사 활성화 분획) 처리로 간접 돌연변이원도 검출.\n2. **포유류 배양세포 염색체이상시험 / 마우스 림포마 TK 시험**: CHO·V79 등 포유류 세포에서 metaphase 100세포를 관찰해 구조적·수적 염색체 이상 검출, 또는 mouse lymphoma L5178Y 세포의 TK 유전자 돌연변이 측정.\n3. **설치류 조혈세포 체내 소핵시험 (in vivo)**: 마우스 등 설치류 골수도말표본에서 미성숙 다염성 적혈구(PCE) 내 소핵(micronucleus, 염색체 파편 잔재) 출현 빈도 측정. 개체당 2,000 PCE 검사.\n\n**3) 정답 근거**. 위 3종이 모두 유전독성시험에 속함. 정답 ⑤.\n\n**4) 오답 소거**:\n- ① 면역독성시험 — 면역계 기능 영향 평가(T·B 세포, 대식세포). 유전독성 시험 배터리 아님.\n- ② 생식발생독성시험 — Segment I·II·III tests(수태능·배태자·출생전후). 유전독성 아님.\n- ③ 국소독성시험 — 피부자극·안자극. 유전독성 아님.\n- ④ 발암성시험 — 2년 장기 투여로 암 발생 평가. 유전독성은 발암성의 \"스크리닝\" 목적이지만 시험 자체는 다르다.\n\n**5) 함정**:\n- 유전독성시험 ↔ 발암성시험 혼동: 유전독성시험은 DNA 손상·돌연변이 검출(단기), 발암성시험은 실제 종양 발생 확인(장기, 2년). Ames 양성이어도 반드시 발암성 양성은 아니다.\n- 3종 배터리 중 **소핵시험만 in vivo**이고 Ames·염색체이상은 in vitro. 체외·체내 배치 비율도 외울 것.\n- S9 mix(포유류 간 대사 분획)는 prokaryote인 박테리아가 포유류 대사를 모사하도록 추가하는 장치이며, 완전 재현은 불가하다 (Ames의 한계).", "tail": "— PDF 검증 확정", "scoreable": true, "correctIndices": [4]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "3", "qid": "Q296", "body": "다음 독성학 용어와 설명의 매칭 중 틀린 것은?\n\na. 반수치사량(LD50) — 시험동물의 50%를 사망하게 하는 추정 용량\nb. MTD(최대 내약 용량) — 90일 시험에서 체중증가를 10% 이내로 억제하는 최고 용량\nc. NOAEL(무해 최대 용량) — 부작용이 관찰되지 않는 최고 용량\nd. ED50(반수 유효 용량) — 대상 동물의 50%에서 효과를 나타내는 용량\ne. ADI/TDI(일일 섭취허용량) — NOAEL × 안전계수(100)\n\n① a  ② b  ③ c  ④ d  ⑤ e", "jokboAnswer": "⑤", "claudeAnswer": "⑤", "explanation": "- ① a 옳음 — LD50 = 단회 50% 치사 용량, 급성 지표\n- ② b 옳음 — MTD = 90일 반복에서 체중증가 10% 이내 억제\n- ③ c 옳음 — NOAEL = No Observed Adverse Effect Level\n- ④ d 옳음 — ED50 = 50% 효과 용량, TI=LD50/ED50\n- ⑤ e **틀림** — ADI = **NOAEL ÷ 안전계수(100)**. 곱하기(×)가 아니라 **나누기(÷)**. 안전계수 100 = 종간 차이 10 × 개체간 차이 10\n족보 함정 포인트는 단 하나: **÷를 ×로 바꾸기**. (강의안 lec-18 슬라이드 10)", "tail": "— PDF 검증 확정 (재분류)", "scoreable": true, "correctIndices": [4]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "5", "qid": "Q298", "body": "반복투여독성시험에서 용량 설정과 관련된 설명으로 옳은 것은?\n\na. 군당 설치류 암수 각 5마리 이상\nb. 한계용량은 체중 1 kg당 2 g (절식 후 매일 투여)\nc. 용량-반응 관계를 나타낼 수 있도록 MTD, NOAEL 포함 3단계 이상 용량 설정\nd. 회복군을 추가하여 독성 변화의 가역성·지연성 평가 권장\ne. 단기간 용량 시험(DRF)은 반복투여시험 전에 반드시 모든 시험에서 실시\n\n① a, b, e  ② a, c, e  ③ b, d  ④ c, d  ⑤ a, b, c, e", "jokboAnswer": "미표기(원본에 \"용량-반응 관계\"만 단편 표기)", "claudeAnswer": "④ (c, d)", "explanation": "- a **틀림** — 군당 설치류 암수 **각 10마리 이상**이 표준. \"5마리\"는 함정.\n- b **틀림** — 반복투여 2 g/kg은 맞지만 **절식하지 않고** 매일 투여. \"절식 후\"는 단회 조건과 섞인 함정.\n- c **옳음** — MTD·NOAEL 포함 3단계 이상, **용량-반응 관계 필수**.\n- d **옳음** — 회복군 권장.\n- e **틀림** — DRF는 필요 시. \"모든 시험에서 반드시\"는 과잉 요건.\n→ 옳은 선지만 모으면 c·d → **④**. (강의안 lec-18 슬라이드 17)", "tail": "— PDF 검증 확정 (재분류)", "scoreable": true, "correctIndices": [3]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "6", "qid": "Q300", "body": "\"박테리아 복귀돌연변이, 체외 염색체 이상, 체내 소핵 시험, S9 mix 대사활성화\"는 어떤 독성시험에 해당하는가?\n\n① 유전독성  ② 면역독성  ③ 국소독성  ④ 발암성  ⑤ 생식발생독성", "jokboAnswer": "①", "claudeAnswer": "① 유전독성", "explanation": "- ① **정답** — 유전독성시험(Genotoxicity) 표준 3종:\n  ① 박테리아 복귀돌연변이(**Ames test**) — S. typhimurium·E. coli\n  ② 체외 **염색체이상시험**\n  ③ 체내 **소핵시험**\n  + **S9 mix**(rat liver microsome, CYP450) = 대사활성화 모사\n- ② 면역독성 = ASA·PCA·GPMT·면역기능 (전혀 다름)\n- ③ 국소독성 = 피부·안점막·구강·질 (토끼 2~3 kg)\n- ④ 발암성 = 설치류 2종 24~30개월 (별개 시험, 유전독성 후속)\n- ⑤ 생식발생독성 = Segment I/II/III, 기형 이중염색 (다른 카테고리)\n이 문항은 **4년 연속(2022~2025) 완전 동일**. 서술 조합만 봐도 즉답 가능. (강의안 lec-18 슬라이드 19)", "tail": "— PDF 검증 확정 (재분류)", "scoreable": true, "correctIndices": [0]}, {"lecture": "L18-safety-testing", "round": "2024-기말", "num": "7", "qid": "Q301", "body": "발암성시험에 대한 설명으로 틀린 것을 모두 고른 것은?\n\na. 랫드·마우스·햄스터 중 2종 이상을 사용한다.\nb. 이유 후 12주 이상 성숙한 시기에 투여를 시작한다.\nc. 단회투여예비 → 반복투여예비 시험을 통해 최고 투여 용량을 결정한다.\nd. MTD(최대 내약 용량)를 시험자가 임의로 결정한다.\ne. 저용량 또는 음성 대조군 동물의 누적사망률이 95%에 이를 때 시험을 종료한다.\n\n① a, b, d, e  ② a, c, e  ③ b, d, e  ④ c, d  ⑤ b, e", "jokboAnswer": "③ (PDF page-60 답박스 직독 확인)", "claudeAnswer": "③ (b, d, e) — 족보와 일치", "explanation": "이 문항은 a가 \"**1종 이상**\" 또는 \"마우스 등 1종\"으로 제시(2024-기말 PDF 본문). 답박스에 \"답: 3\" 명시.\n- a **옳음** — 1종 이상(또는 2종) 필수 사용.\n- b **틀림** — 이유 후 **6주 이내** 어린 동물 시작. \"12주 성숙기\"는 함정.\n- c 옳음 — DRF(단회→반복) 순서 옳음.\n- d **틀림** — MTD = 체중증가 10% 이내 억제로 **객관적 결정**. \"임의\"는 함정.\n- e **틀림** — 누적사망률 **20%** 도달 시 종료. \"95%\"는 정반대 함정.\n→ 틀린 것만 모으면 b·d·e → **③**. (강의안 lec-18 슬라이드 22)", "tail": "— PDF 검증 확정 (재분류·정답 정정)", "scoreable": true, "correctIndices": [2]}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "29", "qid": "Q325", "body": "Prokaryotic cell 유전자돌연변이 시험(Ames test)에 대한 설명 중 틀린 것을 모두 고른 것은?\n\na. S. typhimurium·E. coli를 사용한 복귀돌연변이 시험 = Ames test\nb. 정상 균주는 histidine 없어도 증식한다. 돌연변이 후 his 필요(역전)\nc. S9 mix 첨가로 대사 활성화 산물도 검출 가능\nd. Ames test로 포유류 대사활성화를 재연 가능\ne. 식품·천연물도 변이원성을 함유할 수 있다\n\n① a, b  ② b, d  ③ a, c, d  ④ c, e  ⑤ a, d, e", "jokboAnswer": "미표기", "claudeAnswer": "② (b, d)", "explanation": "- a 옳음 — Ames test 정의.\n- b **틀림(핵심 함정)** — **완전히 반대**. 정상 균주는 **his⁻(영양요구체)** = his 결핍 배지에서 증식 **불가**. 변이원 노출 → **his⁺로 복귀(reverse mutation)** → 증식(콜로니 형성) → 변이원성 판정. 문항 진술은 정상 상태와 돌연변이 상태를 뒤바꿈.\n- c 옳음 — S9 mix(간 microsome CYP450) → 변이원 대사활성화 산물 검출.\n- d **틀림** — prokaryote(박테리아) 기반으로 포유류 대사를 **완전 재연 불가**. S9 mix는 보조적 모사에 그침.\n- e 옳음 — 천연물·식품에도 변이원성 가능(aflatoxin, heterocyclic amine 등).\n→ **②**. (강의안 lec-18 슬라이드 19-20)", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "30", "qid": "Q326", "body": "유전독성 평가의 문제점 중 틀린 것을 모두 고른 것은?\n\n①. 복구능력이 유발 횟수를 상회한다.\n②. 원핵생물 결과가 포유류와 항상 일치하지는 않는다.\n③. 양성 결과는 신약 부적합 결정의 결정적 사유이다.\n④. 양성 결과 발생률과 인체 발암성이 비례한다.\n⑤. 동물·사람 간 해독효소·대사율 차이가 크다.\n\n① ①②  ② ③④  ③ ①③④  ④ ②③⑤  ⑤ ③④⑤", "jokboAnswer": "③④", "claudeAnswer": "② (③, ④)", "explanation": "- ① 옳음 — DNA 복구 능력이 변이 유발을 상회하면 실제 무해.\n- ② 옳음 — 박테리아(원핵) 결과가 포유류와 항상 일치하진 않음.\n- ③ **틀림** — 유전독성 양성 결과는 **추가 시험 근거(참고 자료)**일 뿐. **신약 부적합 결정의 \"결정적 사유\"는 아님**.\n- ④ **틀림** — 양성 발생률과 인체 발암성은 **비례하지 않음** (false positive·negative 多). [2021-기말] #45 O/X와 동일 논지.\n- ⑤ 옳음 — 종간 효소·대사율 차이가 해석 한계.\n→ 틀린 건 ③·④ → **②**. **4년 연속 동일** 함정. (강의안 lec-18 슬라이드 20)", "tail": "", "scoreable": true, "correctIndices": [1, 2, 3]}, {"lecture": "L18-safety-testing", "round": "2022-기말", "num": "31", "qid": "Q327", "body": "다단계 발암 과정에 대한 설명으로 틀린 것을 모두 고른 것은?\n\n①. Initiation — DNA에 비가역적 돌연변이 유발\n②. Carcinogen — 개시·촉진 모두 가능\n③. Promotion — 유전자 돌연변이로 장기간 유발\n④. Promotion — 지속적 작용이 필요\n⑤. 개시·촉진 중 한 단계만으로 종양 형성 가능\n\n① ①③  ② ③⑤  ③ ①②③  ④ ②④⑤  ⑤ ③④⑤", "jokboAnswer": "미표기", "claudeAnswer": "② (③, ⑤)", "explanation": "- ① 옳음 — Initiation = DNA 비가역 돌연변이(adduct).\n- ② 옳음 — Carcinogen = 개시+촉진 양쪽.\n- ③ **틀림** — 정반대. **Initiation이 유전자 돌연변이**. **Promotion은 세포 증식 촉진** (유전자 돌연변이 ❌).\n- ④ 옳음 — Promotion은 지속·반복 노출 필요 (reversibility 일부 있음).\n- ⑤ **틀림** — Init + Prom + Prog **3단계 모두 필요**. 한 단계만으론 악성 종양 형성 ❌.\n→ 틀린 건 ③·⑤ → **②**. 4년 연속 동일 함정. (강의안 lec-18 슬라이드 19)", "tail": "", "scoreable": true, "correctIndices": [1, 2, 4]}]}, "Y2025-모아보기": {"lecture": "Y2025-모아보기", "title": "2025년 모아보기", "slug": "y2025", "questions": [{"lecture": "L03-concepts", "round": "2025-중간", "num": "2", "qid": "", "body": "Paracelsus의 용량반응관계에 대한 설명으로 틀린 것을 고르시오.\n\n① 용량과 반응에서의 차이는 화학 물질의 치료와 독성의 특징 사이에서 나타난다.\n② 치료와 독성은 투여량과 밀접하게 관련되어 있지만, 투여량에 따라 구분될 수 없다.\n③ 과거 독성학 분야에 대한 기본적인 개념들이 현재에도 받아들여지고 있다.\n④ 실험은 화학물질에 대한 반응을 검사하기 위해 요구된다.\n⑤ 노출량이 증가함에 따라 독성도 증가한다는 가정을 바탕으로 한다.", "jokboAnswer": "②", "claudeAnswer": "**②**", "explanation": "Paracelsus의 4개념(교재 p.7-8, 강의안 lec-03 chunk 2 슬라이드 1)은 다음과 같다:\n1. 실험은 화학물질에 대한 반응을 검사하기 위해 요구된다.\n2. 용량과 반응에서의 차이는 화학물질의 치료와 독성의 특징 사이에서 나타난다.\n3. **치료와 독성의 특징은 투여량에 밀접하게 관련되어 있고 🔴 구분할 수 있다.**\n4. 화학물질에 대한 특이도와 치료적 효과 및 독성효과를 확인할 수 있다.\n\n각 선지 판정:\n- ① 옳음 — Paracelsus 2번째 개념 그대로.\n- ② **틀림** — Paracelsus 3번째 개념은 \"투여량에 따라 **구분할 수 있다**\"인데, ②는 \"구분될 수 없다\"로 완전히 뒤집었다. 이것이 Paracelsus 명제의 핵심 — \"용량이 독과 약을 구분한다\"는 그의 본질적 통찰을 부정하는 서술이다.\n- ③ 옳음 — 교재는 Paracelsus의 독물 정의에 대해 \"앞으로도 계속 유효할 것이다\"라고 평가하며 현재까지 유효함을 인정.\n- ④ 옳음 — Paracelsus 1번째 개념.\n- ⑤ 옳음 — 용량-반응 관계의 전제 \"생체에 노출된 독성물질의 양에 비례하여 생체에서 독성작용의 정도가 나타난다\"와 일치.\n\n정답은 **②**. 족보 정답 일치.\n\n**함정 요소**:\n- ②의 \"구분될 수 없다\"는 Paracelsus 명제의 핵심을 부정하는 절대 오답 패턴. Paracelsus의 본질은 \"용량이 차이를 만든다\"이므로 \"구분 불가능\"은 반드시 오답.\n- 1과 4 개념을 헷갈리기 쉬우나 문항은 개념 내용 자체가 아니라 \"틀린 것\" 하나만 고르면 되므로 ②에 집중.\n\n근거 위치: 교재 p.7-8, 강의안 lec-03 chunk 2 슬라이드 1.", "tail": "", "scoreable": true, "correctIndices": [1]}, {"lecture": "L01-history", "round": "2025-중간", "num": "3", "qid": "Q002", "body": "3. 수의독성학의 역사에 대한 아래의 설명 중 틀린 것을 모두 고르면?\n\n①. 19세기 유기화학의 성장에 힘입어 실험독성학이 급속히 발달하였다.\n②. 1960년대 수천 명의 어린이들이 심한 기형으로 태어나게 한 비극적인 Thalidomide 사건은 화학물질의 배아, 태아, 그리고 환경에 대한 영향을 총괄적으로 이해하기 위한 시도를 촉발했다.\n③. Paraquat의 환경 오염 문제는 Rachel Carson의 '침묵의 봄'(1962)이 발간되는 계기로 이어졌다.\n④. 1890년대 방사능과 비타민 중독 사고로 인해 1960년대에 미국 순수식품 및 의약품 관련 법 중의 최초인 Wiley 법안이 통과되었다.\n⑤. 마취제와 소독제 등 새로운 물질의 발견은 화학물질이 실험동물에 이로운가 아니면 해로운가를 결정하기 위하여 최초의 대규모 생물학적 분석(복수동물연구)를 이용하게 했다.", "jokboAnswer": "3, 4, 5", "claudeAnswer": "🔴 ③, ④, ⑤", "explanation": "**1) 배경**. 2025년 중간고사에 출제된 **종합형 역사 문항**. 5개 선지 중 3개가 교묘하게 뒤틀려 있고, 수의독성학 역사의 주요 사건(유기화학·실험독성학 / Thalidomide / 침묵의 봄·DDT / Wiley 법안 / 방사능·비타민·bioassay)이 한 문항에 모두 등장한다. L01 시험 대비의 핵심 문항.\n\n**2) 포인트**. 선지별 판정:\n- ①(19세기 유기화학 성장 → 실험독성학 급속 발달) → **옳음**. 강의안 lec-01 chunk 3 슬라이드 2 \"19세기 전반: 유기화학의 급속 발전 → 실험독성학 기반 마련\". 주의 — 일부 변형 문항(Q107)에서는 \"**20세기** 유기화학\"으로 세기를 뒤틀어 오답 처리한다.\n- ②(1960년대 Thalidomide → 배아·태아·환경 영향 통합 이해 촉발) → **옳음**. Q360의 정답 서술과 동일. 개념학습 Unit 1.6.\n- ③(**Paraquat**의 환경오염 문제 → 침묵의 봄 1962 계기) → **틀림**. 침묵의 봄의 고발 대상은 **DDT**이다. Paraquat는 1950년대 후반 개발된 제초제로 폐섬유화 독성이 유명하며, Rachel Carson의 고발과 무관. lec-02 chunk 2 슬라이드 3.\n- ④(1890년대 방사능·비타민 **중독 사고** → 1960년대 Wiley 법안 통과) → **틀림**. 이 선지는 **두 가지 오류**가 겹쳐 있다. 첫째, 방사능·비타민은 \"**발견**\"이지 \"중독 사고\"가 아니다. 둘째, Wiley 법안(Pure Food and Drug Act)은 **1906년** 통과(미국 연방법), 1960년대가 아니다. 또한 방사능·비타민 발견이 Wiley 법안의 직접 인과라는 강의안 서술도 없다.\n- ⑤(**마취제·소독제** 발견 → 최초 대규모 bioassay 도입) → **틀림**. 최초 대규모 bioassay의 계기는 **방사능·비타민의 발견**(Q348 정답)이지 마취제·소독제가 아니다. lec-01 chunk 3 슬라이드 3.\n\n**3) 정답 근거**. 틀린 선지 = ③·④·⑤. 강의안 lec-01 chunk 3 슬라이드 2~3 + lec-02 chunk 2~3 + 개념학습 Unit 1.5·1.6.\n\n**4) 오답 소거 (선지 조합)**. 족보가 \"3, 4, 5\"로 정답을 지정했으며, Claude 재판정도 동일. ①·②는 명백한 역사적 사실이므로 제외.\n\n**5) 함정**. 이 한 문항에 **수의독성학 역사 3대 함정**이 모두 집약되어 있다:\n- 🔴 **\"Paraquat ↔ DDT\"** — 침묵의 봄의 대상은 DDT. Paraquat 넣으면 즉시 오답.\n- 🔴 **\"Wiley 법안 연도 1906년\"** — 1960년대 넣으면 즉시 오답. 방사능·비타민 \"발견\"이지 \"중독 사고\" 아님.\n- 🔴 **\"복수동물연구(bioassay) 계기 = 방사능·비타민\"** — 마취제·소독제 넣으면 즉시 오답.\n\n시험 직전에 이 3대 함정만 체화하면 역사 종합 문항에서 실점하지 않는다.", "tail": "", "scoreable": true, "correctIndices": [2, 3, 4]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "4", "qid": "", "body": "다음 용어들 중 틀린 것들로만 묶여있는 것은?\n\n① 독소(toxin): 독물 혹은 독(poison)과 같은 의미이며 이들 용어는 독성을 지닌 모든 물질을 지칭할 때 사용된다.\n② 독성(toxicity): 어떠한 독물이 생체에서 손상을 일으킬 수 있는 정도\n③ 중독증(toxicosis): 독물에 중독됨에 따라 발생하는 병적 상태\n④ 노출경로(route of exposure): 독성학에서는 주로 경구, 피부 및 호흡 세 가지의 경로를 통해 중독이 발생한다.\n⑤ 문턱용량(threshold dose): 독성물질의 노출 시에 독성이 보이는 최고용량을 의미한다.", "jokboAnswer": "①⑤", "claudeAnswer": "**①⑤**", "explanation": "교재 p.5-6 \"용어의 정의\" 전체를 근거로 판정:\n- ① **틀림** — 🔵 **독소(toxin)**는 교재 원문에서 \"생물체에 의해 생성된 독성물질\"로 정의되며 mycotoxin·zootoxin·phytotoxin이 예시. \"독물(poison) 혹은 독과 같은 의미이며 독성을 지닌 모든 물질을 지칭\"한다는 서술은 **독성물질(toxicant)**에 대한 정의다. 독소와 독물(=독성물질)을 동의어화한 것이 오류.\n- ② 옳음 — 교재 원문: \"독성(toxicity): 어떠한 독물이 생체에서 손상을 일으킬 수 있는 정도를 나타낸다.\"\n- ③ 옳음 — 교재 원문: \"중독증(toxicosis): 생물체가 독물(poison)에 노출되었을 때에 나타내는 병적상태를 뜻한다.\" 문항 서술은 축약 표현이나 의미 일치.\n- ④ 옳음 — 교재 원문: \"독성학에서는 주로 경구(oral), 피부(dermal), 호흡(inhalation)의 세 가지 경로를 통하여 독물의 노출이 발생한다.\"\n- ⑤ **틀림** — 교재 원문: \"🔴 **문턱용량(threshold dose): 생물체에서 독성물질의 노출 시에 독성이 관찰되는 최소용량을 의미한다.**\" ⑤는 \"독성이 보이는 **최고**용량\"이라고 썼는데, \"최고\"는 정반대 표현이며 \"보이는 최소용량 = 보이지 않는 최고용량\"으로 이해해야 한다.\n\n따라서 틀린 것은 **①⑤**. 족보 정답 일치.\n\n**함정 요소**:\n- **독소 ≠ 독물** — 이 구분이 [2025-중간] #4의 핵심 함정. 독소는 \"생물이 만든 독\", 독물은 \"독을 가진 모든 물질\"이라는 포괄-구체 관계. 영어로도 toxin(생물기원) vs toxicant(모든 독성물질)로 구분된다.\n- 문턱용량의 \"최소 vs 최고\" 뒤집기는 개념학습 Unit 2.1 적용 문항 #2에서도 함정 선지로 출제되었다.\n- ②·③·④는 모두 옳으므로 \"같은 의미\"·\"손상을 일으킬 수 있는 정도\"·\"경구·피부·호흡 3경로\" 같은 교재 키워드 표현에 익숙해질 것.\n\n근거 위치: 교재 p.5-6 \"1. 용어의 정의\".", "tail": "", "scoreable": true, "correctIndices": [0, 4]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "5", "qid": "", "body": "치료지수에 대한 설명으로 틀린 것을 모두 고르시오.\n\n① TI = 중간유효용량(ED50)/반수치사량(LD50)에 의해 구할 수 있다.\n② 치료지수는 약물이나 화학물질의 안전성 정도를 나타낸다.\n③ 동일한 약리작용을 갖는 두 가지 약물을 비교할 때 치료지수의 작용은 불가하다.\n④ 치료지수가 낮은 약물은 효능을 나타내는 농도와 독성을 나타내는 농도가 크게 차이 나므로 복용할 때 용량과 용법에 주의해야 한다.\n⑤ 어떤 약물이 상대적으로 치료지수가 더욱 크다면 그 약물은 환자의 투여 시에 더욱 안정하게 사용할 수 있다.", "jokboAnswer": "①③④", "claudeAnswer": "**①③④** (족보와 일치)", "explanation": "교재 p.5 \"치료지수\" 항목을 기준으로 각 선지 판정:\n- ① **틀림** — 🔴 **TI = LD50 / ED50**이 정확한 공식이다. ①은 분자·분모를 뒤바꾸어 ED50/LD50으로 썼으므로 오류. 치료지수는 \"치사량이 유효량의 몇 배인가\"를 묻는 비율이므로 분자에 LD50, 분모에 ED50이 와야 한다.\n- ② 옳음 — 교재 원문: \"약물이나 화학물질의 안전성(safety) 정도를 나타내는 지수.\"\n- ③ **틀림** — 교재 원문: \"같은 약리작용을 갖는 두 가지 약물을 비교하였을 때에, 어떤 약물이 상대적으로 치료지수가 더욱 크다면 그 약물은 환자에 투여 시에 더욱 안전하게 사용할 수 있다는 의미가 된다.\" 즉 교재는 동일 약리작용 약물 간 TI 비교를 **가능한 활용**으로 제시한다. ③의 \"불가하다\"는 정반대.\n- ④ **틀림** — 핵심 함정. TI가 **낮은** 약물은 유효 농도(ED50)와 치사 농도(LD50)가 **서로 가깝다**(차이가 **작다**). ④는 \"효능 농도와 독성 농도가 **크게 차이 나므로**\"라고 썼는데, TI가 낮다는 것은 곧 차이가 작다는 의미이므로 인과관계가 뒤집혔다. 결론 부분(\"용량·용법 주의\")은 맞지만 전제(\"크게 차이 나므로\")가 틀렸으므로 선지 전체가 틀린 것으로 판정.\n- ⑤ 옳음 — 교재 원문 그대로: TI가 클수록 더 안전하게 사용 가능.\n\n따라서 틀린 것은 **①③④**. 족보 정답과 일치한다.\n\n**함정 요소**:\n- ④는 \"결론은 맞지만 전제가 틀린\" 교묘한 선지. TI 낮음 ⇒ 효능과 독성 농도 **가까움** ⇒ 위험 ⇒ 용량·용법 주의. 이 인과 사슬을 정확히 이해할 것.\n- ①의 분자·분모 역전은 매우 흔한 단순 함정.\n- ③의 \"불가하다\" 역시 단순 부정 함정. TI의 주 용도가 바로 약물 간 안전성 비교라는 점을 상기.\n\n근거 위치: 교재 p.5 \"치료지수\".", "tail": "", "scoreable": true, "correctIndices": [0, 2, 3]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "6", "qid": "", "body": "안전계수에 대한 설명으로 틀린 것을 모두 고르시오.\n\n① 사람을 대상으로 한 실험에서는 10의 안전계수를 적용한다.\n② 만성 동물실험에서 얻은 무독성량의 경우에는 10의 안전계수를 적용한다.\n③ 개체 간 차이를 감안하여 10의 안전계수를 적용한다.\n④ 안전계수는 동물실험 등을 통한 화학물질의 독성시험 결과에서 얻은 무독성량으로부터 인간에게 적용하기 위한 안전한 잔류 허용량을 구하기 위해 사용하는 계수이다.\n⑤ 종 간 차이를 감안하여 10의 안전계수를 적용한다.", "jokboAnswer": "②⑤", "claudeAnswer": "**②** (족보와 다름 — ⑤는 옳음)", "explanation": "교재 p.5 \"안전계수\" 원문: \"일반적으로 동물 종 사이의 감수성 차이를 감안하여 10의 안전계수를, 그리고 개체간의 차이를 감안하여 10의 안전계수를 적용한다. 따라서 사람에서 관찰된 무독성량 값의 경우에는 그 값을 다시 안전계수 10으로 나누고, 만성 동물실험에서 얻은 무독성량의 경우는 그 값을 다시 안전계수 100으로 나누어 안전한 잔류허용량을 계산한다.\"\n\n각 선지 판정:\n- ① 옳음 — 사람 실험 데이터는 종간 차이가 없으므로 개체간 ×10만 적용해 총 안전계수 10.\n- ② **틀림** — 만성 동물실험 NOAEL은 🔴 **종간 10 × 개체간 10 = 100**으로 나눠야 한다. \"10\"만 적용한다는 서술은 오류.\n- ③ 옳음 — 개체간 차이 ×10.\n- ④ 옳음 — 안전계수의 정의 그대로.\n- ⑤ **옳음** (족보는 틀렸다고 했으나) — 종간 차이 ×10은 교재가 명시한 내용. 족보는 ⑤를 틀린 선지로 분류했지만 교재 원문과 완전히 부합하는 옳은 서술이다.\n\n따라서 **족보는 ②⑤이지만 강의안 p.5 근거로 ②만 틀림**. ⑤는 옳은 진술이므로 정답 세트에서 제외되어야 한다.\n\n**Claude 재판정 결론: ②만 정답** (족보 정답 ②⑤는 ⑤가 오기로 포함된 오류).\n\n**함정 요소**:\n- ② \"10만 적용\" 함정: 만성 동물실험 = 10(종간) × 10(개체간) = 100이라는 공식을 반드시 외울 것.\n- ⑤의 족보 오표기: 족보 정답을 무비판적으로 신뢰하면 ⑤도 틀렸다고 오해. **Claude는 강의자료 기준 독립 재판정**한다는 원칙상 ⑤는 옳다.\n- 사람 NOAEL(÷10) vs 동물 만성 NOAEL(÷100)의 이분법이 이 문항의 핵심.\n\n근거 위치: 교재 p.5 \"안전계수\".", "tail": "", "scoreable": true, "correctIndices": [1, 4]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "7", "qid": "", "body": "약리학과 독성학을 비교 설명한 것으로 옳지 않은 것을 모두 고른 것은?\n\n① 약물에 비하여 독성물질의 노출은 주로 경구 섭취, 흡입, 피부 노출, 그 외에 안구 노출 등으로 비교적 노출 경로가 제한적인 편이다.\n② 약물은 합리적으로 계획하여(rationally designed) 자발적으로(voluntarily) 투여된다.\n③ 용량 개념에 있어서는 약리학은 노출량의 개념이고, 독성학은 투여량의 개념으로 이해할 수 있다.\n④ 독성물질은 예상하지 못한 사이에 우발적으로(accidentally) 의식하지 못하고서(involuntarily) 노출이 일어난다.\n⑤ 체내에서의 분포, 대사, 배설의 원리나 용량반응관계의 적용 등에서는 약물이 독성물질이나 서로 유사한 점이 많다.", "jokboAnswer": "③", "claudeAnswer": "**③**", "explanation": "교재 p.7 \"3. 약리학과 독성학의 비교\" 전체가 이 문항의 정답 근거다. 선지 ①②④⑤는 모두 교재 원문 표현을 그대로 옮긴 옳은 진술이며, ③만 용량 개념을 뒤집어 놓았다.\n\n각 선지 판정:\n- ① 옳음 — 독성물질 노출 경로 제한성 (경구·흡입·피부·안구).\n- ② 옳음 — rationally designed + voluntarily.\n- ③ **틀림** — 🔴 **약리학 = 투여량(amount of administration), 독성학 = 노출량(amount of exposure)**. ③은 정확히 뒤집었다.\n- ④ 옳음 — accidentally + involuntarily.\n- ⑤ 옳음 — ADME + 용량-반응 관계 공통.\n\n정답은 **③**. 족보 정답 일치.\n\n**함정 요소**:\n- 이 유형은 2021·2022·2024·2025 모든 회차에서 반복 출제. 매번 \"약리학=투여량, 독성학=노출량\"을 뒤집은 선지가 정답. 영문 용어(amount of administration/exposure)까지 정확히 외울 것.\n- ①의 \"피하주사\"를 독성물질 경로에 포함할지 논란이 있으나(교재는 경구·흡입·피부·안구 4개를 명시), 이 문항은 피하주사 언급 없이 경구·흡입·피부·안구로 정확히 썼으므로 옳은 선지.\n\n근거 위치: 교재 p.7.", "tail": "", "scoreable": true, "correctIndices": [2]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "8", "qid": "Q007", "body": "8. 다음 중 독동학 구획 모형에 대한 설명으로 옳지 않은 것을 모두 고르시오.\n\n① 약물 기반의 생리학이나 해부학적 구조의 기질적 특성에 대한 정보가 필요하다.\n② 복합적 투여 용량에서 물질의 축적 정도를 설명하거나 예측하는데 값진 정보를 제공한다.\n③ 특별한 조직의 생물학 구획 간의 개별적인 전달 속도, 배출 경로에서 개별적인 기여와 비율 등을 정확하게 평가하고 반영할 수 있다.\n④ 특별한 조직에서 시간 경과, 노출 정도 및 약물의 특이한 속성, 배출을 정확하게 평가하거나 반영할 수 있다.\n⑤ 특별한 노출 정도까지 도달하기 위한 약물의 효용성, 투여 용량 및 투여 방식을 선택하는 데 이용할 수 있다.", "jokboAnswer": "1, 3, 4", "claudeAnswer": "**①③④**", "explanation": "교과서 p.14~15.\n- ① 오류: 구획모형은 생리·해부 정보 **없이도** 단순화 기술 가능.\n- ② 옳음.\n- ③ 오류: 개별 조직 구획 간 전달속도·배출 경로별 기여 **정확하게** 평가 = 구획모형 한계.\n- ④ 오류: 특정 조직 상세 반영 불가 = 구획모형 한계.\n- ⑤ 옳음.", "tail": "", "scoreable": true, "correctIndices": [0, 2, 3]}, {"lecture": "L03-concepts", "round": "2025-중간", "num": "9", "qid": "", "body": "독성물질에 의해 손상을 입는 세포나 조직, 장기는 선택적이다. 선택적 독성에 대해 설명한 것 중 틀린 것을 모두 고르시오.\n\n① 어떤 독성물질의 독성작용이 특정한 종류의 생물체 또는 생물체의 특정 부위의 조직에서만 관찰되는 경우에 이러한 독성을 선택적 독성이라 한다.\n② 제초제 파라콰트는 노출 경로 의존적으로 폐에서 선택적으로 높은 독성을 나타낸다.\n③ 선택적 독성이 발생하는 이유로 어떤 일부 종류의 생물체들에서 친화적이기 때문이고 표적 수용체와는 관련이 없다.\n④ 독성물질의 분해 능력이 어떤 일부 종류의 생물체 또는 특정 부위의 조직에서 다른 종류에 비해 더욱 높거나 또는 낮은 경우가 있다.\n⑤ 납이 경구로 노출된 때에는 신장이 일차표적 장기로 손상을 받는다.", "jokboAnswer": "②③⑤", "claudeAnswer": "**②③⑤** (족보와 일치 — ⑤는 교재 근거 부족으로 \"틀린 것\"으로 판정 가능)", "explanation": "교재 p.9-10 \"5. 표적기관과 선택적 독성\" 및 lec-03 chunk 4 슬라이드 2-3 기준으로 판정:\n- ① 옳음 — 선택적 독성의 교재 정의 그대로.\n- ② **틀림** — 🔴 **paraquat는 노출 경로에 상관없이(무관하게) 폐에서 선택적 독성**을 나타낸다. \"경로 의존적\"은 정반대 서술.\n- ③ **틀림** — 선택적 독성의 발생 원인 중 하나가 **표적 수용체의 존재 여부 및 친화력 차이**다 (교재 p.10 첫째·둘째 원인). \"표적 수용체와는 관련이 없다\"는 교재와 정면 충돌.\n- ④ 옳음 — 교재 p.10 셋째 원인: \"독성물질의 분해 능력이 특정 생물체 또는 특정 부위의 조직에서 다른 종류에 비해 더욱 높거나 또는 낮은 경우가 있다.\"\n- ⑤ **틀림** — 교재 p.9는 **카드뮴(cadmium)** 경구 노출 시 신장이 표적이라고 기술하며, **납(lead)**의 표적기관에 대한 명시적 서술은 02장에 없다. 일반 독성학 지식에서 납의 표적은 조혈계(적혈구·헴합성)·신경계(말초·중추)·신장 순으로 복합적이지만, 교재 02장 범위에서 \"납 경구 → 신장 일차표적\"이라는 명제는 근거가 없다. 따라서 교재 근거만으로는 ⑤를 옳다고 할 수 없으며, 족보도 ⑤를 틀린 선지로 분류.\n\n따라서 정답은 **②③⑤**. 족보 정답과 일치.\n\n**함정 요소**:\n- ②의 paraquat \"경로 의존/무관\"은 모든 선택적 독성 문항의 핵심 함정. 고정 암기.\n- ③은 교재의 세 원인(수용체 존재·친화력·분해 능력) 중 첫째·둘째를 통째로 부정하는 절대 오답 패턴.\n- ⑤는 함정형 선지 — 카드뮴-신장이 교재 원문인데 납으로 바꿔놓았다. 금속 독성물질의 표적은 개별적이므로 일반화 금지. 강의자료에 명시된 사례만 근거로 삼아야 한다.\n\n근거 위치: 교재 p.9-10 \"5. 표적기관과 선택적 독성\".", "tail": "", "scoreable": true, "correctIndices": [1, 2, 4]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "10", "qid": "Q009", "body": "10. 독동학과 독력학에 대한 설명 중 틀린 것을 모두 고르시오.\n\n① ADME 과정이 0차역학이고 비선형인 약동학과는 달리 독동학은 1차역학이고 선형이다.\n② 독성물질이 체내에서 어떤 생리적 움직임을 보이는가를 연구하는 학문을 독력학, 독성물질의 독성효과에 대한 분자적 기전, 상호작용을 연구하는 학문을 독동학이라고 한다.\n③ 독동학은 1차역학을 따르고 역학 과정이 선형으로 기대되는 약물의 낮은 농도와 관련된 ADME 과정의 역학이다.\n④ 독동학의 기본적인 목적은 독성 시험 조건 아래에서 생체이물의 투여 용량과 체내 순환하고 있는 농도 사이에 상관관계와 관련된 정보를 얻는데 있다.\n⑤ 독동학 자료는 후속 임상시험에서 투여 용량의 점진적인 증가를 위한 근거를 제공한다.", "jokboAnswer": "1, 2, 3", "claudeAnswer": "**①②**", "explanation": "교과서 p.11.\n- ① 오류: 약동학이 1차역학·선형. 독동학은 고용량에서 0차역학·비선형 **포함**. ①은 뒤바뀜.\n- ② 오류: 독동학 = ADME; 독력학 = 분자 기전. 명칭 뒤바뀜.\n- ③: 약동학의 정의이나 독동학의 저용량 측면 포함 서술로 해석 가능. 족보 정답 ③을 틀렸다고 한 것은 오류 가능성.\n- **Claude 재판정: ①②**.", "tail": "", "scoreable": true, "correctIndices": [0, 1]}, {"lecture": "L04-toxicokinetics", "round": "2025-중간", "num": "11", "qid": "Q010", "body": "11. 약물흡수 관련 특이 요소에 대해 틀린 것을 모두 고르시오.\n\n① 매우 작은 분자들(200Da 이하, 직경 4×10⁻⁴ μm 이하)은 별 어려움 없이 세포 구멍을 통과한다.\n② 이온화된 유형은 지방에 잘 용해되기 때문에 세포막의 지방층을 통하여 확산을 촉진한다.\n③ 세포막 양쪽의 pH와 pKa가 이온화 정도의 결정에 중요한 역할을 한다.\n④ 비이온화된 유형은 지방용해성이 낮기 때문에 세포막의 지방층을 통과하기 힘들다.\n⑤ 약물을 포함한 화학물질들은 이동이 지방이 많은 세포막을 통해 이루어진다.", "jokboAnswer": "2, 4", "claudeAnswer": "**②④**", "explanation": "교과서 p.12.\n- ② 오류: 이온형 = 지용성 낮음.\n- ④ 오류: **비이온형** = 지용성
